function getCurrentCity(wave) {
  const cityIdx = Math.min(Math.floor((wave - 1) / 3), CITIES.length - 1);
  return CITIES[cityIdx];
}

// Returns 0=day, 1=sunset, 2=night based on wave within city block
function getTimeOfDay(wave) {
  return (wave - 1) % 3; // 0=day, 1=sunset, 2=night
}

// ==================== FIREBASE LEADERBOARD ====================
const FIREBASE_URL = 'https://iron-dome-game-c9bba-default-rtdb.asia-southeast1.firebasedatabase.app';
let leaderboardData = [];
let leaderboardLoading = false;
let playerCountry = '';

// Detect country by IP for flag emoji
(async () => {
  try {
    const res = await fetch('https://api.country.is/');
    const data = await res.json();
    if (data && data.country) playerCountry = data.country;
  } catch (e) {}
})();

function countryToFlag(code) {
  if (!code || code.length !== 2) return '';
  return String.fromCodePoint(...[...code.toUpperCase()].map(c => 0x1F1E6 + c.charCodeAt(0) - 65));
}

let leaderboardRaw = {}; // keyed by Firebase key for deletion

async function fetchLeaderboard() {
  leaderboardLoading = true;
  try {
    const res = await fetch(`${FIREBASE_URL}/leaderboard.json`);
    if (!res.ok) throw new Error('fetch failed');
    const data = await res.json();
    if (data) {
      leaderboardRaw = data;
      const entries = Object.entries(data).map(([k, v]) => ({ ...v, _key: k }));
      entries.sort((a, b) => b.score - a.score);
      leaderboardData = entries.slice(0, 10);
    } else {
      leaderboardRaw = {};
      leaderboardData = [];
    }
  } catch (e) { leaderboardData = []; }
  leaderboardLoading = false;
}

function qualifiesForLeaderboard(s) {
  if (s <= 0) return false;
  if (leaderboardData.length < 10) return true;
  return s > leaderboardData[leaderboardData.length - 1].score;
}

async function submitScore(name, sc, wv) {
  try {
    // Add new score
    await fetch(`${FIREBASE_URL}/leaderboard.json`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name: name.toUpperCase().slice(0, 6), score: sc, wave: wv, country: playerCountry, date: Date.now() })
    });
    // Fetch all, then delete any beyond top 10
    const res = await fetch(`${FIREBASE_URL}/leaderboard.json`);
    if (res.ok) {
      const data = await res.json();
      if (data) {
        const entries = Object.entries(data).map(([k, v]) => ({ ...v, _key: k }));
        entries.sort((a, b) => b.score - a.score);
        // Delete entries beyond top 10
        const toDelete = entries.slice(10);
        for (const e of toDelete) {
          await fetch(`${FIREBASE_URL}/leaderboard/${e._key}.json`, { method: 'DELETE' });
        }
        leaderboardData = entries.slice(0, 10);
      }
    }
  } catch (e) {}
}
fetchLeaderboard();

// Play counter - Firebase
async function fetchPlayCount() {
  try {
    const res = await fetch(`${FIREBASE_URL}/stats/totalPlays.json`);
    if (res.ok) { const d = await res.json(); totalPlaysCount = d || 0; }
  } catch(e) {}
}
async function incrementPlayCount() {
  try {
    const res = await fetch(`${FIREBASE_URL}/stats/totalPlays.json`);
    let count = 0;
    if (res.ok) { const d = await res.json(); count = d || 0; }
    count++;
    await fetch(`${FIREBASE_URL}/stats/totalPlays.json`, {
      method: 'PUT', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(count)
    });
    totalPlaysCount = count;
  } catch(e) {}
}
fetchPlayCount();

canvas.height = Math.round(logicalH * dpr);
ctx.scale(dpr, dpr);

// ==================== AUDIO ENGINE ====================
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
let musicGain, masterGain;
function initAudio() {
  masterGain = audioCtx.createGain();
  masterGain.gain.value = 0.3;
  masterGain.connect(audioCtx.destination);
  musicGain = audioCtx.createGain();
  musicGain.gain.value = 0.12;
  musicGain.connect(audioCtx.destination);
}
initAudio();

function playSound(type) {
  if (audioCtx.state === 'suspended') audioCtx.resume();
  const now = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain);
  gain.connect(masterGain);
  switch(type) {
    case 'launch':
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(300, now);
      osc.frequency.exponentialRampToValueAtTime(800, now + 0.1);
      gain.gain.setValueAtTime(0.15, now);
      gain.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
      osc.start(now); osc.stop(now + 0.2);
      break;
    case 'intercept':
      osc.type = 'sine';
      osc.frequency.setValueAtTime(600, now);
      osc.frequency.exponentialRampToValueAtTime(1200, now + 0.08);
      osc.frequency.exponentialRampToValueAtTime(200, now + 0.25);
      gain.gain.setValueAtTime(0.2, now);
      gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
      osc.start(now); osc.stop(now + 0.3);
      const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.15, audioCtx.sampleRate);
      const data = buf.getChannelData(0);
      for (let i = 0; i < data.length; i++) data[i] = (Math.random()*2-1)*Math.exp(-i/(data.length*0.2));
      const noise = audioCtx.createBufferSource(); noise.buffer = buf;
      const ng = audioCtx.createGain();
      ng.gain.setValueAtTime(0.08, now);
      ng.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
      noise.connect(ng); ng.connect(masterGain);
      noise.start(now); noise.stop(now + 0.15);
      break;
    case 'hit':
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(150, now);
      osc.frequency.exponentialRampToValueAtTime(40, now + 0.4);
      gain.gain.setValueAtTime(0.25, now);
      gain.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
      osc.start(now); osc.stop(now + 0.4);
      break;
    case 'combo':
      osc.type = 'sine';
      osc.frequency.setValueAtTime(400, now);
      osc.frequency.setValueAtTime(500, now + 0.05);
      osc.frequency.setValueAtTime(600, now + 0.1);
      osc.frequency.setValueAtTime(800, now + 0.15);
      gain.gain.setValueAtTime(0.12, now);
      gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
      osc.start(now); osc.stop(now + 0.3);
      break;
    case 'boss_hit':
      osc.type = 'square';
      osc.frequency.setValueAtTime(80, now);
      osc.frequency.exponentialRampToValueAtTime(40, now + 0.5);
      gain.gain.setValueAtTime(0.2, now);
      gain.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
      osc.start(now); osc.stop(now + 0.5);
      break;
    case 'boss_destroy':
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(200, now);
      osc.frequency.exponentialRampToValueAtTime(50, now + 0.8);
      gain.gain.setValueAtTime(0.3, now);
      gain.gain.exponentialRampToValueAtTime(0.01, now + 0.8);
      osc.start(now); osc.stop(now + 0.8);
      const osc2b = audioCtx.createOscillator();
      const g2b = audioCtx.createGain();
      osc2b.connect(g2b); g2b.connect(masterGain);
      osc2b.type = 'sine';
      osc2b.frequency.setValueAtTime(300, now + 0.1);
      osc2b.frequency.exponentialRampToValueAtTime(600, now + 0.5);
      g2b.gain.setValueAtTime(0.15, now + 0.1);
      g2b.gain.exponentialRampToValueAtTime(0.01, now + 0.6);
      osc2b.start(now + 0.1); osc2b.stop(now + 0.6);
      break;
    case 'wave_complete':
      [0, 0.1, 0.2, 0.35].forEach((t, i) => {
        const o = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        o.connect(g); g.connect(masterGain);
        o.type = 'sine'; o.frequency.value = [523,659,784,1047][i];
        g.gain.setValueAtTime(0.12, now+t);
        g.gain.exponentialRampToValueAtTime(0.01, now+t+0.3);
        o.start(now+t); o.stop(now+t+0.3);
      });
      return;
    case 'gameover':
      [0, 0.2, 0.4].forEach((t, i) => {
        const o = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        o.connect(g); g.connect(masterGain);
        o.type = 'sawtooth'; o.frequency.value = [200,150,80][i];
        g.gain.setValueAtTime(0.15, now+t);
        g.gain.exponentialRampToValueAtTime(0.01, now+t+0.4);
        o.start(now+t); o.stop(now+t+0.4);
      });
      return;
    case 'siren':
      osc.type = 'sine';
      osc.frequency.setValueAtTime(440, now);
      osc.frequency.linearRampToValueAtTime(880, now + 1.5);
      osc.frequency.linearRampToValueAtTime(440, now + 3);
      gain.gain.setValueAtTime(0.08, now);
      gain.gain.setValueAtTime(0.08, now + 2.5);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 3);
      osc.start(now); osc.stop(now + 3);
      break;
    case 'game_siren':
      // Stylized "azaka" siren - wobbling tone, not too realistic
      osc.type = 'sine';
      for (let c = 0; c < 3; c++) {
        const ct = c * 1.2;
        osc.frequency.setValueAtTime(380, now + ct);
        osc.frequency.linearRampToValueAtTime(700, now + ct + 0.6);
        osc.frequency.linearRampToValueAtTime(380, now + ct + 1.2);
      }
      gain.gain.setValueAtTime(0.1, now);
      gain.gain.setValueAtTime(0.1, now + 3.2);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 3.6);
      osc.start(now); osc.stop(now + 3.6);
      // Add warble overtone
      const sirenOsc2 = audioCtx.createOscillator();
      const sirenG2 = audioCtx.createGain();
      sirenOsc2.connect(sirenG2); sirenG2.connect(masterGain);
      sirenOsc2.type = 'triangle';
      for (let c = 0; c < 3; c++) {
        const ct = c * 1.2;
        sirenOsc2.frequency.setValueAtTime(760, now + ct);
        sirenOsc2.frequency.linearRampToValueAtTime(1400, now + ct + 0.6);
        sirenOsc2.frequency.linearRampToValueAtTime(760, now + ct + 1.2);
      }
      sirenG2.gain.setValueAtTime(0.03, now);
      sirenG2.gain.setValueAtTime(0.03, now + 3.2);
      sirenG2.gain.exponentialRampToValueAtTime(0.001, now + 3.6);
      sirenOsc2.start(now); sirenOsc2.stop(now + 3.6);
      break;
    case 'big_explosion':
      // Deep boom + rumble for city hit
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(80, now);
      osc.frequency.exponentialRampToValueAtTime(20, now + 0.8);
      gain.gain.setValueAtTime(0.35, now);
      gain.gain.exponentialRampToValueAtTime(0.01, now + 0.8);
      osc.start(now); osc.stop(now + 0.8);
      // Sub-bass thud
      const subOsc = audioCtx.createOscillator();
      const subG = audioCtx.createGain();
      subOsc.connect(subG); subG.connect(masterGain);
      subOsc.type = 'sine';
      subOsc.frequency.setValueAtTime(45, now);
      subOsc.frequency.exponentialRampToValueAtTime(15, now + 0.6);
      subG.gain.setValueAtTime(0.3, now);
      subG.gain.exponentialRampToValueAtTime(0.01, now + 0.6);
      subOsc.start(now); subOsc.stop(now + 0.6);
      // Crackle noise
      const expBuf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.5, audioCtx.sampleRate);
      const expData = expBuf.getChannelData(0);
      for (let i = 0; i < expData.length; i++) expData[i] = (Math.random()*2-1) * Math.exp(-i/(expData.length*0.15));
      const expNoise = audioCtx.createBufferSource(); expNoise.buffer = expBuf;
      const expNG = audioCtx.createGain();
      expNG.gain.setValueAtTime(0.15, now);
      expNG.gain.exponentialRampToValueAtTime(0.001, now + 0.5);
      expNoise.connect(expNG); expNG.connect(masterGain);
      expNoise.start(now); expNoise.stop(now + 0.5);
      // Delayed secondary boom
      const sec = audioCtx.createOscillator();
      const secG = audioCtx.createGain();
      sec.connect(secG); secG.connect(masterGain);
      sec.type = 'sine';
      sec.frequency.setValueAtTime(60, now + 0.15);
      sec.frequency.exponentialRampToValueAtTime(25, now + 0.5);
      secG.gain.setValueAtTime(0.15, now + 0.15);
      secG.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
      sec.start(now + 0.15); sec.stop(now + 0.5);
      break;
    case 'hatikvah':
      // Hatikvah - from actual MIDI, E minor key
      // Extracted from MIDI: E4 F#4 G4 A4 B4. B4. C5 B4 C5 E5 B4.. A4.. A4 A4 G4. G4. F#4 E4 F#4 G4 E4..
      // TPQ=480: 240=eighth, 480=quarter, 960=half
      // Using 0.25s = eighth, 0.5s = quarter, 1s = half
      const hNotes = [
        // "Kol od ba-le-vav" (ascending E F# G A)
        [329.63, 0.25],  // E4
        [369.99, 0.25],  // F#4
        [392.00, 0.25],  // G4
        [440.00, 0.25],  // A4
        // "p'ni-mah" (B held, B again)
        [493.88, 0.5],   // B4 (quarter)
        [493.88, 0.5],   // B4 (quarter)
        // "ne-fesh ye-hu-di" (C B C E)
        [523.25, 0.25],  // C5
        [493.88, 0.25],  // B4
        [523.25, 0.25],  // C5
        [659.26, 0.25],  // E5
        // "ho-mi-yah" (B held long)
        [493.88, 1.0],   // B4 (half)
        // "A-" (A held)
        [440.00, 0.5],   // A4
        // "A A G"
        [440.00, 0.25],  // A4
        [440.00, 0.25],  // A4
        [392.00, 0.5],   // G4
        // "G" held
        [392.00, 0.5],   // G4
        // "F# E F# G"
        [369.99, 0.25],  // F#4
        [329.63, 0.25],  // E4
        [369.99, 0.25],  // F#4
        [392.00, 0.25],  // G4
        // "E" held long
        [329.63, 1.0],   // E4 (half, end of phrase 1)
      ];
      let hTime = 0;
      hNotes.forEach(([freq, dur]) => {
        const ho = audioCtx.createOscillator();
        const hg = audioCtx.createGain();
        ho.connect(hg); hg.connect(masterGain);
        ho.type = 'sine';
        ho.frequency.value = freq;
        hg.gain.setValueAtTime(0.1, now + hTime);
        hg.gain.setValueAtTime(0.1, now + hTime + dur * 0.8);
        hg.gain.exponentialRampToValueAtTime(0.001, now + hTime + dur);
        ho.start(now + hTime); ho.stop(now + hTime + dur);
        // Add harmony octave
        const hh = audioCtx.createOscillator();
        const hhg = audioCtx.createGain();
        hh.connect(hhg); hhg.connect(masterGain);
        hh.type = 'triangle';
        hh.frequency.value = freq * 2;
        hhg.gain.setValueAtTime(0.03, now + hTime);
        hhg.gain.exponentialRampToValueAtTime(0.001, now + hTime + dur);
        hh.start(now + hTime); hh.stop(now + hTime + dur);
        hTime += dur;
      });
      // Applause (noise bursts)
      const appDur = 5;
      const appBuf = audioCtx.createBuffer(1, audioCtx.sampleRate * appDur, audioCtx.sampleRate);
      const appData = appBuf.getChannelData(0);
      for (let i = 0; i < appData.length; i++) {
        // Sporadic claps - random bursts
        const t = i / audioCtx.sampleRate;
        const clap = Math.random() > 0.97 ? (Math.random() * 2 - 1) * 0.3 : 0;
        const ambient = (Math.random() * 2 - 1) * 0.02;
        // Fade in and out
        const env = t < 0.5 ? t * 2 : t > 4 ? (5 - t) : 1;
        appData[i] = (clap + ambient) * env;
      }
      const appSrc = audioCtx.createBufferSource(); appSrc.buffer = appBuf;
      const appG = audioCtx.createGain();
      appG.gain.setValueAtTime(0.08, now);
      appSrc.connect(appG); appG.connect(masterGain);
      appSrc.start(now); appSrc.stop(now + appDur);
      return;
  }
}

let musicPlaying = false, musicIntervalId = null;
function startMusic() {
  if (musicPlaying) return;
  musicPlaying = true;
  let beat = 0;
  const bassNotes = [55,55,65,55,73,65,55,55];
  musicIntervalId = setInterval(() => {
    if (audioCtx.state === 'suspended') return;
    const now = audioCtx.currentTime;
    const bass = audioCtx.createOscillator();
    const bg = audioCtx.createGain();
    bass.connect(bg); bg.connect(musicGain);
    bass.type = 'triangle';
    bass.frequency.value = bassNotes[beat % bassNotes.length];
    bg.gain.setValueAtTime(0.15, now);
    bg.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
    bass.start(now); bass.stop(now + 0.3);
    if (beat % 2 === 0) {
      const buf = audioCtx.createBuffer(1, audioCtx.sampleRate*0.05, audioCtx.sampleRate);
      const d = buf.getChannelData(0);
      for (let i = 0; i < d.length; i++) d[i] = (Math.random()*2-1)*Math.exp(-i/(d.length*0.15));
      const n = audioCtx.createBufferSource(); n.buffer = buf;
      const ng2 = audioCtx.createGain();
      ng2.gain.setValueAtTime(0.04, now);
      ng2.gain.exponentialRampToValueAtTime(0.001, now + 0.05);
      n.connect(ng2); ng2.connect(musicGain);
      n.start(now); n.stop(now + 0.05);
    }
    beat++;
  }, 250);
}
function stopMusic() {
  musicPlaying = false;
  if (musicIntervalId) { clearInterval(musicIntervalId); musicIntervalId = null; }
}

// ==================== CONSTANTS ====================
const W = logicalW, H = logicalH;
const DESIGN_W = 1100; // original design width for scaling
const scaleX = W / DESIGN_W;
const fontS = isMobileDevice ? 1.6 : 1; // font scale for mobile readability
function fz(px) { return Math.round(px * fontS); } // scaled font size helper
const GROUND_Y = H - 55;
const SEA_Y = GROUND_Y + 5;
const batteryX = W / 2;
const batteryY = GROUND_Y - 15;

// ==================== PRERENDER TEL AVIV SKYLINE ====================
const cityCanvas = document.createElement('canvas');
cityCanvas.width = Math.round(W * dpr);
cityCanvas.height = Math.round(H * dpr);
const cctx = cityCanvas.getContext('2d');
cctx.scale(dpr, dpr);

function drawBuilding(x, w, h, opts = {}) {
  const y = GROUND_Y - h;
  // Main structure - smoother gradient with more stops
  const grad = cctx.createLinearGradient(x, y, x + w, y + h);
  const base = opts.color || [40, 50, 70];
  grad.addColorStop(0, `rgb(${base[0]+25},${base[1]+25},${base[2]+25})`);
  grad.addColorStop(0.15, `rgb(${base[0]+18},${base[1]+18},${base[2]+20})`);
  grad.addColorStop(0.4, `rgb(${base[0]+5},${base[1]+5},${base[2]+8})`);
  grad.addColorStop(0.65, `rgb(${base[0]},${base[1]},${base[2]})`);
  grad.addColorStop(0.85, `rgb(${base[0]-5},${base[1]-5},${base[2]-3})`);
  grad.addColorStop(1, `rgb(${base[0]-12},${base[1]-12},${base[2]-8})`);
  cctx.fillStyle = grad;

  if (opts.shape === 'round') {
    // Azrieli round tower
    cctx.beginPath();
    cctx.ellipse(x + w/2, y + 10, w/2, 10, 0, 0, Math.PI, true);
    cctx.lineTo(x, GROUND_Y);
    cctx.lineTo(x + w, GROUND_Y);
    cctx.closePath();
    cctx.fill();
    cctx.fillRect(x, y + 10, w, h - 10);
  } else if (opts.shape === 'triangle') {
    // Azrieli triangle tower
    cctx.beginPath();
    cctx.moveTo(x + w/2, y);
    cctx.lineTo(x + w + 5, y + 20);
    cctx.lineTo(x + w, GROUND_Y);
    cctx.lineTo(x, GROUND_Y);
    cctx.lineTo(x - 5, y + 20);
    cctx.closePath();
    cctx.fill();
  } else if (opts.shape === 'spire') {
    // Modern spire building
    cctx.fillRect(x, y + 30, w, h - 30);
    cctx.beginPath();
    cctx.moveTo(x + w/2, y);
    cctx.lineTo(x + w - 2, y + 30);
    cctx.lineTo(x + 2, y + 30);
    cctx.closePath();
    cctx.fill();
  } else if (opts.shape === 'dome') {
    // Dome silhouette - half circle on rectangular base
    const baseH = h * 0.35;
    const domeH = h - baseH;
    cctx.fillRect(x, GROUND_Y - baseH, w, baseH);
    cctx.beginPath();
    cctx.arc(x + w/2, GROUND_Y - baseH, w/2, Math.PI, 0);
    cctx.closePath();
    cctx.fill();
    // Dome highlight
    cctx.fillStyle = `rgba(${base[0]+30},${base[1]+30},${base[2]+20}, 0.3)`;
    cctx.beginPath();
    cctx.arc(x + w/2 - w*0.1, GROUND_Y - baseH - w*0.08, w*0.3, Math.PI, 0);
    cctx.closePath();
    cctx.fill();
  } else if (opts.shape === 'wall') {
    // Old city wall with crenellations (merlons)
    const wallH = h * 0.7;
    const crenH = h * 0.3;
    const crenW = w / 12;
    cctx.fillRect(x, GROUND_Y - wallH, w, wallH);
    // Crenellations
    for (let cx = x; cx < x + w - crenW; cx += crenW * 2) {
      cctx.fillRect(cx, GROUND_Y - wallH - crenH, crenW, crenH);
    }
    // Stone texture lines
    cctx.strokeStyle = `rgba(${base[0]-15},${base[1]-15},${base[2]-15}, 0.4)`;
    cctx.lineWidth = 0.5;
    for (let ly = GROUND_Y - wallH + 8; ly < GROUND_Y; ly += 10) {
      cctx.beginPath();
      cctx.moveTo(x, ly);
      cctx.lineTo(x + w, ly);
      cctx.stroke();
      // Vertical stone joints (offset every other row)
      const offset = ((ly - (GROUND_Y - wallH)) / 10) % 2 === 0 ? 0 : 8;
      for (let jx = x + offset; jx < x + w; jx += 16) {
        cctx.beginPath();
        cctx.moveTo(jx, ly);
        cctx.lineTo(jx, ly + 10);
        cctx.stroke();
      }
    }
  } else if (opts.shape === 'lighthouse') {
    // Lighthouse - tapered cylinder with lamp room
    const baseW = w;
    const topW = w * 0.5;
    const lampH = 18;
    const bodyH = h - lampH;
    // Tapered body
    cctx.beginPath();
    cctx.moveTo(x, GROUND_Y);
    cctx.lineTo(x + (baseW - topW)/2, y + lampH);
    cctx.lineTo(x + (baseW + topW)/2, y + lampH);
    cctx.lineTo(x + baseW, GROUND_Y);
    cctx.closePath();
    cctx.fill();
    // Stripes (red/white)
    const stripeCount = 5;
    const stripeH = bodyH / stripeCount;
    for (let si = 0; si < stripeCount; si++) {
      if (si % 2 === 0) {
        const sTop = y + lampH + si * stripeH;
        const sBot = sTop + stripeH;
        const tRatio1 = (sTop - (y + lampH)) / bodyH;
        const tRatio2 = (sBot - (y + lampH)) / bodyH;
        const lx1 = x + (baseW - topW)/2 * (1 - tRatio1) + 0 * tRatio1;
        const rx1 = x + (baseW + topW)/2 * (1 - tRatio1) + baseW * tRatio1;
        const lx2 = x + (baseW - topW)/2 * (1 - tRatio2) + 0 * tRatio2;
        const rx2 = x + (baseW + topW)/2 * (1 - tRatio2) + baseW * tRatio2;
        cctx.fillStyle = 'rgba(180, 50, 50, 0.4)';
        cctx.beginPath();
        cctx.moveTo(lx1, sTop);
        cctx.lineTo(rx1, sTop);
        cctx.lineTo(rx2, sBot);
        cctx.lineTo(lx2, sBot);
        cctx.closePath();
        cctx.fill();
      }
    }
    // Lamp room (gallery)
    const lampW = topW * 1.4;
    const lampX = x + baseW/2 - lampW/2;
    cctx.fillStyle = '#444';
    cctx.fillRect(lampX, y + 4, lampW, lampH - 4);
    // Lamp glass
    cctx.fillStyle = 'rgba(255, 255, 150, 0.8)';
    cctx.fillRect(lampX + 2, y + 6, lampW - 4, lampH - 10);
    // Light glow
    cctx.fillStyle = 'rgba(255, 255, 100, 0.15)';
    cctx.beginPath();
    cctx.arc(x + baseW/2, y + lampH/2, 30, 0, Math.PI * 2);
    cctx.fill();
    // Cap
    cctx.fillStyle = '#333';
    cctx.beginPath();
    cctx.moveTo(lampX - 2, y + 4);
    cctx.lineTo(x + baseW/2, y - 4);
    cctx.lineTo(lampX + lampW + 2, y + 4);
    cctx.closePath();
    cctx.fill();
    return; // Skip windows for lighthouse
  } else if (opts.shape === 'crane') {
    // Port crane - thin vertical mast with horizontal jib
    const mastW = w * 0.2;
    const mastX = x + w/2 - mastW/2;
    // Vertical mast
    cctx.fillStyle = `rgb(${base[0]},${base[1]},${base[2]})`;
    cctx.fillRect(mastX, y, mastW, h);
    // Horizontal jib (extends right)
    const jibH = 4;
    cctx.fillRect(x - w*0.3, y, w * 1.6, jibH);
    // Counter-jib (short, extends left)
    cctx.fillRect(x - w*0.8, y + 2, w * 0.5, jibH - 1);
    // Counterweight
    cctx.fillStyle = `rgb(${base[0]-15},${base[1]-15},${base[2]-15})`;
    cctx.fillRect(x - w*0.8, y + jibH, w*0.2, 12);
    // A-frame support struts
    cctx.strokeStyle = `rgb(${base[0]+10},${base[1]+10},${base[2]+10})`;
    cctx.lineWidth = 1.5;
    // Left strut
    cctx.beginPath();
    cctx.moveTo(mastX, y + h * 0.3);
    cctx.lineTo(x - w*0.3, y);
    cctx.stroke();
    // Right strut
    cctx.beginPath();
    cctx.moveTo(mastX + mastW, y + h * 0.3);
    cctx.lineTo(x + w * 1.3, y);
    cctx.stroke();
    // Trolley cable
    cctx.strokeStyle = 'rgba(150,150,150,0.5)';
    cctx.lineWidth = 0.8;
    const trolleyX = x + w * 0.8;
    cctx.beginPath();
    cctx.moveTo(trolleyX, y + jibH);
    cctx.lineTo(trolleyX, y + jibH + h*0.35);
    cctx.stroke();
    // Hook
    cctx.fillStyle = '#888';
    cctx.beginPath();
    cctx.arc(trolleyX, y + jibH + h*0.35, 3, 0, Math.PI*2);
    cctx.fill();
    // Warning light
    cctx.fillStyle = 'rgba(255, 50, 50, 0.7)';
    cctx.beginPath();
    cctx.arc(mastX + mastW/2, y - 3, 2.5, 0, Math.PI*2);
    cctx.fill();
    cctx.fillStyle = 'rgba(255, 50, 50, 0.1)';
    cctx.beginPath();
    cctx.arc(mastX + mastW/2, y - 3, 8, 0, Math.PI*2);
    cctx.fill();
    return; // Skip windows for crane
  } else if (opts.shape === 'sail') {
    // Sail Tower Haifa - asymmetric sail shape
    // Right edge is straight vertical, left edge curves out
    cctx.beginPath();
    cctx.moveTo(x + w, GROUND_Y); // bottom right
    cctx.lineTo(x + w, y); // top right (tall straight edge)
    // Sail curve from top to bottom-left
    cctx.quadraticCurveTo(x + w*0.3, y + h*0.15, x, y + h*0.5);
    cctx.lineTo(x + w*0.15, GROUND_Y); // bottom left
    cctx.closePath();
    cctx.fill();
    // Glass panels (vertical lines)
    cctx.strokeStyle = 'rgba(120, 170, 220, 0.2)';
    cctx.lineWidth = 0.8;
    for (let px = x + w*0.2; px < x + w; px += 6) {
      cctx.beginPath();
      const topY = y + (1 - (px - x)/w) * h * 0.4;
      cctx.moveTo(px, Math.max(topY, y));
      cctx.lineTo(px, GROUND_Y);
      cctx.stroke();
    }
    // Highlight edge
    cctx.strokeStyle = `rgba(${base[0]+40},${base[1]+40},${base[2]+40}, 0.4)`;
    cctx.lineWidth = 1.5;
    cctx.beginPath();
    cctx.moveTo(x + w, y);
    cctx.lineTo(x + w, GROUND_Y);
    cctx.stroke();
  } else if (opts.shape === 'stepped') {
    // Stepped pyramid / terraces (Bahai Gardens)
    const steps = 7;
    const stepH = h / steps;
    const maxW = w;
    const minW = w * 0.3;
    for (let si = 0; si < steps; si++) {
      const ratio = si / (steps - 1);
      const sw = maxW - (maxW - minW) * ratio;
      const sx = x + (maxW - sw) / 2;
      const sy = GROUND_Y - (si + 1) * stepH;
      // Green terraces
      const green = Math.floor(80 + ratio * 40);
      cctx.fillStyle = `rgb(${30 + si*3}, ${green}, ${30 + si*2})`;
      cctx.fillRect(sx, sy, sw, stepH + 1);
      // Terrace edge highlight
      cctx.fillStyle = `rgba(100, ${green + 40}, 80, 0.3)`;
      cctx.fillRect(sx, sy, sw, 2);
    }
    // Golden dome at top
    const topStepW = minW;
    const topX = x + (maxW - topStepW)/2;
    const domeR = topStepW * 0.4;
    cctx.fillStyle = 'rgba(200, 170, 50, 0.8)';
    cctx.beginPath();
    cctx.arc(topX + topStepW/2, GROUND_Y - h - domeR*0.3, domeR, Math.PI, 0);
    cctx.closePath();
    cctx.fill();
    return; // Skip windows for stepped
  } else {
    cctx.fillRect(x, y, w, h);
    // Flat roof or antenna
    if (opts.antenna) {
      cctx.strokeStyle = '#555';
      cctx.lineWidth = 1.5;
      cctx.beginPath();
      cctx.moveTo(x + w/2, y);
      cctx.lineTo(x + w/2, y - 15);
      cctx.stroke();
      cctx.fillStyle = '#f44';
      cctx.beginPath();
      cctx.arc(x + w/2, y - 15, 2, 0, Math.PI * 2);
      cctx.fill();
    }
  }

  // Glass facade - horizontal floor lines with gradient
  for (let ly = y + 10; ly < GROUND_Y; ly += 7) {
    const floorGrad = cctx.createLinearGradient(x, ly, x + w, ly);
    floorGrad.addColorStop(0, `rgba(100, 150, 190, 0.03)`);
    floorGrad.addColorStop(0.5, `rgba(100, 150, 190, 0.12)`);
    floorGrad.addColorStop(1, `rgba(100, 150, 190, 0.03)`);
    cctx.strokeStyle = floorGrad;
    cctx.lineWidth = 0.5;
    cctx.beginPath();
    cctx.moveTo(x + 1, ly);
    cctx.lineTo(x + w - 1, ly);
    cctx.stroke();
  }

  // Windows - bigger, with warm/cool light and glow halos
  const winW = Math.max(5, Math.min(7, w / 6));
  const winH = 5;
  const winGapX = winW + 4;
  const winGapY = winH + 9;
  const startX = x + 4;
  const startY = y + 10;

  for (let wy = startY; wy < GROUND_Y - 10; wy += winGapY) {
    for (let wx = startX; wx < x + w - winW - 3; wx += winGapX) {
      const lit = Math.random() > 0.3;
      if (lit) {
        const warm = Math.random() > 0.3;
        let r, g, b, brightness;
        if (warm) {
          brightness = 0.5 + Math.random() * 0.45;
          r = 255; g = 200 + Math.random()*55; b = 120 + Math.random()*80;
        } else {
          brightness = 0.4 + Math.random()*0.45;
          r = 150 + Math.random()*60; g = 200 + Math.random()*55; b = 255;
        }
        // Window glow halo (soft light spill)
        cctx.fillStyle = `rgba(${r}, ${g}, ${b}, ${brightness * 0.08})`;
        cctx.beginPath();
        cctx.arc(wx + winW/2, wy + winH/2, winW * 1.3, 0, Math.PI*2);
        cctx.fill();
        // Window body
        cctx.fillStyle = `rgba(${r}, ${g}, ${b}, ${brightness})`;
        cctx.fillRect(wx, wy, winW, winH);
        // Bright inner highlight
        cctx.fillStyle = `rgba(255, 255, 240, ${brightness * 0.25})`;
        cctx.fillRect(wx + 1, wy + 1, winW - 2, winH - 2);
      } else {
        cctx.fillStyle = `rgba(15, 20, 35, 0.7)`;
        cctx.fillRect(wx, wy, winW, winH);
        // Subtle glass reflection on dark windows
        cctx.fillStyle = `rgba(80, 100, 140, 0.06)`;
        cctx.fillRect(wx, wy, winW, 1);
      }
    }
  }

  // Vertical structural lines
  cctx.strokeStyle = `rgba(30, 35, 50, 0.35)`;
  cctx.lineWidth = 1;
  for (let lx = x + Math.floor(w / 3); lx < x + w; lx += Math.floor(w / 3)) {
    cctx.beginPath();
    cctx.moveTo(lx, y);
    cctx.lineTo(lx, GROUND_Y);
    cctx.stroke();
  }

  // Rooftop details (water tanks, AC units)
  if (!opts.shape || opts.shape === 'default') {
    // Water tank
    if (w > 18 && Math.random() > 0.4) {
      const tww = 6 + Math.random()*4, twh = 8 + Math.random()*4;
      const twx = x + w*0.2 + Math.random() * (w*0.4);
      cctx.fillStyle = `rgba(${base[0]-5},${base[1]-5},${base[2]+5}, 0.8)`;
      cctx.fillRect(twx, y - twh, tww, twh);
      // Tank cap
      cctx.fillStyle = `rgba(${base[0]+10},${base[1]+10},${base[2]+15}, 0.6)`;
      cctx.fillRect(twx - 1, y - twh - 2, tww + 2, 2);
    }
    // AC unit
    if (w > 15 && Math.random() > 0.5) {
      const acw = 5 + Math.random()*3, ach = 4;
      const acx = x + w*0.55 + Math.random() * (w*0.3);
      cctx.fillStyle = `rgba(${base[0]+5},${base[1]+8},${base[2]+10}, 0.7)`;
      cctx.fillRect(acx, y - ach, acw, ach);
      // Fan grill lines
      cctx.strokeStyle = `rgba(0,0,0,0.2)`;
      cctx.lineWidth = 0.5;
      for (let gl = acx + 1; gl < acx + acw - 1; gl += 2) {
        cctx.beginPath(); cctx.moveTo(gl, y - ach + 1); cctx.lineTo(gl, y - 1); cctx.stroke();
      }
    }
  }
}

function generateCityCanvas(city) {
  if (!city) city = CITIES[0];
  cctx.clearRect(0, 0, W, H);

  const sx = scaleX; // shorthand
  const bldgs = city.buildings;
  const bgRange = city.bgHeightRange || [30, 60];

  // -- Far background buildings (silhouettes) --
  cctx.fillStyle = 'rgba(25, 30, 50, 0.9)';
  for (let x = 0; x < W; x += 18 + Math.random() * 15) {
    const bh = bgRange[0] + Math.random() * (bgRange[1] - bgRange[0]);
    cctx.fillRect(x, GROUND_Y - bh, 14 + Math.random() * 12, bh);
  }

  // -- Mid layer buildings (scaled to canvas width) --
  bldgs.mid.forEach(b => drawBuilding(b.x * sx, b.w * sx, b.h, b));

  // -- Landmark buildings --
  bldgs.landmarks.forEach(b => drawBuilding(b.x * sx, b.w * sx, b.h, b));

  // -- Foreground low buildings --
  const fg = bldgs.foreground;
  for (let x = 0; x < W; x += 22 + Math.random() * 18) {
    const bw = 18 + Math.random() * 16;
    const bh = 15 + Math.random() * (fg.maxH || 30);
    if (Math.random() > 0.3) {
      const y = GROUND_Y - bh;
      const fc = fg.color || [55, 52, 48];
      cctx.fillStyle = `rgb(${fc[0] + Math.random()*15}, ${fc[1] + Math.random()*15}, ${fc[2] + Math.random()*15})`;
      cctx.fillRect(x, y, bw, bh);
      // Small windows
      for (let wy = y + 4; wy < GROUND_Y - 3; wy += 7) {
        for (let wx = x + 2; wx < x + bw - 3; wx += 5) {
          cctx.fillStyle = Math.random() > 0.4
            ? `rgba(255,${200+Math.random()*55},${100+Math.random()*80},${0.5+Math.random()*0.4})`
            : 'rgba(15,18,30,0.7)';
          cctx.fillRect(wx, wy, 3, 3);
        }
      }
    }
  }
}

const batteryCanvas = document.createElement('canvas');

function prerenderBattery() {
  bctx.clearRect(0, 0, 180, 100);
  const cx = 90, cy = 65;

  // === Truck chassis (olive drab flat-bed) ===
  // Undercarriage shadow
  bctx.fillStyle = 'rgba(0,0,0,0.25)';
  bctx.fillRect(cx - 62, cy + 16, 124, 6);

  // Frame rails (structural I-beam)
  const railGrad = bctx.createLinearGradient(0, cy + 8, 0, cy + 14);
  railGrad.addColorStop(0, '#3a4a2a');
  railGrad.addColorStop(0.5, '#445535');
  railGrad.addColorStop(1, '#2e3e20');
  bctx.fillStyle = railGrad;
  bctx.fillRect(cx - 65, cy + 10, 130, 5);

  // Flat-bed body with realistic paint gradient
  const platGrad = bctx.createLinearGradient(cx-60, cy, cx+60, cy+16);
  platGrad.addColorStop(0, '#4e5e3e');
  platGrad.addColorStop(0.15, '#566846');
  platGrad.addColorStop(0.5, '#4a5a3a');
  platGrad.addColorStop(0.85, '#3e4e2e');
  platGrad.addColorStop(1, '#354528');
  bctx.fillStyle = platGrad;
  bctx.beginPath();
  bctx.roundRect(cx - 60, cy + 2, 120, 12, 2);
  bctx.fill();

  // Panel lines on truck (riveted panels)
  bctx.strokeStyle = 'rgba(80,95,65,0.5)';
  bctx.lineWidth = 0.5;
  for (let px = cx-55; px < cx+55; px += 12) {
    bctx.beginPath(); bctx.moveTo(px, cy+3); bctx.lineTo(px, cy+13); bctx.stroke();
  }
  // Top rail highlight
  bctx.strokeStyle = 'rgba(120,140,100,0.2)';
  bctx.lineWidth = 0.5;
  bctx.beginPath(); bctx.moveTo(cx-58, cy+3); bctx.lineTo(cx+58, cy+3); bctx.stroke();

  // === Truck cab (right side) ===
  const cabGrad = bctx.createLinearGradient(cx+50, cy-2, cx+68, cy+14);
  cabGrad.addColorStop(0, '#556844');
  cabGrad.addColorStop(0.4, '#4a5c38');
  cabGrad.addColorStop(1, '#3c4e2c');
  bctx.fillStyle = cabGrad;
  bctx.beginPath();
  bctx.roundRect(cx + 50, cy - 2, 18, 16, [2, 2, 0, 0]);
  bctx.fill();
  // Windshield
  bctx.fillStyle = 'rgba(140,180,200,0.35)';
  bctx.fillRect(cx + 63, cy, 4, 8);
  // Cab edge
  bctx.strokeStyle = 'rgba(60,75,45,0.5)';
  bctx.lineWidth = 0.5;
  bctx.strokeRect(cx + 50, cy - 2, 18, 16);

  // === Stabilizer jacks (deployed support legs) ===
  // Left jack
  const jackGrad = bctx.createLinearGradient(0, cy+14, 0, cy+27);
  jackGrad.addColorStop(0, '#3a3a3a');
  jackGrad.addColorStop(0.5, '#333');
  jackGrad.addColorStop(1, '#2a2a2a');
  bctx.fillStyle = jackGrad;
  bctx.fillRect(cx - 63, cy + 14, 5, 13);
  bctx.fillRect(cx + 58, cy + 14, 5, 13);
  // Hydraulic cylinder detail
  bctx.fillStyle = '#444';
  bctx.fillRect(cx - 62, cy + 16, 3, 8);
  bctx.fillRect(cx + 59, cy + 16, 3, 8);
  // Jack pads (wider base)
  bctx.fillStyle = '#3a3a3a';
  bctx.beginPath();
  bctx.roundRect(cx - 66, cy + 25, 11, 3, 1);
  bctx.fill();
  bctx.beginPath();
  bctx.roundRect(cx + 55, cy + 25, 11, 3, 1);
  bctx.fill();

  // === Wheels (dual axle, more detailed) ===
  for (const wx of [cx - 42, cx - 28, cx + 28, cx + 42]) {
    // Tire shadow
    bctx.fillStyle = 'rgba(0,0,0,0.3)';
    bctx.beginPath(); bctx.ellipse(wx, cy + 26, 8, 3, 0, 0, Math.PI * 2); bctx.fill();
    // Tire
    const tireGrad = bctx.createRadialGradient(wx-1, cy+21, 2, wx, cy+22, 9);
    tireGrad.addColorStop(0, '#252525');
    tireGrad.addColorStop(0.7, '#181818');
    tireGrad.addColorStop(1, '#101010');
    bctx.fillStyle = tireGrad;
    bctx.beginPath(); bctx.arc(wx, cy + 22, 8, 0, Math.PI * 2); bctx.fill();
    // Tread pattern (radial lines)
    bctx.strokeStyle = '#1e1e1e';
    bctx.lineWidth = 0.8;
    for (let a = 0; a < Math.PI*2; a += Math.PI/5) {
      bctx.beginPath();
      bctx.moveTo(wx + Math.cos(a)*5.5, cy + 22 + Math.sin(a)*5.5);
      bctx.lineTo(wx + Math.cos(a)*7.5, cy + 22 + Math.sin(a)*7.5);
      bctx.stroke();
    }
    // Rim (metallic)
    const rimGrad = bctx.createRadialGradient(wx-1, cy+21, 0, wx, cy+22, 5);
    rimGrad.addColorStop(0, '#5a5a5a');
    rimGrad.addColorStop(0.5, '#444');
    rimGrad.addColorStop(1, '#333');
    bctx.fillStyle = rimGrad;
    bctx.beginPath(); bctx.arc(wx, cy + 22, 4.5, 0, Math.PI * 2); bctx.fill();
    // Hub cap
    bctx.fillStyle = '#555';
    bctx.beginPath(); bctx.arc(wx, cy + 22, 2.2, 0, Math.PI * 2); bctx.fill();
    // Lug nuts
    for (let a = 0; a < 5; a++) {
      const la = a * Math.PI * 2 / 5;
      bctx.fillStyle = '#6a6a6a';
      bctx.beginPath();
      bctx.arc(wx + Math.cos(la)*3.2, cy + 22 + Math.sin(la)*3.2, 0.7, 0, Math.PI*2);
      bctx.fill();
    }
  }

  // === Radar/EL/M-2084 unit (prominent, separate from launcher) ===
  // Radar pedestal
  bctx.fillStyle = '#4a5a3a';
  bctx.fillRect(cx + 48, cy - 4, 8, 10);
  // Radar housing (flat panel antenna, not dish)
  const radarGrad = bctx.createLinearGradient(cx+44, cy-18, cx+60, cy-6);
  radarGrad.addColorStop(0, '#6a7a5a');
  radarGrad.addColorStop(0.3, '#7a8a6a');
  radarGrad.addColorStop(0.7, '#5a6a4a');
  radarGrad.addColorStop(1, '#4a5a3a');
  bctx.fillStyle = radarGrad;
  bctx.beginPath();
  bctx.roundRect(cx + 44, cy - 18, 16, 14, 1);
  bctx.fill();
  // Radar panel grid pattern (phased array face)
  bctx.strokeStyle = 'rgba(90,110,75,0.4)';
  bctx.lineWidth = 0.4;
  for (let gy = cy - 16; gy < cy - 6; gy += 3) {
    bctx.beginPath(); bctx.moveTo(cx+46, gy); bctx.lineTo(cx+58, gy); bctx.stroke();
  }
  for (let gx = cx + 46; gx < cx + 59; gx += 3) {
    bctx.beginPath(); bctx.moveTo(gx, cy-16); bctx.lineTo(gx, cy-6); bctx.stroke();
  }
  // Radar frame
  bctx.strokeStyle = '#5a6a4a';
  bctx.lineWidth = 1;
  bctx.strokeRect(cx + 44, cy - 18, 16, 14);
  // Antenna mast
  bctx.strokeStyle = '#5a6a4a';
  bctx.lineWidth = 1.5;
  bctx.beginPath(); bctx.moveTo(cx+52, cy-18); bctx.lineTo(cx+52, cy-24); bctx.stroke();
  // Warning light
  bctx.fillStyle = '#ff3333';
  bctx.beginPath(); bctx.arc(cx+52, cy-24, 1.5, 0, Math.PI*2); bctx.fill();
  bctx.fillStyle = 'rgba(255,50,50,0.15)';
  bctx.beginPath(); bctx.arc(cx+52, cy-24, 4, 0, Math.PI*2); bctx.fill();

  // === Launcher base (rotation mechanism — turret ring) ===
  const baseGrad = bctx.createRadialGradient(cx, cy, 0, cx, cy, 20);
  baseGrad.addColorStop(0, '#5e6e4e');
  baseGrad.addColorStop(0.4, '#546444');
  baseGrad.addColorStop(0.7, '#4a5a3a');
  baseGrad.addColorStop(1, '#3a4a2a');
  bctx.fillStyle = baseGrad;
  bctx.beginPath(); bctx.arc(cx, cy, 16, 0, Math.PI*2); bctx.fill();
  // Turret ring groove
  bctx.strokeStyle = '#6a7a5a';
  bctx.lineWidth = 1.5;
  bctx.beginPath(); bctx.arc(cx, cy, 12, 0, Math.PI*2); bctx.stroke();
  bctx.strokeStyle = 'rgba(50,60,40,0.3)';
  bctx.lineWidth = 0.5;
  bctx.beginPath(); bctx.arc(cx, cy, 14, 0, Math.PI*2); bctx.stroke();
  // Bolts
  for (let a = 0; a < Math.PI*2; a += Math.PI/4) {
    bctx.fillStyle = '#7a8a6a';
    bctx.beginPath();
    bctx.arc(cx + Math.cos(a)*13, cy + Math.sin(a)*13, 1.5, 0, Math.PI*2);
    bctx.fill();
    // Bolt shadow
    bctx.fillStyle = 'rgba(0,0,0,0.15)';
    bctx.beginPath();
    bctx.arc(cx + Math.cos(a)*13 + 0.5, cy + Math.sin(a)*13 + 0.5, 1.5, 0, Math.PI*2);
    bctx.fill();
  }

  // === Cable bundle (heavier, from base toward radar) ===
  bctx.strokeStyle = '#2a3a20';
  bctx.lineWidth = 3;
  bctx.beginPath();
  bctx.moveTo(cx + 15, cy + 5);
  bctx.quadraticCurveTo(cx + 30, cy + 12, cx + 48, cy + 2);
  bctx.stroke();
  // Inner cable highlight
  bctx.strokeStyle = 'rgba(70,85,55,0.3)';
  bctx.lineWidth = 1;
  bctx.beginPath();
  bctx.moveTo(cx + 16, cy + 4);
  bctx.quadraticCurveTo(cx + 30, cy + 11, cx + 48, cy + 1);
  bctx.stroke();

  // === IDF marking (Star of David) ===
  bctx.strokeStyle = 'rgba(120,140,110,0.3)';
  bctx.lineWidth = 0.7;
  const sdx = cx - 45, sdy = cy + 8, sds = 4;
  bctx.beginPath();
  bctx.moveTo(sdx, sdy - sds); bctx.lineTo(sdx + sds*0.87, sdy + sds*0.5); bctx.lineTo(sdx - sds*0.87, sdy + sds*0.5); bctx.closePath(); bctx.stroke();
  bctx.beginPath();
  bctx.moveTo(sdx, sdy + sds); bctx.lineTo(sdx + sds*0.87, sdy - sds*0.5); bctx.lineTo(sdx - sds*0.87, sdy - sds*0.5); bctx.closePath(); bctx.stroke();
}
prerenderBattery();

// ==================== LAUNCHER TUBES (drawn dynamically based on angle) ====================
function drawLauncherTubes(angle) {
  ctx.save();
  ctx.translate(batteryX, batteryY);
  ctx.rotate(angle);

  // Main launcher container (rectangular box with 20 tube openings)
  const tubeLen = 65;
  const tubeH = 32;

  // Housing shadow
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.fillRect(4, -tubeH/2 + 2, tubeLen, tubeH);

  // Housing body - olive drab
  const housingGrad = ctx.createLinearGradient(0, -tubeH/2, 0, tubeH/2);
  housingGrad.addColorStop(0, '#5d6d4d');
  housingGrad.addColorStop(0.2, '#556644');
  housingGrad.addColorStop(0.5, '#4d5d3d');
  housingGrad.addColorStop(0.8, '#3d4d2d');
  housingGrad.addColorStop(1, '#2d3d1d');
  ctx.fillStyle = housingGrad;
  ctx.fillRect(0, -tubeH/2, tubeLen, tubeH);

  // Individual missile tubes (4 rows x 5 columns = 20 Tamir missiles)
  const rows = 4, cols = 5;
  const tW = 7, tH = 5;
  const startTX = 4;
  const gapX = (tubeLen - 12) / cols;
  const gapY = tubeH / (rows + 1);

  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const tx = startTX + c * gapX;
      const ty = -tubeH/2 + (r + 1) * gapY - tH/2;
      // Tube opening (dark)
      ctx.fillStyle = '#0d1a08';
      ctx.fillRect(tx, ty, tW, tH);
      // Tube rim highlight
      ctx.strokeStyle = '#6a7a5a';
      ctx.lineWidth = 0.6;
      ctx.strokeRect(tx, ty, tW, tH);
      // Missile tip visible inside (lighter)
      ctx.fillStyle = '#7a8a6a';
      ctx.fillRect(tx + 1.5, ty + 1, 2.5, tH - 2);
    }
  }

  // Housing frame / rivets
  ctx.strokeStyle = '#6a7a5a';
  ctx.lineWidth = 1.5;
  ctx.strokeRect(0, -tubeH/2, tubeLen, tubeH);
  // Rivets along edges
  for (let rv = 0; rv < 6; rv++) {
    const rvx = 5 + rv * (tubeLen-10)/5;
    ctx.fillStyle = '#8a9a7a';
    ctx.beginPath(); ctx.arc(rvx, -tubeH/2 + 2, 1, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(rvx, tubeH/2 - 2, 1, 0, Math.PI*2); ctx.fill();
  }

  // Front cap (muzzle end)
  ctx.fillStyle = '#4a5a3a';
  ctx.fillRect(tubeLen - 3, -tubeH/2 - 2, 6, tubeH + 4);

  // Hydraulic tilting arm (angled support)
  ctx.strokeStyle = '#4a5a3a';
  ctx.lineWidth = 4;
  ctx.beginPath();
  ctx.moveTo(-8, 10);
  ctx.lineTo(tubeLen * 0.35, -1);
  ctx.stroke();
  ctx.strokeStyle = '#6a7a5a';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(-8, 10);
  ctx.lineTo(tubeLen * 0.35, -1);
  ctx.stroke();
  // Hydraulic cylinder detail
  ctx.strokeStyle = '#888';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(-3, 8);
  ctx.lineTo(tubeLen * 0.2, 2);
  ctx.stroke();

  ctx.restore();
}

// ==================== EVENTS ====================
let isMobile = isMobileDevice;

function updateAim(clientX, clientY) {
  const rect = canvas.getBoundingClientRect();
  mouseX = (clientX - rect.left) * (W / rect.width);
  mouseY = (clientY - rect.top) * (H / rect.height);
  batteryAngle = Math.atan2(mouseY - batteryY, mouseX - batteryX);
  if (batteryAngle > -0.15) batteryAngle = -0.15;
  if (batteryAngle < -Math.PI + 0.15) batteryAngle = -Math.PI + 0.15;
}

function isInBtn(x, y, r) {
  return x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h;
}

function handleClick() {
  if (audioCtx.state === 'suspended') audioCtx.resume();
  // Check language buttons on any screen
  for (const lb of langBtnRects) {
    if (isInBtn(mouseX, mouseY, lb)) { setLang(lb.lang); return; }
  }
  if (state === 'menu') {
    if (showLeaderboard) { showLeaderboard = false; return; }
    // Legal overlay interactions
    if (showLegalOverlay) {
      if (isInBtn(mouseX, mouseY, legalCloseBtnRect)) { showLegalOverlay = false; return; }
      for (const tb of legalTabBtnRects) {
        if (isInBtn(mouseX, mouseY, tb)) { legalTab = tb.tab; legalScrollY = 0; return; }
      }
      return;
    }
    if (isInBtn(mouseX, mouseY, startBtnRect)) { startGame(); return; }
    if (isInBtn(mouseX, mouseY, lbBtnRect)) { showLeaderboard = true; fetchLeaderboard(); return; }
    if (isInBtn(mouseX, mouseY, contactBtnRect)) {
      window.open('mailto:adrian@tulu.co.il?subject=Iron Dome Game', '_blank'); return;
    }
    // Share buttons
    for (const sb of shareBtnRects) {
      if (isInBtn(mouseX, mouseY, sb)) {
        const text = t('shareText');
        const url = GAME_URL;
        if (sb.type === 'whatsapp') window.open(`https://wa.me/?text=${encodeURIComponent(text + ' ' + url)}`, '_blank');
        else if (sb.type === 'twitter') window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}&url=${encodeURIComponent(url)}`, '_blank');
        else if (sb.type === 'email') window.open(`mailto:?subject=${encodeURIComponent(text)}&body=${encodeURIComponent(text + '\n' + url)}`, '_blank');
        else if (sb.type === 'copy') {
          navigator.clipboard.writeText(url).catch(()=>{});
          showCopiedToast = 120;
        }
        return;
      }
    }
    // Legal links
    for (const lb of legalBtnRects) {
      if (isInBtn(mouseX, mouseY, lb)) { legalTab = lb.tab; showLegalOverlay = true; legalScrollY = 0; return; }
    }
    return;
  }
  if (state === 'nameinput') {
    if (isInBtn(mouseX, mouseY, submitBtnRect) && nameInput.length > 0) {
      submitScore(nameInput, score, wave);
      state = 'gameover'; nameInputActive = false; showLeaderboard = true;
      return;
    }
    // Mobile keyboard character detection
    if (isMobile) {
      const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
      const cols = 9, charBtnSize = Math.min(36, (W - 40) / cols);
      const cy = H * 0.3;
      const boxH = 40, boxY = cy + 100;
      const kbY = boxY + boxH + 24;
      const kbX = W/2 - (cols * charBtnSize) / 2;
      for (let i = 0; i < chars.length; i++) {
        const col = i % cols, row = Math.floor(i / cols);
        const cx = kbX + col * charBtnSize, cy2 = kbY + row * charBtnSize;
        if (isInBtn(mouseX, mouseY, {x:cx, y:cy2, w:charBtnSize, h:charBtnSize})) {
          if (nameInput.length < 6) nameInput += chars[i];
          return;
        }
      }
      // Backspace button
      const actionY = kbY + Math.ceil(chars.length / cols) * charBtnSize + 8;
      if (isInBtn(mouseX, mouseY, {x: W/2 - 90, y: actionY, w: 80, h: 34})) {
        nameInput = nameInput.slice(0, -1);
        return;
      }
    }
    return;
  }
  if (state === 'victory') {
    if (isInBtn(mouseX, mouseY, playAgainBtnRect)) { showLeaderboard = false; startGame(); return; }
    if (isInBtn(mouseX, mouseY, lbBtnRect)) { showLeaderboard = !showLeaderboard; if (showLeaderboard) fetchLeaderboard(); return; }
    return;
  }
  if (state === 'gameover') {
    if (isInBtn(mouseX, mouseY, playAgainBtnRect)) { showLeaderboard = false; startGame(); return; }
    if (isInBtn(mouseX, mouseY, lbBtnRect)) { showLeaderboard = !showLeaderboard; if (showLeaderboard) fetchLeaderboard(); return; }
    return;
  }
  if (state === 'playing') {
    // Check pause button
    if (isInBtn(mouseX, mouseY, pauseBtnRect)) { paused = !paused; return; }
    // If paused, only allow resume click (center button)
    if (paused) {
      const rbW = fz(180), rbH = fz(46);
      const rbX = W/2 - rbW/2, rbY = H/2 - rbH/2 + fz(20);
      if (isInBtn(mouseX, mouseY, {x: rbX, y: rbY, w: rbW, h: rbH})) { paused = false; }
      return;
    }
    // Check power-up collection
    for (let i = powerUps.length-1; i >= 0; i--) {
      const pu = powerUps[i];
      const pd = Math.sqrt((mouseX - pu.x)**2 + (mouseY - pu.y)**2);
      if (pd < 30) { collectPowerUp(pu); powerUps.splice(i, 1); return; }
    }
    if (waveState === 'playing') fireInterceptor();
  }
}

// Keyboard for name input / pause
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && state === 'playing') { paused = !paused; e.preventDefault(); return; }
  if (state === 'nameinput') {
    if (e.key === 'Backspace') { nameInput = nameInput.slice(0, -1); e.preventDefault(); }
    else if (e.key === 'Enter' && nameInput.length > 0) {
      submitScore(nameInput, score, wave);
      state = 'gameover'; nameInputActive = false; showLeaderboard = true;
    }
    else if (e.key.length === 1 && nameInput.length < 6) {
      nameInput += e.key.toUpperCase(); e.preventDefault();
    }
  }
});

// ==================== WAVE CONFIG ====================
// Enemy type weights per wave range
function getEnemyWeights(w) {
  if (w <= 3) return { rocket: 1.0, drone: 0, ballistic: 0, decoy: 0 };
  if (w <= 6) return { rocket: 0.65, drone: 0.25, ballistic: 0.1, decoy: 0 };
  if (w <= 9) return { rocket: 0.45, drone: 0.25, ballistic: 0.2, decoy: 0.1 };
  if (w <= 12) return { rocket: 0.35, drone: 0.25, ballistic: 0.2, decoy: 0.2 };
  return { rocket: 0.3, drone: 0.25, ballistic: 0.25, decoy: 0.2 };
}

function getWaveConfig(w) {
  return {
    missiles: 10 + w * 5,
    missileSpeed: 1.1 + w * 0.1,
    missileInterval: Math.max(30, 90 - w * 5),
    enemyWeights: getEnemyWeights(w),
  };
}

function startGame() {
  state = 'playing'; score = 0; wave = 0;
  combo = 0; comboTimer = 0; maxCombo = 0; paused = false;
  missiles = []; interceptors = []; explosions = [];
  particles = []; floatingTexts = []; smokeTrails = [];
  powerUps = []; activePower = null; activePowerTimer = 0;
  cityDamage = 0; killFeed = [];
  frame = 0; screenFlash = 0;
  seenTypes = {}; enemyAlert = null;
  currentCityIdx = 0; cityIntroTimer = 0;
  generateCityCanvas(CITIES[0]);
  incrementPlayCount();
  if (typeof umami !== 'undefined') umami.track('game-start');
  playSound('game_siren');
  // Delay first wave start to let siren play
  sirenTimer = 210; // ~3.5 seconds
  waveState = 'siren_intro';
  startMusic();
}

function startWave() {
  wave++;
  // Victory check: after wave 15, all cities defended
  if (wave > 15) {
    // Victory! All cities defended
    stopMusic();
    if (score > highScore) {
      highScore = score; localStorage.setItem('ironDomeHS2', String(highScore));
    }
    nameInput = '';
    nameInputActive = false;
    showLeaderboard = false;
    state = 'victory';
    if (typeof umami !== 'undefined') umami.track('game-end', { score, wave, result: 'victory' });
    playSound('hatikvah');
    fetchLeaderboard().then(() => {
      if (qualifiesForLeaderboard(score)) {
        nameInputActive = true;
        state = 'nameinput';
      }
    });
    return;
  }
  // Check for city change
  const newCityIdx = Math.min(Math.floor((wave - 1) / 3), CITIES.length - 1);
  if (newCityIdx !== currentCityIdx || wave === 1) {
    currentCityIdx = newCityIdx;
    generateCityCanvas(CITIES[currentCityIdx]);
    // Reset city endurance for new city
    cityDamage = 0;
    cityMaxHP = CITIES[currentCityIdx].endurance || 5;
    // Show city intro
    waveState = 'city_intro';
    cityIntroTimer = 150; // 2.5 seconds
    return;
  }
  _startWaveActual();
}

function _startWaveActual() {
  const cfg = getWaveConfig(wave);
  waveMissilesLeft = cfg.missiles;
  // Arsenal: 4x total threats for generous ammo
  maxAmmo = cfg.missiles * 4;
  ammo = maxAmmo;
  missileTimer = 0; waveState = 'playing';
  waveTransitionTimer = 0;
  // Note: cityDamage accumulates over all 3 waves per city, only resets on city change
}

function fireInterceptor() {
  const unlimitedAmmo = activePower === 'rapid' && activePowerTimer > 0;
  if (ammo <= 0 && !unlimitedAmmo) {
    addFloat(batteryX, batteryY - 40, t('noAmmo'), '#ff4444', 16);
    return;
  }
  if (!unlimitedAmmo) ammo--;
  if (!tutorialSeen) { tutorialSeen = true; localStorage.setItem('tutorialSeen', '1'); }
  const speed = 10;
  const dx = mouseX - batteryX, dy = mouseY - batteryY;
  const dist = Math.sqrt(dx*dx + dy*dy);
  interceptors.push({
    x: batteryX, y: batteryY,
    vx: (dx/dist)*speed, vy: (dy/dist)*speed,
    targetX: mouseX, targetY: mouseY,
    trail: [], age: 0
  });
  // Launch smoke
  for (let i = 0; i < 6; i++) {
    smokeTrails.push({
      x: batteryX + (Math.random()-0.5)*8,
      y: batteryY + Math.random()*5,
      vx: (Math.random()-0.5)*1.5,
      vy: Math.random()*1.5,
      size: 3 + Math.random()*4,
      life: 30 + Math.random()*20,
      maxLife: 50
    });
  }
  playSound('launch');
}

// Pick enemy type based on wave weights
function pickEnemyType() {
  const w = getWaveConfig(wave).enemyWeights;
  const r = Math.random();
  let sum = 0;
  for (const [type, weight] of Object.entries(w)) {
    sum += weight;
    if (r < sum) return type;
  }
  return 'rocket';
}

// Enemy type configs
const ENEMY_TYPES = {
  rocket:    { speedMult: 1.0, hp: 1, hitbox: 28, points: 1, color: '#888' },
  drone:     { speedMult: 1.4, hp: 1, hitbox: 22, points: 2, color: '#5588bb' },
  ballistic: { speedMult: 0.7, hp: 3, hitbox: 35, points: 5, color: '#cc4444' },
  decoy:     { speedMult: 2.0, hp: 1, hitbox: 15, points: 1, color: '#ffaa44' },
};

function spawnMissile(forceType) {
  const cfg = getWaveConfig(wave);
  const type = forceType || pickEnemyType();
  const et = ENEMY_TYPES[type];
  const startX = Math.random() * W;
  const startY = -10;
  const speed = (cfg.missileSpeed + Math.random()*0.4) * et.speedMult;
  const targetX = 50 + Math.random()*(W-100);
  const targetY = GROUND_Y;
  const dx = targetX - startX, dy = targetY - startY;
  const dist = Math.sqrt(dx*dx + dy*dy);
  const m = {
    x: startX, y: startY,
    vx: (dx/dist)*speed, vy: (dy/dist)*speed,
    trail: [], type: type,
    hp: et.hp, maxHP: et.hp,
    hitbox: et.hitbox, points: et.points,
    wobbleOffset: Math.random() * Math.PI * 2, // for drones
    flashTimer: 0
  };
  missiles.push(m);
  // Enemy type first-appearance callout
  if (!seenTypes[type]) {
    seenTypes[type] = true;
    const alertKeys = { rocket: 'rocketAlert', drone: 'droneAlert', ballistic: 'ballisticAlert', decoy: 'decoyAlert' };
    const alertColors = { rocket: '#ff8844', drone: '#5599ee', ballistic: '#ff4444', decoy: '#ffcc44' };
    enemyAlert = { text: t(alertKeys[type]), color: alertColors[type], timer: 180 };
  }
  // Decoys spawn in groups of 3-5
  if (type === 'decoy' && !forceType) {
    const extra = 2 + Math.floor(Math.random() * 3);
    for (let i = 0; i < extra; i++) {
      setTimeout(() => { if (state === 'playing') spawnMissile('decoy'); }, i * 80);
    }
  }
}

function addCombo() {
  combo++; comboTimer = 120;
  if (combo > maxCombo) maxCombo = combo;
  if (combo >= 3) playSound('combo');
  // Spawn power-up at every x5 combo
  if (combo > 0 && combo % 5 === 0) {
    // Spawn at a random missile position or center
    const px = W * 0.2 + Math.random() * W * 0.6;
    const py = 50 + Math.random() * 100;
    spawnPowerUp(px, py);
  }
}
function resetCombo() { combo = 0; comboTimer = 0; }
function getMultiplier() {
  if (combo < 3) return 1;
  if (combo < 6) return 2;
  if (combo < 10) return 3;
  return 5;
}

function addFloat(x, y, text, color, size) {
  floatingTexts.push({ x, y, text, color, size: size||18, life: 70, maxLife: 70 });
}

function boom(x, y, color, count, big) {
  // Asymmetric offset for non-perfect-circle shape
  const asymX = (Math.random() - 0.5) * (big ? 12 : 6);
  const asymY = (Math.random() - 0.5) * (big ? 8 : 4);
  explosions.push({
    x, y, radius: 0, maxR: big ? 70 : 38, alpha: 1, color,
    asymX, asymY,
    shockR: 0, shockMaxR: big ? 100 : 55, shockAlpha: big ? 0.7 : 0.5,
    flashTimer: big ? 8 : 5,
    big: !!big
  });
  // Secondary fireball for big explosions (delayed, offset)
  if (big) {
    const offX = (Math.random() - 0.5) * 30;
    const offY = (Math.random() - 0.5) * 20 - 8;
    explosions.push({
      x: x + offX, y: y + offY, radius: 0, maxR: 35, alpha: 0.85, color: '#ff8800',
      asymX: (Math.random() - 0.5) * 8, asymY: (Math.random() - 0.5) * 5,
      shockR: 0, shockMaxR: 0, shockAlpha: 0,
      flashTimer: 3, big: false, delay: 4
    });
  }
  // Multi-color gradient particles (yellow → orange → red)
  const gradientColors = ['#ffff80', '#ffcc40', '#ff8820', '#ff4400', '#cc2200'];
  for (let i = 0; i < count; i++) {
    const a = Math.random()*Math.PI*2;
    const s = (big?2.5:1.2) + Math.random()*(big?6:3.5);
    const gc = gradientColors[Math.floor(Math.random() * gradientColors.length)];
    particles.push({
      x, y, vx: Math.cos(a)*s, vy: Math.sin(a)*s,
      life: 35+Math.random()*35, maxLife: 70,
      color: Math.random() > 0.4 ? gc : color, size: 1.2+Math.random()*(big?4:2.5)
    });
  }
  // Bright sparks — elongated streaks
  for (let i = 0; i < (big ? 25 : 10); i++) {
    const a = Math.random()*Math.PI*2;
    const s = 3 + Math.random()*6;
    particles.push({
      x, y, vx: Math.cos(a)*s, vy: Math.sin(a)*s - 1.5,
      life: 18+Math.random()*22, maxLife: 40,
      color: Math.random() > 0.3 ? '#fff' : '#ffffaa', size: 0.5+Math.random()*1.0,
      isSpark: true
    });
  }
  // Ember particles that float up (big explosions only)
  if (big) {
    for (let i = 0; i < 15; i++) {
      particles.push({
        x: x + (Math.random()-0.5)*25, y,
        vx: (Math.random()-0.5)*1.5, vy: -1.2 - Math.random()*2.5,
        life: 50+Math.random()*50, maxLife: 100,
        color: Math.random()>0.5 ? '#ff8800' : '#ffcc00', size: 0.8+Math.random()*1.8
      });
    }
  }
}

let shakeMaxDuration = 0;
function shake(d) { shakeDuration = Math.max(shakeDuration, d); shakeMaxDuration = Math.max(shakeMaxDuration, d); }

// Power-up system - spawned from x5 combos
const POWER_TYPES = ['shield', 'rapid', 'emp'];
function spawnPowerUp(x, y) {
  const type = POWER_TYPES[Math.floor(Math.random() * POWER_TYPES.length)];
  powerUps.push({ x, y, type, vy: 0.5, life: 480, pulse: 0 }); // floats down slowly, 8s lifespan
}
function collectPowerUp(pu) {
  if (pu.type === 'shield') {
    shieldHP = 1;
    addFloat(pu.x, pu.y, t('powerShield'), '#ffdd00', 22);
  } else if (pu.type === 'rapid') {
    activePower = 'rapid';
    activePowerTimer = 900; // 15 seconds of unlimited ammo
    addFloat(pu.x, pu.y, t('powerRapid'), '#00ddff', 22);
  } else if (pu.type === 'emp') {
    // Destroy all on-screen threats
    for (let i = missiles.length-1; i >= 0; i--) {
      const m = missiles[i];
      boom(m.x, m.y, '#00ddff', 15);
      score += m.points;
      missiles.splice(i, 1);
    }
    screenFlash = 0.3;
    shake(10);
    addFloat(pu.x, pu.y, t('powerEMP'), '#ff00ff', 24);
    playSound('boss_destroy');
  }
  playSound('combo');
}

// ==================== UPDATE ====================
function update() {
  frame++;
  if (state !== 'playing') return;
  if (paused) return;

  if (comboTimer > 0) { comboTimer--; if (comboTimer <= 0) resetCombo(); }
  if (enemyAlert && enemyAlert.timer > 0) enemyAlert.timer--;
  if (screenFlash > 0) screenFlash -= 0.04;

  // Siren intro at game start
  if (waveState === 'siren_intro') {
    sirenTimer--;
    if (sirenTimer <= 0) startWave();
    return;
  }

  // City intro screen
  if (waveState === 'city_intro') {
    cityIntroTimer--;
    if (cityIntroTimer <= 0) _startWaveActual();
    return;
  }

  // Airplane
  airplaneTimer++;
  if (!airplane && airplaneTimer >= AIRPLANE_INTERVAL) {
    const goRight = Math.random() > 0.5;
    airplane = {
      x: goRight ? -250 : W + 250,
      y: 50 + Math.random() * 80,
      speed: goRight ? 2.5 : -2.5,
      wobble: Math.random() * Math.PI * 2
    };
    airplaneTimer = 0;
  }
  if (airplane) {
    airplane.x += airplane.speed;
    airplane.wobble += 0.03;
    airplane.y += Math.sin(airplane.wobble) * 0.3;
    if ((airplane.speed > 0 && airplane.x > W + 300) || (airplane.speed < 0 && airplane.x < -300)) {
      airplane = null;
    }
  }

  if (waveState === 'transition') {
    waveTransitionTimer--;
    if (waveTransitionTimer <= 0) startWave();
    return;
  }
  if (waveState === 'playing' && waveMissilesLeft > 0) {
    missileTimer++;
    if (missileTimer >= getWaveConfig(wave).missileInterval) {
      spawnMissile(); waveMissilesLeft--; missileTimer = 0;
    }
  }

  if (waveState === 'playing' && waveMissilesLeft <= 0 && missiles.length === 0) {
    waveState = 'transition'; waveTransitionTimer = 300; playSound('hatikvah');
  }

  // Missiles
  for (let i = missiles.length-1; i >= 0; i--) {
    const m = missiles[i];
    if (m.flashTimer > 0) m.flashTimer--;
    m.trail.push({x:m.x, y:m.y});
    if (m.trail.length > (m.type === 'ballistic' ? 30 : m.type === 'decoy' ? 8 : 20)) m.trail.shift();
    m.x += m.vx; m.y += m.vy;
    // Drone wobble - sine wave horizontal movement
    if (m.type === 'drone') {
      m.x += Math.sin(frame * 0.08 + m.wobbleOffset) * 2.5;
    }
    if (m.y >= GROUND_Y) {
      // Shield blocks one hit
      if (shieldHP > 0) {
        shieldHP--;
        addFloat(m.x, m.y - 20, '🛡️', '#ffdd00', 20);
        boom(m.x, m.y, '#ffdd00', 20);
        playSound('combo');
        missiles.splice(i, 1);
        continue;
      }
      cityDamage++; resetCombo();
      // Big city explosion - multiple blasts, fire, debris
      boom(m.x, m.y, '#ff4400', 50, true);
      boom(m.x - 15, m.y - 10, '#ff8800', 25);
      boom(m.x + 15, m.y - 5, '#ffcc00', 20);
      // Rising fire column particles
      for (let fi = 0; fi < 20; fi++) {
        particles.push({
          x: m.x + (Math.random()-0.5)*30,
          y: m.y - Math.random()*10,
          vx: (Math.random()-0.5)*1.5,
          vy: -1.5 - Math.random()*3,
          life: 40 + Math.random()*40,
          maxLife: 80,
          color: ['#ff4400','#ff8800','#ffcc00','#ff2200'][Math.floor(Math.random()*4)],
          size: 2 + Math.random()*3
        });
      }
      // Debris chunks flying up
      for (let di = 0; di < 8; di++) {
        particles.push({
          x: m.x + (Math.random()-0.5)*20,
          y: m.y,
          vx: (Math.random()-0.5)*4,
          vy: -3 - Math.random()*5,
          life: 50 + Math.random()*30,
          maxLife: 80,
          color: '#443322',
          size: 2 + Math.random()*2
        });
      }
      playSound('big_explosion');
      shake(20); screenFlash = 0.4;
      missiles.splice(i, 1);
      if (cityDamage >= cityMaxHP) {
        stopMusic(); playSound('gameover');
        if (score > highScore) {
          highScore = score; localStorage.setItem('ironDomeHS2', String(highScore));
        }
        // Check if score qualifies for top 10
        nameInput = '';
        nameInputActive = false;
        showLeaderboard = false;
        state = 'gameover';
        if (typeof umami !== 'undefined') umami.track('game-end', { score, wave, result: 'gameover' });
        fetchLeaderboard().then(() => {
          if (qualifiesForLeaderboard(score)) {
            nameInputActive = true;
            state = 'nameinput';
          }
        });
      }
    }
  }

  // Interceptors
  for (let i = interceptors.length-1; i >= 0; i--) {
    const ic = interceptors[i];
    ic.age++;
    ic.trail.push({x:ic.x, y:ic.y});
    if (ic.trail.length > 14) ic.trail.shift();
    ic.x += ic.vx; ic.y += ic.vy;

    // Smoke from interceptor
    if (ic.age < 20 && ic.age % 2 === 0) {
      smokeTrails.push({
        x: ic.x - ic.vx*0.5 + (Math.random()-0.5)*3,
        y: ic.y - ic.vy*0.5 + (Math.random()-0.5)*3,
        vx: (Math.random()-0.5)*0.5, vy: Math.random()*0.3,
        size: 2+Math.random()*3, life: 20+Math.random()*15, maxLife: 35
      });
    }

    // Proximity homing - find nearest missile in ±30° cone within 60px
    const icHeading = Math.atan2(ic.vy, ic.vx);
    let closestInCone = null, closestDist = 60;
    for (let j = 0; j < missiles.length; j++) {
      const m = missiles[j];
      const dx = m.x - ic.x, dy = m.y - ic.y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist < closestDist) {
        const angleToMissile = Math.atan2(dy, dx);
        let angleDiff = angleToMissile - icHeading;
        while (angleDiff > Math.PI) angleDiff -= Math.PI*2;
        while (angleDiff < -Math.PI) angleDiff += Math.PI*2;
        if (Math.abs(angleDiff) < Math.PI/6) { // ±30°
          closestInCone = m; closestDist = dist;
        }
      }
    }
    // Gently steer toward closest missile in cone
    if (closestInCone && closestDist < 55) {
      const dx = closestInCone.x - ic.x, dy = closestInCone.y - ic.y;
      const targetAngle = Math.atan2(dy, dx);
      let steerDiff = targetAngle - icHeading;
      while (steerDiff > Math.PI) steerDiff -= Math.PI*2;
      while (steerDiff < -Math.PI) steerDiff += Math.PI*2;
      const newAngle = icHeading + steerDiff * 0.15;
      const spd = Math.sqrt(ic.vx*ic.vx + ic.vy*ic.vy);
      ic.vx = Math.cos(newAngle) * spd;
      ic.vy = Math.sin(newAngle) * spd;
    }

    const dT = Math.sqrt((ic.x-ic.targetX)**2 + (ic.y-ic.targetY)**2);
    if (dT < 15 || ic.x < -10 || ic.x > W+10 || ic.y < -10) {
      // Detonation blast radius - check for nearby missiles
      for (let j = missiles.length-1; j >= 0; j--) {
        const m = missiles[j];
        const bd = Math.sqrt((ic.x-m.x)**2 + (ic.y-m.y)**2);
        if (bd < 30) {
          m.hp--;
          if (m.hp <= 0) {
            addCombo();
            const mult = getMultiplier();
            const pts = m.points * mult;
            score += pts;
            boom(m.x, m.y, '#00ff88', 20);
            addFloat(m.x, m.y-10, `+${pts}`, '#00ff88', 16);
            missiles.splice(j, 1);
          } else {
            m.flashTimer = 8;
            boom(m.x, m.y, '#ffaa00', 8);
            addFloat(m.x, m.y-10, `${m.hp}/${m.maxHP}`, '#ffaa00', 12);
          }
        }
      }
      boom(ic.x, ic.y, '#0088cc', 8);
      interceptors.splice(i, 1); continue;
    }

    let hit = false;
    for (let j = missiles.length-1; j >= 0; j--) {
      const m = missiles[j];
      const d = Math.sqrt((ic.x-m.x)**2 + (ic.y-m.y)**2);
      if (d < (m.hitbox || 28)) {
        m.hp--;
        if (m.hp <= 0) {
          // Missile destroyed
          addCombo();
          const mult = getMultiplier();
          const pts = m.points * mult;
          score += pts;
          boom(m.x, m.y, combo >= 3 ? '#ffdd00' : '#00ff88', combo >= 6 ? 45 : 28);
          playSound('intercept');
          let text = `+${pts}`;
          if (mult > 1) text += ` (x${mult})`;
          addFloat(m.x, m.y-10, text, mult > 1 ? '#ffdd00' : '#00ff88', mult > 1 ? 24 : 16);
          // Kill feed
          killFeed.unshift({ text: `${m.type} +${pts}`, color: ENEMY_TYPES[m.type].color, time: frame });
          if (killFeed.length > 3) killFeed.pop();
          missiles.splice(j, 1); interceptors.splice(i, 1);
          hit = true; break;
        } else {
          // Multi-HP: missile damaged but not destroyed
          m.flashTimer = 8;
          boom(ic.x, ic.y, '#ffaa00', 10);
          addFloat(m.x, m.y-10, `${m.hp}/${m.maxHP}`, '#ffaa00', 12);
          playSound('boss_hit');
          interceptors.splice(i, 1);
          hit = true; break;
        }
      }
    }
    if (hit) continue;
  }

  // Explosions
  for (let i = explosions.length-1; i >= 0; i--) {
    const e = explosions[i];
    // Delayed secondary fireballs
    if (e.delay && e.delay > 0) { e.delay--; continue; }
    e.radius += 1.8; e.alpha -= 0.03;
    if (e.flashTimer > 0) e.flashTimer--;
    // Shockwave expands faster than fireball, fades quickly
    if (e.shockMaxR > 0) {
      e.shockR += 3.5;
      e.shockAlpha *= 0.92;
    }
    if (e.alpha <= 0) explosions.splice(i, 1);
  }

  // Particles
  for (let i = particles.length-1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy;
    p.vy += 0.04; p.vx *= 0.99;
    p.life--;
    if (p.life <= 0) particles.splice(i, 1);
  }

  // Smoke
  for (let i = smokeTrails.length-1; i >= 0; i--) {
    const s = smokeTrails[i];
    s.x += s.vx; s.y += s.vy;
    s.size += 0.15;
    s.life--;
    if (s.life <= 0) smokeTrails.splice(i, 1);
  }

  // Floating texts
  for (let i = floatingTexts.length-1; i >= 0; i--) {
    floatingTexts[i].y -= 0.8;
    floatingTexts[i].life--;
    if (floatingTexts[i].life <= 0) floatingTexts.splice(i, 1);
  }

  // Power-up update: float down, pulse, lifetime
  for (let i = powerUps.length-1; i >= 0; i--) {
    const pu = powerUps[i];
    pu.y += pu.vy;
    pu.pulse += 0.08;
    pu.life--;
    if (pu.life <= 0 || pu.y > GROUND_Y) { powerUps.splice(i, 1); continue; }
  }

  // Active power-up timer countdown
  if (activePower && activePowerTimer > 0) {
    activePowerTimer--;
    if (activePowerTimer <= 0) { activePower = null; }
  }

  if (shakeDuration > 0) {
    const shakeIntensity = (shakeDuration / Math.max(1, shakeMaxDuration)); // ease-out
    const mag = 8 * shakeIntensity;
    shakeX = (Math.random()-0.5)*mag; shakeY = (Math.random()-0.5)*mag;
    shakeDuration--;
    if (shakeDuration <= 0) shakeMaxDuration = 0;
  } else { shakeX = 0; shakeY = 0; }
}

// ==================== DRAW ====================
function draw() {
  // Sky gradient - varies by time of day
  const timeOfDay = getTimeOfDay(wave);
  const skyGrad = ctx.createLinearGradient(0, 0, 0, H);
  if (timeOfDay === 0) {
    // Day — rich Mediterranean blue with warm atmospheric haze at horizon
    skyGrad.addColorStop(0, '#3a78b5');    // deep cerulean top
    skyGrad.addColorStop(0.1, '#4a8ec8');
    skyGrad.addColorStop(0.25, '#5ea0d8');
    skyGrad.addColorStop(0.4, '#78b4e2');
    skyGrad.addColorStop(0.55, '#92c6ea');
    skyGrad.addColorStop(0.7, '#aed6f0');
    skyGrad.addColorStop(0.82, '#c8e2f4');
    skyGrad.addColorStop(0.9, '#daeaf5');  // haze transition
    skyGrad.addColorStop(0.96, '#e8ece0');  // warm atmospheric haze
    skyGrad.addColorStop(1, '#dde4d8');    // warm horizon line
  } else if (timeOfDay === 1) {
    // Sunset — dramatic Mediterranean sunset with pink/purple/gold bands
    skyGrad.addColorStop(0, '#0e0a28');    // deep twilight purple
    skyGrad.addColorStop(0.1, '#1a1245');
    skyGrad.addColorStop(0.2, '#2d1b58');  // rich purple
    skyGrad.addColorStop(0.3, '#4a2060');  // magenta-purple
    skyGrad.addColorStop(0.4, '#7a2858');  // rose-purple
    skyGrad.addColorStop(0.5, '#b03850');  // deep rose
    skyGrad.addColorStop(0.6, '#d04a40');  // warm red
    skyGrad.addColorStop(0.7, '#e06830');  // deep orange
    skyGrad.addColorStop(0.8, '#ea8828');  // rich orange
    skyGrad.addColorStop(0.88, '#f0a020'); // golden
    skyGrad.addColorStop(0.94, '#f5b828'); // bright gold
    skyGrad.addColorStop(1, '#f0c838');    // golden horizon glow
  } else {
    // Night — deep atmosphere with subtle blue-purple variation, horizon glow
    skyGrad.addColorStop(0, '#030610');    // near-black zenith
    skyGrad.addColorStop(0.08, '#060c1e');
    skyGrad.addColorStop(0.2, '#0a1430');  // deep navy
    skyGrad.addColorStop(0.35, '#10203e');
    skyGrad.addColorStop(0.5, '#182a4a');  // midnight blue
    skyGrad.addColorStop(0.65, '#1e3252');
    skyGrad.addColorStop(0.75, '#253a58');
    skyGrad.addColorStop(0.85, '#2a3d58');
    skyGrad.addColorStop(0.92, '#2e3e55'); // subtle warm horizon
    skyGrad.addColorStop(0.97, '#2a3548'); // faint city glow at horizon
    skyGrad.addColorStop(1, '#1e2838');
  }
  ctx.fillStyle = skyGrad;
  ctx.fillRect(0, 0, W, H);

  ctx.save();
  ctx.translate(shakeX, shakeY);

  // Stars - visibility varies by time of day
  const starAlphaFactor = timeOfDay === 0 ? 0 : timeOfDay === 1 ? 0.3 : 1.0;
  if (starAlphaFactor > 0) {
    stars.forEach(s => {
      s.twinkle += s.speed;
      const alpha = s.brightness * (0.4 + Math.sin(s.twinkle) * 0.3) * starAlphaFactor;
      ctx.fillStyle = `rgba(255,255,240,${alpha})`;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.size, 0, Math.PI*2);
      ctx.fill();
    });
  }

  // Clouds — fluffy volumetric shapes with self-shadowing & sunset underlight
  clouds.forEach(c => {
    c.x += c.speed;
    if (c.x > W + c.w) c.x = -c.w - 20;
    const baseAlpha = timeOfDay === 2 ? c.opacity * 0.25 : timeOfDay === 1 ? c.opacity * 0.75 : c.opacity;

    // Cloud lobe definitions: [xOff, yOff, wMul, hMul] relative to cloud bounds
    const lobes = [
      [0.15, 0.12, 0.22, 0.38],  // left small
      [0.30, -0.05, 0.30, 0.55], // left-center tall
      [0.50, -0.12, 0.28, 0.65], // center peak (tallest)
      [0.68, -0.02, 0.25, 0.50], // right-center
      [0.82, 0.10, 0.18, 0.35],  // right small
      [0.40, 0.08, 0.20, 0.40],  // fill gap left-center
      [0.60, 0.05, 0.22, 0.45],  // fill gap right-center
    ];

    // Pass 1: Shadow/underside (drawn slightly below, darker)
    lobes.forEach(([lx, ly, lw, lh]) => {
      const cx = c.x + c.w * lx;
      const cy = c.y + c.h * (ly + 0.18); // offset down for bottom shadow
      const rx = c.w * lw;
      const ry = c.h * lh * 0.5;
      let shadowR, shadowG, shadowB, shadowA;
      if (timeOfDay === 0) {
        // Day: cool blue-gray shadow
        shadowR = 180; shadowG = 195; shadowB = 215; shadowA = baseAlpha * 0.4;
      } else if (timeOfDay === 1) {
        // Sunset: warm orange-pink underlit belly
        shadowR = 230; shadowG = 130; shadowB = 80; shadowA = baseAlpha * 0.5;
      } else {
        // Night: dark blueish shadow
        shadowR = 80; shadowG = 90; shadowB = 120; shadowA = baseAlpha * 0.3;
      }
      const sg = ctx.createRadialGradient(cx, cy, 0, cx, cy, Math.max(rx, ry));
      sg.addColorStop(0, `rgba(${shadowR},${shadowG},${shadowB},${shadowA})`);
      sg.addColorStop(0.7, `rgba(${shadowR},${shadowG},${shadowB},${shadowA * 0.4})`);
      sg.addColorStop(1, `rgba(${shadowR},${shadowG},${shadowB},0)`);
      ctx.fillStyle = sg;
      ctx.beginPath();
      ctx.ellipse(cx, cy, rx * 1.1, ry * 0.8, 0, 0, Math.PI*2);
      ctx.fill();
    });

    // Pass 2: Main cloud body (bright, fluffy lobes)
    lobes.forEach(([lx, ly, lw, lh]) => {
      const cx = c.x + c.w * lx;
      const cy = c.y + c.h * ly;
      const rx = c.w * lw;
      const ry = c.h * lh;
      let bodyR, bodyG, bodyB;
      if (timeOfDay === 0) {
        bodyR = 255; bodyG = 255; bodyB = 255;
      } else if (timeOfDay === 1) {
        bodyR = 245; bodyG = 190; bodyB = 150;
      } else {
        bodyR = 130; bodyG = 140; bodyB = 170;
      }
      const bg = ctx.createRadialGradient(cx, cy - ry*0.2, 0, cx, cy, Math.max(rx, ry));
      bg.addColorStop(0, `rgba(${bodyR},${bodyG},${bodyB},${baseAlpha * 0.7})`);
      bg.addColorStop(0.5, `rgba(${bodyR},${bodyG},${bodyB},${baseAlpha * 0.45})`);
      bg.addColorStop(0.85, `rgba(${bodyR},${bodyG},${bodyB},${baseAlpha * 0.15})`);
      bg.addColorStop(1, `rgba(${bodyR},${bodyG},${bodyB},0)`);
      ctx.fillStyle = bg;
      ctx.beginPath();
      ctx.ellipse(cx, cy, rx, ry, 0, 0, Math.PI*2);
      ctx.fill();
    });

    // Pass 3: Bright top highlights (sunlit edges)
    if (timeOfDay !== 2) {
      const hlLobes = [[0.30, -0.12, 0.18, 0.22], [0.50, -0.20, 0.16, 0.25], [0.68, -0.10, 0.14, 0.20]];
      hlLobes.forEach(([lx, ly, lw, lh]) => {
        const cx = c.x + c.w * lx;
        const cy = c.y + c.h * ly;
        const rx = c.w * lw;
        const ry = c.h * lh;
        let hlR, hlG, hlB, hlA;
        if (timeOfDay === 0) {
          hlR = 255; hlG = 255; hlB = 255; hlA = baseAlpha * 0.5;
        } else {
          hlR = 255; hlG = 220; hlB = 180; hlA = baseAlpha * 0.4;
        }
        const hg = ctx.createRadialGradient(cx, cy, 0, cx, cy, Math.max(rx, ry));
        hg.addColorStop(0, `rgba(${hlR},${hlG},${hlB},${hlA})`);
        hg.addColorStop(0.6, `rgba(${hlR},${hlG},${hlB},${hlA * 0.3})`);
        hg.addColorStop(1, `rgba(${hlR},${hlG},${hlB},0)`);
        ctx.fillStyle = hg;
        ctx.beginPath();
        ctx.ellipse(cx, cy, rx, ry, 0, 0, Math.PI*2);
        ctx.fill();
      });
    }
  });

  // Sun or Moon depending on time of day
  if (timeOfDay === 0) {
    // Day - bright yellow/white sun high in sky
    const sunX = W - 60 * scaleX - 60, sunY = 80;
    // Sun glow (outer)
    const sunGlow = ctx.createRadialGradient(sunX, sunY, 20, sunX, sunY, 80);
    sunGlow.addColorStop(0, 'rgba(255, 255, 200, 0.3)');
    sunGlow.addColorStop(0.5, 'rgba(255, 240, 150, 0.1)');
    sunGlow.addColorStop(1, 'rgba(255, 220, 100, 0)');
    ctx.fillStyle = sunGlow;
    ctx.beginPath();
    ctx.arc(sunX, sunY, 80, 0, Math.PI*2);
    ctx.fill();
    // Sun body
    ctx.fillStyle = 'rgba(255, 250, 220, 0.95)';
    ctx.beginPath();
    ctx.arc(sunX, sunY, 28, 0, Math.PI*2);
    ctx.fill();
    // Sun bright core
    ctx.fillStyle = 'rgba(255, 255, 240, 1)';
    ctx.beginPath();
    ctx.arc(sunX, sunY, 18, 0, Math.PI*2);
    ctx.fill();
  } else if (timeOfDay === 1) {
    // Sunset - large orange/red sun near horizon
    const sunX = W - 60 * scaleX - 80, sunY = GROUND_Y - 50;
    // Sunset glow (outer)
    const sunsetGlow = ctx.createRadialGradient(sunX, sunY, 25, sunX, sunY, 100);
    sunsetGlow.addColorStop(0, 'rgba(255, 140, 50, 0.4)');
    sunsetGlow.addColorStop(0.5, 'rgba(255, 100, 50, 0.15)');
    sunsetGlow.addColorStop(1, 'rgba(255, 60, 30, 0)');
    ctx.fillStyle = sunsetGlow;
    ctx.beginPath();
    ctx.arc(sunX, sunY, 100, 0, Math.PI*2);
    ctx.fill();
    // Sun body - large orange
    ctx.fillStyle = 'rgba(255, 120, 40, 0.9)';
    ctx.beginPath();
    ctx.arc(sunX, sunY, 35, 0, Math.PI*2);
    ctx.fill();
    // Sun bright core
    ctx.fillStyle = 'rgba(255, 180, 80, 0.7)';
    ctx.beginPath();
    ctx.arc(sunX, sunY, 22, 0, Math.PI*2);
    ctx.fill();
  } else {
    // Night - moon with craters
    const moonX = W - 60 * scaleX - 60, moonY = 80;
    ctx.fillStyle = 'rgba(240, 240, 220, 0.9)';
    ctx.beginPath();
    ctx.arc(moonX, moonY, 25, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = 'rgba(255,255,230,0.05)';
    ctx.beginPath();
    ctx.arc(moonX, moonY, 45, 0, Math.PI*2);
    ctx.fill();
    // Moon craters
    ctx.fillStyle = 'rgba(200,200,190,0.3)';
    ctx.beginPath(); ctx.arc(moonX-8, moonY-5, 4, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(moonX+8, moonY+5, 3, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(moonX-2, moonY+10, 2.5, 0, Math.PI*2); ctx.fill();
  }

  // Mediterranean sea — enhanced with wave motion, reflection paths, sparkles
  const seaH = H - GROUND_Y;
  const seaGrad = ctx.createLinearGradient(0, GROUND_Y - 2, 0, H);
  if (timeOfDay === 0) {
    seaGrad.addColorStop(0, '#4a7a9e');   // bright Mediterranean surface
    seaGrad.addColorStop(0.15, '#3a6a90');
    seaGrad.addColorStop(0.4, '#2d5a82');
    seaGrad.addColorStop(0.7, '#224a72');
    seaGrad.addColorStop(1, '#1a3a5e');   // deep water
  } else if (timeOfDay === 1) {
    seaGrad.addColorStop(0, '#5a4058');   // warm purple surface
    seaGrad.addColorStop(0.15, '#4a3050');
    seaGrad.addColorStop(0.4, '#3a2545');
    seaGrad.addColorStop(0.7, '#2e1c3a');
    seaGrad.addColorStop(1, '#221430');
  } else {
    seaGrad.addColorStop(0, '#1e3048');   // dark surface
    seaGrad.addColorStop(0.15, '#182840');
    seaGrad.addColorStop(0.4, '#142238');
    seaGrad.addColorStop(0.7, '#101c30');
    seaGrad.addColorStop(1, '#0c1424');
  }
  ctx.fillStyle = seaGrad;
  ctx.fillRect(0, GROUND_Y, W, seaH);

  // Wave motion at surface line — gentle ripple
  ctx.strokeStyle = timeOfDay === 0 ? 'rgba(180,210,230,0.15)' : timeOfDay === 1 ? 'rgba(200,150,100,0.12)' : 'rgba(100,130,170,0.08)';
  ctx.lineWidth = 1;
  for (let wl = 0; wl < 3; wl++) {
    ctx.beginPath();
    for (let wx = 0; wx < W; wx += 2) {
      const wy = GROUND_Y + wl * 2 + Math.sin(wx * 0.015 + frame * 0.03 + wl * 1.2) * 1.5
                + Math.sin(wx * 0.008 + frame * 0.02 - wl) * 1;
      wx === 0 ? ctx.moveTo(wx, wy) : ctx.lineTo(wx, wy);
    }
    ctx.stroke();
  }

  // Sun/Moon reflection path — concentrated column of light on water
  if (timeOfDay === 0) {
    // Day sun reflection — bright sparkle column under sun
    const sunX = W - 60 * scaleX - 60;
    const pathW = 80;
    for (let i = 0; i < 60; i++) {
      const rx = sunX + (Math.random() - 0.5) * pathW * (1 + i * 0.02);
      const ry = GROUND_Y + 3 + (i / 60) * seaH * 0.7;
      const sparkW = 3 + Math.random() * 6;
      const sparkA = 0.06 + Math.random() * 0.08 - (i / 60) * 0.04;
      const wobble = Math.sin(frame * 0.04 + i * 0.7) * 2;
      ctx.fillStyle = `rgba(255,250,230,${Math.max(0, sparkA)})`;
      ctx.fillRect(rx + wobble, ry, sparkW, 1);
    }
  } else if (timeOfDay === 1) {
    // Sunset golden reflection path — dramatic golden road on water
    const sunX = W - 60 * scaleX - 80;
    const pathW = 50;
    // Wide golden glow base
    const goldenGlow = ctx.createRadialGradient(sunX, GROUND_Y, 10, sunX, GROUND_Y + seaH * 0.4, seaH * 0.5);
    goldenGlow.addColorStop(0, 'rgba(255,180,60,0.12)');

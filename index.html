    goldenGlow.addColorStop(0.4, 'rgba(255,140,40,0.06)');
    goldenGlow.addColorStop(1, 'rgba(255,100,20,0)');
    ctx.fillStyle = goldenGlow;
    ctx.fillRect(sunX - 120, GROUND_Y, 240, seaH);
    // Concentrated sparkle streaks
    for (let i = 0; i < 80; i++) {
      const spread = pathW * (1 + (i / 80) * 1.5);
      const rx = sunX + (Math.random() - 0.5) * spread;
      const ry = GROUND_Y + 2 + (i / 80) * seaH * 0.8;
      const sparkW = 4 + Math.random() * 8;
      const sparkA = 0.1 + Math.random() * 0.12 - (i / 80) * 0.06;
      const wobble = Math.sin(frame * 0.035 + i * 0.5) * 3;
      ctx.fillStyle = `rgba(255,${200 + Math.random()*40},${80 + Math.random()*60},${Math.max(0, sparkA)})`;
      ctx.fillRect(rx + wobble, ry, sparkW, 1);
    }
  } else {
    // Night moon reflection — subtle silver path
    const moonX = W - 60 * scaleX - 60;
    const pathW = 40;
    for (let i = 0; i < 35; i++) {
      const rx = moonX + (Math.random() - 0.5) * pathW * (1 + i * 0.03);
      const ry = GROUND_Y + 3 + (i / 35) * seaH * 0.6;
      const sparkW = 2 + Math.random() * 5;
      const sparkA = 0.04 + Math.random() * 0.05 - (i / 35) * 0.03;
      const wobble = Math.sin(frame * 0.03 + i * 0.8) * 2;
      ctx.fillStyle = `rgba(220,230,240,${Math.max(0, sparkA)})`;
      ctx.fillRect(rx + wobble, ry, sparkW, 1);
    }
  }

  // Ambient water shimmer — elongated horizontal sparkles, concentrated near horizon
  for (let i = 0; i < 50; i++) {
    const sx = (i * 37 + frame * 0.25) % W;
    const depthRatio = (i % 8) / 8; // 0=near surface, 1=deep
    const sy = GROUND_Y + 4 + depthRatio * seaH * 0.6 + Math.sin(frame * 0.025 + i * 1.1) * 2;
    const shimW = 6 + Math.sin(i * 2.1) * 4 + Math.sin(frame * 0.04 + i) * 2;
    const nearSurface = 1 - depthRatio; // brighter near surface
    let sR, sG, sB;
    if (timeOfDay === 0) { sR = 200; sG = 230; sB = 255; }
    else if (timeOfDay === 1) { sR = 230; sG = 170; sB = 120; }
    else { sR = 140; sG = 170; sB = 220; }
    const sA = (0.02 + nearSurface * 0.03) * (0.6 + Math.sin(frame * 0.05 + i * 0.7) * 0.4);
    ctx.fillStyle = `rgba(${sR},${sG},${sB},${Math.max(0, sA)})`;
    ctx.fillRect(sx, sy, shimW, 1);
  }

  // City light reflections on water — vertical streaks (sunset/night only)
  if (timeOfDay >= 1) {
    const reflAlpha = timeOfDay === 2 ? 0.035 : 0.02;
    for (let rx = 0; rx < W; rx += 22 + Math.random()*28) {
      const rw = 2 + Math.random()*4;
      const rh = 12 + Math.random()*22;
      const ry = GROUND_Y + 2 + Math.random()*4;
      const rAlpha = reflAlpha * (0.5 + Math.random()*0.5);
      const warm = Math.random() > 0.35;
      ctx.fillStyle = warm
        ? `rgba(255, 215, 140, ${rAlpha})`
        : `rgba(140, 190, 255, ${rAlpha})`;
      const wobbleY = Math.sin(frame*0.03 + rx*0.08)*2;
      ctx.fillRect(rx, ry + wobbleY, rw, rh);
      // Faint glow around reflection
      ctx.fillStyle = warm
        ? `rgba(255, 200, 120, ${rAlpha * 0.3})`
        : `rgba(120, 170, 240, ${rAlpha * 0.3})`;
      ctx.fillRect(rx - 1, ry + wobbleY - 1, rw + 2, rh + 2);
    }
  }

  // City skyline (pre-rendered)
  ctx.drawImage(cityCanvas, 0, 0, W, H);

  // City glow (light pollution) - varies by time of day
  const glowGrad = ctx.createLinearGradient(0, GROUND_Y - 200, 0, GROUND_Y);
  if (timeOfDay === 0) {
    // Day - minimal glow, city well lit by sun
    glowGrad.addColorStop(0, 'rgba(255, 255, 255, 0)');
    glowGrad.addColorStop(0.7, 'rgba(255, 255, 240, 0.005)');
    glowGrad.addColorStop(1, 'rgba(255, 250, 220, 0.01)');
  } else if (timeOfDay === 1) {
    // Sunset - warm orange glow
    glowGrad.addColorStop(0, 'rgba(255, 160, 60, 0)');
    glowGrad.addColorStop(0.7, 'rgba(255, 140, 50, 0.03)');
    glowGrad.addColorStop(1, 'rgba(255, 120, 40, 0.08)');
  } else {
    // Night - strong warm glow (original)
    glowGrad.addColorStop(0, 'rgba(255, 200, 120, 0)');
    glowGrad.addColorStop(0.7, 'rgba(255, 180, 100, 0.02)');
    glowGrad.addColorStop(1, 'rgba(255, 160, 80, 0.06)');
  }
  ctx.fillStyle = glowGrad;
  ctx.fillRect(0, GROUND_Y - 200, W, 200);

  // Ground line
  ctx.strokeStyle = 'rgba(100, 120, 150, 0.3)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(0, GROUND_Y);
  ctx.lineTo(W, GROUND_Y);
  ctx.stroke();

  // Smoke trails - softer, more atmospheric
  smokeTrails.forEach(s => {
    const alpha = (s.life / s.maxLife) * 0.35;
    const grd = ctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, s.size);
    grd.addColorStop(0, `rgba(190, 200, 210, ${alpha})`);
    grd.addColorStop(1, `rgba(160, 170, 180, 0)`);
    ctx.fillStyle = grd;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.size * 1.3, 0, Math.PI*2);
    ctx.fill();
  });

  // Missiles - different visuals per type
  missiles.forEach(m => {
    const isBallistic = m.type === 'ballistic';
    const isDrone = m.type === 'drone';
    const isDecoy = m.type === 'decoy';

    // Trail — volumetric smoke puffs for rockets/ballistic, clean for drones/decoys
    const trailLen = m.trail.length;
    m.trail.forEach((tp, idx) => {
      const progress = idx / trailLen; // 0=oldest, 1=newest
      const age = 1 - progress; // 0=newest, 1=oldest

      if (isDrone) {
        // Drone: faint heat distortion shimmer (no smoke)
        const shimAlpha = progress * 0.15;
        const shimOff = Math.sin(frame * 0.1 + idx * 0.5) * 1.5;
        ctx.fillStyle = `rgba(80,150,220,${shimAlpha})`;
        ctx.beginPath();
        ctx.arc(tp.x + shimOff, tp.y, 1.5 + progress * 1.5, 0, Math.PI*2);
        ctx.fill();
      } else if (isDecoy) {
        // Decoy: tiny spark trail
        const spkAlpha = progress * 0.6;
        ctx.fillStyle = `rgba(255,${180+Math.random()*75},80,${spkAlpha})`;
        ctx.beginPath();
        ctx.arc(tp.x, tp.y, 0.8 + progress * 0.8, 0, Math.PI*2);
        ctx.fill();
      } else {
        // Rocket & Ballistic: volumetric smoke puffs
        const baseSz = isBallistic ? 4 : 2.5;
        // Puffs expand as they age — newest are small, oldest are big and faint
        const puffSize = baseSz * (0.6 + age * 2.2);
        // Wind drift — older puffs drift more
        const windDrift = age * age * 8;
        const turbulence = Math.sin(idx * 1.7 + frame * 0.02) * age * 2;
        const drawX = tp.x - windDrift + turbulence;
        const drawY = tp.y - age * 3 + Math.sin(idx * 2.3) * age;

        // Opacity: starts opaque near engine, fades as puff ages
        const baseAlpha = progress * (1 - age * 0.7);

        // Outer soft smoke (gray, large, very faint)
        const outerSz = puffSize * 1.6;
        const grayVal = isBallistic ? 160 : 190;
        const outerGrd = ctx.createRadialGradient(drawX, drawY, 0, drawX, drawY, outerSz);
        outerGrd.addColorStop(0, `rgba(${grayVal},${grayVal+10},${grayVal+20},${baseAlpha * 0.15})`);
        outerGrd.addColorStop(0.6, `rgba(${grayVal-20},${grayVal-10},${grayVal},${baseAlpha * 0.08})`);
        outerGrd.addColorStop(1, 'rgba(140,140,150,0)');
        ctx.fillStyle = outerGrd;
        ctx.beginPath();
        ctx.arc(drawX, drawY, outerSz, 0, Math.PI*2);
        ctx.fill();

        // Inner warm smoke (near engine: orange tinted, far: gray)
        const warmth = progress; // more warm near engine
        const iR = Math.round(190 + warmth * 60);
        const iG = Math.round(180 + warmth * 30 - age * 40);
        const iB = Math.round(170 - warmth * 60);
        const innerGrd = ctx.createRadialGradient(drawX, drawY, 0, drawX, drawY, puffSize);
        innerGrd.addColorStop(0, `rgba(${iR},${iG},${iB},${baseAlpha * 0.35})`);
        innerGrd.addColorStop(0.5, `rgba(${iR-20},${iG-10},${iB+10},${baseAlpha * 0.2})`);
        innerGrd.addColorStop(1, 'rgba(160,160,170,0)');
        ctx.fillStyle = innerGrd;
        ctx.beginPath();
        ctx.arc(drawX, drawY, puffSize, 0, Math.PI*2);
        ctx.fill();

        // Hot core near engine (newest 30% of trail only)
        if (progress > 0.7) {
          const hotAlpha = (progress - 0.7) / 0.3;
          const hotSz = baseSz * 0.8;
          const hotColor = isBallistic ? `rgba(255,80,30,${hotAlpha * 0.3})` : `rgba(255,140,50,${hotAlpha * 0.2})`;
          ctx.fillStyle = hotColor;
          ctx.beginPath();
          ctx.arc(tp.x, tp.y, hotSz, 0, Math.PI*2);
          ctx.fill();
        }
      }
    });

    const angle = Math.atan2(m.vy, m.vx);
    ctx.save();
    ctx.translate(m.x, m.y);

    if (isDecoy) {
      // Decoy: tiny flickering orange/yellow dot
      const flicker = 0.6 + Math.random() * 0.4;
      ctx.fillStyle = `rgba(255, ${180 + Math.random()*75}, 0, ${flicker})`;
      ctx.beginPath(); ctx.arc(0, 0, 4, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = 'rgba(255,255,200,0.8)';
      ctx.beginPath(); ctx.arc(0, 0, 2, 0, Math.PI*2); ctx.fill();
    } else if (isDrone) {
      // Shahed-136 delta-wing kamikaze drone
      ctx.rotate(angle);
      const flash = m.flashTimer > 0;

      // === Delta wings (swept back) ===
      const wingGrad = ctx.createLinearGradient(0, -14, 0, 14);
      wingGrad.addColorStop(0, flash ? '#fff' : '#6a7a60');
      wingGrad.addColorStop(0.3, flash ? '#eee' : '#7a8a70');
      wingGrad.addColorStop(0.5, flash ? '#ddd' : '#8a9a80');
      wingGrad.addColorStop(0.7, flash ? '#eee' : '#6a7a60');
      wingGrad.addColorStop(1, flash ? '#fff' : '#5a6a50');
      ctx.fillStyle = wingGrad;
      // Top wing
      ctx.beginPath();
      ctx.moveTo(6, 0);        // wing leading edge at nose area
      ctx.lineTo(-8, -13);     // wingtip back-swept
      ctx.lineTo(-12, -11);    // trailing edge
      ctx.lineTo(-6, -1);      // wing root
      ctx.closePath();
      ctx.fill();
      // Bottom wing (mirror)
      ctx.beginPath();
      ctx.moveTo(6, 0);
      ctx.lineTo(-8, 13);
      ctx.lineTo(-12, 11);
      ctx.lineTo(-6, 1);
      ctx.closePath();
      ctx.fill();
      // Wing panel lines
      ctx.strokeStyle = 'rgba(40,50,35,0.3)';
      ctx.lineWidth = 0.5;
      ctx.beginPath();
      ctx.moveTo(0, -1); ctx.lineTo(-9, -12);
      ctx.moveTo(0, 1); ctx.lineTo(-9, 12);
      ctx.stroke();

      // === Fuselage (narrow cylindrical body) ===
      const bodyGrad = ctx.createLinearGradient(0, -2.5, 0, 2.5);
      bodyGrad.addColorStop(0, flash ? '#fff' : '#8a9a7a');
      bodyGrad.addColorStop(0.3, flash ? '#eee' : '#9aaa8a');
      bodyGrad.addColorStop(0.7, flash ? '#eee' : '#7a8a6a');
      bodyGrad.addColorStop(1, flash ? '#ddd' : '#6a7a5a');
      ctx.fillStyle = bodyGrad;
      ctx.beginPath();
      ctx.moveTo(12, 0);       // nose tip
      ctx.lineTo(8, -2);
      ctx.lineTo(-10, -2.2);
      ctx.lineTo(-13, -1.5);
      ctx.lineTo(-13, 1.5);
      ctx.lineTo(-10, 2.2);
      ctx.lineTo(8, 2);
      ctx.closePath();
      ctx.fill();

      // Nose cone (darker, pointed)
      ctx.fillStyle = flash ? '#fff' : '#555';
      ctx.beginPath();
      ctx.moveTo(14, 0);
      ctx.lineTo(10, -1.5);
      ctx.lineTo(10, 1.5);
      ctx.closePath();
      ctx.fill();

      // === V-tail stabilizers ===
      ctx.fillStyle = flash ? '#ddd' : '#6a7a5a';
      // Upper stabilizer
      ctx.beginPath();
      ctx.moveTo(-10, -2);
      ctx.lineTo(-14, -6);
      ctx.lineTo(-15, -5);
      ctx.lineTo(-12, -2);
      ctx.closePath();
      ctx.fill();
      // Lower stabilizer
      ctx.beginPath();
      ctx.moveTo(-10, 2);
      ctx.lineTo(-14, 6);
      ctx.lineTo(-15, 5);
      ctx.lineTo(-12, 2);
      ctx.closePath();
      ctx.fill();

      // === Rear pusher propeller (spinning disc blur) ===
      const propSpin = frame * 0.6 + m.wobbleOffset;
      const propR = 4;
      ctx.strokeStyle = 'rgba(180,190,170,0.5)';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.arc(-14, 0, propR, propSpin, propSpin + Math.PI);
      ctx.stroke();
      ctx.beginPath();
      ctx.arc(-14, 0, propR, propSpin + Math.PI*0.5, propSpin + Math.PI*1.5);
      ctx.stroke();
      // Prop hub
      ctx.fillStyle = '#555';
      ctx.beginPath(); ctx.arc(-14, 0, 1.2, 0, Math.PI*2); ctx.fill();

      // === Warhead marking (red band near nose) ===
      ctx.fillStyle = 'rgba(180,50,40,0.5)';
      ctx.fillRect(6, -1.8, 2, 3.6);
    } else {
      // Rocket or Ballistic missile
      ctx.rotate(angle);
      const len = isBallistic ? 22 : 14;
      const rad = isBallistic ? 4.5 : 2.5;
      const flash = m.flashTimer > 0;

      if (isBallistic) {
        // === BALLISTIC MISSILE (Iranian Fajr / Fateh style) ===
        // Main body — cylindrical with 3D shading
        const bodyGrad = ctx.createLinearGradient(0, -rad, 0, rad);
        bodyGrad.addColorStop(0, flash ? '#fff' : '#a03030');
        bodyGrad.addColorStop(0.15, flash ? '#fee' : '#c04040');
        bodyGrad.addColorStop(0.4, flash ? '#fdd' : '#d04a4a');
        bodyGrad.addColorStop(0.6, flash ? '#fcc' : '#b03535');
        bodyGrad.addColorStop(0.85, flash ? '#faa' : '#8a2525');
        bodyGrad.addColorStop(1, flash ? '#f88' : '#6a1818');
        ctx.fillStyle = bodyGrad;
        ctx.beginPath();
        ctx.moveTo(len * 0.6, -rad);
        ctx.lineTo(-len * 0.35, -rad);
        ctx.lineTo(-len * 0.4, -rad * 0.7);
        ctx.lineTo(-len * 0.4, rad * 0.7);
        ctx.lineTo(-len * 0.35, rad);
        ctx.lineTo(len * 0.6, rad);
        ctx.closePath();
        ctx.fill();

        // Warhead section (darker, conical)
        const whGrad = ctx.createLinearGradient(0, -rad * 0.9, 0, rad * 0.9);
        whGrad.addColorStop(0, flash ? '#eee' : '#884040');
        whGrad.addColorStop(0.5, flash ? '#ddd' : '#993838');
        whGrad.addColorStop(1, flash ? '#ccc' : '#772828');
        ctx.fillStyle = whGrad;
        ctx.beginPath();
        ctx.moveTo(len * 0.6, -rad);
        ctx.lineTo(len * 0.6, rad);
        ctx.lineTo(len * 0.85, rad * 0.55);
        ctx.lineTo(len * 0.85, -rad * 0.55);
        ctx.closePath();
        ctx.fill();

        // Nose cone (ogive shape)
        ctx.fillStyle = flash ? '#ddd' : '#663030';
        ctx.beginPath();
        ctx.moveTo(len + 2, 0);
        ctx.quadraticCurveTo(len * 0.9, -rad * 0.45, len * 0.85, -rad * 0.55);
        ctx.lineTo(len * 0.85, rad * 0.55);
        ctx.quadraticCurveTo(len * 0.9, rad * 0.45, len + 2, 0);
        ctx.fill();

        // Body segment bands (separation rings)
        ctx.strokeStyle = flash ? 'rgba(255,255,255,0.3)' : 'rgba(40,15,15,0.5)';
        ctx.lineWidth = 1;
        for (const bx of [len * 0.15, -len * 0.05, -len * 0.2]) {
          ctx.beginPath();
          ctx.moveTo(bx, -rad); ctx.lineTo(bx, rad);
          ctx.stroke();
        }
        // Warhead/body junction ring
        ctx.fillStyle = flash ? 'rgba(255,255,255,0.3)' : 'rgba(60,20,20,0.6)';
        ctx.fillRect(len * 0.58, -rad - 0.5, 2.5, rad * 2 + 1);

        // Specular highlight (cylinder reflection)
        ctx.fillStyle = 'rgba(255,200,200,0.12)';
        ctx.fillRect(-len * 0.3, -rad + 1, len * 0.8, 1.5);

        // Stabilizer fins (4 fins, we show 2 visible)
        const finGrad = ctx.createLinearGradient(0, -rad - 5, 0, -rad);
        finGrad.addColorStop(0, flash ? '#ddd' : '#661818');
        finGrad.addColorStop(1, flash ? '#eee' : '#882828');
        ctx.fillStyle = finGrad;
        // Top fin
        ctx.beginPath();
        ctx.moveTo(-len * 0.32, -rad);
        ctx.lineTo(-len * 0.42, -rad - 6);
        ctx.lineTo(-len * 0.28, -rad - 5);
        ctx.lineTo(-len * 0.2, -rad);
        ctx.closePath();
        ctx.fill();
        // Bottom fin
        ctx.beginPath();
        ctx.moveTo(-len * 0.32, rad);
        ctx.lineTo(-len * 0.42, rad + 6);
        ctx.lineTo(-len * 0.28, rad + 5);
        ctx.lineTo(-len * 0.2, rad);
        ctx.closePath();
        ctx.fill();

      } else {
        // === ROCKET (Qassam / Grad style) ===
        // Main body — steel tube with 3D cylinder shading
        const bodyGrad = ctx.createLinearGradient(0, -rad, 0, rad);
        bodyGrad.addColorStop(0, flash ? '#fff' : '#6a6a6a');
        bodyGrad.addColorStop(0.15, flash ? '#eee' : '#8a8a88');
        bodyGrad.addColorStop(0.35, flash ? '#ddd' : '#9a9a96');
        bodyGrad.addColorStop(0.5, flash ? '#ccc' : '#8a8a86');
        bodyGrad.addColorStop(0.7, flash ? '#bbb' : '#6a6a66');
        bodyGrad.addColorStop(1, flash ? '#aaa' : '#4a4a48');
        ctx.fillStyle = bodyGrad;
        ctx.beginPath();
        ctx.moveTo(len * 0.55, -rad);
        ctx.lineTo(-len * 0.35, -rad);
        ctx.lineTo(-len * 0.38, -rad * 0.6);
        ctx.lineTo(-len * 0.38, rad * 0.6);
        ctx.lineTo(-len * 0.35, rad);
        ctx.lineTo(len * 0.55, rad);
        ctx.closePath();
        ctx.fill();

        // Warhead (ogive nose section — slightly darker)
        const noseGrad = ctx.createLinearGradient(0, -rad * 0.85, 0, rad * 0.85);
        noseGrad.addColorStop(0, flash ? '#ddd' : '#5a5a58');
        noseGrad.addColorStop(0.5, flash ? '#ccc' : '#6a6a66');
        noseGrad.addColorStop(1, flash ? '#bbb' : '#4a4a46');
        ctx.fillStyle = noseGrad;
        ctx.beginPath();
        ctx.moveTo(len + 3, 0);
        ctx.quadraticCurveTo(len * 0.7, -rad * 0.75, len * 0.55, -rad);
        ctx.lineTo(len * 0.55, rad);
        ctx.quadraticCurveTo(len * 0.7, rad * 0.75, len + 3, 0);
        ctx.fill();

        // Body weld seam / segment line
        ctx.strokeStyle = flash ? 'rgba(255,255,255,0.2)' : 'rgba(30,30,28,0.35)';
        ctx.lineWidth = 0.7;
        ctx.beginPath();
        ctx.moveTo(len * 0.1, -rad); ctx.lineTo(len * 0.1, rad);
        ctx.moveTo(-len * 0.15, -rad); ctx.lineTo(-len * 0.15, rad);
        ctx.stroke();
        // Warhead junction
        ctx.fillStyle = flash ? 'rgba(255,255,255,0.2)' : 'rgba(40,40,38,0.4)';
        ctx.fillRect(len * 0.53, -rad - 0.3, 1.5, rad * 2 + 0.6);

        // Specular highlight
        ctx.fillStyle = 'rgba(255,255,255,0.1)';
        ctx.fillRect(-len * 0.3, -rad + 0.8, len * 0.7, 1);

        // Stabilizer fins (sheet metal — crude)
        ctx.fillStyle = flash ? '#ccc' : '#505050';
        // Top fin
        ctx.beginPath();
        ctx.moveTo(-len * 0.3, -rad);
        ctx.lineTo(-len * 0.38, -rad - 4.5);
        ctx.lineTo(-len * 0.25, -rad - 3.5);
        ctx.lineTo(-len * 0.18, -rad);
        ctx.closePath();
        ctx.fill();
        // Bottom fin
        ctx.beginPath();
        ctx.moveTo(-len * 0.3, rad);
        ctx.lineTo(-len * 0.38, rad + 4.5);
        ctx.lineTo(-len * 0.25, rad + 3.5);
        ctx.lineTo(-len * 0.18, rad);
        ctx.closePath();
        ctx.fill();
        // Fin edge highlight
        ctx.strokeStyle = flash ? 'rgba(255,255,255,0.3)' : 'rgba(120,120,115,0.4)';
        ctx.lineWidth = 0.5;
        ctx.beginPath();
        ctx.moveTo(-len * 0.3, -rad); ctx.lineTo(-len * 0.38, -rad - 4.5);
        ctx.moveTo(-len * 0.3, rad); ctx.lineTo(-len * 0.38, rad + 4.5);
        ctx.stroke();
      }

      // Engine flame — multi-layer with flicker
      const nozzleX = isBallistic ? -len*0.4 : -len*0.38;
      const flickerSeed = frame * 0.15 + m.x * 0.1;
      const flickerW = 0.7 + Math.sin(flickerSeed) * 0.15 + Math.sin(flickerSeed*2.3) * 0.1 + Math.random()*0.15;
      const baseFlameLen = isBallistic ? 18 : 12;
      const flameLen = baseFlameLen + Math.sin(flickerSeed*1.7)*4 + Math.random()*4;
      const nozzleRad = rad * 0.65;

      // Layer 1: Outer red/dark glow (widest, faintest)
      const outerLen = flameLen * 1.15;
      const outerW = nozzleRad * flickerW * 1.3;
      const outerGrd = ctx.createLinearGradient(nozzleX, 0, nozzleX - outerLen, 0);
      outerGrd.addColorStop(0, isBallistic ? 'rgba(255,60,20,0.5)' : 'rgba(255,80,30,0.4)');
      outerGrd.addColorStop(0.4, isBallistic ? 'rgba(200,20,0,0.3)' : 'rgba(200,40,0,0.25)');
      outerGrd.addColorStop(1, 'rgba(80,10,0,0)');
      ctx.fillStyle = outerGrd;
      ctx.beginPath();
      ctx.moveTo(nozzleX, -outerW);
      ctx.quadraticCurveTo(nozzleX - outerLen*0.3, -outerW*0.8, nozzleX - outerLen*0.6, -outerW*0.3);
      ctx.quadraticCurveTo(nozzleX - outerLen*0.85, 0, nozzleX - outerLen, 0);
      ctx.quadraticCurveTo(nozzleX - outerLen*0.85, 0, nozzleX - outerLen*0.6, outerW*0.3);
      ctx.quadraticCurveTo(nozzleX - outerLen*0.3, outerW*0.8, nozzleX, outerW);
      ctx.closePath();
      ctx.fill();

      // Layer 2: Orange mid flame
      const midLen = flameLen * 0.85;
      const midW = nozzleRad * flickerW * 1.0;
      const midGrd = ctx.createLinearGradient(nozzleX, 0, nozzleX - midLen, 0);
      midGrd.addColorStop(0, 'rgba(255,200,80,0.9)');
      midGrd.addColorStop(0.35, 'rgba(255,140,30,0.7)');
      midGrd.addColorStop(0.7, isBallistic ? 'rgba(255,60,10,0.35)' : 'rgba(255,80,20,0.3)');
      midGrd.addColorStop(1, 'rgba(255,40,0,0)');
      ctx.fillStyle = midGrd;
      ctx.beginPath();
      ctx.moveTo(nozzleX, -midW);
      ctx.quadraticCurveTo(nozzleX - midLen*0.4, -midW*0.6, nozzleX - midLen, 0);
      ctx.quadraticCurveTo(nozzleX - midLen*0.4, midW*0.6, nozzleX, midW);
      ctx.closePath();
      ctx.fill();

      // Layer 3: Yellow inner flame
      const innerLen = flameLen * 0.55;
      const innerW = nozzleRad * flickerW * 0.7;
      const innerGrd = ctx.createLinearGradient(nozzleX, 0, nozzleX - innerLen, 0);
      innerGrd.addColorStop(0, 'rgba(255,255,180,0.95)');
      innerGrd.addColorStop(0.5, 'rgba(255,220,80,0.7)');
      innerGrd.addColorStop(1, 'rgba(255,180,40,0)');
      ctx.fillStyle = innerGrd;
      ctx.beginPath();
      ctx.moveTo(nozzleX, -innerW);
      ctx.quadraticCurveTo(nozzleX - innerLen*0.5, -innerW*0.4, nozzleX - innerLen, 0);
      ctx.quadraticCurveTo(nozzleX - innerLen*0.5, innerW*0.4, nozzleX, innerW);
      ctx.closePath();
      ctx.fill();

      // Layer 4: White-hot core (brightest, smallest)
      const coreLen = flameLen * 0.25;
      const coreW = nozzleRad * 0.4;
      ctx.fillStyle = 'rgba(255,255,240,0.9)';
      ctx.beginPath();
      ctx.moveTo(nozzleX, -coreW);
      ctx.quadraticCurveTo(nozzleX - coreLen*0.5, 0, nozzleX - coreLen, 0);
      ctx.quadraticCurveTo(nozzleX - coreLen*0.5, 0, nozzleX, coreW);
      ctx.closePath();
      ctx.fill();

      // Nozzle glow ring
      ctx.strokeStyle = 'rgba(255,200,100,0.4)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.arc(nozzleX, 0, nozzleRad * 0.9, -Math.PI*0.5, Math.PI*0.5);
      ctx.stroke();

      // Ballistic: HP indicator ring
      if (isBallistic && m.hp < m.maxHP) {
        ctx.strokeStyle = 'rgba(255,100,100,0.6)';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(0, 0, rad + 8, -Math.PI/2, -Math.PI/2 + (m.hp/m.maxHP)*Math.PI*2);
        ctx.stroke();
      }
    }

    ctx.restore();

    // Glow around missile
    const glowColor = isBallistic ? 'rgba(255,50,50,0.08)' : isDrone ? 'rgba(80,150,255,0.06)' : isDecoy ? 'rgba(255,180,0,0.1)' : 'rgba(255,120,40,0.05)';
    const glowR = isBallistic ? 18 : isDrone ? 14 : isDecoy ? 6 : 12;
    ctx.fillStyle = glowColor;
    ctx.beginPath();
    ctx.arc(m.x, m.y, glowR, 0, Math.PI*2);
    ctx.fill();
  });

  // Interceptors (Tamir missiles)
  interceptors.forEach(ic => {
    // Trail - bright engine exhaust with glow
    ic.trail.forEach((t, idx) => {
      const alpha = (idx / ic.trail.length);
      // Outer glow trail
      ctx.fillStyle = `rgba(100, 180, 255, ${alpha * 0.08})`;
      ctx.beginPath();
      ctx.arc(t.x, t.y, 4 + alpha*3, 0, Math.PI*2);
      ctx.fill();
      // Inner bright trail
      ctx.fillStyle = `rgba(180, 230, 255, ${alpha * 0.65})`;
      ctx.beginPath();
      ctx.arc(t.x, t.y, 1.2 + alpha*1.2, 0, Math.PI*2);
      ctx.fill();
    });

    const angle = Math.atan2(ic.vy, ic.vx);
    ctx.save();
    ctx.translate(ic.x, ic.y);
    ctx.rotate(angle);

    // === Tamir Interceptor (realistic) ===
    // Main body — slender white cylinder with 3D shading
    const tBodyGrad = ctx.createLinearGradient(0, -2, 0, 2);
    tBodyGrad.addColorStop(0, '#c8d4dc');
    tBodyGrad.addColorStop(0.2, '#dde8ee');
    tBodyGrad.addColorStop(0.4, '#e8f0f4');
    tBodyGrad.addColorStop(0.6, '#d4dee6');
    tBodyGrad.addColorStop(0.85, '#b8c4cc');
    tBodyGrad.addColorStop(1, '#a0abb5');
    ctx.fillStyle = tBodyGrad;
    ctx.beginPath();
    ctx.moveTo(6, -1.8);
    ctx.lineTo(-6, -1.8);
    ctx.lineTo(-6.5, -1.2);
    ctx.lineTo(-6.5, 1.2);
    ctx.lineTo(-6, 1.8);
    ctx.lineTo(6, 1.8);
    ctx.closePath();
    ctx.fill();

    // Seeker dome (dark nose cone)
    ctx.fillStyle = '#556';
    ctx.beginPath();
    ctx.moveTo(10, 0);
    ctx.quadraticCurveTo(8, -1.2, 6, -1.8);
    ctx.lineTo(6, 1.8);
    ctx.quadraticCurveTo(8, 1.2, 10, 0);
    ctx.fill();
    // Seeker ring
    ctx.strokeStyle = 'rgba(100,120,140,0.5)';
    ctx.lineWidth = 0.6;
    ctx.beginPath();
    ctx.moveTo(6.2, -1.7); ctx.lineTo(6.2, 1.7);
    ctx.stroke();

    // Canard fins (small, near nose)
    ctx.fillStyle = '#99aabb';
    ctx.beginPath();
    ctx.moveTo(4, -1.8); ctx.lineTo(3.5, -3.5); ctx.lineTo(2, -3); ctx.lineTo(2.5, -1.8);
    ctx.closePath(); ctx.fill();
    ctx.beginPath();
    ctx.moveTo(4, 1.8); ctx.lineTo(3.5, 3.5); ctx.lineTo(2, 3); ctx.lineTo(2.5, 1.8);
    ctx.closePath(); ctx.fill();

    // Tail fins (cruciform, larger)
    ctx.fillStyle = '#8a9aaa';
    ctx.beginPath();
    ctx.moveTo(-4.5, -1.8); ctx.lineTo(-5.5, -4.5); ctx.lineTo(-3.5, -4); ctx.lineTo(-3, -1.8);
    ctx.closePath(); ctx.fill();
    ctx.beginPath();
    ctx.moveTo(-4.5, 1.8); ctx.lineTo(-5.5, 4.5); ctx.lineTo(-3.5, 4); ctx.lineTo(-3, 1.8);
    ctx.closePath(); ctx.fill();

    // Body band (mid-section marking)
    ctx.fillStyle = 'rgba(80,100,120,0.25)';
    ctx.fillRect(-1, -1.9, 1.5, 3.8);

    // Specular highlight
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    ctx.fillRect(-5, -1.6, 9, 0.8);

    // Engine nozzle
    ctx.fillStyle = '#445';
    ctx.fillRect(-6.5, -1.3, 1.5, 2.6);

    // Engine exhaust — bright blue-white pulse motor
    ctx.fillStyle = 'rgba(180,230,255,0.95)';
    ctx.beginPath();
    ctx.arc(-7, 0, 2.2, 0, Math.PI*2);
    ctx.fill();
    const exLen = 8 + Math.random()*5;
    const exGrad = ctx.createLinearGradient(-7, 0, -7-exLen, 0);
    exGrad.addColorStop(0, 'rgba(220,245,255,0.9)');
    exGrad.addColorStop(0.3, 'rgba(150,210,255,0.6)');
    exGrad.addColorStop(0.6, 'rgba(80,150,255,0.3)');
    exGrad.addColorStop(1, 'rgba(40,80,255,0)');
    ctx.fillStyle = exGrad;
    ctx.beginPath();
    ctx.moveTo(-7, -2);
    ctx.quadraticCurveTo(-7 - exLen*0.5, -1, -7 - exLen, 0);
    ctx.quadraticCurveTo(-7 - exLen*0.5, 1, -7, 2);
    ctx.closePath();
    ctx.fill();
    // White-hot core
    const coreEx = exLen * 0.3;
    ctx.fillStyle = 'rgba(240,250,255,0.8)';
    ctx.beginPath();
    ctx.moveTo(-7, -0.8);
    ctx.quadraticCurveTo(-7 - coreEx*0.5, 0, -7 - coreEx, 0);
    ctx.quadraticCurveTo(-7 - coreEx*0.5, 0, -7, 0.8);
    ctx.closePath();
    ctx.fill();

    ctx.restore();

    // Glow - larger, more visible
    const iglow = ctx.createRadialGradient(ic.x, ic.y, 0, ic.x, ic.y, 16);
    iglow.addColorStop(0, 'rgba(150,230,255,0.12)');
    iglow.addColorStop(0.5, 'rgba(100,180,255,0.05)');
    iglow.addColorStop(1, 'rgba(50,100,255,0)');
    ctx.fillStyle = iglow;
    ctx.beginPath();
    ctx.arc(ic.x, ic.y, 16, 0, Math.PI*2);
    ctx.fill();
  });

  // Explosions — multi-layer with shockwave ring and asymmetric shape
  explosions.forEach(e => {
    if (e.delay && e.delay > 0) return; // skip delayed fireballs
    const ax = e.asymX || 0;
    const ay = e.asymY || 0;
    const cx = e.x + ax * (e.radius / (e.maxR || 38));
    const cy = e.y + ay * (e.radius / (e.maxR || 38));

    // Shockwave ring (fast-expanding, fading thin circle)
    if (e.shockMaxR > 0 && e.shockAlpha > 0.02 && e.shockR < e.shockMaxR) {
      ctx.strokeStyle = `rgba(255,240,200,${e.shockAlpha})`;
      ctx.lineWidth = Math.max(0.5, 2.5 - e.shockR * 0.02);
      ctx.beginPath();
      ctx.arc(e.x, e.y, e.shockR, 0, Math.PI*2);
      ctx.stroke();
      // Faint fill inside shockwave
      ctx.fillStyle = `rgba(255,220,180,${e.shockAlpha * 0.04})`;
      ctx.beginPath();
      ctx.arc(e.x, e.y, e.shockR, 0, Math.PI*2);
      ctx.fill();
    }

    // Outer soft glow — large atmospheric haze
    const outerR = e.radius * 1.5;
    const outerGlow = ctx.createRadialGradient(cx, cy, e.radius*0.3, cx, cy, outerR);
    outerGlow.addColorStop(0, `rgba(255,180,80,${e.alpha*0.15})`);
    outerGlow.addColorStop(0.5, `rgba(255,120,40,${e.alpha*0.06})`);
    outerGlow.addColorStop(1, 'rgba(255,60,10,0)');
    ctx.fillStyle = outerGlow;
    ctx.beginPath();
    ctx.arc(cx, cy, outerR, 0, Math.PI*2);
    ctx.fill();

    // Main fireball — asymmetric center, multi-stop gradient
    const grad = ctx.createRadialGradient(cx, cy, 0, e.x, e.y, e.radius);
    grad.addColorStop(0, `rgba(255,255,240,${e.alpha*0.95})`);
    grad.addColorStop(0.1, `rgba(255,255,200,${e.alpha*0.85})`);
    grad.addColorStop(0.25, `rgba(255,220,100,${e.alpha*0.65})`);
    grad.addColorStop(0.45, `rgba(255,160,40,${e.alpha*0.45})`);
    grad.addColorStop(0.65, `rgba(255,80,15,${e.alpha*0.25})`);
    grad.addColorStop(0.82, `rgba(180,30,0,${e.alpha*0.1})`);
    grad.addColorStop(1, 'rgba(60,10,0,0)');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(e.x, e.y, e.radius, 0, Math.PI*2);
    ctx.fill();

    // Internal bright flash (early frames only)
    if (e.flashTimer > 0) {
      const flashA = (e.flashTimer / 8) * e.alpha;
      const flashR = e.radius * 0.4;
      const flashGrd = ctx.createRadialGradient(cx, cy, 0, cx, cy, flashR);
      flashGrd.addColorStop(0, `rgba(255,255,255,${flashA * 0.8})`);
      flashGrd.addColorStop(0.5, `rgba(255,255,200,${flashA * 0.4})`);
      flashGrd.addColorStop(1, 'rgba(255,240,180,0)');
      ctx.fillStyle = flashGrd;
      ctx.beginPath();
      ctx.arc(cx, cy, flashR, 0, Math.PI*2);
      ctx.fill();
    }
  });

  particles.forEach(p => {
    const pAlpha = Math.max(0, p.life / p.maxLife);
    if (p.isSpark) {
      // Spark streaks — elongated in direction of motion (motion blur)
      const speed = Math.sqrt(p.vx*p.vx + p.vy*p.vy);
      const streakLen = Math.min(speed * 2.5, 12);
      const angle = Math.atan2(p.vy, p.vx);
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(angle);
      ctx.globalAlpha = pAlpha;
      // Bright core
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.ellipse(0, 0, streakLen, p.size * 0.5, 0, 0, Math.PI*2);
      ctx.fill();
      // Warm glow
      ctx.fillStyle = `rgba(255,220,150,${pAlpha*0.4})`;
      ctx.beginPath();
      ctx.ellipse(0, 0, streakLen * 1.3, p.size * 1.2, 0, 0, Math.PI*2);
      ctx.fill();
      ctx.restore();
    } else if (p.size > 1.5) {
      // Larger particles get soft radial gradient
      const pg = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.size);
      pg.addColorStop(0, p.color);
      pg.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.globalAlpha = pAlpha;
      ctx.fillStyle = pg;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size * 1.3, 0, Math.PI*2);
      ctx.fill();
    } else {
      ctx.globalAlpha = pAlpha;
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
      ctx.fill();
    }
  });
  ctx.globalAlpha = 1;

  // Iron Dome Battery
  ctx.drawImage(batteryCanvas, batteryX - 90, batteryY - 65, 180, 100);
  drawLauncherTubes(batteryAngle);

  // Muzzle flash
  if (interceptors.length > 0) {
    const last = interceptors[interceptors.length - 1];
    const age = Math.sqrt((last.x-batteryX)**2 + (last.y-batteryY)**2);
    if (age < 40) {
      const flashAlpha = (1 - age/40) * 0.6;
      const fx = batteryX + Math.cos(batteryAngle)*55;
      const fy = batteryY + Math.sin(batteryAngle)*55;
      ctx.fillStyle = `rgba(180, 240, 255, ${flashAlpha})`;
      ctx.beginPath();
      ctx.arc(fx, fy, 8 + (1-age/40)*5, 0, Math.PI*2);
      ctx.fill();
      ctx.fillStyle = `rgba(255, 255, 255, ${flashAlpha * 0.5})`;
      ctx.beginPath();
      ctx.arc(fx, fy, 4, 0, Math.PI*2);
      ctx.fill();
    }
  }

  // Battery label
  ctx.fillStyle = 'rgba(130, 190, 130, 0.7)';
  ctx.font = 'bold 10px Arial';
  ctx.textAlign = 'center';
  ctx.fillText(t('batteryLabel'), batteryX, batteryY + 42);

  // Floating texts
  floatingTexts.forEach(ft => {
    const alpha = ft.life / ft.maxLife;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = ft.color;
    ctx.font = `bold ${ft.size}px Arial`;
    ctx.textAlign = 'center';
    ctx.shadowColor = 'rgba(0,0,0,0.5)';
    ctx.shadowBlur = 4;
    ctx.fillText(ft.text, ft.x, ft.y);
    ctx.shadowBlur = 0;
  });
  ctx.globalAlpha = 1;

  // Enemy type first-appearance alert
  if (enemyAlert && enemyAlert.timer > 0) {
    const ea = enemyAlert;
    const eaAlpha = Math.min(1, ea.timer / 30); // fade out in last 0.5s
    ctx.save();
    ctx.globalAlpha = eaAlpha;
    ctx.fillStyle = ea.color;
    ctx.font = `bold ${fz(20)}px Arial`;
    ctx.textAlign = 'center';
    ctx.shadowColor = 'rgba(0,0,0,0.7)';
    ctx.shadowBlur = 10;
    ctx.fillText(ea.text, W/2, H * 0.28);
    ctx.shadowBlur = 0;
    ctx.globalAlpha = 1;
    ctx.restore();
  }

  // Airplane with banner
  if (airplane) {
    const ax = airplane.x, ay = airplane.y;
    const dir = airplane.speed > 0 ? 1 : -1;
    ctx.save();
    ctx.translate(ax, ay);
    if (dir < 0) ctx.scale(-1, 1);

    // Wings
    ctx.fillStyle = '#ccd';
    ctx.beginPath();
    ctx.moveTo(-5, -1);
    ctx.lineTo(5, -8);
    ctx.lineTo(8, -7);
    ctx.lineTo(0, 0);
    ctx.closePath();
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(-3, 2);
    ctx.lineTo(4, 7);
    ctx.lineTo(6, 6);
    ctx.lineTo(0, 1);
    ctx.closePath();
    ctx.fill();

    // Fuselage
    ctx.fillStyle = '#dde';
    ctx.beginPath();
    ctx.ellipse(0, 0, 14, 3, 0, 0, Math.PI * 2);
    ctx.fill();

    // Cockpit
    ctx.fillStyle = '#adf';
    ctx.beginPath();
    ctx.ellipse(12, -1, 4, 2, 0.1, 0, Math.PI * 2);
    ctx.fill();

    // Tail
    ctx.fillStyle = '#bbc';
    ctx.beginPath();
    ctx.moveTo(-12, 0);
    ctx.lineTo(-18, -6);
    ctx.lineTo(-15, -5);
    ctx.lineTo(-12, -1);
    ctx.closePath();
    ctx.fill();

    ctx.restore();

    // Banner rope
    const ropeStartX = ax - dir * 16;
    const ropeStartY = ay + 1;
    const bannerOff = Math.round(55 * scaleX);
    const bannerX = ax - dir * bannerOff;
    const bannerY = ay + 8 + Math.sin(airplane.wobble * 1.3) * 2;
    const bannerPull = Math.round(80 * scaleX);

    ctx.strokeStyle = 'rgba(150,150,150,0.6)';
    ctx.lineWidth = 0.8;
    ctx.beginPath();
    ctx.moveTo(ropeStartX, ropeStartY);
    ctx.quadraticCurveTo(
      (ropeStartX + bannerX) / 2,
      Math.max(ropeStartY, bannerY) + 5,
      bannerX + dir * bannerPull, bannerY
    );
    ctx.stroke();

    // Banner
    const bw = Math.round(160 * scaleX), bh = 22;
    const bx2 = bannerX - (dir > 0 ? 0 : bw) + dir * bannerPull;
    const by2 = bannerY - bh/2;
    // Banner wave
    ctx.fillStyle = 'rgba(255, 255, 255, 0.88)';
    ctx.beginPath();
    ctx.moveTo(bx2, by2);
    for (let p = 0; p <= bw; p += 4) {
      const wave = Math.sin((p / bw) * Math.PI * 2 + airplane.wobble * 2) * 2;
      ctx.lineTo(bx2 + p, by2 + wave);
    }
    for (let p = bw; p >= 0; p -= 4) {
      const wave = Math.sin((p / bw) * Math.PI * 2 + airplane.wobble * 2) * 2;
      ctx.lineTo(bx2 + p, by2 + bh + wave);
    }
    ctx.closePath();
    ctx.fill();

    // Banner border
    ctx.strokeStyle = 'rgba(200, 0, 50, 0.5)';
    ctx.lineWidth = 1;
    ctx.stroke();

    // Banner text
    ctx.fillStyle = '#cc0033';
    ctx.font = `bold ${Math.round(13 * scaleX)}px Arial`;
    ctx.textAlign = 'center';
    ctx.fillText('אמילי קנול מלכה', bx2 + bw/2, by2 + bh/2 + 5);
    // Small crown
    ctx.fillStyle = '#ffcc00';
    ctx.font = '10px Arial';
    ctx.fillText('\u{1F451}', bx2 + bw/2, by2 + bh/2 - 6);
  }

  // HUD
  // Power-ups floating
  powerUps.forEach(pu => {
    const s = 16 + Math.sin(pu.pulse) * 3;
    const alpha = pu.life < 60 ? pu.life / 60 : 1;
    ctx.globalAlpha = alpha;
    const emoji = pu.type === 'shield' ? '🛡️' : pu.type === 'rapid' ? '⚡' : '💥';
    // Glow circle
    ctx.fillStyle = pu.type === 'shield' ? 'rgba(255,220,0,0.2)' : pu.type === 'rapid' ? 'rgba(0,200,255,0.2)' : 'rgba(255,0,255,0.2)';
    ctx.beginPath(); ctx.arc(pu.x, pu.y, s + 6, 0, Math.PI*2); ctx.fill();
    ctx.font = `${s}px Arial`;
    ctx.textAlign = 'center';
    ctx.fillStyle = '#fff';
    ctx.fillText(emoji, pu.x, pu.y + s*0.35);
    ctx.globalAlpha = 1;
  });

  // Kill feed (bottom-left)
  if (killFeed.length > 0) {
    const kfX = 10, kfBaseY = GROUND_Y - 20;
    killFeed.forEach((kf, i) => {
      const alpha = Math.max(0.3, 1 - i * 0.2);
      ctx.globalAlpha = alpha;
      ctx.fillStyle = kf.color || '#aaa';
      ctx.font = `bold ${fz(10)}px Arial`;
      ctx.textAlign = 'left';
      ctx.fillText(`🎯 ${kf.text}`, kfX, kfBaseY - i * fz(14));
    });
    ctx.globalAlpha = 1;
  }

  if (state === 'playing') {
    drawHUD();
    drawWaveTransition();
    drawSirenIntro();
    drawCityIntro();
  }

  ctx.restore();

  // Screen flash
  if (screenFlash > 0) {
    ctx.fillStyle = `rgba(255,255,255,${screenFlash})`;
    ctx.fillRect(0, 0, W, H);
  }

  // Subtle vignette for cinematic depth
  const vignGrad = ctx.createRadialGradient(W/2, H/2, Math.min(W,H)*0.35, W/2, H/2, Math.max(W,H)*0.75);
  vignGrad.addColorStop(0, 'rgba(0,0,0,0)');
  vignGrad.addColorStop(1, 'rgba(0,0,0,0.25)');
  ctx.fillStyle = vignGrad;
  ctx.fillRect(0, 0, W, H);

  // Pause overlay
  if (state === 'playing' && paused) {
    ctx.fillStyle = 'rgba(0,0,10,0.7)';
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#fff';
    ctx.font = `bold ${fz(32)}px Arial`;
    ctx.textAlign = 'center';
    ctx.fillText(t('paused'), W/2, H/2 - fz(15));
    // Resume button
    const rbW = fz(180), rbH = fz(46);
    const rbX = W/2 - rbW/2, rbY = H/2 + fz(5);
    const rbGrad = ctx.createLinearGradient(0, rbY, 0, rbY + rbH);
    rbGrad.addColorStop(0, '#00bb55');
    rbGrad.addColorStop(1, '#008833');
    ctx.fillStyle = rbGrad;
    ctx.beginPath(); ctx.roundRect(rbX, rbY, rbW, rbH, 10); ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.font = `bold ${fz(18)}px Arial`;
    ctx.fillText(t('resume'), W/2, rbY + rbH*0.65);
  }

  if (state === 'menu') drawMenu();
  if (state === 'nameinput') drawNameInput();
  if (state === 'gameover') drawGameOver();
  if (state === 'victory') drawVictory();
}

function drawSirenIntro() {
  if (waveState !== 'siren_intro') return;
  const progress = 1 - sirenTimer / 210;

  // Red pulsing overlay
  const pulse = Math.sin(frame * 0.2) * 0.5 + 0.5;
  ctx.fillStyle = `rgba(180, 0, 0, ${0.04 + pulse * 0.06})`;
  ctx.fillRect(0, 0, W, H);

  // Alert text
  const alpha = progress < 0.1 ? progress * 10 : progress > 0.85 ? (1-progress)/0.15 : 1;
  ctx.globalAlpha = alpha;

  ctx.fillStyle = '#ff3333';
  ctx.font = `bold ${26 + pulse * 4}px Arial`;
  ctx.textAlign = 'center';
  ctx.shadowColor = '#ff0000';
  ctx.shadowBlur = 15;
  ctx.fillText(t('sirenAlert'), W/2, H/2 - 15);
  ctx.shadowBlur = 0;

  ctx.fillStyle = '#ffaaaa';
  ctx.font = '16px Arial';
  ctx.fillText(t('sirenPrepare'), W/2, H/2 + 18);

  // First-play controls tutorial
  if (!tutorialSeen) {
    ctx.fillStyle = 'rgba(255,255,255,0.85)';
    ctx.font = `${fz(14)}px Arial`;
    ctx.shadowColor = 'rgba(0,0,0,0.6)';
    ctx.shadowBlur = 6;
    ctx.fillText(isMobile ? t('instrAim') : t('instrAimDesktop'), W/2, H/2 + 55);
    ctx.shadowBlur = 0;
  }

  ctx.globalAlpha = 1;
}

function drawCityIntro() {
  if (waveState !== 'city_intro') return;
  const progress = 1 - cityIntroTimer / 150;
  const city = CITIES[currentCityIdx];
  const cityName = city.name[currentLang] || city.name.en;

  // Dark overlay
  const fadeIn = Math.min(1, progress * 5);
  const fadeOut = cityIntroTimer < 20 ? cityIntroTimer / 20 : 1;
  const alpha = fadeIn * fadeOut;

  ctx.fillStyle = `rgba(0, 5, 20, ${0.7 * alpha})`;
  ctx.fillRect(0, 0, W, H);

  ctx.globalAlpha = alpha;
  ctx.textAlign = 'center';

  // City number indicator
  ctx.fillStyle = 'rgba(100, 180, 255, 0.6)';
  ctx.font = `bold ${fz(14)}px Arial`;
  ctx.fillText(`${currentCityIdx + 1} / ${CITIES.length}`, W/2, H/2 - fz(55));

  // "Defending" subtitle
  ctx.fillStyle = '#88bbff';
  ctx.font = `${fz(16)}px Arial`;
  ctx.fillText(t('cityDefend'), W/2, H/2 - fz(30));

  // City name - big dramatic text with glow
  const nameScale = 1 + Math.sin(progress * Math.PI) * 0.05;
  ctx.save();
  ctx.translate(W/2, H/2 + fz(5));
  ctx.scale(nameScale, nameScale);
  ctx.shadowColor = '#00aaff';
  ctx.shadowBlur = 25;
  ctx.fillStyle = '#fff';
  ctx.font = `bold ${fz(38)}px Arial`;
  ctx.fillText(cityName, 0, 0);
  ctx.shadowBlur = 0;
  ctx.restore();

  // Wave range info
  ctx.fillStyle = 'rgba(150, 200, 255, 0.5)';
  ctx.font = `${fz(13)}px Arial`;
  const waveRange = `${t('wave')} ${city.waves[0]} - ${city.waves[city.waves.length - 1]}`;
  ctx.fillText(waveRange, W/2, H/2 + fz(35));

  // Decorative dividers
  ctx.strokeStyle = `rgba(100, 200, 255, ${0.25 * alpha})`;
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(W/2 - fz(80), H/2 + fz(45));
  ctx.lineTo(W/2 + fz(80), H/2 + fz(45));
  ctx.stroke();

  // Progress bar showing city progression with glow
  const barW = fz(200), barH = fz(6);
  const barX = W/2 - barW/2, barY = H/2 + fz(55);
  ctx.fillStyle = 'rgba(40, 60, 100, 0.5)';
  ctx.beginPath(); ctx.roundRect(barX, barY, barW, barH, 3); ctx.fill();
  const cityProgress = (currentCityIdx + 1) / CITIES.length;
  ctx.save();
  ctx.shadowColor = 'rgba(0,170,255,0.4)';
  ctx.shadowBlur = 6;
  ctx.fillStyle = '#00aaff';
  ctx.beginPath(); ctx.roundRect(barX, barY, barW * cityProgress, barH, 3); ctx.fill();
  ctx.shadowBlur = 0;
  ctx.restore();
  // City dots on progress bar
  for (let ci = 0; ci < CITIES.length; ci++) {
    const dotX = barX + (barW / CITIES.length) * (ci + 0.5);
    ctx.fillStyle = ci <= currentCityIdx ? '#00ddff' : 'rgba(100,150,200,0.4)';
    ctx.beginPath(); ctx.arc(dotX, barY + barH/2, 3, 0, Math.PI*2); ctx.fill();
  }

  ctx.globalAlpha = 1;
}

function drawHUD() {
  // Top HUD bar
  const hudH = fz(44);
  ctx.fillStyle = 'rgba(0, 8, 18, 0.6)';
  ctx.fillRect(0, 0, W, hudH);
  // Bottom edge glow
  const edgeGrad = ctx.createLinearGradient(0, hudH - 2, 0, hudH + 1);
  edgeGrad.addColorStop(0, 'rgba(100, 180, 255, 0.15)');
  edgeGrad.addColorStop(1, 'rgba(0, 0, 0, 0)');
  ctx.fillStyle = edgeGrad;
  ctx.fillRect(0, hudH - 2, W, 3);

  // Pause button (far left, small)
  const pbS = fz(22);
  const pbX = 6, pbY = (hudH - pbS) / 2;
  pauseBtnRect = { x: pbX, y: pbY, w: pbS, h: pbS };
  ctx.fillStyle = 'rgba(50,60,80,0.4)';
  ctx.beginPath(); ctx.roundRect(pbX, pbY, pbS, pbS, 4); ctx.fill();
  ctx.fillStyle = 'rgba(180,200,230,0.6)';
  const pBarW = pbS * 0.16, pBarH = pbS * 0.45;
  ctx.fillRect(pbX + pbS*0.28, pbY + pbS*0.28, pBarW, pBarH);
  ctx.fillRect(pbX + pbS*0.56, pbY + pbS*0.28, pBarW, pBarH);

  // City endurance bar (left, after pause)
  const endBarX = pbX + pbS + fz(8);
  const endBarW = fz(80), endBarH = fz(8);
  const endBarY = hudH * 0.35;
  // City name label above bar
  ctx.fillStyle = 'rgba(150,200,255,0.6)';
  ctx.font = `${fz(8)}px Arial`;
  ctx.textAlign = 'left';
  const cName = CITIES[currentCityIdx] ? (CITIES[currentCityIdx].name[currentLang] || CITIES[currentCityIdx].name.en) : '';
  ctx.fillText(cName, endBarX, endBarY - 2);
  // Bar background
  ctx.fillStyle = 'rgba(40,40,50,0.6)';
  ctx.beginPath(); ctx.roundRect(endBarX, endBarY + 2, endBarW, endBarH, 3); ctx.fill();
  // Bar fill - green→yellow→red
  const endRatio = cityMaxHP > 0 ? Math.max(0, 1 - cityDamage / cityMaxHP) : 1;
  if (endRatio > 0) {
    const endColor = endRatio > 0.6 ? '#22dd77' : endRatio > 0.3 ? '#ffcc33' : '#ff4444';
    ctx.fillStyle = endColor;
    ctx.beginPath(); ctx.roundRect(endBarX, endBarY + 2, endBarW * endRatio, endBarH, 3); ctx.fill();
  }
  // Damage count
  ctx.fillStyle = endRatio > 0.3 ? 'rgba(200,220,255,0.7)' : '#ff4444';
  ctx.font = `bold ${fz(8)}px Arial`;
  ctx.fillText(`${cityDamage}/${cityMaxHP}`, endBarX + endBarW + fz(4), endBarY + endBarH);
  // Shield indicator
  if (shieldHP > 0) {
    ctx.font = `${fz(12)}px Arial`;
    ctx.fillText('🛡️', endBarX + endBarW + fz(22), endBarY + endBarH + 2);
  }
  // Active power indicator
  if (activePower && activePowerTimer > 0) {
    const pwIcon = activePower === 'rapid' ? '⚡' : activePower === 'shield' ? '🛡️' : '💥';
    const pwSecs = Math.ceil(activePowerTimer / 60);
    ctx.font = `${fz(12)}px Arial`;
    ctx.fillText(`${pwIcon} ${pwSecs}s`, endBarX, endBarY + endBarH + fz(14));
  }

  // Wave + missiles remaining (center)
  ctx.fillStyle = '#6aacee';
  ctx.font = `bold ${fz(13)}px Arial`;
  ctx.textAlign = 'center';
  const cityName = CITIES[currentCityIdx] ? (CITIES[currentCityIdx].name[currentLang] || CITIES[currentCityIdx].name.en) : '';
  const displayWave = waveState === 'siren_intro' ? wave + 1 : wave;
  ctx.fillText(`${t('wave')} ${displayWave} - ${cityName}`, W/2, hudH*0.42);
  const missilesInPlay = waveMissilesLeft + missiles.length;
  if (waveState === 'playing' && missilesInPlay > 0) {
    ctx.fillStyle = 'rgba(150,180,220,0.5)';
    ctx.font = `${fz(9)}px Arial`;
    ctx.fillText(`${missilesInPlay} ${t('missiles')}`, W/2, hudH*0.75);
  }

  // Score (right) - BIG and prominent with glow
  ctx.save();
  ctx.textAlign = 'right';
  const scoreX = W - fz(12);
  // Score glow
  ctx.shadowColor = 'rgba(100, 200, 255, 0.5)';
  ctx.shadowBlur = 12;
  ctx.fillStyle = '#fff';
  ctx.font = `bold ${fz(26)}px Arial`;
  ctx.fillText(`${score}`, scoreX, hudH*0.62);
  ctx.shadowBlur = 0;
  ctx.restore();
  // Score label
  ctx.fillStyle = 'rgba(150,180,220,0.5)';
  ctx.font = `${fz(8)}px Arial`;
  ctx.textAlign = 'right';
  ctx.fillText(t('score'), scoreX, hudH*0.88);

  // Ammo bar (bottom strip) — hide during siren/city intro
  if (sirenTimer <= 0 && cityIntroTimer <= 0) {
    const barH2 = fz(5), barMargin = 8;
    const barW2 = W - barMargin * 2;
    const barY = H - barH2 - 5;
    ctx.fillStyle = 'rgba(0, 10, 20, 0.4)';
    ctx.fillRect(0, barY - fz(16), W, barH2 + fz(22));
    // Bar background
    ctx.fillStyle = 'rgba(40, 50, 60, 0.6)';
    ctx.fillRect(barMargin, barY, barW2, barH2);
    // Bar fill with gradient
    const ammoRatio = maxAmmo > 0 ? ammo / maxAmmo : 0;
    if (ammoRatio > 0) {
      const ammoGrad = ctx.createLinearGradient(barMargin, barY, barMargin, barY + barH2);
      if (ammoRatio > 0.5) {
        ammoGrad.addColorStop(0, '#22dd77');
        ammoGrad.addColorStop(1, '#00aa55');
      } else if (ammoRatio > 0.2) {
        ammoGrad.addColorStop(0, '#ffcc33');
        ammoGrad.addColorStop(1, '#dd8800');
      } else {
        ammoGrad.addColorStop(0, '#ff5555');
        ammoGrad.addColorStop(1, '#cc2222');
      }
      ctx.fillStyle = ammoGrad;
      ctx.fillRect(barMargin, barY, barW2 * ammoRatio, barH2);
      // Ammo bar shine
      ctx.fillStyle = 'rgba(255,255,255,0.12)';
      ctx.fillRect(barMargin, barY, barW2 * ammoRatio, barH2 / 2);
    }
    // Ammo text
    ctx.fillStyle = ammoRatio > 0.2 ? 'rgba(200,220,255,0.7)' : '#ff4444';
    ctx.font = `bold ${fz(9)}px Arial`;
    ctx.textAlign = 'left';
    ctx.fillText(`${t('ammo')}: ${ammo}/${maxAmmo}`, barMargin, barY - fz(3));
    // Out of ammo warning
    if (ammo <= 0 && state === 'playing') {
      const blink = Math.sin(frame * 0.15) > 0;
      if (blink) {
        ctx.fillStyle = '#ff3333';
        ctx.font = `bold ${fz(13)}px Arial`;
        ctx.textAlign = 'center';
        ctx.fillText(t('outOfAmmo'), W/2, barY - fz(12));
      }
    }
  }

  // Combo
  if (combo >= 2) {
    const pulse = 1 + Math.sin(frame*0.15)*0.04;
    ctx.save();
    ctx.translate(W/2, hudH + fz(16));
    ctx.scale(pulse, pulse);
    const mult = getMultiplier();
    ctx.fillStyle = combo >= 10 ? '#ff55ff' : combo >= 6 ? '#ffaa00' : '#ffdd00';
    ctx.font = `bold ${fz(combo >= 6 ? 16 : 13)}px Arial`;
    ctx.textAlign = 'center';
    ctx.shadowColor = 'rgba(0,0,0,0.5)';
    ctx.shadowBlur = 4;
    ctx.fillText(`COMBO x${combo}`, 0, 0);
    ctx.shadowBlur = 0;
    if (mult > 1) {
      ctx.fillStyle = '#fff';
      ctx.font = `bold ${fz(9)}px Arial`;
      ctx.fillText(`x${mult}`, 0, fz(12));
    }
    ctx.restore();
    if (comboTimer > 0) {
      const cbw = fz(50), cbh = 2, cbx = W/2 - cbw/2, cby = hudH + fz(22);
      ctx.fillStyle = 'rgba(40,40,40,0.5)';
      ctx.fillRect(cbx, cby, cbw, cbh);
      ctx.fillStyle = combo >= 6 ? '#ffaa00' : '#ffdd00';
      ctx.fillRect(cbx, cby, cbw*(comboTimer/120), cbh);
    }
  }

  // Crosshair
  if (waveState === 'playing') {
    const cx = mouseX, cy = mouseY;
    ctx.strokeStyle = `rgba(100, 255, 150, ${0.3 + Math.sin(frame*0.08)*0.1})`;
    ctx.lineWidth = 1;
    ctx.setLineDash([4, 4]);
    ctx.beginPath(); ctx.arc(cx, cy, 18, 0, Math.PI*2); ctx.stroke();
    ctx.setLineDash([]);
    ctx.strokeStyle = 'rgba(100, 255, 150, 0.6)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(cx-12, cy); ctx.lineTo(cx-5, cy);
    ctx.moveTo(cx+5, cy); ctx.lineTo(cx+12, cy);
    ctx.moveTo(cx, cy-12); ctx.lineTo(cx, cy-5);
    ctx.moveTo(cx, cy+5); ctx.lineTo(cx, cy+12);
    ctx.stroke();
    ctx.fillStyle = 'rgba(100, 255, 150, 0.8)';
    ctx.beginPath(); ctx.arc(cx, cy, 1.5, 0, Math.PI*2); ctx.fill();
  }
}

function drawWaveTransition() {
  if (waveState !== 'transition') return;
  const p = 1 - waveTransitionTimer/300;
  const alpha = p < 0.15 ? p/0.15 : p > 0.85 ? (1-p)/0.15 : 1;
  ctx.fillStyle = `rgba(0,15,30,${alpha*0.75})`;
  ctx.fillRect(0, H/2-65, W, 130);
  // Top/bottom border lines
  ctx.fillStyle = `rgba(100,200,255,${alpha*0.2})`;
  ctx.fillRect(0, H/2-65, W, 1);
  ctx.fillRect(0, H/2+64, W, 1);
  ctx.globalAlpha = alpha;
  ctx.save();
  ctx.shadowColor = 'rgba(100,200,255,0.6)';
  ctx.shadowBlur = 10;
  ctx.fillStyle = '#4ac8ff';
  ctx.font = 'bold 32px Arial';
  ctx.textAlign = 'center';
  ctx.fillText(`${t('wave')} ${wave} ${t('waveComplete')}`, W/2, H/2-18);
  ctx.shadowBlur = 0;
  ctx.restore();
  ctx.fillStyle = '#8ad8ff';
  ctx.font = '18px Arial';
  ctx.textAlign = 'center';
  const nextWave = wave + 1;
  if (nextWave <= 15) {
    ctx.fillText(`${t('nextWave')} ${nextWave}...`, W/2, H/2+12);
    // Show next city if changing
    const nextCityIdx = Math.min(Math.floor((nextWave - 1) / 3), CITIES.length - 1);
    if (nextCityIdx !== currentCityIdx) {
      const nextCity = CITIES[nextCityIdx];
      const nextCityName = nextCity.name[currentLang] || nextCity.name.en;
      ctx.save();
      ctx.shadowColor = 'rgba(255,220,50,0.5)';
      ctx.shadowBlur = 8;
      ctx.fillStyle = '#ffdd00';
      ctx.font = 'bold 18px Arial';
      ctx.fillText(`\u279C ${nextCityName}`, W/2, H/2+35);
      ctx.shadowBlur = 0;
      ctx.restore();
    }
    // Show enemy type hint for later waves
    if (nextWave >= 4) {
      const weights = getEnemyWeights(nextWave);
      let hint = '';
      if (weights.drone > 0 && nextWave === 4) hint = t('droneAlert');
      else if (weights.ballistic > 0 && nextWave === 7) hint = t('ballisticAlert');
      if (hint) {
        ctx.save();
        ctx.shadowColor = 'rgba(255,150,50,0.6)';
        ctx.shadowBlur = 8;
        ctx.fillStyle = '#ffaa44';
        ctx.font = 'bold 15px Arial';
        ctx.textAlign = 'center';
        ctx.fillText(hint, W/2, H/2+55);
        ctx.shadowBlur = 0;
        ctx.restore();
      }
    }
  }
  ctx.globalAlpha = 1;
}

function drawLangToggle(baseY) {
  const langs = [{l:'he',flag:'🇮🇱',label:'עב'},{l:'en',flag:'🇺🇸',label:'EN'},{l:'de',flag:'🇩🇪',label:'DE'}];
  const bw = fz(52), bh = fz(42), gap = fz(8);
  const totalW = langs.length * bw + (langs.length-1) * gap;
  const sx = W/2 - totalW/2;
  langBtnRects = [];
  langs.forEach((lang, i) => {
    const bx = sx + i * (bw + gap);
    const active = currentLang === lang.l;
    // Background
    ctx.fillStyle = active ? 'rgba(0,180,90,0.35)' : 'rgba(50,60,80,0.6)';
    ctx.beginPath(); ctx.roundRect(bx, baseY, bw, bh, 10); ctx.fill();
    if (active) {
      ctx.save();
      ctx.shadowColor = '#00cc66';
      ctx.shadowBlur = 12;
      ctx.strokeStyle = '#00ee66';
      ctx.lineWidth = 2;
      ctx.beginPath(); ctx.roundRect(bx, baseY, bw, bh, 10); ctx.stroke();
      ctx.shadowBlur = 0;
      ctx.restore();
    } else {
      ctx.strokeStyle = 'rgba(100,140,180,0.3)';
      ctx.lineWidth = 1;
      ctx.beginPath(); ctx.roundRect(bx, baseY, bw, bh, 10); ctx.stroke();
    }
    // Flag emoji (large)
    ctx.font = `${fz(22)}px Arial`;
    ctx.textAlign = 'center';
    ctx.fillStyle = '#fff';
    ctx.fillText(lang.flag, bx + bw/2, baseY + bh*0.48);
    // Label below flag
    ctx.fillStyle = active ? '#fff' : '#8899aa';
    ctx.font = `bold ${fz(10)}px Arial`;
    ctx.fillText(lang.label, bx + bw/2, baseY + bh*0.82);
    langBtnRects.push({x: bx, y: baseY, w: bw, h: bh, lang: lang.l});
  });
}

function drawLeaderboardTable(baseY) {
  ctx.fillStyle = '#6aacee';
  ctx.font = `bold ${fz(18)}px Arial`;
  ctx.textAlign = 'center';
  ctx.fillText(t('leaderboard'), W/2, baseY);
  if (leaderboardLoading) {
    ctx.fillStyle = '#888';
    ctx.font = `${fz(13)}px Arial`;
    ctx.fillText('...', W/2, baseY + fz(25));
    return;
  }
  if (leaderboardData.length === 0) {
    ctx.fillStyle = '#666';
    ctx.font = `${fz(12)}px Arial`;
    ctx.fillText('-', W/2, baseY + fz(25));
    return;
  }
  const colW = Math.min(W - 30, fz(320));
  const lx = W/2 - colW/2;
  const rowH = fz(22);
  leaderboardData.forEach((entry, i) => {
    const ey = baseY + rowH + i * rowH;
    const isTop = i < 3;
    ctx.fillStyle = isTop ? ['#ffdd00','#cccccc','#cc8844'][i] : 'rgba(180,200,220,0.5)';
    ctx.font = isTop ? `bold ${fz(13)}px Arial` : `${fz(13)}px Arial`;
    ctx.textAlign = 'left';
    ctx.fillText(`${i+1}.`, lx, ey);
    const flag = countryToFlag(entry.country);
    ctx.fillText(`${flag} ${entry.name || '???'}`, lx + fz(24), ey);
    ctx.textAlign = 'right';
    ctx.fillText(`${entry.score}`, lx + colW - fz(50), ey);
    ctx.fillStyle = 'rgba(130,160,200,0.4)';
    ctx.font = `${fz(10)}px Arial`;
    ctx.fillText(`${t('wave')} ${entry.wave || '?'}`, lx + colW, ey);
  });
}

function drawMenuButton(x, y, w, h, text, colors, icon) {
  const btnGrad = ctx.createLinearGradient(0, y, 0, y+h);
  btnGrad.addColorStop(0, colors[0]);
  btnGrad.addColorStop(0.5, colors[1]);
  btnGrad.addColorStop(1, colors[2]);
  ctx.save();
  ctx.shadowColor = colors[3] || 'rgba(0,0,0,0.2)';
  ctx.shadowBlur = 12;
  ctx.fillStyle = btnGrad;
  ctx.beginPath(); ctx.roundRect(x, y, w, h, 12); ctx.fill();
  ctx.shadowBlur = 0;
  ctx.restore();
  // Shine
  ctx.fillStyle = 'rgba(255,255,255,0.08)';
  ctx.beginPath(); ctx.roundRect(x + 2, y + 1, w - 4, h*0.4, [10,10,0,0]); ctx.fill();
  // Border
  ctx.strokeStyle = colors[4] || 'rgba(255,255,255,0.15)';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.roundRect(x, y, w, h, 12); ctx.stroke();
  // Text with icon
  ctx.fillStyle = '#fff';
  ctx.font = `bold ${fz(18)}px Arial`;
  ctx.textAlign = 'center';
  const displayText = icon ? (isRTL() ? `${text} ${icon}` : `${icon} ${text}`) : text;
  ctx.fillText(displayText, x + w/2, y + h*0.65);
}

  // Contact (dark blue)

    ['#334466','#2a3a55','#223044','rgba(50,70,120,0.3)','rgba(100,130,200,0.2)'], '✉');
  curY += bigBtnH + fz(18);

  // Play counter

  ctx.beginPath(); ctx.roundRect(pcX, curY, pcW, pcH, 6); ctx.fill();
  ctx.fillStyle = '#8899bb';
  ctx.font = `${fz(12)}px Arial`;
  ctx.textAlign = 'center';
  ctx.fillText(`${t('gamesPlayed')}: ${totalPlaysCount.toLocaleString()}`, W/2, curY + pcH*0.7);
  curY += pcH + fz(14);

  // Share buttons
  ctx.fillStyle = '#6688aa';
  ctx.font = `${fz(11)}px Arial`;
  ctx.fillText(t('shareWith'), W/2, curY);

  const shareBtnSize = fz(40);
  const shareGap = fz(10);

  const shareIcons = ['W','X','✉','🔗'];

  const shareStartX = W/2 - totalShareW/2;

    ctx.fillStyle = shareColors[i];
    ctx.beginPath(); ctx.roundRect(sx2, curY, shareBtnSize, shareBtnSize, 8); ctx.fill();

    ctx.font = `bold ${fz(16)}px Arial`;
    ctx.textAlign = 'center';
    ctx.fillText(shareIcons[i], sx2 + shareBtnSize/2, curY + shareBtnSize*0.65);

    showCopiedToast--;

  ctx.font = `${fz(10)}px Arial`;
  ctx.textAlign = 'center';
  legalBtnRects = [];

  const legalStr = legalLabels.join('  |  ');
  const legalTotalW = ctx.measureText(legalStr).width;
  let legalCurX = W/2 - legalTotalW/2;
  legalLinks.forEach((link, i) => {
    const lw = ctx.measureText(link.label).width;
    ctx.fillText(link.label, legalCurX + lw/2, legalY);
    legalBtnRects.push({ x: legalCurX - 4, y: legalY - fz(12), w: lw + 8, h: fz(16), tab: link.tab });
    legalCurX += lw;
    if (i < legalLinks.length - 1) {
      const sepW = ctx.measureText('  |  ').width;
      ctx.fillText('|', legalCurX + sepW/2, legalY);
      legalCurX += sepW;
    }
  });

  // Instructions (small, above buttons)
  // (removed from main view to keep clean - instructions show in game HUD area now)
}

function drawLegalOverlay() {
  // Full-screen dark overlay
  ctx.fillStyle = 'rgba(0,0,10,0.95)';
  ctx.fillRect(0, 0, W, H);

  // Close button (X) top-right
  const closeS = fz(36);
  const closeX = W - closeS - fz(10), closeY = fz(10);
  legalCloseBtnRect = { x: closeX, y: closeY, w: closeS, h: closeS };
  ctx.fillStyle = 'rgba(255,60,60,0.3)';
  ctx.beginPath(); ctx.roundRect(closeX, closeY, closeS, closeS, 8); ctx.fill();
  ctx.fillStyle = '#ff6666';
  ctx.font = `bold ${fz(20)}px Arial`;
  ctx.textAlign = 'center';
  ctx.fillText('✕', closeX + closeS/2, closeY + closeS*0.7);

  // Tab buttons
  const tabs = [
    { id: 'terms', label: t('terms') },
    { id: 'privacy', label: t('privacy') },
    { id: 'disclaimer', label: t('disclaimer') }
  ];
  const tabW = fz(100), tabH = fz(32), tabGap = fz(6);
  const tabTotalW = tabs.length * tabW + (tabs.length-1) * tabGap;
  const tabStartX = W/2 - tabTotalW/2;
  const tabY = fz(12);
  legalTabBtnRects = [];
  tabs.forEach((tab, i) => {
    const tx = tabStartX + i * (tabW + tabGap);
    const active = legalTab === tab.id;
    ctx.fillStyle = active ? 'rgba(0,150,200,0.4)' : 'rgba(40,50,70,0.5)';
    ctx.beginPath(); ctx.roundRect(tx, tabY, tabW, tabH, 6); ctx.fill();
    if (active) {
      ctx.strokeStyle = '#00aadd';
      ctx.lineWidth = 2;
      ctx.beginPath(); ctx.roundRect(tx, tabY, tabW, tabH, 6); ctx.stroke();
    }
    ctx.fillStyle = active ? '#fff' : '#8899aa';
    ctx.font = `bold ${fz(11)}px Arial`;
    ctx.textAlign = 'center';
    ctx.fillText(tab.label, tx + tabW/2, tabY + tabH*0.68);
    legalTabBtnRects.push({ x: tx, y: tabY, w: tabW, h: tabH, tab: tab.id });
  });

  // Content area
  const contentY = tabY + tabH + fz(16);
  const contentX = fz(20);
  const contentW = W - fz(40);
  const lineH = fz(16);
  let lines = [];

  if (legalTab === 'terms') {
    lines = [
      '--- ' + t('terms') + ' ---',
      '', 'Entity: Adrian Knoll',
      '', '1. This game is provided free of charge, as-is.',
      '2. No warranty is expressed or implied.',
      '3. The developer is not liable for any damages.',
      '4. Leaderboard entries must use appropriate names.',
      '5. We reserve the right to modify or remove content.',
      '6. Age 13+ recommended.',
      '7. By playing, you agree to these terms.',
    ];
  } else if (legalTab === 'privacy') {
    lines = [
      '--- ' + t('privacy') + ' ---',
      '', 'Entity: Adrian Knoll',
      '', 'Data collected:',
      '- Firebase: leaderboard names, scores, wave, country',
      '- Umami: anonymous page view analytics (no cookies)',
      '- localStorage: high score, language preference',
      '', 'IP address is used only for country detection',
      'and is not stored by us.',
      '', 'No personal data is sold or shared with third parties.',
      '', 'Country detection: api.country.is (privacy-friendly)',
    ];
  } else {
    lines = [
      '--- ' + t('disclaimer') + ' ---',
      '', 'Entity: Adrian Knoll',
      '', 'This game is for educational and entertainment',
      'purposes only.',
      '', 'This game is NOT affiliated with the IDF, Rafael',
      'Advanced Defense Systems, or the Israeli government.',
      '', 'All game imagery is an artistic representation.',
      '', 'No political statement is intended.',
      '', 'Iron Dome is a registered trademark of Rafael.',
    ];
  }

  ctx.fillStyle = '#ccddee';
  ctx.font = `${fz(12)}px Arial`;
  ctx.textAlign = isRTL() ? 'right' : 'left';
  const textX = isRTL() ? W - contentX : contentX;
  lines.forEach((line, i) => {
    const ly = contentY + i * lineH - legalScrollY;
    if (ly > contentY - lineH && ly < H - fz(10)) {
      if (line.startsWith('---')) {
        ctx.fillStyle = '#00aadd';
        ctx.font = `bold ${fz(16)}px Arial`;
        ctx.textAlign = 'center';
        ctx.fillText(line.replace(/---/g, '').trim(), W/2, ly);
        ctx.textAlign = isRTL() ? 'right' : 'left';
        ctx.font = `${fz(12)}px Arial`;
        ctx.fillStyle = '#ccddee';
      } else {
        ctx.fillText(line, textX, ly);
      }
    }
  });
}

function drawNameInput() {
  ctx.fillStyle = 'rgba(0,0,10,0.9)';
  ctx.fillRect(0,0,W,H);

  const cy = H * 0.18;

  ctx.fillStyle = '#ffdd00';
  ctx.font = `bold ${fz(28)}px Arial`;
  ctx.textAlign = 'center';
  ctx.fillText(`${score}`, W/2, cy);
  ctx.fillStyle = '#fff';
  ctx.font = `${fz(14)}px Arial`;
  ctx.fillText(t('finalScore'), W/2, cy + fz(22));

  // Rating
  const ratings = t('rating');
  const rColors = ['#888','#aaa','#00cc66','#00ddff','#ffaa00','#ffdd00'];
  let ri = 0;
  if (score >= 200) ri = 5;
  else if (score >= 100) ri = 4;
  else if (score >= 50) ri = 3;
  else if (score >= 20) ri = 2;
  else if (score >= 5) ri = 1;
  ctx.fillStyle = rColors[ri];
  ctx.font = `bold ${fz(18)}px Arial`;
  ctx.fillText(ratings[ri], W/2, cy + fz(50));

  // Name input prompt
  ctx.fillStyle = '#6aacee';
  ctx.font = `${fz(14)}px Arial`;
  ctx.fillText(t('enterName'), W/2, cy + fz(85));

  // Name input box
  const boxW = fz(180), boxH = fz(40);
  const boxX = W/2 - boxW/2, boxY = cy + fz(95);
  ctx.fillStyle = 'rgba(20,30,50,0.8)';
  ctx.strokeStyle = '#4488cc';
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.roundRect(boxX, boxY, boxW, boxH, 6); ctx.fill();
  ctx.beginPath(); ctx.roundRect(boxX, boxY, boxW, boxH, 6); ctx.stroke();
  // Name text
  ctx.fillStyle = '#fff';
  ctx.font = `bold ${fz(24)}px monospace`;
  ctx.textAlign = 'center';
  const displayName = nameInput + (Math.sin(frame*0.1) > 0 ? '_' : ' ');
  ctx.fillText(displayName, W/2, boxY + boxH*0.7);
  // char count
  ctx.fillStyle = 'rgba(150,180,220,0.4)';
  ctx.font = `${fz(10)}px Arial`;
  ctx.fillText(`${nameInput.length}/6`, W/2 + boxW/2 - fz(10), boxY + boxH + fz(14));

  // On mobile, show simple character buttons
  if (isMobile) {
    const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
    const cols = 9, charBtnSize = Math.min(fz(36), (W - 30) / cols);
    const kbY = boxY + boxH + fz(24);
    const kbX = W/2 - (cols * charBtnSize) / 2;
    for (let i = 0; i < chars.length; i++) {
      const col = i % cols, row = Math.floor(i / cols);
      const cx = kbX + col * charBtnSize, cy2 = kbY + row * charBtnSize;
      ctx.fillStyle = 'rgba(40,50,70,0.7)';
      ctx.beginPath(); ctx.roundRect(cx+1, cy2+1, charBtnSize-2, charBtnSize-2, 4); ctx.fill();
      ctx.fillStyle = '#ddd';
      ctx.font = `bold ${fz(14)}px Arial`;
      ctx.textAlign = 'center';
      ctx.fillText(chars[i], cx + charBtnSize/2, cy2 + charBtnSize/2 + 5);
    }
    // Backspace and Submit buttons
    const actionY = kbY + Math.ceil(chars.length / cols) * charBtnSize + fz(8);
    // Backspace
    ctx.fillStyle = 'rgba(150,50,50,0.6)';
    const bsW = fz(80), bsH = fz(36);
    ctx.beginPath(); ctx.roundRect(W/2 - bsW - 10, actionY, bsW, bsH, 6); ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.font = `bold ${fz(16)}px Arial`;
    ctx.fillText('\u232B', W/2 - bsW/2 - 10, actionY + bsH*0.63);
    // Submit
    const subBtnW = fz(80), subBtnH = fz(36);
    const subBtnX = W/2 + 10;
    submitBtnRect = { x: subBtnX, y: actionY, w: subBtnW, h: subBtnH };
    ctx.fillStyle = nameInput.length > 0 ? 'rgba(0,150,80,0.7)' : 'rgba(50,60,70,0.4)';
    ctx.beginPath(); ctx.roundRect(subBtnX, actionY, subBtnW, subBtnH, 6); ctx.fill();
    ctx.fillStyle = nameInput.length > 0 ? '#fff' : '#666';
    ctx.font = `bold ${fz(14)}px Arial`;
    ctx.fillText(t('submit'), subBtnX + subBtnW/2, actionY + subBtnH*0.63);
  } else {
    // Desktop: type with keyboard hint
    const subBtnW = 120, subBtnH = 38;
    const subBtnY = boxY + boxH + 24;
    submitBtnRect = { x: W/2 - subBtnW/2, y: subBtnY, w: subBtnW, h: subBtnH };
    ctx.fillStyle = nameInput.length > 0 ? 'rgba(0,150,80,0.7)' : 'rgba(50,60,70,0.4)';
    ctx.beginPath(); ctx.roundRect(submitBtnRect.x, subBtnY, subBtnW, subBtnH, 8); ctx.fill();
    ctx.fillStyle = nameInput.length > 0 ? '#fff' : '#666';
    ctx.font = 'bold 16px Arial';
    ctx.textAlign = 'center';
    ctx.fillText(t('submit'), W/2, subBtnY + 25);
  }
}

function drawVictory() {
  ctx.fillStyle = 'rgba(0, 5, 15, 0.88)';

  // If leaderboard is open

    btnGrad2.addColorStop(0, '#00bb55');
    btnGrad2.addColorStop(1, '#008833');

  ctx.shadowBlur = 30;

  ctx.font = `bold ${fz(17)}px Arial`;

}

  }

  const goY = H * 0.12;

  ctx.save();
  ctx.shadowColor = 'rgba(255,50,50,0.6)';
  ctx.shadowBlur = 15;
  ctx.fillStyle = '#ff4444';
  ctx.font = `bold ${fz(34)}px Arial`;
  ctx.textAlign = 'center';
  ctx.fillText(t('gameOver'), W/2, goY);
  ctx.shadowBlur = 0;
  ctx.restore();

  // Score + best
  ctx.save();
  ctx.shadowColor = 'rgba(255,255,255,0.4)';
  ctx.shadowBlur = 8;
  ctx.fillStyle = '#fff';
  ctx.font = `bold ${fz(30)}px Arial`;
  ctx.textAlign = 'center';
  ctx.fillText(`${score}`, W/2, goY + fz(42));
  ctx.shadowBlur = 0;
  ctx.restore();
  if (score >= highScore && score > 0) {
    ctx.save();
    ctx.shadowColor = 'rgba(255,220,50,0.5)';
    ctx.shadowBlur = 8;
    ctx.fillStyle = '#ffdd00';
    ctx.font = `bold ${fz(14)}px Arial`;
    ctx.textAlign = 'center';
    ctx.fillText(t('newRecord'), W/2, goY + fz(62));
    ctx.shadowBlur = 0;
    ctx.restore();
  } else {
    ctx.fillStyle = '#888';
    ctx.font = `${fz(12)}px Arial`;
    ctx.textAlign = 'center';
    ctx.fillText(`${t('best')}: ${highScore}`, W/2, goY + fz(62));
  }

  // Wave + combo
  ctx.fillStyle = '#88bbff';
  ctx.font = `${fz(13)}px Arial`;
  ctx.fillText(`${t('waveLabel')}: ${wave}  |  ${t('comboMax')}: ${maxCombo}`, W/2, goY + fz(84));

  // City destroyed message
  const destroyedCity = CITIES[currentCityIdx] ? (CITIES[currentCityIdx].name[currentLang] || CITIES[currentCityIdx].name.en) : '';
  ctx.save();
  ctx.shadowColor = 'rgba(255,50,50,0.4)';
  ctx.shadowBlur = 8;
  ctx.fillStyle = '#ff6666';
  ctx.font = `bold ${fz(14)}px Arial`;
  if (currentLang === 'he') {
    ctx.fillText(`${destroyedCity} ${t('cityDestroyed')}`, W/2, goY + fz(100));
  } else {
    ctx.fillText(`${destroyedCity} ${t('cityDestroyed')}`, W/2, goY + fz(100));
  }
  ctx.shadowBlur = 0;
  ctx.restore();

  // Rating
  const ratings = t('rating');
  const rColors = ['#888','#aaa','#00cc66','#00ddff','#ffaa00','#ffdd00'];
  let ri = 0;
  if (score >= 200) ri = 5;
  else if (score >= 100) ri = 4;
  else if (score >= 50) ri = 3;
  else if (score >= 20) ri = 2;
  else if (score >= 5) ri = 1;
  ctx.fillStyle = rColors[ri];
  ctx.font = `bold ${fz(18)}px Arial`;
  ctx.fillText(ratings[ri], W/2, goY + fz(126));

  // Buttons side by side
  const gap = fz(10);
  const playW = fz(160), playH = fz(42);
  const lbW2 = fz(55), lbH2 = fz(42);
  const totalBtnW = playW + gap + lbW2;
  const btnY = goY + fz(141);
  const startX = W/2 - totalBtnW/2;

  // Play again with glow
  playAgainBtnRect = { x: startX, y: btnY, w: playW, h: playH };
  ctx.save();
  ctx.shadowColor = 'rgba(0,200,100,0.3)';
  ctx.shadowBlur = 12;
  const btnGrad = ctx.createLinearGradient(0, btnY, 0, btnY+playH);
  btnGrad.addColorStop(0, '#00cc66');
  btnGrad.addColorStop(0.5, '#00bb55');
  btnGrad.addColorStop(1, '#008833');
  ctx.fillStyle = btnGrad;
  ctx.beginPath(); ctx.roundRect(startX, btnY, playW, playH, 12); ctx.fill();
  ctx.shadowBlur = 0;
  ctx.restore();
  // Button shine
  ctx.fillStyle = 'rgba(255,255,255,0.08)';
  ctx.beginPath(); ctx.roundRect(startX + 2, btnY + 1, playW - 4, playH*0.4, [10,10,0,0]); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.font = `bold ${fz(17)}px Arial`;
  ctx.fillText(t('playAgain'), startX + playW/2, btnY + playH*0.63);

  // Leaderboard button with glow
  const lbX = startX + playW + gap;
  lbBtnRect = { x: lbX, y: btnY, w: lbW2, h: lbH2 };
  ctx.save();
  ctx.shadowColor = 'rgba(80,150,255,0.2)';
  ctx.shadowBlur = 8;
  ctx.fillStyle = 'rgba(30,50,80,0.7)';
  ctx.beginPath(); ctx.roundRect(lbX, btnY, lbW2, lbH2, 12); ctx.fill();
  ctx.shadowBlur = 0;
  ctx.restore();
  ctx.strokeStyle = 'rgba(100,150,220,0.4)';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.roundRect(lbX, btnY, lbW2, lbH2, 12); ctx.stroke();
  ctx.fillStyle = '#6aacee';
  ctx.font = `bold ${fz(18)}px Arial`;
  ctx.fillText(`\u{1F3C6}`, lbX + lbW2/2, btnY + lbH2*0.63);
}

// ==================== GAME LOOP ====================
function gameLoop() {
  update();
  draw();
  requestAnimationFrame(gameLoop);
}

function resize() {
  const vw = window.innerWidth;
  const vh = window.innerHeight;
  if (isMobileDevice) {
    // Fill the entire viewport on mobile
    canvas.style.width = vw + 'px';
    canvas.style.height = vh + 'px';
  } else {
    const scale = Math.min(vw / W, vh / H);
    canvas.style.width = (W * scale) + 'px';
    canvas.style.height = (H * scale) + 'px';
  }
  // Scroll to top on mobile to hide address bar
  window.scrollTo(0, 1);
}
window.addEventListener('resize', resize);
window.addEventListener('orientationchange', () => setTimeout(resize, 100));
resize();
gameLoop();
</script>
</body>
</html>

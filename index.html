  const colW = mobLB ? Math.min(W - 30, 460) : Math.min(W * 0.7, fz(500));
  const lx = W/2 - colW/2;
  leaderboardData.forEach((entry, i) => {
    const ey = baseY + rowH * 1.2 + i * rowH;
    const isTop = i < 3;
    ctx.fillStyle = isTop ? ['#ffdd00','#cccccc','#cc8844'][i] : 'rgba(180,200,220,0.5)';
    ctx.font = isTop ? `bold ${topSz}px Arial` : `${entrySz}px Arial`;
    ctx.textAlign = 'left';
    ctx.fillText(`${i+1}.`, lx, ey);
    const flag = countryToFlag(entry.country);
    ctx.fillText(`${flag} ${entry.name || '???'}`, lx + (mobLB ? 32 : fz(30)), ey);
    ctx.textAlign = 'right';
    ctx.fillText(`${entry.score}`, lx + colW - (mobLB ? 55 : fz(55)), ey);
    ctx.fillStyle = 'rgba(130,160,200,0.4)';
    ctx.font = `${waveSz}px Arial`;
    ctx.fillText(`${t('wave')} ${entry.wave || '?'}`, lx + colW, ey);
  });
}

function drawMenuButton(x, y, w, h, text, colors, icon, isHovered) {
  const btnGrad = ctx.createLinearGradient(0, y, 0, y+h);
  btnGrad.addColorStop(0, colors[0]);
  btnGrad.addColorStop(0.5, colors[1]);
  btnGrad.addColorStop(1, colors[2]);
  ctx.save();
  ctx.shadowColor = colors[3] || 'rgba(0,0,0,0.2)';
  ctx.shadowBlur = isHovered ? 22 : 12;
  ctx.fillStyle = btnGrad;
  ctx.beginPath(); ctx.roundRect(x, y, w, h, 12); ctx.fill();
  ctx.shadowBlur = 0;
  ctx.restore();
  // Hover brightening overlay
  if (isHovered) {
    ctx.fillStyle = 'rgba(255,255,255,0.08)';
    ctx.beginPath(); ctx.roundRect(x, y, w, h, 12); ctx.fill();
  }
  // Shine
  ctx.fillStyle = `rgba(255,255,255,${isHovered ? 0.14 : 0.08})`;
  ctx.beginPath(); ctx.roundRect(x + 2, y + 1, w - 4, h*0.4, [10,10,0,0]); ctx.fill();
  // Border
  ctx.strokeStyle = isHovered ? 'rgba(255,255,255,0.35)' : (colors[4] || 'rgba(255,255,255,0.15)');
  ctx.lineWidth = isHovered ? 1.5 : 1;
  ctx.beginPath(); ctx.roundRect(x, y, w, h, 12); ctx.stroke();
  // Text with icon
  ctx.fillStyle = '#fff';
  ctx.font = `bold ${isMobileDevice ? 16 : fz(18)}px Arial`;
  ctx.textAlign = 'center';
  const displayText = icon ? (isRTL() ? `${text} ${icon}` : `${icon} ${text}`) : text;
  ctx.fillText(displayText, x + w/2, y + h*0.65);
}

function drawMenu() {
  ctx.fillStyle = 'rgba(0,5,15,0.55)';
  ctx.fillRect(0,0,W,H);

  // Language toggle at top center
  drawLangToggle(isMobileDevice ? 10 : fz(10));

  if (showLeaderboard) {
    drawLeaderboardTable(isMobileDevice ? 80 : H * 0.15);
    ctx.fillStyle = 'rgba(150,180,220,0.4)';
    ctx.font = `${isMobileDevice ? 14 : fz(13)}px Arial`;
    ctx.textAlign = 'center';
    ctx.fillText(currentLang === 'he' ? 'לחץ לחזרה' : 'Tap to go back', W/2, isMobileDevice ? 460 : H - 30);
    return;
  }

  // Legal overlay
  if (showLegalOverlay) { drawLegalOverlay(); return; }

  const mobM = isMobileDevice;
  const bigBtnW = mobM ? Math.min(W * 0.75, 340) : Math.min(W * 0.7, fz(320));
  const bigBtnH = mobM ? 50 : fz(55);
  // Vertically center menu content
  const btnGapM = mobM ? 10 : fz(10);
  const totalMenuH = mobM
    ? (38 + 20 + 36 + (highScore > 0 ? 18 : 0) + 10 + bigBtnH*3 + btnGapM*2 + 16 + 26 + 14 + 14 + 36 + 12 + 26)
    : (fz(38) + fz(22) + fz(42) + (highScore > 0 ? fz(18) : 0) + fz(6) + bigBtnH*3 + fz(10)*2 + fz(18) + fz(28) + fz(14) + fz(14) + fz(40) + fz(12) + fz(30));
  // Flags end at 10+36=46 on mobile. Need title below with gap.
  const langToggleBottom = mobM ? (10 + 36 + 24 + 38) : (fz(10) + fz(42) + fz(8) + fz(38));
  // Center content vertically, but clamp so it stays below flags
  let curY = Math.max(langToggleBottom, (H - totalMenuH) / 2);

  // Title with glow
  const titleY = curY;
  ctx.save();
  ctx.shadowColor = '#00cc66'; ctx.shadowBlur = 25;
  ctx.fillStyle = '#00dd66';
  ctx.font = `bold ${mobM ? 38 : fz(38)}px Arial`;
  ctx.textAlign = 'center';
  ctx.fillText(t('title'), W/2, titleY);
  ctx.shadowBlur = 0;
  ctx.restore();

  ctx.fillStyle = '#7abcee';
  ctx.font = `${mobM ? 16 : fz(14)}px Arial`;
  ctx.textAlign = 'center';
  ctx.fillText(t('subtitle'), W/2, titleY + (mobM ? 22 : fz(22)));
  curY = titleY + (mobM ? 40 : fz(42));

  // Leaderboard #1 or local high score
  if (leaderboardData.length > 0) {

    const flag = countryFlag(leader.country);

    if (ly > contentY - lineH && ly < H - fz(10)) {
      if (line.startsWith('---')) {
        ctx.fillStyle = '#00aadd';
        ctx.font = `bold ${fz(16)}px Arial`;
        ctx.textAlign = 'center';
        ctx.fillText(line.replace(/---/g, '').trim(), W/2, ly);

        ctx.fillText(line, textX, ly);

function drawNameInput() {
  ctx.fillStyle = 'rgba(0,0,10,0.9)';
  ctx.fillRect(0,0,W,H);

  // On mobile, use tighter spacing to leave room for keyboard
  const mobS = isMobile ? 0.7 : 1; // mobile spacing scale
  const cy = isMobile ? H * 0.08 : H * 0.18;

  ctx.fillStyle = '#ffdd00';
  ctx.font = `bold ${fz(28)}px Arial`;
  ctx.textAlign = 'center';
  ctx.fillText(`${score}`, W/2, cy);
  ctx.fillStyle = '#fff';
  ctx.font = `${fz(14)}px Arial`;
  ctx.fillText(t('finalScore'), W/2, cy + fz(22) * mobS);

  // Rating
  const ratings = t('rating');
  const rColors = ['#888','#aaa','#00cc66','#00ddff','#ffaa00','#ffdd00'];
  let ri = 0;
  if (score >= 200) ri = 5;
  else if (score >= 100) ri = 4;
  else if (score >= 50) ri = 3;
  else if (score >= 20) ri = 2;
  else if (score >= 5) ri = 1;
  ctx.fillStyle = rColors[ri];
  ctx.font = `bold ${fz(18)}px Arial`;
  ctx.fillText(ratings[ri], W/2, cy + fz(50) * mobS);

  // Name input prompt
  ctx.fillStyle = '#6aacee';
  ctx.font = `${fz(14)}px Arial`;
  ctx.fillText(t('enterName'), W/2, cy + fz(85) * mobS);

  // Name input box
  const boxW = fz(180), boxH = fz(40);
  const boxX = W/2 - boxW/2, boxY = cy + fz(95) * mobS;
  ctx.fillStyle = 'rgba(20,30,50,0.8)';
  ctx.strokeStyle = '#4488cc';
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.roundRect(boxX, boxY, boxW, boxH, 6); ctx.fill();
  ctx.beginPath(); ctx.roundRect(boxX, boxY, boxW, boxH, 6); ctx.stroke();
  // Name text
  ctx.fillStyle = '#fff';
  ctx.font = `bold ${fz(24)}px monospace`;
  ctx.textAlign = 'center';
  const displayName = nameInput + (Math.sin(frame*0.1) > 0 ? '_' : ' ');
  ctx.fillText(displayName, W/2, boxY + boxH*0.7);
  // char count
  ctx.fillStyle = 'rgba(150,180,220,0.4)';
  ctx.font = `${fz(10)}px Arial`;
  ctx.fillText(`${nameInput.length}/6`, W/2 + boxW/2 - fz(10), boxY + boxH + fz(14));

  // On mobile, show simple character buttons (uses raw px, NOT fz(), to fit screen)
  if (isMobile) {
    const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
    const kbPad = 8;
    const cols = 10;
    const charBtnSize = Math.floor((W - kbPad * 2) / cols);
    const kbY = boxY + boxH + 18;
    const kbX = Math.floor((W - cols * charBtnSize) / 2);
    const fontSize = Math.max(10, Math.floor(charBtnSize * 0.45));
    for (let i = 0; i < chars.length; i++) {
      const col = i % cols, row = Math.floor(i / cols);
      const cx = kbX + col * charBtnSize, cy2 = kbY + row * charBtnSize;
      ctx.fillStyle = 'rgba(40,50,70,0.7)';
      ctx.beginPath(); ctx.roundRect(cx+1, cy2+1, charBtnSize-2, charBtnSize-2, 4); ctx.fill();
      ctx.fillStyle = '#ddd';
      ctx.font = `bold ${fontSize}px Arial`;
      ctx.textAlign = 'center';
      ctx.fillText(chars[i], cx + charBtnSize/2, cy2 + charBtnSize * 0.65);
    }
    // Backspace and Submit buttons
    const numRows = Math.ceil(chars.length / cols);
    const actionY = kbY + numRows * charBtnSize + 8;
    const actionBtnW = Math.floor((W - kbPad * 2 - 12) / 2);
    const actionBtnH = Math.floor(charBtnSize * 1.1);
    const actionFontSize = Math.max(12, Math.floor(actionBtnH * 0.42));
    // Backspace
    const bsX = kbX;
    ctx.fillStyle = 'rgba(150,50,50,0.6)';
    ctx.beginPath(); ctx.roundRect(bsX, actionY, actionBtnW, actionBtnH, 6); ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.font = `bold ${actionFontSize}px Arial`;
    ctx.fillText('\u232B DEL', bsX + actionBtnW/2, actionY + actionBtnH*0.63);
    // Submit
    const subBtnX = kbX + actionBtnW + 12;
    submitBtnRect = { x: subBtnX, y: actionY, w: actionBtnW, h: actionBtnH };
    ctx.fillStyle = nameInput.length > 0 ? 'rgba(0,150,80,0.7)' : 'rgba(50,60,70,0.4)';
    ctx.beginPath(); ctx.roundRect(subBtnX, actionY, actionBtnW, actionBtnH, 6); ctx.fill();
    ctx.fillStyle = nameInput.length > 0 ? '#fff' : '#666';
    ctx.font = `bold ${actionFontSize}px Arial`;
    ctx.fillText(t('submit'), subBtnX + actionBtnW/2, actionY + actionBtnH*0.63);
  } else {
    // Desktop: type with keyboard hint
    const subBtnW = 120, subBtnH = 38;
    const subBtnY = boxY + boxH + 24;
    submitBtnRect = { x: W/2 - subBtnW/2, y: subBtnY, w: subBtnW, h: subBtnH };
    ctx.fillStyle = nameInput.length > 0 ? 'rgba(0,150,80,0.7)' : 'rgba(50,60,70,0.4)';
    ctx.beginPath(); ctx.roundRect(submitBtnRect.x, subBtnY, subBtnW, subBtnH, 8); ctx.fill();
    ctx.fillStyle = nameInput.length > 0 ? '#fff' : '#666';
    ctx.font = 'bold 16px Arial';
    ctx.textAlign = 'center';
    ctx.fillText(t('submit'), W/2, subBtnY + 25);
  }
}

function drawVictory() {
  ctx.fillStyle = 'rgba(0, 5, 15, 0.88)';
  ctx.fillRect(0, 0, W, H);

  // Language toggle
  drawLangToggle(12);

  // If leaderboard is open
  if (showLeaderboard) {
    const mobV = isMobileDevice;
    drawLeaderboardTable(mobV ? 80 : H * 0.15);
    const btnW = mobV ? 180 : fz(170), btnH = mobV ? 42 : fz(40);
    const btnY2 = mobV ? 470 : H - fz(80);
    playAgainBtnRect = { x: W/2 - btnW/2, y: btnY2, w: btnW, h: btnH };
    const btnGrad2 = ctx.createLinearGradient(0, btnY2, 0, btnY2 + btnH);
    btnGrad2.addColorStop(0, '#00bb55');
    btnGrad2.addColorStop(1, '#008833');
    ctx.fillStyle = btnGrad2;
    ctx.beginPath(); ctx.roundRect(playAgainBtnRect.x, btnY2, btnW, btnH, 10); ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.font = `bold ${mobV ? 16 : fz(17)}px Arial`;
    ctx.textAlign = 'center';
    ctx.fillText(t('playAgain'), W/2, btnY2 + btnH * 0.65);
    lbBtnRect = { x: 0, y: btnY2 + btnH, w: W, h: 40 };
    ctx.fillStyle = 'rgba(150,180,220,0.4)';
    ctx.font = `${mobV ? 12 : fz(12)}px Arial`;
    ctx.fillText(currentLang === 'he' ? '\u05DC\u05D7\u05E5 \u05DC\u05D7\u05D6\u05E8\u05D4' : 'Tap to go back', W/2, btnY2 + btnH + 24);
    return;
  }

  // Start content below language flags
  const mob = isMobileDevice;
  // Flags end at 10+36=46 on mobile. Title font=36px, baseline needs to be at 46+20+36=102
  const vY = mob ? 102 : H * 0.17;

  // Victory title with golden glow
  ctx.save();
  ctx.shadowColor = '#ffcc00';
  ctx.shadowBlur = 30;
  ctx.fillStyle = '#ffdd00';
  ctx.font = `bold ${mob ? 36 : fz(36)}px Arial`;
  ctx.textAlign = 'center';
  const pulse = 1 + Math.sin(frame * 0.04) * 0.03;
  ctx.translate(W/2, vY);
  ctx.scale(pulse, pulse);
  ctx.fillText(t('victory'), 0, 0);
  ctx.restore();
  ctx.shadowBlur = 0;

  // Description
  ctx.fillStyle = '#88ccff';
  ctx.font = `${mob ? 16 : fz(15)}px Arial`;
  ctx.textAlign = 'center';
  ctx.fillText(t('victoryDesc'), W/2, vY + (mob ? 28 : fz(30)));

  // Score
  ctx.fillStyle = '#fff';
  ctx.font = `bold ${mob ? 40 : fz(30)}px Arial`;
  ctx.fillText(`${score}`, W/2, vY + (mob ? 72 : fz(70)));
  ctx.fillStyle = 'rgba(150,180,220,0.5)';
  ctx.font = `${mob ? 13 : fz(12)}px Arial`;
  ctx.fillText(t('finalScore'), W/2, vY + (mob ? 90 : fz(88)));

  // Stats
  ctx.fillStyle = '#88bbff';
  ctx.font = `${mob ? 14 : fz(13)}px Arial`;
  ctx.fillText(`${t('waveLabel')}: ${wave}  |  ${t('comboMax')}: ${maxCombo}`, W/2, vY + (mob ? 112 : fz(110)));

  // Cities defended list
  ctx.fillStyle = 'rgba(100, 200, 255, 0.6)';
  ctx.font = `${mob ? 12 : fz(11)}px Arial`;
  const cityNames = CITIES.map(c => c.name[currentLang] || c.name.en).join('  \u2022  ');
  ctx.fillText(cityNames, W/2, vY + (mob ? 130 : fz(132)));

  // Rating
  const ratings = t('rating');
  ctx.fillStyle = '#ffdd00';
  ctx.font = `bold ${mob ? 22 : fz(18)}px Arial`;
  ctx.fillText(ratings[5], W/2, vY + (mob ? 158 : fz(160)));

  // Buttons side by side
  const gap = mob ? 8 : fz(10);
  const playW = mob ? 160 : fz(160), playH = mob ? 40 : fz(42);
  const lbW2 = mob ? 50 : fz(55), lbH2 = mob ? 40 : fz(42);
  const totalBtnW = playW + gap + lbW2;
  const btnY = vY + (mob ? 175 : fz(178));
  const startX = W/2 - totalBtnW / 2;

  // Play again with glow
  playAgainBtnRect = { x: startX, y: btnY, w: playW, h: playH };
  ctx.save();
  ctx.shadowColor = 'rgba(0,200,100,0.3)';
  ctx.shadowBlur = 12;
  const btnGrad = ctx.createLinearGradient(0, btnY, 0, btnY + playH);
  btnGrad.addColorStop(0, '#00cc66');
  btnGrad.addColorStop(0.5, '#00bb55');
  btnGrad.addColorStop(1, '#008833');
  ctx.fillStyle = btnGrad;
  ctx.beginPath(); ctx.roundRect(startX, btnY, playW, playH, 12); ctx.fill();
  ctx.shadowBlur = 0;
  ctx.restore();
  ctx.fillStyle = 'rgba(255,255,255,0.08)';
  ctx.beginPath(); ctx.roundRect(startX + 2, btnY + 1, playW - 4, playH*0.4, [10,10,0,0]); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.font = `bold ${mob ? 17 : fz(17)}px Arial`;
  ctx.textAlign = 'center';
  ctx.fillText(t('playAgain'), startX + playW / 2, btnY + playH * 0.63);

  // Leaderboard button with glow
  const lbX = startX + playW + gap;
  lbBtnRect = { x: lbX, y: btnY, w: lbW2, h: lbH2 };
  ctx.save();
  ctx.shadowColor = 'rgba(80,150,255,0.2)';
  ctx.shadowBlur = 8;
  ctx.fillStyle = 'rgba(30,50,80,0.7)';
  ctx.beginPath(); ctx.roundRect(lbX, btnY, lbW2, lbH2, 12); ctx.fill();
  ctx.shadowBlur = 0;
  ctx.restore();
  ctx.strokeStyle = 'rgba(100,150,220,0.4)';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.roundRect(lbX, btnY, lbW2, lbH2, 12); ctx.stroke();
  ctx.fillStyle = '#6aacee';
  ctx.font = `bold ${mob ? 18 : fz(18)}px Arial`;
  ctx.textAlign = 'center';
  ctx.fillText('\u{1F3C6}', lbX + lbW2 / 2, btnY + lbH2 * 0.63);

  // Share buttons (M8 — share prompt after victory)
  if (!isEmbedMode) {
    drawShareButtons(btnY + playH + (mob ? 18 : fz(18)), endShareBtnRects);
  }
}

function drawGameOver() {
  ctx.fillStyle = 'rgba(0,0,10,0.88)';
  ctx.fillRect(0,0,W,H);

  // Language toggle
  drawLangToggle(12);

  // If leaderboard is open, show full-screen leaderboard with back button
  if (showLeaderboard) {
    const mobGOlb = isMobileDevice;
    drawLeaderboardTable(mobGOlb ? 80 : H * 0.15);
    const btnW = mobGOlb ? 180 : fz(170), btnH = mobGOlb ? 42 : fz(40);
    const btnY2 = mobGOlb ? 470 : H - fz(80);
    playAgainBtnRect = { x: W/2 - btnW/2, y: btnY2, w: btnW, h: btnH };
    const btnGrad2 = ctx.createLinearGradient(0, btnY2, 0, btnY2+btnH);
    btnGrad2.addColorStop(0, '#00bb55');
    btnGrad2.addColorStop(1, '#008833');
    ctx.fillStyle = btnGrad2;
    ctx.beginPath(); ctx.roundRect(playAgainBtnRect.x, btnY2, btnW, btnH, 10); ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.font = `bold ${mobGOlb ? 16 : fz(17)}px Arial`;
    ctx.textAlign = 'center';
    ctx.fillText(t('playAgain'), W/2, btnY2 + btnH*0.65);
    lbBtnRect = { x: 0, y: btnY2 + btnH, w: W, h: 40 };
    ctx.fillStyle = 'rgba(150,180,220,0.4)';
    ctx.font = `${mobGOlb ? 12 : fz(12)}px Arial`;
    ctx.fillText(currentLang === 'he' ? 'לחץ לחזרה' : 'Tap to go back', W/2, btnY2 + btnH + 24);
    return;
  }

  const mobGO = isMobileDevice;
  // Flags end at 10+36=46 on mobile. Title font=34px, baseline needs to be at 46+20+34=100
  const goY = mobGO ? 100 : H * 0.17;

  ctx.save();
  ctx.shadowColor = 'rgba(255,50,50,0.6)';
  ctx.shadowBlur = 15;
  ctx.fillStyle = '#ff4444';
  ctx.font = `bold ${mobGO ? 34 : fz(34)}px Arial`;
  ctx.textAlign = 'center';
  ctx.fillText(t('gameOver'), W/2, goY);
  ctx.shadowBlur = 0;
  ctx.restore();

  // Score + best
  ctx.save();
  ctx.shadowColor = 'rgba(255,255,255,0.4)';
  ctx.shadowBlur = 8;
  ctx.fillStyle = '#fff';
  ctx.font = `bold ${mobGO ? 38 : fz(30)}px Arial`;
  ctx.textAlign = 'center';
  ctx.fillText(`${score}`, W/2, goY + (mobGO ? 42 : fz(42)));
  ctx.shadowBlur = 0;
  ctx.restore();
  if (score >= highScore && score > 0) {
    ctx.save();
    ctx.shadowColor = 'rgba(255,220,50,0.5)';
    ctx.shadowBlur = 8;
    ctx.fillStyle = '#ffdd00';
    ctx.font = `bold ${mobGO ? 14 : fz(14)}px Arial`;
    ctx.textAlign = 'center';
    ctx.fillText(t('newRecord'), W/2, goY + (mobGO ? 60 : fz(62)));
    ctx.shadowBlur = 0;
    ctx.restore();
  } else {
    ctx.fillStyle = '#888';
    ctx.font = `${mobGO ? 13 : fz(12)}px Arial`;
    ctx.textAlign = 'center';
    ctx.fillText(`${t('best')}: ${highScore}`, W/2, goY + (mobGO ? 60 : fz(62)));
  }

  // Wave + combo
  ctx.fillStyle = '#88bbff';
  ctx.font = `${mobGO ? 14 : fz(13)}px Arial`;
  ctx.fillText(`${t('waveLabel')}: ${wave}  |  ${t('comboMax')}: ${maxCombo}`, W/2, goY + (mobGO ? 82 : fz(84)));

  // City destroyed message
  const destroyedCity = CITIES[currentCityIdx] ? (CITIES[currentCityIdx].name[currentLang] || CITIES[currentCityIdx].name.en) : '';
  ctx.save();
  ctx.shadowColor = 'rgba(255,50,50,0.4)';
  ctx.shadowBlur = 8;
  ctx.fillStyle = '#ff6666';
  ctx.font = `bold ${mobGO ? 15 : fz(14)}px Arial`;
  ctx.fillText(`${destroyedCity} ${t('cityDestroyed')}`, W/2, goY + (mobGO ? 102 : fz(100)));
  ctx.shadowBlur = 0;
  ctx.restore();

  // Rating
  const ratings = t('rating');
  const rColors = ['#888','#aaa','#00cc66','#00ddff','#ffaa00','#ffdd00'];
  let ri = 0;
  if (score >= 200) ri = 5;
  else if (score >= 100) ri = 4;
  else if (score >= 50) ri = 3;
  else if (score >= 20) ri = 2;
  else if (score >= 5) ri = 1;
  ctx.fillStyle = rColors[ri];
  ctx.font = `bold ${mobGO ? 20 : fz(18)}px Arial`;
  ctx.fillText(ratings[ri], W/2, goY + (mobGO ? 130 : fz(126)));

  // Buttons side by side
  const gap = mobGO ? 8 : fz(10);
  const playW = mobGO ? 160 : fz(160), playH = mobGO ? 40 : fz(42);
  const lbW2 = mobGO ? 50 : fz(55), lbH2 = mobGO ? 40 : fz(42);
  const totalBtnW = playW + gap + lbW2;
  const btnY = goY + (mobGO ? 148 : fz(141));
  const startX = W/2 - totalBtnW/2;

  // Play again with glow
  playAgainBtnRect = { x: startX, y: btnY, w: playW, h: playH };
  ctx.save();
  ctx.shadowColor = 'rgba(0,200,100,0.3)';
  ctx.shadowBlur = 12;
  const btnGrad = ctx.createLinearGradient(0, btnY, 0, btnY+playH);
  btnGrad.addColorStop(0, '#00cc66');
  btnGrad.addColorStop(0.5, '#00bb55');
  btnGrad.addColorStop(1, '#008833');
  ctx.fillStyle = btnGrad;
  ctx.beginPath(); ctx.roundRect(startX, btnY, playW, playH, 12); ctx.fill();
  ctx.shadowBlur = 0;
  ctx.restore();
  // Button shine
  ctx.fillStyle = 'rgba(255,255,255,0.08)';
  ctx.beginPath(); ctx.roundRect(startX + 2, btnY + 1, playW - 4, playH*0.4, [10,10,0,0]); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.font = `bold ${mobGO ? 17 : fz(17)}px Arial`;
  ctx.fillText(t('playAgain'), startX + playW/2, btnY + playH*0.63);

  // Leaderboard button with glow
  const lbX = startX + playW + gap;
  lbBtnRect = { x: lbX, y: btnY, w: lbW2, h: lbH2 };
  ctx.save();
  ctx.shadowColor = 'rgba(80,150,255,0.2)';
  ctx.shadowBlur = 8;
  ctx.fillStyle = 'rgba(30,50,80,0.7)';
  ctx.beginPath(); ctx.roundRect(lbX, btnY, lbW2, lbH2, 12); ctx.fill();
  ctx.shadowBlur = 0;
  ctx.restore();
  ctx.strokeStyle = 'rgba(100,150,220,0.4)';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.roundRect(lbX, btnY, lbW2, lbH2, 12); ctx.stroke();
  ctx.fillStyle = '#6aacee';
  ctx.font = `bold ${mobGO ? 18 : fz(18)}px Arial`;
  ctx.fillText(`\u{1F3C6}`, lbX + lbW2/2, btnY + lbH2*0.63);

  // Share buttons (M7 — share prompt after game over)
  if (!isEmbedMode) {
    drawShareButtons(btnY + playH + (mobGO ? 18 : fz(18)), endShareBtnRects);
  }
}

// ==================== GAME LOOP ====================
function gameLoop() {
  update();
  draw();
  requestAnimationFrame(gameLoop);
}

function resize() {
  const vw = window.innerWidth;
  const vh = window.innerHeight;
  if (isMobileDevice) {
    // Fill the entire viewport on mobile
    canvas.style.width = vw + 'px';
    canvas.style.height = vh + 'px';
  } else {
    const scale = Math.min(vw / W, vh / H);
    canvas.style.width = (W * scale) + 'px';
    canvas.style.height = (H * scale) + 'px';
  }
  // Scroll to top on mobile to hide address bar
  window.scrollTo(0, 1);
}
window.addEventListener('resize', resize);
window.addEventListener('orientationchange', () => setTimeout(resize, 100));
resize();
gameLoop();
</script>

const FIREBASE_URL = 'https://iron-dome-game-c9bba-default-rtdb.asia-southeast1.firebasedatabase.app';
let leaderboardData = [];
let leaderboardLoading = false;
let playerCountry = '';

// Detect country by IP for flag emoji
(async () => {

    const data = await res.json();
    if (data && data.country) playerCountry = data.country;
  } catch (e) {}
})();

function countryToFlag(code) {
  if (!code || code.length !== 2) return '';
  return String.fromCodePoint(...[...code.toUpperCase()].map(c => 0x1F1E6 + c.charCodeAt(0) - 65));
}

let leaderboardRaw = {}; // keyed by Firebase key for deletion

async function fetchLeaderboard() {
  leaderboardLoading = true;
  try {
    const res = await fetch(`${FIREBASE_URL}/leaderboard.json`);
    if (!res.ok) throw new Error('fetch failed');
    const data = await res.json();
    if (data) {
      leaderboardRaw = data;
      const entries = Object.entries(data).map(([k, v]) => ({ ...v, _key: k }));
      entries.sort((a, b) => b.score - a.score);
      leaderboardData = entries.slice(0, 10);
    } else {
      leaderboardRaw = {};
      leaderboardData = [];
    }
  } catch (e) { leaderboardData = []; }
  leaderboardLoading = false;
}

function qualifiesForLeaderboard(s) {
  if (s <= 0) return false;
  if (leaderboardData.length < 10) return true;
  return s > leaderboardData[leaderboardData.length - 1].score;
}

async function submitScore(name, sc, wv) {
  try {
    // Add new score
    await fetch(`${FIREBASE_URL}/leaderboard.json`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name: name.toUpperCase().slice(0, 6), score: sc, wave: wv, country: playerCountry, date: Date.now() })
    });
    // Fetch all, then delete any beyond top 10
    const res = await fetch(`${FIREBASE_URL}/leaderboard.json`);
    if (res.ok) {
      const data = await res.json();
      if (data) {
        const entries = Object.entries(data).map(([k, v]) => ({ ...v, _key: k }));
        entries.sort((a, b) => b.score - a.score);
        // Delete entries beyond top 10
        const toDelete = entries.slice(10);
        for (const e of toDelete) {
          await fetch(`${FIREBASE_URL}/leaderboard/${e._key}.json`, { method: 'DELETE' });
        }
        leaderboardData = entries.slice(0, 10);
      }
    }
  } catch (e) {}
}
fetchLeaderboard();

function drawShareButtons(y, rects) {

// ==================== AUDIO ENGINE ====================
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
let musicGain, masterGain;
function initAudio() {
  masterGain = audioCtx.createGain();
  masterGain.gain.value = 0.3;
  masterGain.connect(audioCtx.destination);
  musicGain = audioCtx.createGain();
  musicGain.gain.value = 0.12;
  musicGain.connect(audioCtx.destination);
}
initAudio();

function playSound(type) {
  if (audioCtx.state === 'suspended') audioCtx.resume();
  const now = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain);
  gain.connect(masterGain);
  switch(type) {
    case 'launch':
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(300, now);
      osc.frequency.exponentialRampToValueAtTime(800, now + 0.1);
      gain.gain.setValueAtTime(0.15, now);
      gain.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
      osc.start(now); osc.stop(now + 0.2);
      break;
    case 'intercept':
      osc.type = 'sine';
      osc.frequency.setValueAtTime(600, now);
      osc.frequency.exponentialRampToValueAtTime(1200, now + 0.08);
      osc.frequency.exponentialRampToValueAtTime(200, now + 0.25);
      gain.gain.setValueAtTime(0.2, now);
      gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
      osc.start(now); osc.stop(now + 0.3);
      const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.15, audioCtx.sampleRate);
      const data = buf.getChannelData(0);
      for (let i = 0; i < data.length; i++) data[i] = (Math.random()*2-1)*Math.exp(-i/(data.length*0.2));
      const noise = audioCtx.createBufferSource(); noise.buffer = buf;
      const ng = audioCtx.createGain();
      ng.gain.setValueAtTime(0.08, now);
      ng.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
      noise.connect(ng); ng.connect(masterGain);
      noise.start(now); noise.stop(now + 0.15);
      break;
    case 'hit':
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(150, now);
      osc.frequency.exponentialRampToValueAtTime(40, now + 0.4);
      gain.gain.setValueAtTime(0.25, now);
      gain.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
      osc.start(now); osc.stop(now + 0.4);
      break;
    case 'combo':
      osc.type = 'sine';
      osc.frequency.setValueAtTime(400, now);
      osc.frequency.setValueAtTime(500, now + 0.05);
      osc.frequency.setValueAtTime(600, now + 0.1);
      osc.frequency.setValueAtTime(800, now + 0.15);
      gain.gain.setValueAtTime(0.12, now);
      gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
      osc.start(now); osc.stop(now + 0.3);
      break;
    case 'boss_hit':
      osc.type = 'square';
      osc.frequency.setValueAtTime(80, now);
      osc.frequency.exponentialRampToValueAtTime(40, now + 0.5);
      gain.gain.setValueAtTime(0.2, now);
      gain.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
      osc.start(now); osc.stop(now + 0.5);
      break;
    case 'boss_destroy':
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(200, now);
      osc.frequency.exponentialRampToValueAtTime(50, now + 0.8);
      gain.gain.setValueAtTime(0.3, now);
      gain.gain.exponentialRampToValueAtTime(0.01, now + 0.8);
      osc.start(now); osc.stop(now + 0.8);
      const osc2b = audioCtx.createOscillator();
      const g2b = audioCtx.createGain();
      osc2b.connect(g2b); g2b.connect(masterGain);
      osc2b.type = 'sine';
      osc2b.frequency.setValueAtTime(300, now + 0.1);
      osc2b.frequency.exponentialRampToValueAtTime(600, now + 0.5);
      g2b.gain.setValueAtTime(0.15, now + 0.1);
      g2b.gain.exponentialRampToValueAtTime(0.01, now + 0.6);
      osc2b.start(now + 0.1); osc2b.stop(now + 0.6);
      break;
    case 'wave_complete':
      [0, 0.1, 0.2, 0.35].forEach((t, i) => {
        const o = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        o.connect(g); g.connect(masterGain);
        o.type = 'sine'; o.frequency.value = [523,659,784,1047][i];
        g.gain.setValueAtTime(0.12, now+t);
        g.gain.exponentialRampToValueAtTime(0.01, now+t+0.3);
        o.start(now+t); o.stop(now+t+0.3);
      });
      return;
    case 'gameover':
      [0, 0.2, 0.4].forEach((t, i) => {
        const o = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        o.connect(g); g.connect(masterGain);
        o.type = 'sawtooth'; o.frequency.value = [200,150,80][i];
        g.gain.setValueAtTime(0.15, now+t);
        g.gain.exponentialRampToValueAtTime(0.01, now+t+0.4);
        o.start(now+t); o.stop(now+t+0.4);
      });
      return;
    case 'siren':
      osc.type = 'sine';
      osc.frequency.setValueAtTime(440, now);
      osc.frequency.linearRampToValueAtTime(880, now + 1.5);
      osc.frequency.linearRampToValueAtTime(440, now + 3);
      gain.gain.setValueAtTime(0.08, now);
      gain.gain.setValueAtTime(0.08, now + 2.5);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 3);
      osc.start(now); osc.stop(now + 3);
      break;
    case 'game_siren':
      // Stylized "azaka" siren - wobbling tone, not too realistic
      osc.type = 'sine';
      for (let c = 0; c < 3; c++) {
        const ct = c * 1.2;
        osc.frequency.setValueAtTime(380, now + ct);
        osc.frequency.linearRampToValueAtTime(700, now + ct + 0.6);
        osc.frequency.linearRampToValueAtTime(380, now + ct + 1.2);
      }
      gain.gain.setValueAtTime(0.1, now);
      gain.gain.setValueAtTime(0.1, now + 3.2);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 3.6);
      osc.start(now); osc.stop(now + 3.6);
      // Add warble overtone
      const sirenOsc2 = audioCtx.createOscillator();
      const sirenG2 = audioCtx.createGain();
      sirenOsc2.connect(sirenG2); sirenG2.connect(masterGain);
      sirenOsc2.type = 'triangle';
      for (let c = 0; c < 3; c++) {
        const ct = c * 1.2;
        sirenOsc2.frequency.setValueAtTime(760, now + ct);
        sirenOsc2.frequency.linearRampToValueAtTime(1400, now + ct + 0.6);
        sirenOsc2.frequency.linearRampToValueAtTime(760, now + ct + 1.2);
      }
      sirenG2.gain.setValueAtTime(0.03, now);
      sirenG2.gain.setValueAtTime(0.03, now + 3.2);
      sirenG2.gain.exponentialRampToValueAtTime(0.001, now + 3.6);
      sirenOsc2.start(now); sirenOsc2.stop(now + 3.6);
      break;
    case 'big_explosion':
      // Deep boom + rumble for city hit
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(80, now);
      osc.frequency.exponentialRampToValueAtTime(20, now + 0.8);
      gain.gain.setValueAtTime(0.35, now);
      gain.gain.exponentialRampToValueAtTime(0.01, now + 0.8);
      osc.start(now); osc.stop(now + 0.8);
      // Sub-bass thud
      const subOsc = audioCtx.createOscillator();
      const subG = audioCtx.createGain();
      subOsc.connect(subG); subG.connect(masterGain);
      subOsc.type = 'sine';
      subOsc.frequency.setValueAtTime(45, now);
      subOsc.frequency.exponentialRampToValueAtTime(15, now + 0.6);
      subG.gain.setValueAtTime(0.3, now);
      subG.gain.exponentialRampToValueAtTime(0.01, now + 0.6);
      subOsc.start(now); subOsc.stop(now + 0.6);
      // Crackle noise
      const expBuf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.5, audioCtx.sampleRate);
      const expData = expBuf.getChannelData(0);
      for (let i = 0; i < expData.length; i++) expData[i] = (Math.random()*2-1) * Math.exp(-i/(expData.length*0.15));
      const expNoise = audioCtx.createBufferSource(); expNoise.buffer = expBuf;
      const expNG = audioCtx.createGain();
      expNG.gain.setValueAtTime(0.15, now);
      expNG.gain.exponentialRampToValueAtTime(0.001, now + 0.5);
      expNoise.connect(expNG); expNG.connect(masterGain);
      expNoise.start(now); expNoise.stop(now + 0.5);
      // Delayed secondary boom
      const sec = audioCtx.createOscillator();
      const secG = audioCtx.createGain();
      sec.connect(secG); secG.connect(masterGain);
      sec.type = 'sine';
      sec.frequency.setValueAtTime(60, now + 0.15);
      sec.frequency.exponentialRampToValueAtTime(25, now + 0.5);
      secG.gain.setValueAtTime(0.15, now + 0.15);
      secG.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
      sec.start(now + 0.15); sec.stop(now + 0.5);
      break;
    case 'hatikvah':
      // Hatikvah - from actual MIDI, E minor key
      // Extracted from MIDI: E4 F#4 G4 A4 B4. B4. C5 B4 C5 E5 B4.. A4.. A4 A4 G4. G4. F#4 E4 F#4 G4 E4..
      // TPQ=480: 240=eighth, 480=quarter, 960=half
      // Using 0.25s = eighth, 0.5s = quarter, 1s = half
      const hNotes = [
        // "Kol od ba-le-vav" (ascending E F# G A)
        [329.63, 0.25],  // E4
        [369.99, 0.25],  // F#4
        [392.00, 0.25],  // G4
        [440.00, 0.25],  // A4
        // "p'ni-mah" (B held, B again)
        [493.88, 0.5],   // B4 (quarter)
        [493.88, 0.5],   // B4 (quarter)
        // "ne-fesh ye-hu-di" (C B C E)
        [523.25, 0.25],  // C5
        [493.88, 0.25],  // B4
        [523.25, 0.25],  // C5
        [659.26, 0.25],  // E5
        // "ho-mi-yah" (B held long)
        [493.88, 1.0],   // B4 (half)
        // "A-" (A held)
        [440.00, 0.5],   // A4
        // "A A G"
        [440.00, 0.25],  // A4
        [440.00, 0.25],  // A4
        [392.00, 0.5],   // G4
        // "G" held
        [392.00, 0.5],   // G4
        // "F# E F# G"
        [369.99, 0.25],  // F#4
        [329.63, 0.25],  // E4
        [369.99, 0.25],  // F#4
        [392.00, 0.25],  // G4
        // "E" held long
        [329.63, 1.0],   // E4 (half, end of phrase 1)
      ];
      let hTime = 0;
      hNotes.forEach(([freq, dur]) => {
        const ho = audioCtx.createOscillator();
        const hg = audioCtx.createGain();
        ho.connect(hg); hg.connect(masterGain);
        ho.type = 'sine';
        ho.frequency.value = freq;
        hg.gain.setValueAtTime(0.1, now + hTime);
        hg.gain.setValueAtTime(0.1, now + hTime + dur * 0.8);
        hg.gain.exponentialRampToValueAtTime(0.001, now + hTime + dur);
        ho.start(now + hTime); ho.stop(now + hTime + dur);
        // Add harmony octave
        const hh = audioCtx.createOscillator();
        const hhg = audioCtx.createGain();
        hh.connect(hhg); hhg.connect(masterGain);
        hh.type = 'triangle';
        hh.frequency.value = freq * 2;
        hhg.gain.setValueAtTime(0.03, now + hTime);
        hhg.gain.exponentialRampToValueAtTime(0.001, now + hTime + dur);
        hh.start(now + hTime); hh.stop(now + hTime + dur);
        hTime += dur;
      });
      // Applause (noise bursts)
      const appDur = 5;
      const appBuf = audioCtx.createBuffer(1, audioCtx.sampleRate * appDur, audioCtx.sampleRate);
      const appData = appBuf.getChannelData(0);
      for (let i = 0; i < appData.length; i++) {
        // Sporadic claps - random bursts
        const t = i / audioCtx.sampleRate;
        const clap = Math.random() > 0.97 ? (Math.random() * 2 - 1) * 0.3 : 0;
        const ambient = (Math.random() * 2 - 1) * 0.02;
        // Fade in and out
        const env = t < 0.5 ? t * 2 : t > 4 ? (5 - t) : 1;
        appData[i] = (clap + ambient) * env;
      }
      const appSrc = audioCtx.createBufferSource(); appSrc.buffer = appBuf;
      const appG = audioCtx.createGain();
      appG.gain.setValueAtTime(0.08, now);
      appSrc.connect(appG); appG.connect(masterGain);
      appSrc.start(now); appSrc.stop(now + appDur);
      return;
  }
}

let musicPlaying = false, musicIntervalId = null;
function startMusic() {
  if (musicPlaying) return;
  musicPlaying = true;
  let beat = 0;
  const bassNotes = [55,55,65,55,73,65,55,55];
  musicIntervalId = setInterval(() => {
    if (audioCtx.state === 'suspended') return;
    const now = audioCtx.currentTime;
    const bass = audioCtx.createOscillator();
    const bg = audioCtx.createGain();
    bass.connect(bg); bg.connect(musicGain);
    bass.type = 'triangle';
    bass.frequency.value = bassNotes[beat % bassNotes.length];
    bg.gain.setValueAtTime(0.15, now);
    bg.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
    bass.start(now); bass.stop(now + 0.3);
    if (beat % 2 === 0) {
      const buf = audioCtx.createBuffer(1, audioCtx.sampleRate*0.05, audioCtx.sampleRate);
      const d = buf.getChannelData(0);
      for (let i = 0; i < d.length; i++) d[i] = (Math.random()*2-1)*Math.exp(-i/(d.length*0.15));
      const n = audioCtx.createBufferSource(); n.buffer = buf;
      const ng2 = audioCtx.createGain();
      ng2.gain.setValueAtTime(0.04, now);
      ng2.gain.exponentialRampToValueAtTime(0.001, now + 0.05);
      n.connect(ng2); ng2.connect(musicGain);
      n.start(now); n.stop(now + 0.05);
    }
    beat++;
  }, 250);
}
function stopMusic() {
  musicPlaying = false;
  if (musicIntervalId) { clearInterval(musicIntervalId); musicIntervalId = null; }
}

const RELOAD_TIMES = [180, 210, 240, 300, 360]; // frames per city (3s / 3.5s / 4s / 5s / 6s)
const ALTITUDE_CUTOFFS = {
  rocket:    GROUND_Y - 120,
  drone:     GROUND_Y - 180,
  ballistic: GROUND_Y - 70,
  decoy:     GROUND_Y - 50
};
const IRON_BEAM_MAX_KILLS = 4;
const IRON_BEAM_KILL_INTERVAL = 60;   // ~1s per target
const DAVIDS_SLING_MAX_KILLS = 2;
const DAVIDS_SLING_KILL_INTERVAL = 45; // ~0.75s per target
const TOKEN_BANK_MAX = 3;
const CONSECUTIVE_HITS_FOR_TOKEN = 5;

// ==================== PRERENDER TEL AVIV SKYLINE ====================
const cityCanvas = document.createElement('canvas');
cityCanvas.width = Math.round(W * dpr);
cityCanvas.height = Math.round(H * dpr);
const cctx = cityCanvas.getContext('2d');
cctx.scale(dpr, dpr);

function drawBuilding(x, w, h, opts = {}) {
  const y = GROUND_Y - h;
  // Main structure - smoother gradient with more stops
  const grad = cctx.createLinearGradient(x, y, x + w, y + h);
  const base = opts.color || [40, 50, 70];
  grad.addColorStop(0, `rgb(${base[0]+25},${base[1]+25},${base[2]+25})`);
  grad.addColorStop(0.15, `rgb(${base[0]+18},${base[1]+18},${base[2]+20})`);
  grad.addColorStop(0.4, `rgb(${base[0]+5},${base[1]+5},${base[2]+8})`);
  grad.addColorStop(0.65, `rgb(${base[0]},${base[1]},${base[2]})`);
  grad.addColorStop(0.85, `rgb(${base[0]-5},${base[1]-5},${base[2]-3})`);
  grad.addColorStop(1, `rgb(${base[0]-12},${base[1]-12},${base[2]-8})`);
  cctx.fillStyle = grad;

  if (opts.shape === 'round') {
    // Azrieli round tower
    cctx.beginPath();
    cctx.ellipse(x + w/2, y + 10, w/2, 10, 0, 0, Math.PI, true);
    cctx.lineTo(x, GROUND_Y);
    cctx.lineTo(x + w, GROUND_Y);
    cctx.closePath();
    cctx.fill();
    cctx.fillRect(x, y + 10, w, h - 10);
  } else if (opts.shape === 'triangle') {
    // Azrieli triangle tower
    cctx.beginPath();
    cctx.moveTo(x + w/2, y);
    cctx.lineTo(x + w + 5, y + 20);
    cctx.lineTo(x + w, GROUND_Y);
    cctx.lineTo(x, GROUND_Y);
    cctx.lineTo(x - 5, y + 20);
    cctx.closePath();
    cctx.fill();
  } else if (opts.shape === 'spire') {
    // Modern spire building
    cctx.fillRect(x, y + 30, w, h - 30);
    cctx.beginPath();
    cctx.moveTo(x + w/2, y);
    cctx.lineTo(x + w - 2, y + 30);
    cctx.lineTo(x + 2, y + 30);
    cctx.closePath();
    cctx.fill();
  } else if (opts.shape === 'eshkol') {
    // Eshkol Tower — University of Haifa, Oscar Niemeyer brutalist design
    // Narrow pedestal base
    const pedestalW = w * 0.35;
    const pedestalH = h * 0.2;
    const pedestalX = x + (w - pedestalW) / 2;
    cctx.fillStyle = `rgb(${base[0]-10},${base[1]-10},${base[2]-10})`;
    cctx.fillRect(pedestalX, GROUND_Y - pedestalH, pedestalW, pedestalH);
    // Wide rectangular tower body (overhangs pedestal)
    const towerY = y;
    const towerH = h - pedestalH;
    const towerGrad = cctx.createLinearGradient(x, towerY, x + w, towerY);
    towerGrad.addColorStop(0, `rgb(${base[0]+8},${base[1]+8},${base[2]+8})`);
    towerGrad.addColorStop(0.5, `rgb(${base[0]},${base[1]},${base[2]})`);
    towerGrad.addColorStop(1, `rgb(${base[0]-8},${base[1]-8},${base[2]-8})`);
    cctx.fillStyle = towerGrad;
    cctx.fillRect(x, towerY, w, towerH);
    // Horizontal concrete bands (brutalist aesthetic)
    cctx.fillStyle = `rgba(${base[0]+15},${base[1]+15},${base[2]+15}, 0.3)`;
    for (let by = towerY + 6; by < towerY + towerH; by += 10) {
      cctx.fillRect(x, by, w, 1.5);
    }
    // Dark window strips between bands
    cctx.fillStyle = 'rgba(15, 20, 35, 0.4)';
    for (let by = towerY + 8; by < towerY + towerH; by += 10) {
      cctx.fillRect(x + 2, by, w - 4, 5);
    }
    // Roof edge accent
    cctx.fillStyle = `rgba(${base[0]+20},${base[1]+20},${base[2]+20}, 0.5)`;
    cctx.fillRect(x, towerY, w, 2);
    return; // Skip default windows
  } else if (opts.shape === 'watertower') {
    // Nahariya Water Tower — white octagonal landmark (1936), city symbol
    const shaftW = w * 0.45;
    const shaftX = x + (w - shaftW) / 2;
    const tankH = h * 0.22;
    const tankW = w * 0.75;
    const tankX = x + (w - tankW) / 2;
    const capH = h * 0.1;
    const shaftTop = y + capH + tankH;
    // Shaft — slightly tapered white cylinder
    const shaftBotW = shaftW * 1.1;
    cctx.fillStyle = `rgb(${base[0]},${base[1]},${base[2]})`;
    cctx.beginPath();
    cctx.moveTo(shaftX - (shaftBotW - shaftW)/2, GROUND_Y);
    cctx.lineTo(shaftX, shaftTop);
    cctx.lineTo(shaftX + shaftW, shaftTop);
    cctx.lineTo(shaftX + shaftW + (shaftBotW - shaftW)/2, GROUND_Y);
    cctx.closePath();
    cctx.fill();
    // Shaft shadow gradient
    const shaftGrad = cctx.createLinearGradient(shaftX, shaftTop, shaftX + shaftW, shaftTop);
    shaftGrad.addColorStop(0, 'rgba(0,0,0,0.05)');
    shaftGrad.addColorStop(0.7, 'rgba(0,0,0,0)');
    shaftGrad.addColorStop(1, 'rgba(0,0,0,0.12)');
    cctx.fillStyle = shaftGrad;
    cctx.fillRect(shaftX, shaftTop, shaftW, GROUND_Y - shaftTop);
    // Window slits on shaft
    cctx.fillStyle = 'rgba(60, 80, 100, 0.3)';
    for (let wy = shaftTop + 15; wy < GROUND_Y - 20; wy += 25) {
      cctx.fillRect(shaftX + shaftW*0.35, wy, shaftW*0.3, 8);
    }
    // Tank section — wider octagonal/rectangular with slight overhang
    cctx.fillStyle = `rgb(${base[0]-5},${base[1]-5},${base[2]-5})`;
    cctx.fillRect(tankX, y + capH, tankW, tankH);
    // Tank bottom bevel
    cctx.beginPath();
    cctx.moveTo(tankX, y + capH + tankH);
    cctx.lineTo(shaftX, y + capH + tankH + 6);
    cctx.lineTo(shaftX + shaftW, y + capH + tankH + 6);
    cctx.lineTo(tankX + tankW, y + capH + tankH);
    cctx.closePath();
    cctx.fill();
    // Tank horizontal bands
    cctx.strokeStyle = `rgba(${base[0]-25},${base[1]-25},${base[2]-25}, 0.2)`;
    cctx.lineWidth = 0.6;
    for (let ty = y + capH + 4; ty < y + capH + tankH; ty += 5) {
      cctx.beginPath();
      cctx.moveTo(tankX, ty);
      cctx.lineTo(tankX + tankW, ty);
      cctx.stroke();
    }
    // Observation railing
    cctx.strokeStyle = 'rgba(100,100,100,0.4)';
    cctx.lineWidth = 0.8;
    cctx.beginPath();
    cctx.moveTo(tankX - 2, y + capH);
    cctx.lineTo(tankX - 2, y + capH - 5);
    cctx.lineTo(tankX + tankW + 2, y + capH - 5);
    cctx.lineTo(tankX + tankW + 2, y + capH);
    cctx.stroke();
    // Railing posts
    for (let rx = tankX; rx <= tankX + tankW; rx += tankW/4) {
      cctx.beginPath();
      cctx.moveTo(rx, y + capH);
      cctx.lineTo(rx, y + capH - 5);
      cctx.stroke();
    }
    // Conical red/terracotta cap
    cctx.fillStyle = 'rgba(160, 75, 50, 0.85)';
    cctx.beginPath();
    cctx.moveTo(x + w/2, y);
    cctx.lineTo(tankX - 1, y + capH + 1);
    cctx.lineTo(tankX + tankW + 1, y + capH + 1);
    cctx.closePath();
    cctx.fill();
    // Cap highlight
    cctx.fillStyle = 'rgba(190, 100, 70, 0.3)';
    cctx.beginPath();
    cctx.moveTo(x + w/2, y + 2);
    cctx.lineTo(tankX + tankW*0.3, y + capH);
    cctx.lineTo(x + w/2, y + capH);
    cctx.closePath();
    cctx.fill();
    return; // Skip default windows
  } else if (opts.shape === 'dome') {
    // Dome silhouette - half circle on rectangular base
    const baseH = h * 0.35;
    const domeH = h - baseH;
    cctx.fillRect(x, GROUND_Y - baseH, w, baseH);
    cctx.beginPath();
    cctx.arc(x + w/2, GROUND_Y - baseH, w/2, Math.PI, 0);
    cctx.closePath();
    cctx.fill();
    // Dome highlight
    cctx.fillStyle = `rgba(${base[0]+30},${base[1]+30},${base[2]+20}, 0.3)`;
    cctx.beginPath();
    cctx.arc(x + w/2 - w*0.1, GROUND_Y - baseH - w*0.08, w*0.3, Math.PI, 0);
    cctx.closePath();
    cctx.fill();
  } else if (opts.shape === 'wall') {
    // Old city wall with crenellations (merlons)
    const wallH = h * 0.7;
    const crenH = h * 0.3;
    const crenW = w / 12;
    cctx.fillRect(x, GROUND_Y - wallH, w, wallH);
    // Crenellations
    for (let cx = x; cx < x + w - crenW; cx += crenW * 2) {
      cctx.fillRect(cx, GROUND_Y - wallH - crenH, crenW, crenH);
    }
    // Stone texture lines
    cctx.strokeStyle = `rgba(${base[0]-15},${base[1]-15},${base[2]-15}, 0.4)`;
    cctx.lineWidth = 0.5;
    for (let ly = GROUND_Y - wallH + 8; ly < GROUND_Y; ly += 10) {
      cctx.beginPath();
      cctx.moveTo(x, ly);
      cctx.lineTo(x + w, ly);
      cctx.stroke();
      // Vertical stone joints (offset every other row)
      const offset = ((ly - (GROUND_Y - wallH)) / 10) % 2 === 0 ? 0 : 8;
      for (let jx = x + offset; jx < x + w; jx += 16) {
        cctx.beginPath();
        cctx.moveTo(jx, ly);
        cctx.lineTo(jx, ly + 10);
        cctx.stroke();
      }
    }
  } else if (opts.shape === 'lighthouse') {
    // Lighthouse - tapered cylinder with lamp room
    const baseW = w;
    const topW = w * 0.5;
    const lampH = 18;
    const bodyH = h - lampH;
    // Tapered body
    cctx.beginPath();
    cctx.moveTo(x, GROUND_Y);
    cctx.lineTo(x + (baseW - topW)/2, y + lampH);
    cctx.lineTo(x + (baseW + topW)/2, y + lampH);
    cctx.lineTo(x + baseW, GROUND_Y);
    cctx.closePath();
    cctx.fill();
    // Stripes (red/white)
    const stripeCount = 5;
    const stripeH = bodyH / stripeCount;
    for (let si = 0; si < stripeCount; si++) {
      if (si % 2 === 0) {
        const sTop = y + lampH + si * stripeH;
        const sBot = sTop + stripeH;
        const tRatio1 = (sTop - (y + lampH)) / bodyH;
        const tRatio2 = (sBot - (y + lampH)) / bodyH;
        const lx1 = x + (baseW - topW)/2 * (1 - tRatio1) + 0 * tRatio1;
        const rx1 = x + (baseW + topW)/2 * (1 - tRatio1) + baseW * tRatio1;
        const lx2 = x + (baseW - topW)/2 * (1 - tRatio2) + 0 * tRatio2;
        const rx2 = x + (baseW + topW)/2 * (1 - tRatio2) + baseW * tRatio2;
        cctx.fillStyle = 'rgba(180, 50, 50, 0.4)';
        cctx.beginPath();
        cctx.moveTo(lx1, sTop);
        cctx.lineTo(rx1, sTop);
        cctx.lineTo(rx2, sBot);
        cctx.lineTo(lx2, sBot);
        cctx.closePath();
        cctx.fill();
      }
    }
    // Lamp room (gallery)
    const lampW = topW * 1.4;
    const lampX = x + baseW/2 - lampW/2;
    cctx.fillStyle = '#444';
    cctx.fillRect(lampX, y + 4, lampW, lampH - 4);
    // Lamp glass
    cctx.fillStyle = 'rgba(255, 255, 150, 0.8)';
    cctx.fillRect(lampX + 2, y + 6, lampW - 4, lampH - 10);
    // Light glow
    cctx.fillStyle = 'rgba(255, 255, 100, 0.15)';
    cctx.beginPath();
    cctx.arc(x + baseW/2, y + lampH/2, 30, 0, Math.PI * 2);
    cctx.fill();
    // Cap
    cctx.fillStyle = '#333';
    cctx.beginPath();
    cctx.moveTo(lampX - 2, y + 4);
    cctx.lineTo(x + baseW/2, y - 4);
    cctx.lineTo(lampX + lampW + 2, y + 4);
    cctx.closePath();
    cctx.fill();
    return; // Skip windows for lighthouse
  } else if (opts.shape === 'crane') {
    // Container gantry crane — STS (ship-to-shore) port crane
    const mastW = w * 0.22;
    const mastX = x + w/2 - mastW/2;
    // Container yard below crane
    const containerColors = ['rgb(180,50,45)', 'rgb(45,75,155)', 'rgb(45,130,55)', 'rgb(175,135,35)', 'rgb(50,50,55)'];
    const yardY = GROUND_Y - 18;
    for (let row = 0; row < 2; row++) {
      for (let col = 0; col < 4; col++) {
        const cColor = containerColors[(row * 4 + col) % containerColors.length];
        cctx.fillStyle = cColor;
        cctx.fillRect(x - w*0.4 + col * w*0.45, yardY + row * 9, w*0.4, 8);
        // Container door lines
        cctx.strokeStyle = 'rgba(0,0,0,0.15)';
        cctx.lineWidth = 0.5;
        const cx = x - w*0.4 + col * w*0.45 + w*0.2;
        cctx.beginPath();
        cctx.moveTo(cx, yardY + row * 9);
        cctx.lineTo(cx, yardY + row * 9 + 8);
        cctx.stroke();
      }
    }
    // Vertical mast with lattice cross-bracing
    cctx.fillStyle = `rgb(${base[0]},${base[1]},${base[2]})`;
    cctx.fillRect(mastX, y, mastW, h);
    // Lattice cross-braces on mast
    cctx.strokeStyle = `rgba(${base[0]+20},${base[1]+20},${base[2]+20}, 0.4)`;
    cctx.lineWidth = 0.7;
    for (let ly = y; ly < y + h - 20; ly += 20) {
      cctx.beginPath();
      cctx.moveTo(mastX, ly);
      cctx.lineTo(mastX + mastW, ly + 20);
      cctx.stroke();
      cctx.beginPath();
      cctx.moveTo(mastX + mastW, ly);
      cctx.lineTo(mastX, ly + 20);
      cctx.stroke();
    }
    // Horizontal jib (extends right, longer)
    const jibH = 4;
    cctx.fillStyle = `rgb(${base[0]},${base[1]},${base[2]})`;
    cctx.fillRect(x - w*0.4, y, w * 2.0, jibH);
    // Counter-jib (extends left)
    cctx.fillRect(x - w*1.0, y + 2, w * 0.6, jibH - 1);
    // Counterweight
    cctx.fillStyle = `rgb(${base[0]-20},${base[1]-20},${base[2]-20})`;
    cctx.fillRect(x - w*1.0, y + jibH, w*0.25, 14);
    // A-frame support struts
    cctx.strokeStyle = `rgb(${base[0]+10},${base[1]+10},${base[2]+10})`;
    cctx.lineWidth = 1.8;
    cctx.beginPath();
    cctx.moveTo(mastX, y + h * 0.3);
    cctx.lineTo(x - w*0.4, y);
    cctx.stroke();
    cctx.beginPath();
    cctx.moveTo(mastX + mastW, y + h * 0.3);
    cctx.lineTo(x + w * 1.6, y);
    cctx.stroke();
    // Backstay cables
    cctx.strokeStyle = 'rgba(140,140,140,0.3)';
    cctx.lineWidth = 0.6;
    cctx.beginPath();
    cctx.moveTo(mastX + mastW/2, y);
    cctx.lineTo(x - w*0.8, y + 3);
    cctx.stroke();
    // Trolley cable + spreader
    cctx.strokeStyle = 'rgba(150,150,150,0.5)';
    cctx.lineWidth = 0.8;
    const trolleyX = x + w * 0.9;
    cctx.beginPath();
    cctx.moveTo(trolleyX, y + jibH);
    cctx.lineTo(trolleyX, y + jibH + h*0.35);
    cctx.stroke();
    // Spreader bar (horizontal)
    cctx.fillStyle = 'rgba(200, 160, 40, 0.7)';
    cctx.fillRect(trolleyX - 6, y + jibH + h*0.35, 12, 2);
    // Warning light on top
    cctx.fillStyle = 'rgba(255, 50, 50, 0.7)';
    cctx.beginPath();
    cctx.arc(mastX + mastW/2, y - 3, 2.5, 0, Math.PI*2);
    cctx.fill();
    cctx.fillStyle = 'rgba(255, 50, 50, 0.1)';
    cctx.beginPath();
    cctx.arc(mastX + mastW/2, y - 3, 8, 0, Math.PI*2);
    cctx.fill();
    return; // Skip windows for crane
  } else if (opts.shape === 'sail') {
    // Sail Tower Haifa — 29-floor asymmetric curtain-wall skyscraper
    // Blue-tinted glass body with gradient
    const sailGrad = cctx.createLinearGradient(x, y, x + w, y);
    sailGrad.addColorStop(0, `rgba(${base[0]+15},${base[1]+20},${base[2]+35}, 0.9)`);
    sailGrad.addColorStop(0.6, `rgba(${base[0]},${base[1]},${base[2]}, 1)`);
    sailGrad.addColorStop(1, `rgba(${base[0]-10},${base[1]-5},${base[2]+10}, 1)`);
    cctx.fillStyle = sailGrad;
    // Main sail shape — right edge straight, left curves out dramatically
    cctx.beginPath();
    cctx.moveTo(x + w, GROUND_Y); // bottom right
    cctx.lineTo(x + w, y); // top right (tall straight mast edge)
    // Sail curve from top sweeping left
    cctx.bezierCurveTo(x + w*0.5, y + h*0.05, x + w*0.2, y + h*0.2, x, y + h*0.45);
    cctx.lineTo(x + w*0.12, GROUND_Y); // bottom left (narrow base)
    cctx.closePath();
    cctx.fill();
    // Structural mast — thick right edge
    cctx.fillStyle = `rgba(${base[0]-15},${base[1]-10},${base[2]-5}, 0.8)`;
    cctx.fillRect(x + w - 3, y, 3, h);
    // Floor lines (horizontal) — glass facade depth
    cctx.strokeStyle = 'rgba(80, 120, 170, 0.15)';
    cctx.lineWidth = 0.6;
    for (let fy = y + 8; fy < GROUND_Y; fy += 8) {
      // Calculate sail width at this height
      const hRatio = (fy - y) / h;
      let leftEdge;
      if (hRatio < 0.45) {
        leftEdge = x + w - (w * 0.88) * (hRatio / 0.45);
      } else {
        leftEdge = x + w*0.12;
      }
      cctx.beginPath();
      cctx.moveTo(Math.max(leftEdge, x + w*0.12), fy);
      cctx.lineTo(x + w - 3, fy);
      cctx.stroke();
    }
    // Vertical glass panel dividers
    cctx.strokeStyle = 'rgba(100, 150, 200, 0.12)';
    cctx.lineWidth = 0.5;
    for (let px = x + w*0.2; px < x + w - 3; px += 7) {
      const topRatio = Math.max(0, 1 - (px - x)/w);
      const topY2 = y + topRatio * h * 0.45;
      cctx.beginPath();
      cctx.moveTo(px, Math.max(topY2, y));
      cctx.lineTo(px, GROUND_Y);
      cctx.stroke();
    }
    // Light reflection strip on curved face
    cctx.fillStyle = 'rgba(160, 200, 240, 0.08)';
    cctx.beginPath();
    cctx.moveTo(x + w*0.5, y + h*0.1);
    cctx.quadraticCurveTo(x + w*0.35, y + h*0.25, x + w*0.25, y + h*0.45);
    cctx.lineTo(x + w*0.35, y + h*0.45);
    cctx.quadraticCurveTo(x + w*0.45, y + h*0.25, x + w*0.6, y + h*0.1);
    cctx.closePath();
    cctx.fill();
    // Observation deck accent near top
    cctx.fillStyle = 'rgba(200, 210, 220, 0.3)';
    cctx.fillRect(x + w*0.4, y + 4, w*0.55, 2);
    // Antenna/spire at peak
    cctx.strokeStyle = 'rgba(180, 180, 190, 0.7)';
    cctx.lineWidth = 1.2;
    cctx.beginPath();
    cctx.moveTo(x + w - 1, y);
    cctx.lineTo(x + w - 1, y - 18);
    cctx.stroke();
    // Antenna tip light
    cctx.fillStyle = 'rgba(255, 60, 60, 0.6)';
    cctx.beginPath();
    cctx.arc(x + w - 1, y - 18, 1.5, 0, Math.PI*2);
    cctx.fill();
  } else if (opts.shape === 'stepped') {
    // Bahai Gardens — 9 terraces cascading down Mount Carmel
    const steps = 9;
    const stepH = h / steps;
    const maxW = w;
    const minW = w * 0.22;
    const centerX = x + maxW / 2;
    for (let si = 0; si < steps; si++) {
      const ratio = si / (steps - 1);
      const sw = maxW - (maxW - minW) * ratio;
      const sx = x + (maxW - sw) / 2;
      const sy = GROUND_Y - (si + 1) * stepH;
      // Lush green terrace with gradient
      const green = Math.floor(75 + ratio * 50);
      const tGrad = cctx.createLinearGradient(sx, sy, sx, sy + stepH);
      tGrad.addColorStop(0, `rgb(${28 + si*2}, ${green + 10}, ${28 + si*2})`);
      tGrad.addColorStop(1, `rgb(${22 + si*2}, ${green - 8}, ${22 + si*2})`);
      cctx.fillStyle = tGrad;
      cctx.fillRect(sx, sy, sw, stepH + 1);
      // Stone balustrade edge (light gray)
      cctx.fillStyle = `rgba(190, 185, 170, ${0.4 + ratio * 0.2})`;
      cctx.fillRect(sx, sy, sw, 1.5);
      // Central stairway strip (lighter green/stone)
      const stairW = sw * 0.08;
      cctx.fillStyle = `rgba(170, 165, 150, ${0.25 + ratio * 0.1})`;
      cctx.fillRect(centerX - stairW/2, sy, stairW, stepH + 1);
      // Cypress trees flanking the stairway (every other terrace)
      if (si % 2 === 0 && si < steps - 1) {
        const cypH = stepH * 1.6;
        const cypW = 3;
        [-1, 1].forEach(side => {
          const cx = centerX + side * (stairW/2 + 4);
          cctx.fillStyle = `rgba(15, ${35 + si*3}, 15, 0.85)`;
          cctx.beginPath();
          cctx.moveTo(cx, sy - cypH + stepH);
          cctx.lineTo(cx - cypW, sy + stepH);
          cctx.lineTo(cx + cypW, sy + stepH);
          cctx.closePath();
          cctx.fill();
        });
      }
    }
    // Shrine of the Bab — golden dome with columned base
    const topStepW = minW;
    const topX = x + (maxW - topStepW)/2;
    const shrineY = GROUND_Y - h;
    const domeR = topStepW * 0.5;
    // Columned base structure
    const baseW = topStepW * 0.8;
    const baseH = domeR * 0.7;
    const baseX = centerX - baseW/2;
    cctx.fillStyle = 'rgba(210, 200, 180, 0.85)';
    cctx.fillRect(baseX, shrineY - baseH, baseW, baseH);
    // Columns
    cctx.strokeStyle = 'rgba(180, 170, 150, 0.6)';
    cctx.lineWidth = 1;
    for (let ci = 0; ci < 4; ci++) {
      const colX = baseX + baseW * (ci + 0.5) / 4;
      cctx.beginPath();
      cctx.moveTo(colX, shrineY - baseH);
      cctx.lineTo(colX, shrineY);
      cctx.stroke();
    }
    // Golden dome with gradient
    const domeGrad = cctx.createRadialGradient(centerX - domeR*0.2, shrineY - baseH - domeR*0.4, domeR*0.1, centerX, shrineY - baseH, domeR);
    domeGrad.addColorStop(0, 'rgba(240, 210, 80, 0.95)');
    domeGrad.addColorStop(0.5, 'rgba(210, 175, 50, 0.9)');
    domeGrad.addColorStop(1, 'rgba(170, 140, 30, 0.85)');
    cctx.fillStyle = domeGrad;
    cctx.beginPath();
    cctx.arc(centerX, shrineY - baseH, domeR, Math.PI, 0);
    cctx.closePath();
    cctx.fill();
    // Dome highlight
    cctx.fillStyle = 'rgba(255, 235, 130, 0.3)';
    cctx.beginPath();
    cctx.arc(centerX - domeR*0.2, shrineY - baseH - domeR*0.15, domeR*0.5, Math.PI, 0);
    cctx.closePath();
    cctx.fill();
    // Warm glow around shrine
    const glowGrad = cctx.createRadialGradient(centerX, shrineY - baseH - domeR*0.3, 0, centerX, shrineY - baseH, domeR * 2);
    glowGrad.addColorStop(0, 'rgba(240, 210, 80, 0.12)');
    glowGrad.addColorStop(1, 'rgba(240, 210, 80, 0)');
    cctx.fillStyle = glowGrad;
    cctx.beginPath();
    cctx.arc(centerX, shrineY - baseH, domeR * 2, 0, Math.PI*2);
    cctx.fill();
    return; // Skip windows for stepped
  } else {
    cctx.fillRect(x, y, w, h);
    // Flat roof or antenna
    if (opts.antenna) {
      cctx.strokeStyle = '#555';
      cctx.lineWidth = 1.5;
      cctx.beginPath();
      cctx.moveTo(x + w/2, y);
      cctx.lineTo(x + w/2, y - 15);
      cctx.stroke();
      cctx.fillStyle = '#f44';
      cctx.beginPath();
      cctx.arc(x + w/2, y - 15, 2, 0, Math.PI * 2);
      cctx.fill();
    }
  }

  // Glass facade - horizontal floor lines with gradient
  for (let ly = y + 10; ly < GROUND_Y; ly += 7) {
    const floorGrad = cctx.createLinearGradient(x, ly, x + w, ly);
    floorGrad.addColorStop(0, `rgba(100, 150, 190, 0.03)`);
    floorGrad.addColorStop(0.5, `rgba(100, 150, 190, 0.12)`);
    floorGrad.addColorStop(1, `rgba(100, 150, 190, 0.03)`);
    cctx.strokeStyle = floorGrad;
    cctx.lineWidth = 0.5;
    cctx.beginPath();
    cctx.moveTo(x + 1, ly);
    cctx.lineTo(x + w - 1, ly);
    cctx.stroke();
  }

  // Windows - bigger, with warm/cool light and glow halos
  const winW = Math.max(5, Math.min(7, w / 6));
  const winH = 5;
  const winGapX = winW + 4;
  const winGapY = winH + 9;
  const startX = x + 4;
  const startY = y + 10;

  for (let wy = startY; wy < GROUND_Y - 10; wy += winGapY) {
    for (let wx = startX; wx < x + w - winW - 3; wx += winGapX) {
      const lit = Math.random() > 0.3;
      if (lit) {
        const warm = Math.random() > 0.3;
        let r, g, b, brightness;
        if (warm) {
          brightness = 0.5 + Math.random() * 0.45;
          r = 255; g = 200 + Math.random()*55; b = 120 + Math.random()*80;
        } else {
          brightness = 0.4 + Math.random()*0.45;
          r = 150 + Math.random()*60; g = 200 + Math.random()*55; b = 255;
        }
        // Window glow halo (soft light spill)
        cctx.fillStyle = `rgba(${r}, ${g}, ${b}, ${brightness * 0.08})`;
        cctx.beginPath();
        cctx.arc(wx + winW/2, wy + winH/2, winW * 1.3, 0, Math.PI*2);
        cctx.fill();
        // Window body
        cctx.fillStyle = `rgba(${r}, ${g}, ${b}, ${brightness})`;
        cctx.fillRect(wx, wy, winW, winH);
        // Bright inner highlight
        cctx.fillStyle = `rgba(255, 255, 240, ${brightness * 0.25})`;
        cctx.fillRect(wx + 1, wy + 1, winW - 2, winH - 2);
      } else {
        cctx.fillStyle = `rgba(15, 20, 35, 0.7)`;
        cctx.fillRect(wx, wy, winW, winH);
        // Subtle glass reflection on dark windows
        cctx.fillStyle = `rgba(80, 100, 140, 0.06)`;
        cctx.fillRect(wx, wy, winW, 1);
      }
    }
  }

  // Vertical structural lines
  cctx.strokeStyle = `rgba(30, 35, 50, 0.35)`;
  cctx.lineWidth = 1;
  for (let lx = x + Math.floor(w / 3); lx < x + w; lx += Math.floor(w / 3)) {
    cctx.beginPath();
    cctx.moveTo(lx, y);
    cctx.lineTo(lx, GROUND_Y);
    cctx.stroke();
  }

  // Rooftop details (water tanks, AC units)
  if (!opts.shape || opts.shape === 'default') {
    // Water tank
    if (w > 18 && Math.random() > 0.4) {
      const tww = 6 + Math.random()*4, twh = 8 + Math.random()*4;
      const twx = x + w*0.2 + Math.random() * (w*0.4);
      cctx.fillStyle = `rgba(${base[0]-5},${base[1]-5},${base[2]+5}, 0.8)`;
      cctx.fillRect(twx, y - twh, tww, twh);
      // Tank cap
      cctx.fillStyle = `rgba(${base[0]+10},${base[1]+10},${base[2]+15}, 0.6)`;
      cctx.fillRect(twx - 1, y - twh - 2, tww + 2, 2);
    }
    // AC unit
    if (w > 15 && Math.random() > 0.5) {
      const acw = 5 + Math.random()*3, ach = 4;
      const acx = x + w*0.55 + Math.random() * (w*0.3);
      cctx.fillStyle = `rgba(${base[0]+5},${base[1]+8},${base[2]+10}, 0.7)`;
      cctx.fillRect(acx, y - ach, acw, ach);
      // Fan grill lines
      cctx.strokeStyle = `rgba(0,0,0,0.2)`;
      cctx.lineWidth = 0.5;
      for (let gl = acx + 1; gl < acx + acw - 1; gl += 2) {
        cctx.beginPath(); cctx.moveTo(gl, y - ach + 1); cctx.lineTo(gl, y - 1); cctx.stroke();
      }
    }
  }
}

function generateCityCanvas(city) {
  if (!city) city = CITIES[0];
  cctx.clearRect(0, 0, W, H);

  const sx = scaleX; // shorthand
  const bldgs = city.buildings;
  const bgRange = city.bgHeightRange || [30, 60];

  // -- Nahariya: Western Galilee hills + palm trees --
  if (city.id === 'nahariya') {
    // Gentle green hills in background (Western Galilee)
    const hillGradN = cctx.createLinearGradient(0, GROUND_Y - 60, 0, GROUND_Y);
    hillGradN.addColorStop(0, 'rgba(40, 65, 35, 0.7)');
    hillGradN.addColorStop(1, 'rgba(45, 55, 35, 0.5)');
    cctx.fillStyle = hillGradN;
    cctx.beginPath();
    cctx.moveTo(0, GROUND_Y);
    cctx.lineTo(0, GROUND_Y - 30);
    cctx.quadraticCurveTo(W * 0.15, GROUND_Y - 55, W * 0.3, GROUND_Y - 40);
    cctx.quadraticCurveTo(W * 0.5, GROUND_Y - 60, W * 0.7, GROUND_Y - 35);
    cctx.quadraticCurveTo(W * 0.85, GROUND_Y - 50, W, GROUND_Y - 30);
    cctx.lineTo(W, GROUND_Y);
    cctx.closePath();
    cctx.fill();
    // Palm trees scattered across the skyline
    const palmSeeds = [0.05, 0.15, 0.28, 0.42, 0.52, 0.65, 0.72, 0.82, 0.93];
    palmSeeds.forEach(px => {
      const palmX = px * W;
      const trunkH = 35 + Math.abs(Math.sin(px * 37)) * 25;
      const palmBase = GROUND_Y - 8;
      const palmTop = palmBase - trunkH;
      // Trunk — thin brown curved line
      cctx.strokeStyle = `rgba(${90 + Math.floor(Math.sin(px*19)*15)}, ${65 + Math.floor(Math.sin(px*23)*10)}, ${40}, 0.7)`;
      cctx.lineWidth = 2.5;
      cctx.beginPath();
      cctx.moveTo(palmX, palmBase);
      const lean = Math.sin(px * 47) * 8;
      cctx.quadraticCurveTo(palmX + lean * 0.5, palmBase - trunkH * 0.5, palmX + lean, palmTop);
      cctx.stroke();
      // Fronds — fan of curved lines from top
      const frondTop = palmTop;
      const frondX = palmX + lean;
      cctx.strokeStyle = `rgba(${30 + Math.floor(Math.sin(px*13)*10)}, ${70 + Math.floor(Math.sin(px*17)*15)}, ${25}, 0.75)`;
      cctx.lineWidth = 1.5;
      const frondAngles = [-2.2, -1.6, -1.0, -0.4, 0.3, 0.9, 1.5, 2.1];
      frondAngles.forEach(angle => {
        const frondLen = 12 + Math.abs(Math.sin(angle * 3)) * 8;
        cctx.beginPath();
        cctx.moveTo(frondX, frondTop);
        const endX = frondX + Math.cos(angle) * frondLen;
        const endY = frondTop + Math.sin(angle) * frondLen * 0.6 - 2;
        const cpX = frondX + Math.cos(angle) * frondLen * 0.6;
        const cpY = frondTop + Math.sin(angle) * frondLen * 0.3 - 5;
        cctx.quadraticCurveTo(cpX, cpY, endX, endY);
        cctx.stroke();
      });
    });
  }

  // -- Beer Sheva: Negev desert landscape --
  if (city.id === 'beersheva') {
    // Flat desert horizon — sandy dunes
    const desertGrad = cctx.createLinearGradient(0, GROUND_Y - 60, 0, GROUND_Y);
    desertGrad.addColorStop(0, 'rgba(200, 175, 120, 0.7)');
    desertGrad.addColorStop(0.5, 'rgba(190, 165, 110, 0.8)');
    desertGrad.addColorStop(1, 'rgba(175, 150, 100, 0.6)');
    cctx.fillStyle = desertGrad;
    cctx.beginPath();
    cctx.moveTo(0, GROUND_Y);
    cctx.lineTo(0, GROUND_Y - 25);
    // Gentle rolling dunes
    cctx.quadraticCurveTo(W * 0.15, GROUND_Y - 45, W * 0.3, GROUND_Y - 30);
    cctx.quadraticCurveTo(W * 0.5, GROUND_Y - 55, W * 0.7, GROUND_Y - 35);
    cctx.quadraticCurveTo(W * 0.85, GROUND_Y - 50, W, GROUND_Y - 28);
    cctx.lineTo(W, GROUND_Y);
    cctx.closePath();
    cctx.fill();

    // Scattered desert scrub
    for (let i = 0; i < 20; i++) {
      const sx2 = Math.random() * W;
      const sy = GROUND_Y - 20 - Math.random() * 30;
      cctx.fillStyle = `rgba(${100 + Math.random()*30}, ${110 + Math.random()*25}, ${60 + Math.random()*20}, ${0.3 + Math.random()*0.3})`;
      cctx.beginPath();
      cctx.ellipse(sx2, sy, 3 + Math.random()*4, 2 + Math.random()*2, 0, 0, Math.PI * 2);
      cctx.fill();
    }
  }

  // -- Jerusalem: Judean hills backdrop --
  if (city.id === 'jerusalem') {
    // Rolling Judean hills — golden/olive tones
    const hillGrad = cctx.createLinearGradient(0, GROUND_Y - 120, 0, GROUND_Y);
    hillGrad.addColorStop(0, 'rgba(140, 130, 90, 0.8)');
    hillGrad.addColorStop(0.5, 'rgba(130, 120, 80, 0.75)');
    hillGrad.addColorStop(1, 'rgba(120, 110, 75, 0.6)');
    cctx.fillStyle = hillGrad;
    cctx.beginPath();
    cctx.moveTo(0, GROUND_Y);
    cctx.lineTo(0, GROUND_Y - 50);
    // Undulating hills
    cctx.quadraticCurveTo(W * 0.12, GROUND_Y - 90, W * 0.25, GROUND_Y - 60);
    cctx.quadraticCurveTo(W * 0.4, GROUND_Y - 100, W * 0.55, GROUND_Y - 70);
    cctx.quadraticCurveTo(W * 0.7, GROUND_Y - 110, W * 0.85, GROUND_Y - 75);
    cctx.quadraticCurveTo(W * 0.95, GROUND_Y - 95, W, GROUND_Y - 55);
    cctx.lineTo(W, GROUND_Y);
    cctx.closePath();
    cctx.fill();

    // Cypress and olive trees on hills
    const jTreeSeeds = [0.08, 0.18, 0.32, 0.45, 0.58, 0.68, 0.78, 0.88, 0.95];
    jTreeSeeds.forEach(tx => {
      const treeX = tx * W;
      const t1 = Math.sin(tx * Math.PI * 3) * 20;
      const treeBase = GROUND_Y - 55 - Math.abs(t1) - Math.sin(tx * 7) * 15;
      // Cypress — dark narrow triangles
      if (Math.sin(tx * 41) > 0) {
        const treeH = 16 + Math.abs(Math.sin(tx * 23)) * 10;
        cctx.fillStyle = `rgba(${35 + Math.floor(Math.sin(tx*19)*10)}, ${55 + Math.floor(Math.sin(tx*13)*10)}, ${30}, 0.7)`;
        cctx.beginPath();
        cctx.moveTo(treeX, treeBase - treeH);
        cctx.lineTo(treeX - 3, treeBase);
        cctx.lineTo(treeX + 3, treeBase);
        cctx.closePath();
        cctx.fill();
      } else {
        // Olive tree — round canopy
        cctx.fillStyle = `rgba(${70 + Math.floor(Math.sin(tx*17)*15)}, ${85 + Math.floor(Math.sin(tx*11)*10)}, ${50}, 0.6)`;
        cctx.beginPath();
        cctx.arc(treeX, treeBase - 5, 5 + Math.random()*3, 0, Math.PI * 2);
        cctx.fill();
      }
    });
  }

  // -- Haifa: Mount Carmel hillside backdrop --
  if (city.id === 'haifa') {
    // Green hillside rising from left (port) to right (Carmel ridge)
    const hillGrad = cctx.createLinearGradient(0, GROUND_Y - 180, 0, GROUND_Y);
    hillGrad.addColorStop(0, 'rgba(25, 55, 30, 0.95)');
    hillGrad.addColorStop(0.4, 'rgba(30, 60, 35, 0.9)');
    hillGrad.addColorStop(1, 'rgba(35, 50, 30, 0.85)');
    cctx.fillStyle = hillGrad;
    cctx.beginPath();
    cctx.moveTo(0, GROUND_Y);
    cctx.lineTo(0, GROUND_Y - 40);
    // Gentle slope rising to the right (Mount Carmel)
    cctx.quadraticCurveTo(W * 0.3, GROUND_Y - 80, W * 0.55, GROUND_Y - 130);
    cctx.quadraticCurveTo(W * 0.75, GROUND_Y - 170, W, GROUND_Y - 190);
    cctx.lineTo(W, GROUND_Y);
    cctx.closePath();
    cctx.fill();
    // Pine/cypress tree silhouettes on the slopes
    const treeSeeds = [0.58, 0.62, 0.66, 0.71, 0.76, 0.80, 0.85, 0.88, 0.92, 0.95, 0.97];
    treeSeeds.forEach(tx => {
      const treeX = tx * W;
      // Calculate hill height at this x position
      const t1 = Math.max(0, Math.min(1, (treeX / W - 0.0) / 1.0));
      const hillH = 40 + t1 * 150;
      const treeBase = GROUND_Y - hillH + 10 + Math.sin(tx * 47) * 15;
      const treeH = 18 + Math.abs(Math.sin(tx * 31)) * 14;
      const treeW = 6 + Math.abs(Math.sin(tx * 23)) * 5;
      // Cypress-style narrow triangle
      cctx.fillStyle = `rgba(${18 + Math.floor(Math.sin(tx*17)*8)}, ${40 + Math.floor(Math.sin(tx*13)*12)}, ${20 + Math.floor(Math.sin(tx*19)*6)}, 0.9)`;
      cctx.beginPath();
      cctx.moveTo(treeX, treeBase);
      cctx.lineTo(treeX - treeW/2, treeBase + treeH);
      cctx.lineTo(treeX + treeW/2, treeBase + treeH);
      cctx.closePath();
      cctx.fill();
    });
  }

  // -- Tel Aviv: Mediterranean beachfront promenade --
  if (city.id === 'telaviv') {
    // Warm sandy beach strip behind buildings
    const beachY = GROUND_Y - 12;
    const bGrad = cctx.createLinearGradient(0, beachY, 0, GROUND_Y + 3);
    bGrad.addColorStop(0, 'rgba(220, 195, 150, 0.5)');
    bGrad.addColorStop(1, 'rgba(200, 175, 130, 0.4)');
    cctx.fillStyle = bGrad;
    cctx.fillRect(0, beachY, W, GROUND_Y - beachY + 3);

    // Promenade railing (tayelet) — thin line along beach
    cctx.strokeStyle = 'rgba(160, 150, 130, 0.5)';
    cctx.lineWidth = 1.5;
    cctx.beginPath();
    cctx.moveTo(0, beachY + 2);
    cctx.lineTo(W, beachY + 2);
    cctx.stroke();
    // Railing posts
    for (let px = 20; px < W; px += 35 + Math.random() * 15) {
      cctx.fillStyle = 'rgba(140, 130, 115, 0.5)';
      cctx.fillRect(px, beachY - 2, 2, 6);
    }
  }

  // -- Far background buildings (silhouettes) --
  cctx.fillStyle = 'rgba(25, 30, 50, 0.9)';
  for (let x = 0; x < W; x += 18 + Math.random() * 15) {
    const bh = bgRange[0] + Math.random() * (bgRange[1] - bgRange[0]);
    cctx.fillRect(x, GROUND_Y - bh, 14 + Math.random() * 12, bh);
  }

  // -- Mid layer buildings (scaled to canvas width) --
  bldgs.mid.forEach(b => drawBuilding(b.x * sx, b.w * sx, b.h, b));

  // -- Landmark buildings --
  bldgs.landmarks.forEach(b => drawBuilding(b.x * sx, b.w * sx, b.h, b));

  // -- Nahariya: sandy beach foreground --
  if (city.id === 'nahariya') {
    // Sandy beach strip
    const beachTop = GROUND_Y - 18;
    const beachGrad = cctx.createLinearGradient(0, beachTop, 0, GROUND_Y + 5);
    beachGrad.addColorStop(0, 'rgba(210, 185, 140, 0.6)');
    beachGrad.addColorStop(0.5, 'rgba(225, 200, 155, 0.7)');
    beachGrad.addColorStop(1, 'rgba(195, 170, 125, 0.5)');
    cctx.fillStyle = beachGrad;
    cctx.fillRect(0, beachTop, W, GROUND_Y - beachTop + 5);

    // Beach texture — scattered dots
    for (let i = 0; i < 60; i++) {
      const bx = Math.random() * W;
      const by = beachTop + Math.random() * (GROUND_Y - beachTop);
      cctx.fillStyle = `rgba(${180 + Math.random()*40}, ${160 + Math.random()*30}, ${110 + Math.random()*30}, ${0.2 + Math.random()*0.3})`;
      cctx.fillRect(bx, by, 2 + Math.random()*2, 1 + Math.random()*1.5);
    }

    // Beach umbrellas (small silhouettes)
    const umbrellaXs = [0.12, 0.35, 0.58, 0.78];
    umbrellaXs.forEach(ux => {
      const uxp = ux * W + (Math.random() - 0.5) * 20;
      const uy = GROUND_Y - 10 - Math.random() * 5;
      // Pole
      cctx.strokeStyle = 'rgba(120, 100, 70, 0.5)';
      cctx.lineWidth = 1.5;
      cctx.beginPath();
      cctx.moveTo(uxp, uy + 8);
      cctx.lineTo(uxp, uy - 6);
      cctx.stroke();
      // Canopy
      const colors = ['rgba(200, 60, 60, 0.4)', 'rgba(60, 100, 200, 0.4)', 'rgba(220, 180, 40, 0.4)', 'rgba(60, 180, 100, 0.4)'];
      cctx.fillStyle = colors[Math.floor(Math.random() * colors.length)];
      cctx.beginPath();
      cctx.arc(uxp, uy - 6, 8, Math.PI, 0);
      cctx.fill();
    });
  }

  // -- Foreground low buildings --
  const fg = bldgs.foreground;
  for (let x = 0; x < W; x += 22 + Math.random() * 18) {
    const bw = 18 + Math.random() * 16;
    const bh = 15 + Math.random() * (fg.maxH || 30);
    if (Math.random() > 0.3) {
      const y = GROUND_Y - bh;
      const fc = fg.color || [55, 52, 48];
      cctx.fillStyle = `rgb(${fc[0] + Math.random()*15}, ${fc[1] + Math.random()*15}, ${fc[2] + Math.random()*15})`;
      cctx.fillRect(x, y, bw, bh);
      // Small windows
      for (let wy = y + 4; wy < GROUND_Y - 3; wy += 7) {
        for (let wx = x + 2; wx < x + bw - 3; wx += 5) {
          cctx.fillStyle = Math.random() > 0.4
            ? `rgba(255,${200+Math.random()*55},${100+Math.random()*80},${0.5+Math.random()*0.4})`
            : 'rgba(15,18,30,0.7)';
          cctx.fillRect(wx, wy, 3, 3);
        }
      }
    }
  }

  // -- Haifa: cargo ship silhouette in the sea --
  if (city.id === 'haifa') {
    const shipX = 120 * sx;
    const shipY = GROUND_Y + 12;
    cctx.fillStyle = 'rgba(40, 45, 55, 0.7)';
    // Hull
    cctx.beginPath();
    cctx.moveTo(shipX, shipY);
    cctx.lineTo(shipX + 80 * sx, shipY);
    cctx.lineTo(shipX + 75 * sx, shipY + 10);
    cctx.lineTo(shipX + 5 * sx, shipY + 10);
    cctx.closePath();
    cctx.fill();
    // Superstructure (bridge at rear)
    cctx.fillStyle = 'rgba(50, 55, 65, 0.7)';
    cctx.fillRect(shipX + 58 * sx, shipY - 14, 14 * sx, 14);
    // Containers on deck
    const containerColors = ['rgba(180,50,50,0.5)', 'rgba(50,80,160,0.5)', 'rgba(50,140,60,0.5)', 'rgba(180,140,40,0.5)'];
    for (let ci = 0; ci < 5; ci++) {
      cctx.fillStyle = containerColors[ci % containerColors.length];
      cctx.fillRect(shipX + (8 + ci * 10) * sx, shipY - 6, 8 * sx, 6);
    }
    // Funnel
    cctx.fillStyle = 'rgba(60, 60, 70, 0.7)';
    cctx.fillRect(shipX + 62 * sx, shipY - 20, 4 * sx, 6);
  }
}

// ==================== IRON DOME BATTERY (IDF-accurate detailed) ====================
const batteryCanvas = document.createElement('canvas');
batteryCanvas.width = Math.round(180 * dpr);
batteryCanvas.height = Math.round(100 * dpr);
const bctx = batteryCanvas.getContext('2d');
bctx.scale(dpr, dpr);

function prerenderBattery() {
  bctx.clearRect(0, 0, 180, 100);
  const cx = 90, cy = 65;

  // === Truck chassis (olive drab flat-bed) ===
  // Undercarriage shadow
  bctx.fillStyle = 'rgba(0,0,0,0.25)';
  bctx.fillRect(cx - 62, cy + 16, 124, 6);

  // Frame rails (structural I-beam)
  const railGrad = bctx.createLinearGradient(0, cy + 8, 0, cy + 14);
  railGrad.addColorStop(0, '#3a4a2a');
  railGrad.addColorStop(0.5, '#445535');
  railGrad.addColorStop(1, '#2e3e20');
  bctx.fillStyle = railGrad;
  bctx.fillRect(cx - 65, cy + 10, 130, 5);

  // Flat-bed body with realistic paint gradient
  const platGrad = bctx.createLinearGradient(cx-60, cy, cx+60, cy+16);
  platGrad.addColorStop(0, '#4e5e3e');
  platGrad.addColorStop(0.15, '#566846');
  platGrad.addColorStop(0.5, '#4a5a3a');
  platGrad.addColorStop(0.85, '#3e4e2e');
  platGrad.addColorStop(1, '#354528');
  bctx.fillStyle = platGrad;
  bctx.beginPath();
  bctx.roundRect(cx - 60, cy + 2, 120, 12, 2);
  bctx.fill();

  // Panel lines on truck (riveted panels)
  bctx.strokeStyle = 'rgba(80,95,65,0.5)';
  bctx.lineWidth = 0.5;
  for (let px = cx-55; px < cx+55; px += 12) {
    bctx.beginPath(); bctx.moveTo(px, cy+3); bctx.lineTo(px, cy+13); bctx.stroke();
  }
  // Top rail highlight
  bctx.strokeStyle = 'rgba(120,140,100,0.2)';
  bctx.lineWidth = 0.5;
  bctx.beginPath(); bctx.moveTo(cx-58, cy+3); bctx.lineTo(cx+58, cy+3); bctx.stroke();

  // === Truck cab (right side) ===
  const cabGrad = bctx.createLinearGradient(cx+50, cy-2, cx+68, cy+14);
  cabGrad.addColorStop(0, '#556844');
  cabGrad.addColorStop(0.4, '#4a5c38');
  cabGrad.addColorStop(1, '#3c4e2c');
  bctx.fillStyle = cabGrad;
  bctx.beginPath();
  bctx.roundRect(cx + 50, cy - 2, 18, 16, [2, 2, 0, 0]);
  bctx.fill();
  // Windshield
  bctx.fillStyle = 'rgba(140,180,200,0.35)';
  bctx.fillRect(cx + 63, cy, 4, 8);
  // Cab edge
  bctx.strokeStyle = 'rgba(60,75,45,0.5)';
  bctx.lineWidth = 0.5;
  bctx.strokeRect(cx + 50, cy - 2, 18, 16);

  // === Stabilizer jacks (deployed support legs) ===
  // Left jack
  const jackGrad = bctx.createLinearGradient(0, cy+14, 0, cy+27);
  jackGrad.addColorStop(0, '#3a3a3a');
  jackGrad.addColorStop(0.5, '#333');
  jackGrad.addColorStop(1, '#2a2a2a');
  bctx.fillStyle = jackGrad;
  bctx.fillRect(cx - 63, cy + 14, 5, 13);
  bctx.fillRect(cx + 58, cy + 14, 5, 13);
  // Hydraulic cylinder detail
  bctx.fillStyle = '#444';
  bctx.fillRect(cx - 62, cy + 16, 3, 8);
  bctx.fillRect(cx + 59, cy + 16, 3, 8);
  // Jack pads (wider base)
  bctx.fillStyle = '#3a3a3a';
  bctx.beginPath();
  bctx.roundRect(cx - 66, cy + 25, 11, 3, 1);
  bctx.fill();
  bctx.beginPath();
  bctx.roundRect(cx + 55, cy + 25, 11, 3, 1);
  bctx.fill();

  // === Wheels (dual axle, more detailed) ===
  for (const wx of [cx - 42, cx - 28, cx + 28, cx + 42]) {
    // Tire shadow
    bctx.fillStyle = 'rgba(0,0,0,0.3)';
    bctx.beginPath(); bctx.ellipse(wx, cy + 26, 8, 3, 0, 0, Math.PI * 2); bctx.fill();
    // Tire
    const tireGrad = bctx.createRadialGradient(wx-1, cy+21, 2, wx, cy+22, 9);
    tireGrad.addColorStop(0, '#252525');
    tireGrad.addColorStop(0.7, '#181818');
    tireGrad.addColorStop(1, '#101010');
    bctx.fillStyle = tireGrad;
    bctx.beginPath(); bctx.arc(wx, cy + 22, 8, 0, Math.PI * 2); bctx.fill();
    // Tread pattern (radial lines)
    bctx.strokeStyle = '#1e1e1e';
    bctx.lineWidth = 0.8;
    for (let a = 0; a < Math.PI*2; a += Math.PI/5) {
      bctx.beginPath();
      bctx.moveTo(wx + Math.cos(a)*5.5, cy + 22 + Math.sin(a)*5.5);
      bctx.lineTo(wx + Math.cos(a)*7.5, cy + 22 + Math.sin(a)*7.5);
      bctx.stroke();
    }
    // Rim (metallic)
    const rimGrad = bctx.createRadialGradient(wx-1, cy+21, 0, wx, cy+22, 5);
    rimGrad.addColorStop(0, '#5a5a5a');
    rimGrad.addColorStop(0.5, '#444');
    rimGrad.addColorStop(1, '#333');
    bctx.fillStyle = rimGrad;
    bctx.beginPath(); bctx.arc(wx, cy + 22, 4.5, 0, Math.PI * 2); bctx.fill();
    // Hub cap
    bctx.fillStyle = '#555';
    bctx.beginPath(); bctx.arc(wx, cy + 22, 2.2, 0, Math.PI * 2); bctx.fill();
    // Lug nuts
    for (let a = 0; a < 5; a++) {
      const la = a * Math.PI * 2 / 5;
      bctx.fillStyle = '#6a6a6a';
      bctx.beginPath();
      bctx.arc(wx + Math.cos(la)*3.2, cy + 22 + Math.sin(la)*3.2, 0.7, 0, Math.PI*2);
      bctx.fill();
    }
  }

  // === Radar/EL/M-2084 unit (prominent, separate from launcher) ===
  // Radar pedestal
  bctx.fillStyle = '#4a5a3a';
  bctx.fillRect(cx + 48, cy - 4, 8, 10);
  // Radar housing (flat panel antenna, not dish)
  const radarGrad = bctx.createLinearGradient(cx+44, cy-18, cx+60, cy-6);
  radarGrad.addColorStop(0, '#6a7a5a');
  radarGrad.addColorStop(0.3, '#7a8a6a');
  radarGrad.addColorStop(0.7, '#5a6a4a');
  radarGrad.addColorStop(1, '#4a5a3a');
  bctx.fillStyle = radarGrad;
  bctx.beginPath();
  bctx.roundRect(cx + 44, cy - 18, 16, 14, 1);
  bctx.fill();
  // Radar panel grid pattern (phased array face)
  bctx.strokeStyle = 'rgba(90,110,75,0.4)';
  bctx.lineWidth = 0.4;
  for (let gy = cy - 16; gy < cy - 6; gy += 3) {
    bctx.beginPath(); bctx.moveTo(cx+46, gy); bctx.lineTo(cx+58, gy); bctx.stroke();
  }
  for (let gx = cx + 46; gx < cx + 59; gx += 3) {
    bctx.beginPath(); bctx.moveTo(gx, cy-16); bctx.lineTo(gx, cy-6); bctx.stroke();
  }
  // Radar frame
  bctx.strokeStyle = '#5a6a4a';
  bctx.lineWidth = 1;
  bctx.strokeRect(cx + 44, cy - 18, 16, 14);
  // Antenna mast
  bctx.strokeStyle = '#5a6a4a';
  bctx.lineWidth = 1.5;
  bctx.beginPath(); bctx.moveTo(cx+52, cy-18); bctx.lineTo(cx+52, cy-24); bctx.stroke();
  // Warning light
  bctx.fillStyle = '#ff3333';
  bctx.beginPath(); bctx.arc(cx+52, cy-24, 1.5, 0, Math.PI*2); bctx.fill();
  bctx.fillStyle = 'rgba(255,50,50,0.15)';
  bctx.beginPath(); bctx.arc(cx+52, cy-24, 4, 0, Math.PI*2); bctx.fill();

  // === Launcher base (rotation mechanism — turret ring) ===
  const baseGrad = bctx.createRadialGradient(cx, cy, 0, cx, cy, 20);
  baseGrad.addColorStop(0, '#5e6e4e');
  baseGrad.addColorStop(0.4, '#546444');
  baseGrad.addColorStop(0.7, '#4a5a3a');
  baseGrad.addColorStop(1, '#3a4a2a');
  bctx.fillStyle = baseGrad;
  bctx.beginPath(); bctx.arc(cx, cy, 16, 0, Math.PI*2); bctx.fill();
  // Turret ring groove
  bctx.strokeStyle = '#6a7a5a';
  bctx.lineWidth = 1.5;
  bctx.beginPath(); bctx.arc(cx, cy, 12, 0, Math.PI*2); bctx.stroke();
  bctx.strokeStyle = 'rgba(50,60,40,0.3)';
  bctx.lineWidth = 0.5;
  bctx.beginPath(); bctx.arc(cx, cy, 14, 0, Math.PI*2); bctx.stroke();
  // Bolts
  for (let a = 0; a < Math.PI*2; a += Math.PI/4) {
    bctx.fillStyle = '#7a8a6a';
    bctx.beginPath();
    bctx.arc(cx + Math.cos(a)*13, cy + Math.sin(a)*13, 1.5, 0, Math.PI*2);
    bctx.fill();
    // Bolt shadow
    bctx.fillStyle = 'rgba(0,0,0,0.15)';
    bctx.beginPath();
    bctx.arc(cx + Math.cos(a)*13 + 0.5, cy + Math.sin(a)*13 + 0.5, 1.5, 0, Math.PI*2);
    bctx.fill();
  }

  // === Cable bundle (heavier, from base toward radar) ===
  bctx.strokeStyle = '#2a3a20';
  bctx.lineWidth = 3;
  bctx.beginPath();
  bctx.moveTo(cx + 15, cy + 5);
  bctx.quadraticCurveTo(cx + 30, cy + 12, cx + 48, cy + 2);
  bctx.stroke();
  // Inner cable highlight
  bctx.strokeStyle = 'rgba(70,85,55,0.3)';
  bctx.lineWidth = 1;
  bctx.beginPath();
  bctx.moveTo(cx + 16, cy + 4);
  bctx.quadraticCurveTo(cx + 30, cy + 11, cx + 48, cy + 1);
  bctx.stroke();

  // === IDF marking (Star of David) ===
  bctx.strokeStyle = 'rgba(120,140,110,0.3)';
  bctx.lineWidth = 0.7;
  const sdx = cx - 45, sdy = cy + 8, sds = 4;
  bctx.beginPath();
  bctx.moveTo(sdx, sdy - sds); bctx.lineTo(sdx + sds*0.87, sdy + sds*0.5); bctx.lineTo(sdx - sds*0.87, sdy + sds*0.5); bctx.closePath(); bctx.stroke();
  bctx.beginPath();
  bctx.moveTo(sdx, sdy + sds); bctx.lineTo(sdx + sds*0.87, sdy - sds*0.5); bctx.lineTo(sdx - sds*0.87, sdy - sds*0.5); bctx.closePath(); bctx.stroke();
}
prerenderBattery();

// ==================== LAUNCHER TUBES (drawn dynamically based on angle) ====================
function drawLauncherTubes(angle) {
  ctx.save();
  ctx.translate(batteryX, batteryY);
  ctx.rotate(angle);

  // Main launcher container (rectangular box with 20 tube openings)
  const tubeLen = 65;
  const tubeH = 32;

  // Housing shadow
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.fillRect(4, -tubeH/2 + 2, tubeLen, tubeH);

  // Housing body - olive drab
  const housingGrad = ctx.createLinearGradient(0, -tubeH/2, 0, tubeH/2);
  housingGrad.addColorStop(0, '#5d6d4d');
  housingGrad.addColorStop(0.2, '#556644');
  housingGrad.addColorStop(0.5, '#4d5d3d');
  housingGrad.addColorStop(0.8, '#3d4d2d');
  housingGrad.addColorStop(1, '#2d3d1d');
  ctx.fillStyle = housingGrad;
  ctx.fillRect(0, -tubeH/2, tubeLen, tubeH);

  // Individual missile tubes (4 rows x 5 columns = 20 Tamir missiles)
  const rows = 4, cols = 5;
  const tW = 7, tH = 5;
  const startTX = 4;
  const gapX = (tubeLen - 12) / cols;
  const gapY = tubeH / (rows + 1);

  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const tx = startTX + c * gapX;
      const ty = -tubeH/2 + (r + 1) * gapY - tH/2;
      // Tube opening (dark)
      ctx.fillStyle = '#0d1a08';
      ctx.fillRect(tx, ty, tW, tH);
      // Tube rim highlight
      ctx.strokeStyle = '#6a7a5a';
      ctx.lineWidth = 0.6;
      ctx.strokeRect(tx, ty, tW, tH);
      // Missile tip visible inside (lighter)
      ctx.fillStyle = '#7a8a6a';
      ctx.fillRect(tx + 1.5, ty + 1, 2.5, tH - 2);
    }
  }

  // Housing frame / rivets
  ctx.strokeStyle = '#6a7a5a';
  ctx.lineWidth = 1.5;
  ctx.strokeRect(0, -tubeH/2, tubeLen, tubeH);
  // Rivets along edges
  for (let rv = 0; rv < 6; rv++) {
    const rvx = 5 + rv * (tubeLen-10)/5;
    ctx.fillStyle = '#8a9a7a';
    ctx.beginPath(); ctx.arc(rvx, -tubeH/2 + 2, 1, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(rvx, tubeH/2 - 2, 1, 0, Math.PI*2); ctx.fill();
  }

  // Front cap (muzzle end)
  ctx.fillStyle = '#4a5a3a';
  ctx.fillRect(tubeLen - 3, -tubeH/2 - 2, 6, tubeH + 4);

  // Hydraulic tilting arm (angled support)
  ctx.strokeStyle = '#4a5a3a';
  ctx.lineWidth = 4;
  ctx.beginPath();
  ctx.moveTo(-8, 10);
  ctx.lineTo(tubeLen * 0.35, -1);
  ctx.stroke();
  ctx.strokeStyle = '#6a7a5a';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(-8, 10);
  ctx.lineTo(tubeLen * 0.35, -1);
  ctx.stroke();
  // Hydraulic cylinder detail
  ctx.strokeStyle = '#888';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(-3, 8);
  ctx.lineTo(tubeLen * 0.2, 2);
  ctx.stroke();

  ctx.restore();
}

// ==================== EVENTS ====================
let isMobile = isMobileDevice;

function updateAim(clientX, clientY) {
  const rect = canvas.getBoundingClientRect();
  mouseX = (clientX - rect.left) * (W / rect.width);
  mouseY = (clientY - rect.top) * (H / rect.height);
  batteryAngle = Math.atan2(mouseY - batteryY, mouseX - batteryX);
  if (batteryAngle > -0.15) batteryAngle = -0.15;
  if (batteryAngle < -Math.PI + 0.15) batteryAngle = -Math.PI + 0.15;
}

function isInBtn(x, y, r) {
  return x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h;
}

function handleClick() {
  if (audioCtx.state === 'suspended') audioCtx.resume();
  // Check language buttons on any screen (but not when legal overlay covers them)
  if (!showLegalOverlay) {
    for (const lb of langBtnRects) {
      if (isInBtn(mouseX, mouseY, lb)) { setLang(lb.lang); return; }
    }
  }
  if (state === 'menu') {
    if (showLeaderboard) { showLeaderboard = false; return; }
    // Legal overlay interactions
    if (showLegalOverlay) {
      if (isInBtn(mouseX, mouseY, legalCloseBtnRect)) { showLegalOverlay = false; return; }
      for (const tb of legalTabBtnRects) {
        if (isInBtn(mouseX, mouseY, tb)) { legalTab = tb.tab; legalScrollY = 0; return; }
      }
      return;
    }
    if (isInBtn(mouseX, mouseY, startBtnRect)) { startGame(); return; }
    if (isInBtn(mouseX, mouseY, lbBtnRect)) { showLeaderboard = true; fetchLeaderboard(); return; }
    if (isInBtn(mouseX, mouseY, contactBtnRect)) {
      window.open('mailto:adrian@tulu.co.il?subject=Iron Dome Game', '_blank'); return;
    }
    // Share buttons
    for (const sb of shareBtnRects) {
      if (isInBtn(mouseX, mouseY, sb)) {
        openShare(sb.type, t('shareText'), GAME_URL);
        return;
      }
    }
    // Legal links
    for (const lb of legalBtnRects) {
      if (isInBtn(mouseX, mouseY, lb)) { legalTab = lb.tab; showLegalOverlay = true; legalScrollY = 0; return; }
    }
    return;
  }
  if (state === 'nameinput') {
    if (isInBtn(mouseX, mouseY, submitBtnRect) && nameInput.length > 0) {
      submitScore(nameInput, score, wave);
      state = 'gameover'; nameInputActive = false; showLeaderboard = true;
      return;
    }
    // Mobile keyboard character detection — must match draw layout exactly (raw px, not fz())
    if (isMobile) {
      const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
      const kbPad = 8;
      const cols = 10;
      const charBtnSize = Math.floor((W - kbPad * 2) / cols);
      const mobS = 0.7;
      const cy = H * 0.08;
      const boxH = fz(40), boxY = cy + fz(95) * mobS;
      const kbY = boxY + boxH + 18;
      const kbX = Math.floor((W - cols * charBtnSize) / 2);
      for (let i = 0; i < chars.length; i++) {
        const col = i % cols, row = Math.floor(i / cols);
        const cx = kbX + col * charBtnSize, cy2 = kbY + row * charBtnSize;
        if (isInBtn(mouseX, mouseY, {x:cx, y:cy2, w:charBtnSize, h:charBtnSize})) {
          if (nameInput.length < 6) nameInput += chars[i];
          return;
        }
      }
      // Backspace button
      const numRows = Math.ceil(chars.length / cols);
      const actionY = kbY + numRows * charBtnSize + 8;
      const actionBtnW = Math.floor((W - kbPad * 2 - 12) / 2);
      const actionBtnH = Math.floor(charBtnSize * 1.1);
      const bsX = kbX;
      if (isInBtn(mouseX, mouseY, {x: bsX, y: actionY, w: actionBtnW, h: actionBtnH})) {
        nameInput = nameInput.slice(0, -1);
        return;
      }
    }
    return;
  }
  if (state === 'victory') {
    if (isInBtn(mouseX, mouseY, playAgainBtnRect)) { showLeaderboard = false; startGame(); return; }
    if (isInBtn(mouseX, mouseY, lbBtnRect)) { showLeaderboard = !showLeaderboard; if (showLeaderboard) fetchLeaderboard(); return; }
    for (const sb of endShareBtnRects) {
      if (isInBtn(mouseX, mouseY, sb)) { openShare(sb.type, getShareText(true), GAME_URL); return; }
    }
    return;
  }
  if (state === 'gameover') {
    if (isInBtn(mouseX, mouseY, playAgainBtnRect)) { showLeaderboard = false; startGame(); return; }
    if (isInBtn(mouseX, mouseY, lbBtnRect)) { showLeaderboard = !showLeaderboard; if (showLeaderboard) fetchLeaderboard(); return; }
    for (const sb of endShareBtnRects) {
      if (isInBtn(mouseX, mouseY, sb)) { openShare(sb.type, getShareText(false), GAME_URL); return; }
    }
    return;
  }
  if (state === 'playing') {
    // Check pause button
    if (isInBtn(mouseX, mouseY, pauseBtnRect)) { paused = !paused; return; }
    // If paused, only allow resume click (center button)
    if (paused) {
      const rbW = fz(180), rbH = fz(46);
      const rbX = W/2 - rbW/2, rbY = H/2 - rbH/2 + fz(20);
      if (isInBtn(mouseX, mouseY, {x: rbX, y: rbY, w: rbW, h: rbH})) { paused = false; }
      return;
    }
    if (waveState === 'playing') fireInterceptor();
  }
}

// Keyboard for name input / pause
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && state === 'playing') { paused = !paused; e.preventDefault(); return; }
  // Defense system activation (1 = Iron Beam, 2 = David's Sling)
  if (state === 'playing' && !paused && waveState === 'playing') {
    if (e.key === '1') { activateDefenseSystem('iron_beam'); e.preventDefault(); return; }
    if (e.key === '2') { activateDefenseSystem('davids_sling'); e.preventDefault(); return; }
  }
  if (state === 'nameinput') {
    if (e.key === 'Backspace') { nameInput = nameInput.slice(0, -1); e.preventDefault(); }
    else if (e.key === 'Enter' && nameInput.length > 0) {
      submitScore(nameInput, score, wave);
      state = 'gameover'; nameInputActive = false; showLeaderboard = true;
    }
    else if (e.key.length === 1 && nameInput.length < 6) {
      nameInput += e.key.toUpperCase(); e.preventDefault();
    }
  }
});

// ==================== WAVE CONFIG ====================
// Enemy type weights per wave range
function getEnemyWeights(w) {
  if (w <= 3) return { rocket: 1.0, drone: 0, ballistic: 0, decoy: 0 };
  if (w <= 6) return { rocket: 0.70, drone: 0.20, ballistic: 0.10, decoy: 0 };
  if (w <= 9) return { rocket: 0.50, drone: 0.20, ballistic: 0.20, decoy: 0.10 };
  if (w <= 12) return { rocket: 0.35, drone: 0.25, ballistic: 0.20, decoy: 0.20 };
  return { rocket: 0.30, drone: 0.25, ballistic: 0.25, decoy: 0.20 };
}

function getWaveConfig(w) {
  return {
    missiles: 6 + w * 2,
    missileSpeed: 0.9 + w * 0.06,
    missileInterval: Math.max(40, 110 - w * 4),
    enemyWeights: getEnemyWeights(w),
  };
}

function startGame() {
  state = 'playing'; score = 0; wave = 0;
  combo = 0; comboTimer = 0; maxCombo = 0; paused = false;
  missiles = []; interceptors = []; explosions = [];
  particles = []; floatingTexts = []; smokeTrails = [];
  powerUps = [];
  launcherReloading = false; launcherReloadTimer = 0; launcherReloadDuration = 0;
  tokenBank = 0; consecutiveHits = 0;
  activeDefenseSystem = null; defenseSystemTimer = 0; defenseSystemKills = 0; defenseSystemTarget = null;
  ammo = LAUNCHER_POD_SIZE; maxAmmo = LAUNCHER_POD_SIZE;
  cityDamage = 0; killFeed = [];
  killCounts = { rocket: 0, drone: 0, ballistic: 0, decoy: 0 };
  spawnCounts = { rocket: 0, drone: 0, ballistic: 0, decoy: 0 };
  shotsFired = 0; shotsHit = 0;
  frame = 0; screenFlash = 0;
  seenTypes = {}; enemyAlert = null;
  currentCityIdx = 0; cityIntroTimer = 0;
  generateCityCanvas(CITIES[0]);
  incrementPlayCount();
  if (typeof umami !== 'undefined') umami.track('game-start');
  playSound('game_siren');
  // Delay first wave start to let siren play
  sirenTimer = 210; // ~3.5 seconds
  waveState = 'siren_intro';
  startMusic();
}

function startWave() {
  wave++;
  // Victory check: after wave 15, all cities defended
  if (wave > 15) {
    // Victory! All cities defended
    stopMusic();
    if (score > highScore) {
      highScore = score; localStorage.setItem('ironDomeHS2', String(highScore));
    }
    nameInput = '';
    nameInputActive = false;
    showLeaderboard = false;
    state = 'victory';
    if (typeof umami !== 'undefined') umami.track('game-end', { score, wave, result: 'victory' });
    playSound('hatikvah');
    fetchLeaderboard().then(() => {
      if (qualifiesForLeaderboard(score)) {
        nameInputActive = true;
        state = 'nameinput';
      }
    });
    return;
  }
  // Check for city change
  const newCityIdx = Math.min(Math.floor((wave - 1) / 3), CITIES.length - 1);
  if (newCityIdx !== currentCityIdx || wave === 1) {
    currentCityIdx = newCityIdx;
    generateCityCanvas(CITIES[currentCityIdx]);
    // Reset city endurance for new city
    cityDamage = 0;
    cityMaxHP = CITIES[currentCityIdx].endurance || 5;
    ammo = LAUNCHER_POD_SIZE; maxAmmo = LAUNCHER_POD_SIZE;
    launcherReloading = false; launcherReloadTimer = 0;
    // Show city intro
    waveState = 'city_intro';
    cityIntroTimer = 150; // 2.5 seconds
    return;
  }
  _startWaveActual();
}

function _startWaveActual() {
  const cfg = getWaveConfig(wave);
  waveMissilesLeft = cfg.missiles;
  maxAmmo = LAUNCHER_POD_SIZE;
  // Ammo only resets on city change — carries between waves within a city
  missileTimer = 0; waveState = 'playing';
  waveTransitionTimer = 0;
  // Note: cityDamage accumulates over all 3 waves per city, only resets on city change
}

function fireInterceptor() {
  if (launcherReloading) {
    addFloat(batteryX, batteryY - 40, t('reloading'), '#ffaa33', 16);
    return;
  }
  if (ammo <= 0) {
    startLauncherReload();
    return;
  }
  ammo--;
  if (ammo <= 0) startLauncherReload();
  shotsFired++;
  if (!tutorialSeen) { tutorialSeen = true; localStorage.setItem('tutorialSeen', '1'); }
  const speed = 10 * getComboBuffs().speedMult;
  const dx = mouseX - batteryX, dy = mouseY - batteryY;
  const dist = Math.sqrt(dx*dx + dy*dy);
  interceptors.push({
    x: batteryX, y: batteryY,
    vx: (dx/dist)*speed, vy: (dy/dist)*speed,
    targetX: mouseX, targetY: mouseY,
    trail: [], age: 0
  });
  // Launch smoke
  for (let i = 0; i < 6; i++) {
    smokeTrails.push({
      x: batteryX + (Math.random()-0.5)*8,
      y: batteryY + Math.random()*5,
      vx: (Math.random()-0.5)*1.5,
      vy: Math.random()*1.5,
      size: 3 + Math.random()*4,
      life: 30 + Math.random()*20,
      maxLife: 50
    });
  }
  playSound('launch');
}

// Pick enemy type based on wave weights
function pickEnemyType() {
  const w = getWaveConfig(wave).enemyWeights;
  const r = Math.random();
  let sum = 0;
  for (const [type, weight] of Object.entries(w)) {
    sum += weight;
    if (r < sum) return type;
  }
  return 'rocket';
}

// Enemy type configs
const ENEMY_TYPES = {
  rocket:    { speedMult: 1.0, hp: 1, hitbox: 28, points: 1, color: '#888', emoji: '🚀' },
  drone:     { speedMult: 1.1, hp: 1, hitbox: 22, points: 2, color: '#5588bb', emoji: '✈️' },
  ballistic: { speedMult: 0.7, hp: 3, hitbox: 35, points: 5, color: '#cc4444', emoji: '💣' },
  decoy:     { speedMult: 0.7, hp: 1, hitbox: 20, points: 1, color: '#ffaa44', emoji: '🎆' },
};

// Country code → flag emoji (e.g. "IL" → 🇮🇱)
function countryFlag(code) {
  if (!code || code.length !== 2) return '🌍';
  return String.fromCodePoint(...[...code.toUpperCase()].map(c => 0x1F1E6 + c.charCodeAt(0) - 65));
}

// Frosted glass panel for HUD V2
function drawGlassPanel(x, y, w, h, r) {
  r = r || 10;
  ctx.fillStyle = 'rgba(0, 15, 30, 0.78)';
  ctx.beginPath(); ctx.roundRect(x, y, w, h, r); ctx.fill();
  // Subtle blue border
  ctx.strokeStyle = 'rgba(80, 160, 255, 0.15)';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.roundRect(x, y, w, h, r); ctx.stroke();
  // Top-half shine
  ctx.fillStyle = 'rgba(255, 255, 255, 0.03)';
  ctx.beginPath(); ctx.roundRect(x + 1, y + 1, w - 2, h * 0.45, [r, r, 0, 0]); ctx.fill();
}

// Gradient-filled bar with shine effect
function drawGradBar(x, y, w, h, ratio, colors) {
  // Background
  ctx.fillStyle = 'rgba(20, 30, 50, 0.6)';
  ctx.beginPath(); ctx.roundRect(x, y, w, h, h/2); ctx.fill();
  ctx.strokeStyle = 'rgba(80, 160, 255, 0.08)';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.roundRect(x, y, w, h, h/2); ctx.stroke();
  // Fill
  if (ratio > 0) {
    const fillW = w * Math.min(1, ratio);
    const grad = ctx.createLinearGradient(x, y, x, y + h);
    grad.addColorStop(0, colors[0]);
    grad.addColorStop(1, colors[1]);
    ctx.fillStyle = grad;
    ctx.beginPath(); ctx.roundRect(x, y, fillW, h, h/2); ctx.fill();
    // Shine on top half
    ctx.fillStyle = 'rgba(255,255,255,0.18)';
    ctx.beginPath(); ctx.roundRect(x, y, fillW, h * 0.5, [h/2, h/2, 0, 0]); ctx.fill();
    // Glow
    ctx.shadowColor = colors[0];
    ctx.shadowBlur = 6;
    ctx.fillStyle = 'transparent';
    ctx.beginPath(); ctx.roundRect(x, y, fillW, h, h/2); ctx.fill();
    ctx.shadowBlur = 0;
  }
}

function spawnMissile(forceType) {
  const cfg = getWaveConfig(wave);
  const type = forceType || pickEnemyType();
  const et = ENEMY_TYPES[type];
  const startX = Math.random() * W;
  const startY = -10;
  const speed = (cfg.missileSpeed + Math.random()*0.4) * et.speedMult;
  const targetX = 50 + Math.random()*(W-100);
  const targetY = GROUND_Y;
  const dx = targetX - startX, dy = targetY - startY;
  const dist = Math.sqrt(dx*dx + dy*dy);
  const m = {
    x: startX, y: startY,
    vx: (dx/dist)*speed, vy: (dy/dist)*speed,
    trail: [], type: type,
    hp: et.hp, maxHP: et.hp,
    hitbox: et.hitbox, points: et.points,
    wobbleOffset: Math.random() * Math.PI * 2, // for drones
    flashTimer: 0
  };
  missiles.push(m);
  if (spawnCounts[type] !== undefined) spawnCounts[type]++;
  // Enemy type first-appearance callout
  if (!seenTypes[type]) {
    seenTypes[type] = true;
    const alertKeys = { rocket: 'rocketAlert', drone: 'droneAlert', ballistic: 'ballisticAlert', decoy: 'decoyAlert' };
    const alertColors = { rocket: '#ff8844', drone: '#5599ee', ballistic: '#ff4444', decoy: '#ffcc44' };
    enemyAlert = { text: t(alertKeys[type]), color: alertColors[type], timer: 180 };
  }
  // Decoys spawn in groups of 3 (DECISION-037: reduced from 5 to smooth difficulty curve)
  if (type === 'decoy' && !forceType) {
    const extra = 2;
    for (let i = 0; i < extra; i++) {
      setTimeout(() => { if (state === 'playing') spawnMissile('decoy'); }, i * 80);
    }
  }
}

function addCombo() {
  combo++; comboTimer = 999;
  if (combo > maxCombo) maxCombo = combo;
  if (combo >= 3) playSound('combo');
  // Token earning: every 5 consecutive hits = +1 defense token
  consecutiveHits++;
  if (consecutiveHits > 0 && consecutiveHits % CONSECUTIVE_HITS_FOR_TOKEN === 0) {
    if (tokenBank < TOKEN_BANK_MAX) {
      tokenBank++;
      addFloat(batteryX, batteryY - 60, t('tokenEarned'), '#ffdd00', 20);
      playSound('combo');
    } else {
      addFloat(batteryX, batteryY - 60, t('tokenBankFull'), '#ffaa33', 14);
    }
  }
}
function resetCombo() { combo = 0; comboTimer = 0; consecutiveHits = 0; }
function getMultiplier() {
  if (combo < 3) return 1;
  if (combo < 6) return 2;
  if (combo < 10) return 3;
  return 5;
}

// Combo streaks buff gameplay, not just score (DECISION-039)
function getComboBuffs() {
  return {
    speedMult: combo >= 3 ? 1.2 : 1.0,       // 3+ combo: 20% faster interceptors
    blastRadius: combo >= 6 ? 45 : 30,        // 6+ combo: 50% bigger blast
    homingRange: combo >= 10 ? 120 : 60        // 10+ combo: double homing range
  };
}

function addFloat(x, y, text, color, size) {
  floatingTexts.push({ x, y, text, color, size: size||18, life: 70, maxLife: 70 });
}

function boom(x, y, color, count, big) {
  // Asymmetric offset for non-perfect-circle shape
  const asymX = (Math.random() - 0.5) * (big ? 12 : 6);
  const asymY = (Math.random() - 0.5) * (big ? 8 : 4);
  explosions.push({
    x, y, radius: 0, maxR: big ? 70 : 38, alpha: 1, color,
    asymX, asymY,
    shockR: 0, shockMaxR: big ? 100 : 55, shockAlpha: big ? 0.7 : 0.5,
    flashTimer: big ? 8 : 5,
    big: !!big
  });
  // Secondary fireball for big explosions (delayed, offset)
  if (big) {
    const offX = (Math.random() - 0.5) * 30;
    const offY = (Math.random() - 0.5) * 20 - 8;
    explosions.push({
      x: x + offX, y: y + offY, radius: 0, maxR: 35, alpha: 0.85, color: '#ff8800',
      asymX: (Math.random() - 0.5) * 8, asymY: (Math.random() - 0.5) * 5,
      shockR: 0, shockMaxR: 0, shockAlpha: 0,
      flashTimer: 3, big: false, delay: 4
    });
  }
  // Multi-color gradient particles (yellow → orange → red)
  const gradientColors = ['#ffff80', '#ffcc40', '#ff8820', '#ff4400', '#cc2200'];
  for (let i = 0; i < count; i++) {
    const a = Math.random()*Math.PI*2;
    const s = (big?2.5:1.2) + Math.random()*(big?6:3.5);
    const gc = gradientColors[Math.floor(Math.random() * gradientColors.length)];
    particles.push({
      x, y, vx: Math.cos(a)*s, vy: Math.sin(a)*s,
      life: 35+Math.random()*35, maxLife: 70,
      color: Math.random() > 0.4 ? gc : color, size: 1.2+Math.random()*(big?4:2.5)
    });
  }
  // Bright sparks — elongated streaks
  for (let i = 0; i < (big ? 25 : 10); i++) {
    const a = Math.random()*Math.PI*2;
    const s = 3 + Math.random()*6;
    particles.push({

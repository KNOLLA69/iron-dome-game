      x, y, vx: Math.cos(a)*s, vy: Math.sin(a)*s - 1.5,
      life: 18+Math.random()*22, maxLife: 40,
      color: Math.random() > 0.3 ? '#fff' : '#ffffaa', size: 0.5+Math.random()*1.0,
      isSpark: true
    });
  }
  // Ember particles that float up (big explosions only)
  if (big) {
    for (let i = 0; i < 15; i++) {
      particles.push({
        x: x + (Math.random()-0.5)*25, y,
        vx: (Math.random()-0.5)*1.5, vy: -1.2 - Math.random()*2.5,
        life: 50+Math.random()*50, maxLife: 100,
        color: Math.random()>0.5 ? '#ff8800' : '#ffcc00', size: 0.8+Math.random()*1.8
      });
    }
  }
}

let shakeMaxDuration = 0;
function shake(d) { shakeDuration = Math.max(shakeDuration, d); shakeMaxDuration = Math.max(shakeMaxDuration, d); }

// Power-up system - spawned from x5 combos
// ==================== LAUNCHER RELOAD ====================
function startLauncherReload() {
  if (launcherReloading) return;
  launcherReloading = true;
  launcherReloadDuration = RELOAD_TIMES[currentCityIdx] || 300;
  launcherReloadTimer = launcherReloadDuration;
  playSound('launch'); // reuse launch sound for now
}

// ==================== DEFENSE SYSTEMS (Iron Beam / David's Sling) ====================
function activateDefenseSystem(type) {
  if (activeDefenseSystem) { addFloat(W/2, H * 0.4, t('systemActive'), '#ffaa33', 16); return; }
  if (tokenBank <= 0) { addFloat(W/2, H * 0.4, t('noTokens'), '#ff4444', 16); return; }
  if (type === 'iron_beam') {
    const targets = missiles.filter(m => m.type === 'rocket' || m.type === 'drone');
    if (targets.length === 0) { addFloat(W/2, H * 0.4, t('noTargets'), '#ff6666', 14); return; }
  } else if (type === 'davids_sling') {
    const targets = missiles.filter(m => m.type === 'ballistic');
    if (targets.length === 0) { addFloat(W/2, H * 0.4, t('noTargets'), '#ff6666', 14); return; }
  }
  tokenBank--;
  activeDefenseSystem = type;
  defenseSystemKills = 0;
  defenseSystemMaxKills = type === 'iron_beam' ? IRON_BEAM_MAX_KILLS : DAVIDS_SLING_MAX_KILLS;
  defenseSystemTimer = 0;
  defenseSystemTarget = null;
  playSound(type === 'iron_beam' ? 'combo' : 'launch');
}

// ==================== UPDATE ====================
function update() {
  frame++;
  if (state !== 'playing') return;
  if (paused) return;

  // Combo resets on miss, not on timer
  if (enemyAlert && enemyAlert.timer > 0) enemyAlert.timer--;
  if (screenFlash > 0) screenFlash -= 0.04;

  // Siren intro at game start
  if (waveState === 'siren_intro') {
    sirenTimer--;
    if (sirenTimer <= 0) startWave();
    return;
  }

  // City intro screen
  if (waveState === 'city_intro') {
    cityIntroTimer--;
    if (cityIntroTimer <= 0) _startWaveActual();
    return;
  }

  if (waveState === 'transition') {
    waveTransitionTimer--;
    if (waveTransitionTimer <= 0) startWave();
    return;
  }
  if (waveState === 'playing' && waveMissilesLeft > 0) {
    missileTimer++;
    if (missileTimer >= getWaveConfig(wave).missileInterval) {
      spawnMissile(); waveMissilesLeft--; missileTimer = 0;
    }
  }

  if (waveState === 'playing' && waveMissilesLeft <= 0 && missiles.length === 0) {
    waveState = 'transition'; waveTransitionTimer = 300; playSound('hatikvah');
  }

  // Missiles
  for (let i = missiles.length-1; i >= 0; i--) {
    const m = missiles[i];
    if (m.flashTimer > 0) m.flashTimer--;
    m.trail.push({x:m.x, y:m.y});
    if (m.trail.length > (m.type === 'ballistic' ? 18 : m.type === 'decoy' ? 6 : 12)) m.trail.shift();
    m.x += m.vx; m.y += m.vy;
    // Drone wobble - sine wave horizontal movement
    if (m.type === 'drone') {
      m.x += Math.sin(frame * 0.08 + m.wobbleOffset) * 2.5;
    }
    if (m.y >= GROUND_Y) {
      cityDamage++; resetCombo();
      // Big city explosion - multiple blasts, fire, debris
      boom(m.x, m.y, '#ff4400', 50, true);
      boom(m.x - 15, m.y - 10, '#ff8800', 25);
      boom(m.x + 15, m.y - 5, '#ffcc00', 20);
      // Rising fire column particles
      for (let fi = 0; fi < 20; fi++) {
        particles.push({
          x: m.x + (Math.random()-0.5)*30,
          y: m.y - Math.random()*10,
          vx: (Math.random()-0.5)*1.5,
          vy: -1.5 - Math.random()*3,
          life: 40 + Math.random()*40,
          maxLife: 80,
          color: ['#ff4400','#ff8800','#ffcc00','#ff2200'][Math.floor(Math.random()*4)],
          size: 2 + Math.random()*3
        });
      }
      // Debris chunks flying up
      for (let di = 0; di < 8; di++) {
        particles.push({
          x: m.x + (Math.random()-0.5)*20,
          y: m.y,
          vx: (Math.random()-0.5)*4,
          vy: -3 - Math.random()*5,
          life: 50 + Math.random()*30,
          maxLife: 80,
          color: '#443322',
          size: 2 + Math.random()*2
        });
      }
      playSound('big_explosion');
      shake(20); screenFlash = 0.4;
      missiles.splice(i, 1);
      if (cityDamage >= cityMaxHP) {
        stopMusic(); playSound('gameover');
        if (score > highScore) {
          highScore = score; localStorage.setItem('ironDomeHS2', String(highScore));
        }
        // Check if score qualifies for top 10
        nameInput = '';
        nameInputActive = false;
        showLeaderboard = false;
        state = 'gameover';
        if (typeof umami !== 'undefined') umami.track('game-end', { score, wave, result: 'gameover' });
        fetchLeaderboard().then(() => {
          if (qualifiesForLeaderboard(score)) {
            nameInputActive = true;
            state = 'nameinput';
          }
        });
      }
    }
  }

  // Interceptors
  for (let i = interceptors.length-1; i >= 0; i--) {
    const ic = interceptors[i];
    ic.age++;
    ic.trail.push({x:ic.x, y:ic.y});
    if (ic.trail.length > 14) ic.trail.shift();
    ic.x += ic.vx; ic.y += ic.vy;

    // Smoke from interceptor
    if (ic.age < 20 && ic.age % 2 === 0) {
      smokeTrails.push({
        x: ic.x - ic.vx*0.5 + (Math.random()-0.5)*3,
        y: ic.y - ic.vy*0.5 + (Math.random()-0.5)*3,
        vx: (Math.random()-0.5)*0.5, vy: Math.random()*0.3,
        size: 2+Math.random()*3, life: 20+Math.random()*15, maxLife: 35
      });
    }

    // Proximity homing - find nearest missile in ±30° cone (throttled to every 3rd frame for perf)
    if (frame % 3 !== ic.age % 3) { /* skip homing scan this frame */ }
    else {
    const icHeading = Math.atan2(ic.vy, ic.vx);
    let closestInCone = null, closestDist = getComboBuffs().homingRange;
    for (let j = 0; j < missiles.length; j++) {
      const m = missiles[j];
      const dx = m.x - ic.x, dy = m.y - ic.y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist < closestDist) {
        const angleToMissile = Math.atan2(dy, dx);
        let angleDiff = angleToMissile - icHeading;
        while (angleDiff > Math.PI) angleDiff -= Math.PI*2;
        while (angleDiff < -Math.PI) angleDiff += Math.PI*2;
        if (Math.abs(angleDiff) < Math.PI/6) { // ±30°
          closestInCone = m; closestDist = dist;
        }
      }
    }
    // Gently steer toward closest missile in cone
    if (closestInCone && closestDist < 55) {
      const dx = closestInCone.x - ic.x, dy = closestInCone.y - ic.y;
      const targetAngle = Math.atan2(dy, dx);
      let steerDiff = targetAngle - icHeading;
      while (steerDiff > Math.PI) steerDiff -= Math.PI*2;
      while (steerDiff < -Math.PI) steerDiff += Math.PI*2;
      const newAngle = icHeading + steerDiff * 0.15;
      const spd = Math.sqrt(ic.vx*ic.vx + ic.vy*ic.vy);
      ic.vx = Math.cos(newAngle) * spd;
      ic.vy = Math.sin(newAngle) * spd;
    }
    } // end homing throttle

    const dT = Math.sqrt((ic.x-ic.targetX)**2 + (ic.y-ic.targetY)**2);
    if (dT < 15 || ic.x < -10 || ic.x > W+10 || ic.y < -10) {
      // Detonation blast radius - check for nearby missiles
      let detonationHit = false;
      for (let j = missiles.length-1; j >= 0; j--) {
        const m = missiles[j];
        const bd = Math.sqrt((ic.x-m.x)**2 + (ic.y-m.y)**2);
        const cutoffY = ALTITUDE_CUTOFFS[m.type] || GROUND_Y;
          if (m.y > cutoffY) { if (bd < getComboBuffs().blastRadius + 20) addFloat(m.x, m.y - 10, t('belowCutoff'), '#ff6666', 12); continue; }
          if (bd < getComboBuffs().blastRadius) {
          detonationHit = true;
          m.hp--;
          if (m.hp <= 0) {
            addCombo();
            const mult = getMultiplier();
            const pts = m.points * mult;
            score += pts;
            boom(m.x, m.y, '#00ff88', 20);
            addFloat(m.x, m.y-10, `+${pts}`, '#00ff88', 16);
            if (killCounts[m.type] !== undefined) killCounts[m.type]++;
            missiles.splice(j, 1);
          } else {
            m.flashTimer = 8;
            boom(m.x, m.y, '#ffaa00', 8);
            addFloat(m.x, m.y-10, `${m.hp}/${m.maxHP}`, '#ffaa00', 12);
          }
        }
      }
      if (detonationHit) shotsHit++; else resetCombo(); // Miss — reset combo
      boom(ic.x, ic.y, '#0088cc', 8);
      interceptors.splice(i, 1); continue;
    }

    let hit = false;
    for (let j = missiles.length-1; j >= 0; j--) {
      const m = missiles[j];
      const d = Math.sqrt((ic.x-m.x)**2 + (ic.y-m.y)**2);
      const cutoffY2 = ALTITUDE_CUTOFFS[m.type] || GROUND_Y;
      if (m.y > cutoffY2) continue;
      if (d < (m.hitbox || 28)) {
        m.hp--;
        if (m.hp <= 0) {
          // Missile destroyed
          addCombo();
          const mult = getMultiplier();
          const pts = m.points * mult;
          score += pts;
          boom(m.x, m.y, combo >= 3 ? '#ffdd00' : '#00ff88', combo >= 6 ? 45 : 28);
          playSound('intercept');
          let text = `+${pts}`;
          if (mult > 1) text += ` (x${mult})`;
          addFloat(m.x, m.y-10, text, mult > 1 ? '#ffdd00' : '#00ff88', mult > 1 ? 24 : 16);
          // Kill counter
          if (killCounts[m.type] !== undefined) killCounts[m.type]++;
          missiles.splice(j, 1); interceptors.splice(i, 1);
          hit = true; break;
        } else {
          // Multi-HP: missile damaged but not destroyed
          m.flashTimer = 8;
          boom(ic.x, ic.y, '#ffaa00', 10);
          addFloat(m.x, m.y-10, `${m.hp}/${m.maxHP}`, '#ffaa00', 12);
          playSound('boss_hit');
          interceptors.splice(i, 1);
          hit = true; break;
        }
      }
    }
    if (hit) { shotsHit++; continue; }
  }

  // Explosions
  // Performance caps — cull oldest when over limit (DECISION-041)
  while (particles.length > 200) particles.shift();
  while (smokeTrails.length > 80) smokeTrails.shift();
  while (explosions.length > 15) explosions.shift();

  for (let i = explosions.length-1; i >= 0; i--) {
    const e = explosions[i];
    // Delayed secondary fireballs
    if (e.delay && e.delay > 0) { e.delay--; continue; }
    e.radius += 1.8; e.alpha -= 0.03;
    if (e.flashTimer > 0) e.flashTimer--;
    // Shockwave expands faster than fireball, fades quickly
    if (e.shockMaxR > 0) {
      e.shockR += 3.5;
      e.shockAlpha *= 0.92;
    }
    if (e.alpha <= 0) explosions.splice(i, 1);
  }

  // Particles
  for (let i = particles.length-1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy;
    p.vy += 0.04; p.vx *= 0.99;
    p.life--;
    if (p.life <= 0) particles.splice(i, 1);
  }

  // Smoke
  for (let i = smokeTrails.length-1; i >= 0; i--) {
    const s = smokeTrails[i];
    s.x += s.vx; s.y += s.vy;
    s.size += 0.15;
    s.life--;
    if (s.life <= 0) smokeTrails.splice(i, 1);
  }

  // Floating texts
  for (let i = floatingTexts.length-1; i >= 0; i--) {
    floatingTexts[i].y -= 0.8;
    floatingTexts[i].life--;
    if (floatingTexts[i].life <= 0) floatingTexts.splice(i, 1);
  }

  // Launcher reload countdown
  if (launcherReloading) {
    launcherReloadTimer--;
    if (launcherReloadTimer <= 0) {
      launcherReloading = false;
      ammo = LAUNCHER_POD_SIZE;
      addFloat(batteryX, batteryY - 40, '🔄 20', '#44ff88', 18);
      playSound('combo');
    }
  }

  // Active defense system tick (Iron Beam / David's Sling)
  if (activeDefenseSystem) {
    defenseSystemTimer++;
    const killInterval = activeDefenseSystem === 'iron_beam' ? IRON_BEAM_KILL_INTERVAL : DAVIDS_SLING_KILL_INTERVAL;
    if (defenseSystemTimer % killInterval === 0 || defenseSystemTimer === 1) {
      let validTargets;
      if (activeDefenseSystem === 'iron_beam') {
        validTargets = missiles.filter(m => (m.type === 'rocket' || m.type === 'drone') && m.y > 0 && m.y < GROUND_Y);
      } else {
        validTargets = missiles.filter(m => m.type === 'ballistic' && m.y > 0 && m.y < GROUND_Y);
      }
      if (validTargets.length > 0 && defenseSystemKills < defenseSystemMaxKills) {
        validTargets.sort((a, b) => b.y - a.y); // closest to ground first
        const target = validTargets[0];
        defenseSystemTarget = target;
        const idx = missiles.indexOf(target);
        if (idx !== -1) {
          addCombo();
          const mult = getMultiplier();
          const pts = target.points * mult;
          score += pts;
          if (activeDefenseSystem === 'iron_beam') {
            boom(target.x, target.y, '#00ffff', 15);
          } else {
            boom(target.x, target.y, '#ff8800', 30, true);
          }
          let text = '+' + pts;
          if (mult > 1) text += ' (x' + mult + ')';
          addFloat(target.x, target.y - 10, text, '#00ffff', 18);
          if (killCounts[target.type] !== undefined) killCounts[target.type]++;
          missiles.splice(idx, 1);
          defenseSystemKills++;
          shotsHit++;
        }
      }
      if (defenseSystemKills >= defenseSystemMaxKills || (validTargets && validTargets.length === 0)) {
        activeDefenseSystem = null;
        defenseSystemTarget = null;
      }
    }
  }

  if (shakeDuration > 0) {
    const shakeIntensity = (shakeDuration / Math.max(1, shakeMaxDuration)); // ease-out
    const mag = 8 * shakeIntensity;
    shakeX = (Math.random()-0.5)*mag; shakeY = (Math.random()-0.5)*mag;
    shakeDuration--;
    if (shakeDuration <= 0) shakeMaxDuration = 0;
  } else { shakeX = 0; shakeY = 0; }
}

// ==================== DRAW ====================
function draw() {
  // Sky gradient - varies by time of day
  const timeOfDay = getTimeOfDay(wave);
  const skyGrad = ctx.createLinearGradient(0, 0, 0, H);
  if (timeOfDay === 0) {
    // Day — rich Mediterranean blue with warm atmospheric haze at horizon
    skyGrad.addColorStop(0, '#3a78b5');    // deep cerulean top
    skyGrad.addColorStop(0.1, '#4a8ec8');
    skyGrad.addColorStop(0.25, '#5ea0d8');
    skyGrad.addColorStop(0.4, '#78b4e2');
    skyGrad.addColorStop(0.55, '#92c6ea');
    skyGrad.addColorStop(0.7, '#aed6f0');
    skyGrad.addColorStop(0.82, '#c8e2f4');
    skyGrad.addColorStop(0.9, '#daeaf5');  // haze transition
    skyGrad.addColorStop(0.96, '#e8ece0');  // warm atmospheric haze
    skyGrad.addColorStop(1, '#dde4d8');    // warm horizon line
  } else if (timeOfDay === 1) {
    // Sunset — dramatic Mediterranean sunset with pink/purple/gold bands
    skyGrad.addColorStop(0, '#0e0a28');    // deep twilight purple
    skyGrad.addColorStop(0.1, '#1a1245');
    skyGrad.addColorStop(0.2, '#2d1b58');  // rich purple
    skyGrad.addColorStop(0.3, '#4a2060');  // magenta-purple
    skyGrad.addColorStop(0.4, '#7a2858');  // rose-purple
    skyGrad.addColorStop(0.5, '#b03850');  // deep rose
    skyGrad.addColorStop(0.6, '#d04a40');  // warm red
    skyGrad.addColorStop(0.7, '#e06830');  // deep orange
    skyGrad.addColorStop(0.8, '#ea8828');  // rich orange
    skyGrad.addColorStop(0.88, '#f0a020'); // golden
    skyGrad.addColorStop(0.94, '#f5b828'); // bright gold
    skyGrad.addColorStop(1, '#f0c838');    // golden horizon glow
  } else {
    // Night — deep atmosphere with subtle blue-purple variation, horizon glow
    skyGrad.addColorStop(0, '#030610');    // near-black zenith
    skyGrad.addColorStop(0.08, '#060c1e');
    skyGrad.addColorStop(0.2, '#0a1430');  // deep navy
    skyGrad.addColorStop(0.35, '#10203e');
    skyGrad.addColorStop(0.5, '#182a4a');  // midnight blue
    skyGrad.addColorStop(0.65, '#1e3252');
    skyGrad.addColorStop(0.75, '#253a58');
    skyGrad.addColorStop(0.85, '#2a3d58');
    skyGrad.addColorStop(0.92, '#2e3e55'); // subtle warm horizon
    skyGrad.addColorStop(0.97, '#2a3548'); // faint city glow at horizon
    skyGrad.addColorStop(1, '#1e2838');
  }
  ctx.fillStyle = skyGrad;
  ctx.fillRect(0, 0, W, H);

  ctx.save();
  ctx.translate(shakeX, shakeY);

  // Stars - visibility varies by time of day
  const starAlphaFactor = timeOfDay === 0 ? 0 : timeOfDay === 1 ? 0.3 : 1.0;
  if (starAlphaFactor > 0) {
    stars.forEach(s => {
      s.twinkle += s.speed;
      const alpha = s.brightness * (0.4 + Math.sin(s.twinkle) * 0.3) * starAlphaFactor;
      ctx.fillStyle = `rgba(255,255,240,${alpha})`;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.size, 0, Math.PI*2);
      ctx.fill();
    });
  }

  // Clouds — fluffy volumetric shapes with self-shadowing & sunset underlight
  clouds.forEach(c => {
    c.x += c.speed;
    if (c.x > W + c.w) c.x = -c.w - 20;
    const baseAlpha = timeOfDay === 2 ? c.opacity * 0.25 : timeOfDay === 1 ? c.opacity * 0.75 : c.opacity;

    // Cloud lobe definitions: [xOff, yOff, wMul, hMul] relative to cloud bounds
    const lobes = [
      [0.15, 0.12, 0.22, 0.38],  // left small
      [0.30, -0.05, 0.30, 0.55], // left-center tall
      [0.50, -0.12, 0.28, 0.65], // center peak (tallest)
      [0.68, -0.02, 0.25, 0.50], // right-center
      [0.82, 0.10, 0.18, 0.35],  // right small
      [0.40, 0.08, 0.20, 0.40],  // fill gap left-center
      [0.60, 0.05, 0.22, 0.45],  // fill gap right-center
    ];

    // Pass 1: Shadow/underside (drawn slightly below, darker)
    lobes.forEach(([lx, ly, lw, lh]) => {
      const cx = c.x + c.w * lx;
      const cy = c.y + c.h * (ly + 0.18); // offset down for bottom shadow
      const rx = c.w * lw;
      const ry = c.h * lh * 0.5;
      let shadowR, shadowG, shadowB, shadowA;
      if (timeOfDay === 0) {
        // Day: cool blue-gray shadow
        shadowR = 180; shadowG = 195; shadowB = 215; shadowA = baseAlpha * 0.4;
      } else if (timeOfDay === 1) {
        // Sunset: warm orange-pink underlit belly
        shadowR = 230; shadowG = 130; shadowB = 80; shadowA = baseAlpha * 0.5;
      } else {
        // Night: dark blueish shadow
        shadowR = 80; shadowG = 90; shadowB = 120; shadowA = baseAlpha * 0.3;
      }
      const sg = ctx.createRadialGradient(cx, cy, 0, cx, cy, Math.max(rx, ry));
      sg.addColorStop(0, `rgba(${shadowR},${shadowG},${shadowB},${shadowA})`);
      sg.addColorStop(0.7, `rgba(${shadowR},${shadowG},${shadowB},${shadowA * 0.4})`);
      sg.addColorStop(1, `rgba(${shadowR},${shadowG},${shadowB},0)`);
      ctx.fillStyle = sg;
      ctx.beginPath();
      ctx.ellipse(cx, cy, rx * 1.1, ry * 0.8, 0, 0, Math.PI*2);
      ctx.fill();
    });

    // Pass 2: Main cloud body (bright, fluffy lobes)
    lobes.forEach(([lx, ly, lw, lh]) => {
      const cx = c.x + c.w * lx;
      const cy = c.y + c.h * ly;
      const rx = c.w * lw;
      const ry = c.h * lh;
      let bodyR, bodyG, bodyB;
      if (timeOfDay === 0) {
        bodyR = 255; bodyG = 255; bodyB = 255;
      } else if (timeOfDay === 1) {
        bodyR = 245; bodyG = 190; bodyB = 150;
      } else {
        bodyR = 130; bodyG = 140; bodyB = 170;
      }
      const bg = ctx.createRadialGradient(cx, cy - ry*0.2, 0, cx, cy, Math.max(rx, ry));
      bg.addColorStop(0, `rgba(${bodyR},${bodyG},${bodyB},${baseAlpha * 0.7})`);
      bg.addColorStop(0.5, `rgba(${bodyR},${bodyG},${bodyB},${baseAlpha * 0.45})`);
      bg.addColorStop(0.85, `rgba(${bodyR},${bodyG},${bodyB},${baseAlpha * 0.15})`);
      bg.addColorStop(1, `rgba(${bodyR},${bodyG},${bodyB},0)`);
      ctx.fillStyle = bg;
      ctx.beginPath();
      ctx.ellipse(cx, cy, rx, ry, 0, 0, Math.PI*2);
      ctx.fill();
    });

    // Pass 3: Bright top highlights (sunlit edges)
    if (timeOfDay !== 2) {
      const hlLobes = [[0.30, -0.12, 0.18, 0.22], [0.50, -0.20, 0.16, 0.25], [0.68, -0.10, 0.14, 0.20]];
      hlLobes.forEach(([lx, ly, lw, lh]) => {
        const cx = c.x + c.w * lx;
        const cy = c.y + c.h * ly;
        const rx = c.w * lw;
        const ry = c.h * lh;
        let hlR, hlG, hlB, hlA;
        if (timeOfDay === 0) {
          hlR = 255; hlG = 255; hlB = 255; hlA = baseAlpha * 0.5;
        } else {
          hlR = 255; hlG = 220; hlB = 180; hlA = baseAlpha * 0.4;
        }
        const hg = ctx.createRadialGradient(cx, cy, 0, cx, cy, Math.max(rx, ry));
        hg.addColorStop(0, `rgba(${hlR},${hlG},${hlB},${hlA})`);
        hg.addColorStop(0.6, `rgba(${hlR},${hlG},${hlB},${hlA * 0.3})`);
        hg.addColorStop(1, `rgba(${hlR},${hlG},${hlB},0)`);
        ctx.fillStyle = hg;
        ctx.beginPath();
        ctx.ellipse(cx, cy, rx, ry, 0, 0, Math.PI*2);
        ctx.fill();
      });
    }
  });

  // Sun or Moon depending on time of day
  if (timeOfDay === 0) {
    // Day - bright yellow/white sun high in sky
    const sunX = W - 60 * scaleX - 60, sunY = 80;
    // Sun glow (outer)
    const sunGlow = ctx.createRadialGradient(sunX, sunY, 20, sunX, sunY, 80);
    sunGlow.addColorStop(0, 'rgba(255, 255, 200, 0.3)');
    sunGlow.addColorStop(0.5, 'rgba(255, 240, 150, 0.1)');
    sunGlow.addColorStop(1, 'rgba(255, 220, 100, 0)');
    ctx.fillStyle = sunGlow;
    ctx.beginPath();
    ctx.arc(sunX, sunY, 80, 0, Math.PI*2);
    ctx.fill();
    // Sun body
    ctx.fillStyle = 'rgba(255, 250, 220, 0.95)';
    ctx.beginPath();
    ctx.arc(sunX, sunY, 28, 0, Math.PI*2);
    ctx.fill();
    // Sun bright core
    ctx.fillStyle = 'rgba(255, 255, 240, 1)';
    ctx.beginPath();
    ctx.arc(sunX, sunY, 18, 0, Math.PI*2);
    ctx.fill();
  } else if (timeOfDay === 1) {
    // Sunset - large orange/red sun near horizon
    const sunX = W - 60 * scaleX - 80, sunY = GROUND_Y - 50;
    // Sunset glow (outer)
    const sunsetGlow = ctx.createRadialGradient(sunX, sunY, 25, sunX, sunY, 100);
    sunsetGlow.addColorStop(0, 'rgba(255, 140, 50, 0.4)');
    sunsetGlow.addColorStop(0.5, 'rgba(255, 100, 50, 0.15)');
    sunsetGlow.addColorStop(1, 'rgba(255, 60, 30, 0)');
    ctx.fillStyle = sunsetGlow;
    ctx.beginPath();
    ctx.arc(sunX, sunY, 100, 0, Math.PI*2);
    ctx.fill();
    // Sun body - large orange
    ctx.fillStyle = 'rgba(255, 120, 40, 0.9)';
    ctx.beginPath();
    ctx.arc(sunX, sunY, 35, 0, Math.PI*2);
    ctx.fill();
    // Sun bright core
    ctx.fillStyle = 'rgba(255, 180, 80, 0.7)';
    ctx.beginPath();
    ctx.arc(sunX, sunY, 22, 0, Math.PI*2);
    ctx.fill();
  } else {
    // Night - moon with craters
    const moonX = W - 60 * scaleX - 60, moonY = 80;
    ctx.fillStyle = 'rgba(240, 240, 220, 0.9)';
    ctx.beginPath();
    ctx.arc(moonX, moonY, 25, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = 'rgba(255,255,230,0.05)';
    ctx.beginPath();
    ctx.arc(moonX, moonY, 45, 0, Math.PI*2);
    ctx.fill();
    // Moon craters
    ctx.fillStyle = 'rgba(200,200,190,0.3)';
    ctx.beginPath(); ctx.arc(moonX-8, moonY-5, 4, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(moonX+8, moonY+5, 3, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(moonX-2, moonY+10, 2.5, 0, Math.PI*2); ctx.fill();
  }

  // Mediterranean sea — enhanced with wave motion, reflection paths, sparkles
  const seaH = H - GROUND_Y;
  const seaGrad = ctx.createLinearGradient(0, GROUND_Y - 2, 0, H);
  if (timeOfDay === 0) {
    seaGrad.addColorStop(0, '#4a7a9e');   // bright Mediterranean surface
    seaGrad.addColorStop(0.15, '#3a6a90');
    seaGrad.addColorStop(0.4, '#2d5a82');
    seaGrad.addColorStop(0.7, '#224a72');
    seaGrad.addColorStop(1, '#1a3a5e');   // deep water
  } else if (timeOfDay === 1) {
    seaGrad.addColorStop(0, '#5a4058');   // warm purple surface
    seaGrad.addColorStop(0.15, '#4a3050');
    seaGrad.addColorStop(0.4, '#3a2545');
    seaGrad.addColorStop(0.7, '#2e1c3a');
    seaGrad.addColorStop(1, '#221430');
  } else {
    seaGrad.addColorStop(0, '#1e3048');   // dark surface
    seaGrad.addColorStop(0.15, '#182840');
    seaGrad.addColorStop(0.4, '#142238');
    seaGrad.addColorStop(0.7, '#101c30');
    seaGrad.addColorStop(1, '#0c1424');
  }
  ctx.fillStyle = seaGrad;
  ctx.fillRect(0, GROUND_Y, W, seaH);

  // Wave motion at surface line — gentle ripple
  ctx.strokeStyle = timeOfDay === 0 ? 'rgba(180,210,230,0.15)' : timeOfDay === 1 ? 'rgba(200,150,100,0.12)' : 'rgba(100,130,170,0.08)';
  ctx.lineWidth = 1;
  for (let wl = 0; wl < 3; wl++) {
    ctx.beginPath();
    for (let wx = 0; wx < W; wx += 2) {
      const wy = GROUND_Y + wl * 2 + Math.sin(wx * 0.015 + frame * 0.03 + wl * 1.2) * 1.5
                + Math.sin(wx * 0.008 + frame * 0.02 - wl) * 1;
      wx === 0 ? ctx.moveTo(wx, wy) : ctx.lineTo(wx, wy);
    }
    ctx.stroke();
  }

  // Sun/Moon reflection path — concentrated column of light on water
  if (timeOfDay === 0) {
    // Day sun reflection — bright sparkle column under sun
    const sunX = W - 60 * scaleX - 60;
    const pathW = 80;
    for (let i = 0; i < 60; i++) {
      const rx = sunX + (Math.random() - 0.5) * pathW * (1 + i * 0.02);
      const ry = GROUND_Y + 3 + (i / 60) * seaH * 0.7;
      const sparkW = 3 + Math.random() * 6;
      const sparkA = 0.06 + Math.random() * 0.08 - (i / 60) * 0.04;
      const wobble = Math.sin(frame * 0.04 + i * 0.7) * 2;
      ctx.fillStyle = `rgba(255,250,230,${Math.max(0, sparkA)})`;
      ctx.fillRect(rx + wobble, ry, sparkW, 1);
    }
  } else if (timeOfDay === 1) {
    // Sunset golden reflection path — dramatic golden road on water
    const sunX = W - 60 * scaleX - 80;
    const pathW = 50;
    // Wide golden glow base
    const goldenGlow = ctx.createRadialGradient(sunX, GROUND_Y, 10, sunX, GROUND_Y + seaH * 0.4, seaH * 0.5);
    goldenGlow.addColorStop(0, 'rgba(255,180,60,0.12)');
    goldenGlow.addColorStop(0.4, 'rgba(255,140,40,0.06)');
    goldenGlow.addColorStop(1, 'rgba(255,100,20,0)');
    ctx.fillStyle = goldenGlow;
    ctx.fillRect(sunX - 120, GROUND_Y, 240, seaH);
    // Concentrated sparkle streaks
    for (let i = 0; i < 80; i++) {
      const spread = pathW * (1 + (i / 80) * 1.5);
      const rx = sunX + (Math.random() - 0.5) * spread;
      const ry = GROUND_Y + 2 + (i / 80) * seaH * 0.8;
      const sparkW = 4 + Math.random() * 8;
      const sparkA = 0.1 + Math.random() * 0.12 - (i / 80) * 0.06;
      const wobble = Math.sin(frame * 0.035 + i * 0.5) * 3;
      ctx.fillStyle = `rgba(255,${200 + Math.random()*40},${80 + Math.random()*60},${Math.max(0, sparkA)})`;
      ctx.fillRect(rx + wobble, ry, sparkW, 1);
    }
  } else {
    // Night moon reflection — subtle silver path
    const moonX = W - 60 * scaleX - 60;
    const pathW = 40;
    for (let i = 0; i < 35; i++) {
      const rx = moonX + (Math.random() - 0.5) * pathW * (1 + i * 0.03);
      const ry = GROUND_Y + 3 + (i / 35) * seaH * 0.6;
      const sparkW = 2 + Math.random() * 5;
      const sparkA = 0.04 + Math.random() * 0.05 - (i / 35) * 0.03;
      const wobble = Math.sin(frame * 0.03 + i * 0.8) * 2;
      ctx.fillStyle = `rgba(220,230,240,${Math.max(0, sparkA)})`;
      ctx.fillRect(rx + wobble, ry, sparkW, 1);
    }
  }

  // Ambient water shimmer — elongated horizontal sparkles, concentrated near horizon
  for (let i = 0; i < 50; i++) {
    const sx = (i * 37 + frame * 0.25) % W;
    const depthRatio = (i % 8) / 8; // 0=near surface, 1=deep
    const sy = GROUND_Y + 4 + depthRatio * seaH * 0.6 + Math.sin(frame * 0.025 + i * 1.1) * 2;
    const shimW = 6 + Math.sin(i * 2.1) * 4 + Math.sin(frame * 0.04 + i) * 2;
    const nearSurface = 1 - depthRatio; // brighter near surface
    let sR, sG, sB;
    if (timeOfDay === 0) { sR = 200; sG = 230; sB = 255; }
    else if (timeOfDay === 1) { sR = 230; sG = 170; sB = 120; }
    else { sR = 140; sG = 170; sB = 220; }
    const sA = (0.02 + nearSurface * 0.03) * (0.6 + Math.sin(frame * 0.05 + i * 0.7) * 0.4);
    ctx.fillStyle = `rgba(${sR},${sG},${sB},${Math.max(0, sA)})`;
    ctx.fillRect(sx, sy, shimW, 1);
  }

  // City light reflections on water — vertical streaks (sunset/night only)
  if (timeOfDay >= 1) {
    const reflAlpha = timeOfDay === 2 ? 0.035 : 0.02;
    for (let rx = 0; rx < W; rx += 22 + Math.random()*28) {
      const rw = 2 + Math.random()*4;
      const rh = 12 + Math.random()*22;
      const ry = GROUND_Y + 2 + Math.random()*4;
      const rAlpha = reflAlpha * (0.5 + Math.random()*0.5);
      const warm = Math.random() > 0.35;
      ctx.fillStyle = warm
        ? `rgba(255, 215, 140, ${rAlpha})`
        : `rgba(140, 190, 255, ${rAlpha})`;
      const wobbleY = Math.sin(frame*0.03 + rx*0.08)*2;
      ctx.fillRect(rx, ry + wobbleY, rw, rh);
      // Faint glow around reflection
      ctx.fillStyle = warm
        ? `rgba(255, 200, 120, ${rAlpha * 0.3})`
        : `rgba(120, 170, 240, ${rAlpha * 0.3})`;
      ctx.fillRect(rx - 1, ry + wobbleY - 1, rw + 2, rh + 2);
    }
  }

  // City skyline (pre-rendered)
  ctx.drawImage(cityCanvas, 0, 0, W, H);

  // City glow (light pollution) - varies by time of day
  const glowGrad = ctx.createLinearGradient(0, GROUND_Y - 200, 0, GROUND_Y);
  if (timeOfDay === 0) {
    // Day - minimal glow, city well lit by sun
    glowGrad.addColorStop(0, 'rgba(255, 255, 255, 0)');
    glowGrad.addColorStop(0.7, 'rgba(255, 255, 240, 0.005)');
    glowGrad.addColorStop(1, 'rgba(255, 250, 220, 0.01)');
  } else if (timeOfDay === 1) {
    // Sunset - warm orange glow
    glowGrad.addColorStop(0, 'rgba(255, 160, 60, 0)');
    glowGrad.addColorStop(0.7, 'rgba(255, 140, 50, 0.03)');
    glowGrad.addColorStop(1, 'rgba(255, 120, 40, 0.08)');
  } else {
    // Night - strong warm glow (original)
    glowGrad.addColorStop(0, 'rgba(255, 200, 120, 0)');
    glowGrad.addColorStop(0.7, 'rgba(255, 180, 100, 0.02)');
    glowGrad.addColorStop(1, 'rgba(255, 160, 80, 0.06)');
  }
  ctx.fillStyle = glowGrad;
  ctx.fillRect(0, GROUND_Y - 200, W, 200);

  // Ground line
  ctx.strokeStyle = 'rgba(100, 120, 150, 0.3)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(0, GROUND_Y);
  ctx.lineTo(W, GROUND_Y);
  ctx.stroke();

  // Smoke trails - softer, more atmospheric
  smokeTrails.forEach(s => {
    const alpha = (s.life / s.maxLife) * 0.35;
    const grd = ctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, s.size);
    grd.addColorStop(0, `rgba(190, 200, 210, ${alpha})`);
    grd.addColorStop(1, `rgba(160, 170, 180, 0)`);
    ctx.fillStyle = grd;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.size * 1.3, 0, Math.PI*2);
    ctx.fill();
  });

  // Missiles - different visuals per type
  missiles.forEach(m => {
    const isBallistic = m.type === 'ballistic';
    const isDrone = m.type === 'drone';
    const isDecoy = m.type === 'decoy';

    // Trail — volumetric smoke puffs for rockets/ballistic, clean for drones/decoys
    const trailLen = m.trail.length;
    m.trail.forEach((tp, idx) => {
      const progress = idx / trailLen; // 0=oldest, 1=newest
      const age = 1 - progress; // 0=newest, 1=oldest

      if (isDrone) {
        // Drone: faint heat distortion shimmer (no smoke)
        const shimAlpha = progress * 0.15;
        const shimOff = Math.sin(frame * 0.1 + idx * 0.5) * 1.5;
        ctx.fillStyle = `rgba(80,150,220,${shimAlpha})`;
        ctx.beginPath();
        ctx.arc(tp.x + shimOff, tp.y, 1.5 + progress * 1.5, 0, Math.PI*2);
        ctx.fill();
      } else if (isDecoy) {
        // Decoy: tiny spark trail
        const spkAlpha = progress * 0.6;
        ctx.fillStyle = `rgba(255,${180+Math.random()*75},80,${spkAlpha})`;
        ctx.beginPath();
        ctx.arc(tp.x, tp.y, 0.8 + progress * 0.8, 0, Math.PI*2);
        ctx.fill();
      } else {
        // Rocket & Ballistic: volumetric smoke puffs
        const baseSz = isBallistic ? 4 : 2.5;
        // Puffs expand as they age — newest are small, oldest are big and faint
        const puffSize = baseSz * (0.6 + age * 2.2);
        // Wind drift — older puffs drift more
        const windDrift = age * age * 8;
        const turbulence = Math.sin(idx * 1.7 + frame * 0.02) * age * 2;
        const drawX = tp.x - windDrift + turbulence;
        const drawY = tp.y - age * 3 + Math.sin(idx * 2.3) * age;

        // Opacity: starts opaque near engine, fades as puff ages
        const baseAlpha = progress * (1 - age * 0.7);

        // Outer soft smoke (gray, large, very faint)
        const outerSz = puffSize * 1.6;
        const grayVal = isBallistic ? 160 : 190;
        const outerGrd = ctx.createRadialGradient(drawX, drawY, 0, drawX, drawY, outerSz);
        outerGrd.addColorStop(0, `rgba(${grayVal},${grayVal+10},${grayVal+20},${baseAlpha * 0.15})`);
        outerGrd.addColorStop(0.6, `rgba(${grayVal-20},${grayVal-10},${grayVal},${baseAlpha * 0.08})`);
        outerGrd.addColorStop(1, 'rgba(140,140,150,0)');
        ctx.fillStyle = outerGrd;
        ctx.beginPath();
        ctx.arc(drawX, drawY, outerSz, 0, Math.PI*2);
        ctx.fill();

        // Inner warm smoke (near engine: orange tinted, far: gray)
        const warmth = progress; // more warm near engine
        const iR = Math.round(190 + warmth * 60);
        const iG = Math.round(180 + warmth * 30 - age * 40);
        const iB = Math.round(170 - warmth * 60);
        const innerGrd = ctx.createRadialGradient(drawX, drawY, 0, drawX, drawY, puffSize);
        innerGrd.addColorStop(0, `rgba(${iR},${iG},${iB},${baseAlpha * 0.35})`);
        innerGrd.addColorStop(0.5, `rgba(${iR-20},${iG-10},${iB+10},${baseAlpha * 0.2})`);
        innerGrd.addColorStop(1, 'rgba(160,160,170,0)');
        ctx.fillStyle = innerGrd;
        ctx.beginPath();
        ctx.arc(drawX, drawY, puffSize, 0, Math.PI*2);
        ctx.fill();

        // Hot core near engine (newest 30% of trail only)
        if (progress > 0.7) {
          const hotAlpha = (progress - 0.7) / 0.3;
          const hotSz = baseSz * 0.8;
          const hotColor = isBallistic ? `rgba(255,80,30,${hotAlpha * 0.3})` : `rgba(255,140,50,${hotAlpha * 0.2})`;
          ctx.fillStyle = hotColor;
          ctx.beginPath();
          ctx.arc(tp.x, tp.y, hotSz, 0, Math.PI*2);
          ctx.fill();
        }
      }
    });

    const angle = Math.atan2(m.vy, m.vx);
    ctx.save();
    ctx.translate(m.x, m.y);

    if (isDecoy) {
      // Decoy: tiny flickering orange/yellow dot
      const flicker = 0.6 + Math.random() * 0.4;
      ctx.fillStyle = `rgba(255, ${180 + Math.random()*75}, 0, ${flicker})`;
      ctx.beginPath(); ctx.arc(0, 0, 4, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = 'rgba(255,255,200,0.8)';
      ctx.beginPath(); ctx.arc(0, 0, 2, 0, Math.PI*2); ctx.fill();
    } else if (isDrone) {
      // Shahed-136 delta-wing kamikaze drone
      ctx.rotate(angle);
      const flash = m.flashTimer > 0;

      // === Delta wings (swept back) ===
      const wingGrad = ctx.createLinearGradient(0, -14, 0, 14);
      wingGrad.addColorStop(0, flash ? '#fff' : '#6a7a60');
      wingGrad.addColorStop(0.3, flash ? '#eee' : '#7a8a70');
      wingGrad.addColorStop(0.5, flash ? '#ddd' : '#8a9a80');
      wingGrad.addColorStop(0.7, flash ? '#eee' : '#6a7a60');
      wingGrad.addColorStop(1, flash ? '#fff' : '#5a6a50');
      ctx.fillStyle = wingGrad;
      // Top wing
      ctx.beginPath();
      ctx.moveTo(6, 0);        // wing leading edge at nose area
      ctx.lineTo(-8, -13);     // wingtip back-swept
      ctx.lineTo(-12, -11);    // trailing edge
      ctx.lineTo(-6, -1);      // wing root
      ctx.closePath();
      ctx.fill();
      // Bottom wing (mirror)
      ctx.beginPath();
      ctx.moveTo(6, 0);
      ctx.lineTo(-8, 13);
      ctx.lineTo(-12, 11);
      ctx.lineTo(-6, 1);
      ctx.closePath();
      ctx.fill();
      // Wing panel lines
      ctx.strokeStyle = 'rgba(40,50,35,0.3)';
      ctx.lineWidth = 0.5;
      ctx.beginPath();
      ctx.moveTo(0, -1); ctx.lineTo(-9, -12);
      ctx.moveTo(0, 1); ctx.lineTo(-9, 12);
      ctx.stroke();

      // === Fuselage (narrow cylindrical body) ===
      const bodyGrad = ctx.createLinearGradient(0, -2.5, 0, 2.5);
      bodyGrad.addColorStop(0, flash ? '#fff' : '#8a9a7a');
      bodyGrad.addColorStop(0.3, flash ? '#eee' : '#9aaa8a');
      bodyGrad.addColorStop(0.7, flash ? '#eee' : '#7a8a6a');
      bodyGrad.addColorStop(1, flash ? '#ddd' : '#6a7a5a');
      ctx.fillStyle = bodyGrad;
      ctx.beginPath();
      ctx.moveTo(12, 0);       // nose tip
      ctx.lineTo(8, -2);
      ctx.lineTo(-10, -2.2);
      ctx.lineTo(-13, -1.5);
      ctx.lineTo(-13, 1.5);
      ctx.lineTo(-10, 2.2);
      ctx.lineTo(8, 2);
      ctx.closePath();
      ctx.fill();

      // Nose cone (darker, pointed)
      ctx.fillStyle = flash ? '#fff' : '#555';
      ctx.beginPath();
      ctx.moveTo(14, 0);
      ctx.lineTo(10, -1.5);
      ctx.lineTo(10, 1.5);
      ctx.closePath();
      ctx.fill();

      // === V-tail stabilizers ===
      ctx.fillStyle = flash ? '#ddd' : '#6a7a5a';
      // Upper stabilizer
      ctx.beginPath();
      ctx.moveTo(-10, -2);
      ctx.lineTo(-14, -6);
      ctx.lineTo(-15, -5);
      ctx.lineTo(-12, -2);
      ctx.closePath();
      ctx.fill();
      // Lower stabilizer
      ctx.beginPath();
      ctx.moveTo(-10, 2);
      ctx.lineTo(-14, 6);
      ctx.lineTo(-15, 5);
      ctx.lineTo(-12, 2);
      ctx.closePath();
      ctx.fill();

      // === Rear pusher propeller (spinning disc blur) ===
      const propSpin = frame * 0.6 + m.wobbleOffset;
      const propR = 4;
      ctx.strokeStyle = 'rgba(180,190,170,0.5)';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.arc(-14, 0, propR, propSpin, propSpin + Math.PI);
      ctx.stroke();
      ctx.beginPath();
      ctx.arc(-14, 0, propR, propSpin + Math.PI*0.5, propSpin + Math.PI*1.5);
      ctx.stroke();
      // Prop hub
      ctx.fillStyle = '#555';
      ctx.beginPath(); ctx.arc(-14, 0, 1.2, 0, Math.PI*2); ctx.fill();

      // === Warhead marking (red band near nose) ===
      ctx.fillStyle = 'rgba(180,50,40,0.5)';
      ctx.fillRect(6, -1.8, 2, 3.6);
    } else {
      // Rocket or Ballistic missile
      ctx.rotate(angle);
      const len = isBallistic ? 22 : 14;
      const rad = isBallistic ? 4.5 : 2.5;
      const flash = m.flashTimer > 0;

      if (isBallistic) {
        // === BALLISTIC MISSILE (Iranian Fajr / Fateh style) ===
        // Main body — cylindrical with 3D shading
        const bodyGrad = ctx.createLinearGradient(0, -rad, 0, rad);
        bodyGrad.addColorStop(0, flash ? '#fff' : '#a03030');
        bodyGrad.addColorStop(0.15, flash ? '#fee' : '#c04040');
        bodyGrad.addColorStop(0.4, flash ? '#fdd' : '#d04a4a');
        bodyGrad.addColorStop(0.6, flash ? '#fcc' : '#b03535');
        bodyGrad.addColorStop(0.85, flash ? '#faa' : '#8a2525');
        bodyGrad.addColorStop(1, flash ? '#f88' : '#6a1818');
        ctx.fillStyle = bodyGrad;
        ctx.beginPath();
        ctx.moveTo(len * 0.6, -rad);
        ctx.lineTo(-len * 0.35, -rad);
        ctx.lineTo(-len * 0.4, -rad * 0.7);
        ctx.lineTo(-len * 0.4, rad * 0.7);
        ctx.lineTo(-len * 0.35, rad);
        ctx.lineTo(len * 0.6, rad);
        ctx.closePath();
        ctx.fill();

        // Warhead section (darker, conical)
        const whGrad = ctx.createLinearGradient(0, -rad * 0.9, 0, rad * 0.9);
        whGrad.addColorStop(0, flash ? '#eee' : '#884040');
        whGrad.addColorStop(0.5, flash ? '#ddd' : '#993838');
        whGrad.addColorStop(1, flash ? '#ccc' : '#772828');
        ctx.fillStyle = whGrad;
        ctx.beginPath();
        ctx.moveTo(len * 0.6, -rad);
        ctx.lineTo(len * 0.6, rad);
        ctx.lineTo(len * 0.85, rad * 0.55);
        ctx.lineTo(len * 0.85, -rad * 0.55);
        ctx.closePath();
        ctx.fill();

        // Nose cone (ogive shape)
        ctx.fillStyle = flash ? '#ddd' : '#663030';
        ctx.beginPath();
        ctx.moveTo(len + 2, 0);
        ctx.quadraticCurveTo(len * 0.9, -rad * 0.45, len * 0.85, -rad * 0.55);
        ctx.lineTo(len * 0.85, rad * 0.55);
        ctx.quadraticCurveTo(len * 0.9, rad * 0.45, len + 2, 0);
        ctx.fill();

        // Body segment bands (separation rings)
        ctx.strokeStyle = flash ? 'rgba(255,255,255,0.3)' : 'rgba(40,15,15,0.5)';
        ctx.lineWidth = 1;
        for (const bx of [len * 0.15, -len * 0.05, -len * 0.2]) {
          ctx.beginPath();
          ctx.moveTo(bx, -rad); ctx.lineTo(bx, rad);
          ctx.stroke();
        }
        // Warhead/body junction ring
        ctx.fillStyle = flash ? 'rgba(255,255,255,0.3)' : 'rgba(60,20,20,0.6)';
        ctx.fillRect(len * 0.58, -rad - 0.5, 2.5, rad * 2 + 1);

        // Specular highlight (cylinder reflection)
        ctx.fillStyle = 'rgba(255,200,200,0.12)';
        ctx.fillRect(-len * 0.3, -rad + 1, len * 0.8, 1.5);

        // Stabilizer fins (4 fins, we show 2 visible)
        const finGrad = ctx.createLinearGradient(0, -rad - 5, 0, -rad);
        finGrad.addColorStop(0, flash ? '#ddd' : '#661818');
        finGrad.addColorStop(1, flash ? '#eee' : '#882828');
        ctx.fillStyle = finGrad;
        // Top fin
        ctx.beginPath();
        ctx.moveTo(-len * 0.32, -rad);
        ctx.lineTo(-len * 0.42, -rad - 6);
        ctx.lineTo(-len * 0.28, -rad - 5);
        ctx.lineTo(-len * 0.2, -rad);
        ctx.closePath();
        ctx.fill();
        // Bottom fin
        ctx.beginPath();
        ctx.moveTo(-len * 0.32, rad);
        ctx.lineTo(-len * 0.42, rad + 6);
        ctx.lineTo(-len * 0.28, rad + 5);
        ctx.lineTo(-len * 0.2, rad);
        ctx.closePath();
        ctx.fill();

      } else {
        // === ROCKET (Qassam / Grad style) ===
        // Main body — steel tube with 3D cylinder shading
        const bodyGrad = ctx.createLinearGradient(0, -rad, 0, rad);
        bodyGrad.addColorStop(0, flash ? '#fff' : '#6a6a6a');
        bodyGrad.addColorStop(0.15, flash ? '#eee' : '#8a8a88');
        bodyGrad.addColorStop(0.35, flash ? '#ddd' : '#9a9a96');
        bodyGrad.addColorStop(0.5, flash ? '#ccc' : '#8a8a86');
        bodyGrad.addColorStop(0.7, flash ? '#bbb' : '#6a6a66');
        bodyGrad.addColorStop(1, flash ? '#aaa' : '#4a4a48');
        ctx.fillStyle = bodyGrad;
        ctx.beginPath();
        ctx.moveTo(len * 0.55, -rad);
        ctx.lineTo(-len * 0.35, -rad);
        ctx.lineTo(-len * 0.38, -rad * 0.6);
        ctx.lineTo(-len * 0.38, rad * 0.6);
        ctx.lineTo(-len * 0.35, rad);
        ctx.lineTo(len * 0.55, rad);
        ctx.closePath();
        ctx.fill();

        // Warhead (ogive nose section — slightly darker)
        const noseGrad = ctx.createLinearGradient(0, -rad * 0.85, 0, rad * 0.85);
        noseGrad.addColorStop(0, flash ? '#ddd' : '#5a5a58');
        noseGrad.addColorStop(0.5, flash ? '#ccc' : '#6a6a66');
        noseGrad.addColorStop(1, flash ? '#bbb' : '#4a4a46');
        ctx.fillStyle = noseGrad;
        ctx.beginPath();
        ctx.moveTo(len + 3, 0);
        ctx.quadraticCurveTo(len * 0.7, -rad * 0.75, len * 0.55, -rad);
        ctx.lineTo(len * 0.55, rad);
        ctx.quadraticCurveTo(len * 0.7, rad * 0.75, len + 3, 0);
        ctx.fill();

        // Body weld seam / segment line
        ctx.strokeStyle = flash ? 'rgba(255,255,255,0.2)' : 'rgba(30,30,28,0.35)';
        ctx.lineWidth = 0.7;
        ctx.beginPath();
        ctx.moveTo(len * 0.1, -rad); ctx.lineTo(len * 0.1, rad);
        ctx.moveTo(-len * 0.15, -rad); ctx.lineTo(-len * 0.15, rad);
        ctx.stroke();
        // Warhead junction
        ctx.fillStyle = flash ? 'rgba(255,255,255,0.2)' : 'rgba(40,40,38,0.4)';
        ctx.fillRect(len * 0.53, -rad - 0.3, 1.5, rad * 2 + 0.6);

        // Specular highlight
        ctx.fillStyle = 'rgba(255,255,255,0.1)';
        ctx.fillRect(-len * 0.3, -rad + 0.8, len * 0.7, 1);

        // Stabilizer fins (sheet metal — crude)
        ctx.fillStyle = flash ? '#ccc' : '#505050';
        // Top fin
        ctx.beginPath();
        ctx.moveTo(-len * 0.3, -rad);
        ctx.lineTo(-len * 0.38, -rad - 4.5);
        ctx.lineTo(-len * 0.25, -rad - 3.5);
        ctx.lineTo(-len * 0.18, -rad);
        ctx.closePath();
        ctx.fill();
        // Bottom fin
        ctx.beginPath();
        ctx.moveTo(-len * 0.3, rad);
        ctx.lineTo(-len * 0.38, rad + 4.5);
        ctx.lineTo(-len * 0.25, rad + 3.5);
        ctx.lineTo(-len * 0.18, rad);
        ctx.closePath();
        ctx.fill();
        // Fin edge highlight
        ctx.strokeStyle = flash ? 'rgba(255,255,255,0.3)' : 'rgba(120,120,115,0.4)';
        ctx.lineWidth = 0.5;
        ctx.beginPath();
        ctx.moveTo(-len * 0.3, -rad); ctx.lineTo(-len * 0.38, -rad - 4.5);
        ctx.moveTo(-len * 0.3, rad); ctx.lineTo(-len * 0.38, rad + 4.5);
        ctx.stroke();
      }

      // Engine flame — multi-layer with flicker
      const nozzleX = isBallistic ? -len*0.4 : -len*0.38;
      const flickerSeed = frame * 0.15 + m.x * 0.1;
      const flickerW = 0.7 + Math.sin(flickerSeed) * 0.15 + Math.sin(flickerSeed*2.3) * 0.1 + Math.random()*0.15;
      const baseFlameLen = isBallistic ? 18 : 12;
      const flameLen = baseFlameLen + Math.sin(flickerSeed*1.7)*4 + Math.random()*4;
      const nozzleRad = rad * 0.65;

      // Layer 1: Outer red/dark glow (widest, faintest)
      const outerLen = flameLen * 1.15;
      const outerW = nozzleRad * flickerW * 1.3;
      const outerGrd = ctx.createLinearGradient(nozzleX, 0, nozzleX - outerLen, 0);
      outerGrd.addColorStop(0, isBallistic ? 'rgba(255,60,20,0.5)' : 'rgba(255,80,30,0.4)');
      outerGrd.addColorStop(0.4, isBallistic ? 'rgba(200,20,0,0.3)' : 'rgba(200,40,0,0.25)');
      outerGrd.addColorStop(1, 'rgba(80,10,0,0)');
      ctx.fillStyle = outerGrd;
      ctx.beginPath();
      ctx.moveTo(nozzleX, -outerW);
      ctx.quadraticCurveTo(nozzleX - outerLen*0.3, -outerW*0.8, nozzleX - outerLen*0.6, -outerW*0.3);
      ctx.quadraticCurveTo(nozzleX - outerLen*0.85, 0, nozzleX - outerLen, 0);
      ctx.quadraticCurveTo(nozzleX - outerLen*0.85, 0, nozzleX - outerLen*0.6, outerW*0.3);
      ctx.quadraticCurveTo(nozzleX - outerLen*0.3, outerW*0.8, nozzleX, outerW);
      ctx.closePath();
      ctx.fill();

      // Layer 2: Orange mid flame
      const midLen = flameLen * 0.85;
      const midW = nozzleRad * flickerW * 1.0;
      const midGrd = ctx.createLinearGradient(nozzleX, 0, nozzleX - midLen, 0);
      midGrd.addColorStop(0, 'rgba(255,200,80,0.9)');
      midGrd.addColorStop(0.35, 'rgba(255,140,30,0.7)');
      midGrd.addColorStop(0.7, isBallistic ? 'rgba(255,60,10,0.35)' : 'rgba(255,80,20,0.3)');
      midGrd.addColorStop(1, 'rgba(255,40,0,0)');
      ctx.fillStyle = midGrd;
      ctx.beginPath();
      ctx.moveTo(nozzleX, -midW);
      ctx.quadraticCurveTo(nozzleX - midLen*0.4, -midW*0.6, nozzleX - midLen, 0);
      ctx.quadraticCurveTo(nozzleX - midLen*0.4, midW*0.6, nozzleX, midW);
      ctx.closePath();
      ctx.fill();

      // Layer 3: Yellow inner flame
      const innerLen = flameLen * 0.55;
      const innerW = nozzleRad * flickerW * 0.7;
      const innerGrd = ctx.createLinearGradient(nozzleX, 0, nozzleX - innerLen, 0);
      innerGrd.addColorStop(0, 'rgba(255,255,180,0.95)');
      innerGrd.addColorStop(0.5, 'rgba(255,220,80,0.7)');
      innerGrd.addColorStop(1, 'rgba(255,180,40,0)');
      ctx.fillStyle = innerGrd;
      ctx.beginPath();
      ctx.moveTo(nozzleX, -innerW);
      ctx.quadraticCurveTo(nozzleX - innerLen*0.5, -innerW*0.4, nozzleX - innerLen, 0);
      ctx.quadraticCurveTo(nozzleX - innerLen*0.5, innerW*0.4, nozzleX, innerW);
      ctx.closePath();
      ctx.fill();

      // Layer 4: White-hot core (brightest, smallest)
      const coreLen = flameLen * 0.25;
      const coreW = nozzleRad * 0.4;
      ctx.fillStyle = 'rgba(255,255,240,0.9)';
      ctx.beginPath();
      ctx.moveTo(nozzleX, -coreW);
      ctx.quadraticCurveTo(nozzleX - coreLen*0.5, 0, nozzleX - coreLen, 0);
      ctx.quadraticCurveTo(nozzleX - coreLen*0.5, 0, nozzleX, coreW);
      ctx.closePath();
      ctx.fill();

      // Nozzle glow ring
      ctx.strokeStyle = 'rgba(255,200,100,0.4)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.arc(nozzleX, 0, nozzleRad * 0.9, -Math.PI*0.5, Math.PI*0.5);
      ctx.stroke();

      // Ballistic: HP indicator ring
      if (isBallistic && m.hp < m.maxHP) {
        ctx.strokeStyle = 'rgba(255,100,100,0.6)';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(0, 0, rad + 8, -Math.PI/2, -Math.PI/2 + (m.hp/m.maxHP)*Math.PI*2);
        ctx.stroke();
      }
    }

    ctx.restore();

    // Glow around missile
    const glowColor = isBallistic ? 'rgba(255,50,50,0.08)' : isDrone ? 'rgba(80,150,255,0.06)' : isDecoy ? 'rgba(255,180,0,0.1)' : 'rgba(255,120,40,0.05)';
    const glowR = isBallistic ? 18 : isDrone ? 14 : isDecoy ? 6 : 12;
    ctx.fillStyle = glowColor;
    ctx.beginPath();
    ctx.arc(m.x, m.y, glowR, 0, Math.PI*2);
    ctx.fill();
  });

  // Interceptors (Tamir missiles)
  interceptors.forEach(ic => {
    // Trail - bright engine exhaust with glow
    ic.trail.forEach((t, idx) => {
      const alpha = (idx / ic.trail.length);
      // Outer glow trail
      ctx.fillStyle = `rgba(100, 180, 255, ${alpha * 0.08})`;
      ctx.beginPath();
      ctx.arc(t.x, t.y, 4 + alpha*3, 0, Math.PI*2);
      ctx.fill();
      // Inner bright trail
      ctx.fillStyle = `rgba(180, 230, 255, ${alpha * 0.65})`;
      ctx.beginPath();
      ctx.arc(t.x, t.y, 1.2 + alpha*1.2, 0, Math.PI*2);
      ctx.fill();
    });

    const angle = Math.atan2(ic.vy, ic.vx);
    ctx.save();
    ctx.translate(ic.x, ic.y);
    ctx.rotate(angle);

    // === Tamir Interceptor (realistic) ===
    // Main body — slender white cylinder with 3D shading
    const tBodyGrad = ctx.createLinearGradient(0, -2, 0, 2);
    tBodyGrad.addColorStop(0, '#c8d4dc');
    tBodyGrad.addColorStop(0.2, '#dde8ee');
    tBodyGrad.addColorStop(0.4, '#e8f0f4');
    tBodyGrad.addColorStop(0.6, '#d4dee6');
    tBodyGrad.addColorStop(0.85, '#b8c4cc');
    tBodyGrad.addColorStop(1, '#a0abb5');
    ctx.fillStyle = tBodyGrad;
    ctx.beginPath();
    ctx.moveTo(6, -1.8);
    ctx.lineTo(-6, -1.8);
    ctx.lineTo(-6.5, -1.2);
    ctx.lineTo(-6.5, 1.2);
    ctx.lineTo(-6, 1.8);
    ctx.lineTo(6, 1.8);
    ctx.closePath();
    ctx.fill();

    // Seeker dome (dark nose cone)
    ctx.fillStyle = '#556';
    ctx.beginPath();
    ctx.moveTo(10, 0);
    ctx.quadraticCurveTo(8, -1.2, 6, -1.8);
    ctx.lineTo(6, 1.8);
    ctx.quadraticCurveTo(8, 1.2, 10, 0);
    ctx.fill();
    // Seeker ring
    ctx.strokeStyle = 'rgba(100,120,140,0.5)';
    ctx.lineWidth = 0.6;
    ctx.beginPath();
    ctx.moveTo(6.2, -1.7); ctx.lineTo(6.2, 1.7);
    ctx.stroke();

    // Canard fins (small, near nose)
    ctx.fillStyle = '#99aabb';
    ctx.beginPath();
    ctx.moveTo(4, -1.8); ctx.lineTo(3.5, -3.5); ctx.lineTo(2, -3); ctx.lineTo(2.5, -1.8);
    ctx.closePath(); ctx.fill();
    ctx.beginPath();
    ctx.moveTo(4, 1.8); ctx.lineTo(3.5, 3.5); ctx.lineTo(2, 3); ctx.lineTo(2.5, 1.8);
    ctx.closePath(); ctx.fill();

    // Tail fins (cruciform, larger)
    ctx.fillStyle = '#8a9aaa';
    ctx.beginPath();
    ctx.moveTo(-4.5, -1.8); ctx.lineTo(-5.5, -4.5); ctx.lineTo(-3.5, -4); ctx.lineTo(-3, -1.8);
    ctx.closePath(); ctx.fill();
    ctx.beginPath();
    ctx.moveTo(-4.5, 1.8); ctx.lineTo(-5.5, 4.5); ctx.lineTo(-3.5, 4); ctx.lineTo(-3, 1.8);
    ctx.closePath(); ctx.fill();

    // Body band (mid-section marking)
    ctx.fillStyle = 'rgba(80,100,120,0.25)';
    ctx.fillRect(-1, -1.9, 1.5, 3.8);

    // Specular highlight
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    ctx.fillRect(-5, -1.6, 9, 0.8);

    // Engine nozzle
    ctx.fillStyle = '#445';
    ctx.fillRect(-6.5, -1.3, 1.5, 2.6);

    // Engine exhaust — bright blue-white pulse motor
    ctx.fillStyle = 'rgba(180,230,255,0.95)';
    ctx.beginPath();
    ctx.arc(-7, 0, 2.2, 0, Math.PI*2);
    ctx.fill();
    const exLen = 8 + Math.random()*5;
    const exGrad = ctx.createLinearGradient(-7, 0, -7-exLen, 0);
    exGrad.addColorStop(0, 'rgba(220,245,255,0.9)');
    exGrad.addColorStop(0.3, 'rgba(150,210,255,0.6)');
    exGrad.addColorStop(0.6, 'rgba(80,150,255,0.3)');
    exGrad.addColorStop(1, 'rgba(40,80,255,0)');
    ctx.fillStyle = exGrad;
    ctx.beginPath();
    ctx.moveTo(-7, -2);
    ctx.quadraticCurveTo(-7 - exLen*0.5, -1, -7 - exLen, 0);
    ctx.quadraticCurveTo(-7 - exLen*0.5, 1, -7, 2);
    ctx.closePath();
    ctx.fill();
    // White-hot core
    const coreEx = exLen * 0.3;
    ctx.fillStyle = 'rgba(240,250,255,0.8)';
    ctx.beginPath();
    ctx.moveTo(-7, -0.8);
    ctx.quadraticCurveTo(-7 - coreEx*0.5, 0, -7 - coreEx, 0);
    ctx.quadraticCurveTo(-7 - coreEx*0.5, 0, -7, 0.8);
    ctx.closePath();
    ctx.fill();

    ctx.restore();

    // Glow - larger, more visible
    const iglow = ctx.createRadialGradient(ic.x, ic.y, 0, ic.x, ic.y, 16);
    iglow.addColorStop(0, 'rgba(150,230,255,0.12)');
    iglow.addColorStop(0.5, 'rgba(100,180,255,0.05)');
    iglow.addColorStop(1, 'rgba(50,100,255,0)');
    ctx.fillStyle = iglow;
    ctx.beginPath();
    ctx.arc(ic.x, ic.y, 16, 0, Math.PI*2);
    ctx.fill();
  });

  // Explosions — multi-layer with shockwave ring and asymmetric shape
  explosions.forEach(e => {
    if (e.delay && e.delay > 0) return; // skip delayed fireballs
    const ax = e.asymX || 0;
    const ay = e.asymY || 0;
    const cx = e.x + ax * (e.radius / (e.maxR || 38));
    const cy = e.y + ay * (e.radius / (e.maxR || 38));

    // Shockwave ring (fast-expanding, fading thin circle)
    if (e.shockMaxR > 0 && e.shockAlpha > 0.02 && e.shockR < e.shockMaxR) {
      ctx.strokeStyle = `rgba(255,240,200,${e.shockAlpha})`;
      ctx.lineWidth = Math.max(0.5, 2.5 - e.shockR * 0.02);
      ctx.beginPath();
      ctx.arc(e.x, e.y, e.shockR, 0, Math.PI*2);
      ctx.stroke();
      // Faint fill inside shockwave
      ctx.fillStyle = `rgba(255,220,180,${e.shockAlpha * 0.04})`;
      ctx.beginPath();
      ctx.arc(e.x, e.y, e.shockR, 0, Math.PI*2);
      ctx.fill();
    }

    // Outer soft glow — large atmospheric haze
    const outerR = e.radius * 1.5;
    const outerGlow = ctx.createRadialGradient(cx, cy, e.radius*0.3, cx, cy, outerR);
    outerGlow.addColorStop(0, `rgba(255,180,80,${e.alpha*0.15})`);
    outerGlow.addColorStop(0.5, `rgba(255,120,40,${e.alpha*0.06})`);
    outerGlow.addColorStop(1, 'rgba(255,60,10,0)');
    ctx.fillStyle = outerGlow;
    ctx.beginPath();
    ctx.arc(cx, cy, outerR, 0, Math.PI*2);
    ctx.fill();

    // Main fireball — asymmetric center, multi-stop gradient
    const grad = ctx.createRadialGradient(cx, cy, 0, e.x, e.y, e.radius);
    grad.addColorStop(0, `rgba(255,255,240,${e.alpha*0.95})`);
    grad.addColorStop(0.1, `rgba(255,255,200,${e.alpha*0.85})`);
    grad.addColorStop(0.25, `rgba(255,220,100,${e.alpha*0.65})`);
    grad.addColorStop(0.45, `rgba(255,160,40,${e.alpha*0.45})`);
    grad.addColorStop(0.65, `rgba(255,80,15,${e.alpha*0.25})`);
    grad.addColorStop(0.82, `rgba(180,30,0,${e.alpha*0.1})`);
    grad.addColorStop(1, 'rgba(60,10,0,0)');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(e.x, e.y, e.radius, 0, Math.PI*2);
    ctx.fill();

    // Internal bright flash (early frames only)
    if (e.flashTimer > 0) {
      const flashA = (e.flashTimer / 8) * e.alpha;
      const flashR = e.radius * 0.4;
      const flashGrd = ctx.createRadialGradient(cx, cy, 0, cx, cy, flashR);
      flashGrd.addColorStop(0, `rgba(255,255,255,${flashA * 0.8})`);
      flashGrd.addColorStop(0.5, `rgba(255,255,200,${flashA * 0.4})`);
      flashGrd.addColorStop(1, 'rgba(255,240,180,0)');
      ctx.fillStyle = flashGrd;
      ctx.beginPath();
      ctx.arc(cx, cy, flashR, 0, Math.PI*2);
      ctx.fill();
    }
  });

  particles.forEach(p => {
    const pAlpha = Math.max(0, p.life / p.maxLife);
    if (p.isSpark) {
      // Spark streaks — elongated in direction of motion (motion blur)
      const speed = Math.sqrt(p.vx*p.vx + p.vy*p.vy);
      const streakLen = Math.min(speed * 2.5, 12);
      const angle = Math.atan2(p.vy, p.vx);
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(angle);
      ctx.globalAlpha = pAlpha;
      // Bright core
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.ellipse(0, 0, streakLen, p.size * 0.5, 0, 0, Math.PI*2);
      ctx.fill();
      // Warm glow
      ctx.fillStyle = `rgba(255,220,150,${pAlpha*0.4})`;
      ctx.beginPath();
      ctx.ellipse(0, 0, streakLen * 1.3, p.size * 1.2, 0, 0, Math.PI*2);
      ctx.fill();
      ctx.restore();
    } else if (p.size > 1.5) {
      // Larger particles get soft radial gradient
      const pg = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.size);
      pg.addColorStop(0, p.color);
      pg.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.globalAlpha = pAlpha;
      ctx.fillStyle = pg;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size * 1.3, 0, Math.PI*2);
      ctx.fill();
    } else {
      ctx.globalAlpha = pAlpha;
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
      ctx.fill();
    }
  });
  ctx.globalAlpha = 1;

  // Iron Dome Battery
  ctx.drawImage(batteryCanvas, batteryX - 90, batteryY - 65, 180, 100);
  drawLauncherTubes(batteryAngle);

  // Muzzle flash
  if (interceptors.length > 0) {
    const last = interceptors[interceptors.length - 1];
    const age = Math.sqrt((last.x-batteryX)**2 + (last.y-batteryY)**2);
    if (age < 40) {
      const flashAlpha = (1 - age/40) * 0.6;
      const fx = batteryX + Math.cos(batteryAngle)*55;
      const fy = batteryY + Math.sin(batteryAngle)*55;
      ctx.fillStyle = `rgba(180, 240, 255, ${flashAlpha})`;
      ctx.beginPath();
      ctx.arc(fx, fy, 8 + (1-age/40)*5, 0, Math.PI*2);
      ctx.fill();
      ctx.fillStyle = `rgba(255, 255, 255, ${flashAlpha * 0.5})`;
      ctx.beginPath();
      ctx.arc(fx, fy, 4, 0, Math.PI*2);
      ctx.fill();
    }
  }

  // Battery label
  ctx.fillStyle = 'rgba(130, 190, 130, 0.7)';
  ctx.font = 'bold 10px Arial';
  ctx.textAlign = 'center';
  ctx.fillText(t('batteryLabel'), batteryX, batteryY + 42);

  // Floating texts
  floatingTexts.forEach(ft => {
    const alpha = ft.life / ft.maxLife;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = ft.color;
    ctx.font = `bold ${ft.size}px Arial`;
    ctx.textAlign = 'center';
    ctx.shadowColor = 'rgba(0,0,0,0.5)';
    ctx.shadowBlur = 4;
    ctx.fillText(ft.text, ft.x, ft.y);
    ctx.shadowBlur = 0;
  });
  ctx.globalAlpha = 1;

  // Enemy type first-appearance alert
  if (enemyAlert && enemyAlert.timer > 0) {
    const ea = enemyAlert;
    const eaAlpha = Math.min(1, ea.timer / 30); // fade out in last 0.5s
    ctx.save();
    ctx.globalAlpha = eaAlpha;
    ctx.fillStyle = ea.color;
    ctx.font = `bold ${fz(20)}px Arial`;
    ctx.textAlign = 'center';
    ctx.shadowColor = 'rgba(0,0,0,0.7)';
    ctx.shadowBlur = 10;
    ctx.fillText(ea.text, W/2, H * 0.28);
    ctx.shadowBlur = 0;
    ctx.globalAlpha = 1;
    ctx.restore();
  }

  // HUD
  // Power-ups floating
  // Defense system beam/projectile rendering (placeholder — Designer will polish)
  if (activeDefenseSystem && defenseSystemTarget) {
    const t2 = defenseSystemTarget;
    if (activeDefenseSystem === 'iron_beam') {
      // Cyan laser beam from battery to target
      ctx.save();
      ctx.strokeStyle = '#00ffff';
      ctx.lineWidth = 3;
      ctx.shadowColor = '#00ffff';
      ctx.shadowBlur = 15;
      ctx.globalAlpha = 0.7 + Math.sin(frame * 0.3) * 0.3;
      ctx.beginPath();
      ctx.moveTo(batteryX, batteryY - 30);
      ctx.lineTo(t2.x, t2.y);
      ctx.stroke();
      ctx.globalAlpha = 1;
      ctx.restore();
    } else {
      // David's Sling — large projectile heading to target
      const dx = t2.x - batteryX, dy = t2.y - (batteryY - 30);
      const angle = Math.atan2(dy, dx);
      ctx.save();
      ctx.translate(t2.x - Math.cos(angle) * 20, t2.y - Math.sin(angle) * 20);
      ctx.rotate(angle);
      ctx.fillStyle = '#ff8800';
      ctx.fillRect(-8, -3, 16, 6);
      ctx.fillStyle = '#ffcc44';
      ctx.fillRect(-12, -2, 4, 4);
      ctx.restore();
    }
  }

  // Kill feed now rendered inside drawHUD()

  if (state === 'playing') {
    drawHUD();
    drawWaveTransition();
    drawSirenIntro();
    drawCityIntro();
  }

  ctx.restore();

  // Screen flash
  if (screenFlash > 0) {
    ctx.fillStyle = `rgba(255,255,255,${screenFlash})`;
    ctx.fillRect(0, 0, W, H);
  }

  // Subtle vignette for cinematic depth
  const vignGrad = ctx.createRadialGradient(W/2, H/2, Math.min(W,H)*0.35, W/2, H/2, Math.max(W,H)*0.75);
  vignGrad.addColorStop(0, 'rgba(0,0,0,0)');
  vignGrad.addColorStop(1, 'rgba(0,0,0,0.25)');
  ctx.fillStyle = vignGrad;
  ctx.fillRect(0, 0, W, H);

  // Pause overlay
  if (state === 'playing' && paused) {
    ctx.fillStyle = 'rgba(0,0,10,0.7)';
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#fff';
    ctx.font = `bold ${fz(32)}px Arial`;
    ctx.textAlign = 'center';
    ctx.fillText(t('paused'), W/2, H/2 - fz(15));
    // Resume button
    const rbW = fz(180), rbH = fz(46);
    const rbX = W/2 - rbW/2, rbY = H/2 + fz(5);
    const rbGrad = ctx.createLinearGradient(0, rbY, 0, rbY + rbH);
    rbGrad.addColorStop(0, '#00bb55');
    rbGrad.addColorStop(1, '#008833');
    ctx.fillStyle = rbGrad;
    ctx.beginPath(); ctx.roundRect(rbX, rbY, rbW, rbH, 10); ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.font = `bold ${fz(18)}px Arial`;
    ctx.fillText(t('resume'), W/2, rbY + rbH*0.65);
  }

  if (state === 'menu') drawMenu();
  if (state === 'nameinput') drawNameInput();
  if (state === 'gameover') drawGameOver();
  if (state === 'victory') drawVictory();
}

function drawSirenIntro() {
  if (waveState !== 'siren_intro') return;
  const progress = 1 - sirenTimer / 210;

  // Red pulsing overlay
  const pulse = Math.sin(frame * 0.2) * 0.5 + 0.5;
  ctx.fillStyle = `rgba(180, 0, 0, ${0.04 + pulse * 0.06})`;
  ctx.fillRect(0, 0, W, H);

  // Alert text
  const alpha = progress < 0.1 ? progress * 10 : progress > 0.85 ? (1-progress)/0.15 : 1;
  ctx.globalAlpha = alpha;

  ctx.fillStyle = '#ff3333';
  ctx.font = `bold ${26 + pulse * 4}px Arial`;
  ctx.textAlign = 'center';
  ctx.shadowColor = '#ff0000';
  ctx.shadowBlur = 15;
  ctx.fillText(t('sirenAlert'), W/2, H/2 - 15);
  ctx.shadowBlur = 0;

  ctx.fillStyle = '#ffaaaa';
  ctx.font = '16px Arial';
  ctx.fillText(t('sirenPrepare'), W/2, H/2 + 18);

  // First-play controls tutorial
  if (!tutorialSeen) {
    ctx.fillStyle = 'rgba(255,255,255,0.85)';
    ctx.font = `${fz(14)}px Arial`;
    ctx.shadowColor = 'rgba(0,0,0,0.6)';
    ctx.shadowBlur = 6;
    ctx.fillText(isMobile ? t('instrAim') : t('instrAimDesktop'), W/2, H/2 + 55);
    ctx.shadowBlur = 0;
  }

  ctx.globalAlpha = 1;
}

function drawCityIntro() {
  if (waveState !== 'city_intro') return;
  const progress = 1 - cityIntroTimer / 150;
  const city = CITIES[currentCityIdx];
  const cityName = city.name[currentLang] || city.name.en;

  // Dark overlay
  const fadeIn = Math.min(1, progress * 5);
  const fadeOut = cityIntroTimer < 20 ? cityIntroTimer / 20 : 1;
  const alpha = fadeIn * fadeOut;

  ctx.fillStyle = `rgba(0, 5, 20, ${0.7 * alpha})`;
  ctx.fillRect(0, 0, W, H);

  ctx.globalAlpha = alpha;
  ctx.textAlign = 'center';

  // City number indicator
  ctx.fillStyle = 'rgba(100, 180, 255, 0.6)';
  ctx.font = `bold ${fz(14)}px Arial`;
  ctx.fillText(`${currentCityIdx + 1} / ${CITIES.length}`, W/2, H/2 - fz(55));

  // "Defending" subtitle
  ctx.fillStyle = '#88bbff';
  ctx.font = `${fz(16)}px Arial`;
  ctx.fillText(t('cityDefend'), W/2, H/2 - fz(30));

  // City name - big dramatic text with glow
  const nameScale = 1 + Math.sin(progress * Math.PI) * 0.05;
  ctx.save();
  ctx.translate(W/2, H/2 + fz(5));
  ctx.scale(nameScale, nameScale);
  ctx.shadowColor = '#00aaff';
  ctx.shadowBlur = 25;
  ctx.fillStyle = '#fff';
  ctx.font = `bold ${fz(38)}px Arial`;
  ctx.fillText(cityName, 0, 0);
  ctx.shadowBlur = 0;
  ctx.restore();

  // Wave range info
  ctx.fillStyle = 'rgba(150, 200, 255, 0.5)';
  ctx.font = `${fz(13)}px Arial`;
  const waveRange = `${t('wave')} ${city.waves[0]} - ${city.waves[city.waves.length - 1]}`;
  ctx.fillText(waveRange, W/2, H/2 + fz(35));

  // Decorative dividers
  ctx.strokeStyle = `rgba(100, 200, 255, ${0.25 * alpha})`;
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(W/2 - fz(80), H/2 + fz(45));
  ctx.lineTo(W/2 + fz(80), H/2 + fz(45));
  ctx.stroke();

  // Progress bar showing city progression with glow
  const barW = fz(200), barH = fz(6);
  const barX = W/2 - barW/2, barY = H/2 + fz(55);
  ctx.fillStyle = 'rgba(40, 60, 100, 0.5)';
  ctx.beginPath(); ctx.roundRect(barX, barY, barW, barH, 3); ctx.fill();
  const cityProgress = (currentCityIdx + 1) / CITIES.length;
  ctx.save();
  ctx.shadowColor = 'rgba(0,170,255,0.4)';
  ctx.shadowBlur = 6;
  ctx.fillStyle = '#00aaff';
  ctx.beginPath(); ctx.roundRect(barX, barY, barW * cityProgress, barH, 3); ctx.fill();
  ctx.shadowBlur = 0;
  ctx.restore();
  // City dots on progress bar
  for (let ci = 0; ci < CITIES.length; ci++) {
    const dotX = barX + (barW / CITIES.length) * (ci + 0.5);
    ctx.fillStyle = ci <= currentCityIdx ? '#00ddff' : 'rgba(100,150,200,0.4)';
    ctx.beginPath(); ctx.arc(dotX, barY + barH/2, 3, 0, Math.PI*2); ctx.fill();
  }

  ctx.globalAlpha = 1;
}

function drawHUD() {
  const endRatio = cityMaxHP > 0 ? Math.max(0, 1 - cityDamage / cityMaxHP) : 1;
  const hpColors = endRatio > 0.6 ? ['#22dd77','#00aa55'] : endRatio > 0.3 ? ['#ffcc33','#dd8800'] : ['#ff5555','#cc2222'];
  const cName = CITIES[currentCityIdx] ? (CITIES[currentCityIdx].name[currentLang] || CITIES[currentCityIdx].name.en) : '';
  const displayWave = waveState === 'siren_intro' ? wave + 1 : wave;

  // ===== TOP BAR =====
  const barH = fz(38);
  ctx.fillStyle = 'rgba(0, 8, 20, 0.7)';
  ctx.fillRect(0, 0, W, barH);
  const edgeGrad = ctx.createLinearGradient(0, barH - 1, 0, barH + 1);
  edgeGrad.addColorStop(0, 'rgba(80, 160, 255, 0.12)');
  edgeGrad.addColorStop(1, 'transparent');
  ctx.fillStyle = edgeGrad;
  ctx.fillRect(0, barH - 1, W, 2);

  // -- Pause button --
  const pbS = fz(20);
  const pbX = fz(6), pbY = (barH - pbS) / 2;
  pauseBtnRect = { x: pbX, y: pbY, w: pbS, h: pbS };
  ctx.fillStyle = 'rgba(50,60,80,0.5)';
  ctx.beginPath(); ctx.roundRect(pbX, pbY, pbS, pbS, 4); ctx.fill();
  ctx.fillStyle = 'rgba(180,200,230,0.65)';
  ctx.fillRect(pbX + pbS*0.27, pbY + pbS*0.25, pbS*0.16, pbS*0.5);
  ctx.fillRect(pbX + pbS*0.57, pbY + pbS*0.25, pbS*0.16, pbS*0.5);

  // -- City + wave + HP bar --
  const ciX = pbX + pbS + fz(8);
  ctx.fillStyle = '#e0ecff';
  ctx.font = `bold ${fz(13)}px Arial`;
  ctx.textAlign = 'left';
  ctx.fillText(cName, ciX, barH * 0.42);
  const nameW = ctx.measureText(cName).width;
  ctx.fillStyle = 'rgba(120,180,240,0.6)';
  ctx.font = `bold ${fz(9)}px Arial`;
  ctx.fillText(`W${displayWave}`, ciX + nameW + fz(5), barH * 0.40);
  // HP bar
  const hpX = ciX, hpY = barH * 0.55, hpW = fz(90), hpH = fz(6);
  drawGradBar(hpX, hpY, hpW, hpH, endRatio, hpColors);
  ctx.fillStyle = endRatio > 0.3 ? 'rgba(200,220,255,0.8)' : '#ff6666';
  ctx.font = `bold ${fz(9)}px Arial`;
  ctx.textAlign = 'left';
  ctx.fillText(`${cityDamage}/${cityMaxHP}`, hpX + hpW + fz(4), hpY + hpH);
  // Shield removed — defense token system

  // -- Launcher pod ammo (center) --
  if (waveState === 'playing') {
    ctx.textAlign = 'center';
    const ammoColor = launcherReloading ? '#ffaa33' : ammo <= 5 ? '#ff4444' : 'rgba(120,190,255,0.8)';
    ctx.fillStyle = ammoColor;
    ctx.font = `bold ${fz(14)}px Arial`;
    const ammoText = launcherReloading ? t('reloading') : `${ammo}/${LAUNCHER_POD_SIZE}`;
    ctx.fillText(ammoText, W/2, barH * 0.65);
    const missilesInPlay = waveMissilesLeft + missiles.length;
    if (missilesInPlay > 0) {
      ctx.fillStyle = 'rgba(120,190,255,0.4)';
      ctx.font = `${fz(7)}px Arial`;
      ctx.fillText(`${missilesInPlay} ${t('missiles')}`, W/2, barH * 0.88);
    }
  }

  // -- Score (right, big + glowing) --
  ctx.save();
  ctx.textAlign = 'right';
  const sX = W - fz(10);
  ctx.shadowColor = 'rgba(100, 200, 255, 0.5)';
  ctx.shadowBlur = 12;
  ctx.fillStyle = '#fff';
  ctx.font = `bold ${fz(24)}px Arial`;
  ctx.fillText(`${score}`, sX, barH * 0.6);
  ctx.shadowBlur = 0;
  ctx.restore();
  ctx.fillStyle = 'rgba(150,180,220,0.4)';
  ctx.font = `bold ${fz(7)}px Arial`;
  ctx.textAlign = 'right';
  ctx.fillText(t('score').toUpperCase(), sX, barH * 0.85);

  // ===== TOKEN BANK + DEFENSE SYSTEM (below bar, left) =====
  { const py = barH + 3;
    for (let ti = 0; ti < TOKEN_BANK_MAX; ti++) { const tx = fz(8) + ti * fz(14); ctx.fillStyle = ti < tokenBank ? 'rgba(255,220,0,0.8)' : 'rgba(100,100,100,0.3)'; ctx.beginPath(); ctx.arc(tx + fz(5), py + fz(6), fz(5), 0, Math.PI*2); ctx.fill(); if (ti < tokenBank) { ctx.fillStyle = '#ffdd00'; ctx.font = `bold ${fz(6)}px Arial`; ctx.textAlign = 'center'; ctx.fillText('⚡', tx + fz(5), py + fz(8)); } }
    const progress = consecutiveHits % CONSECUTIVE_HITS_FOR_TOKEN;
    if (progress > 0 && tokenBank < TOKEN_BANK_MAX) { ctx.fillStyle = 'rgba(255,220,0,0.4)'; ctx.font = `${fz(6)}px Arial`; ctx.textAlign = 'left'; ctx.fillText(`${progress}/${CONSECUTIVE_HITS_FOR_TOKEN}`, fz(8) + TOKEN_BANK_MAX * fz(14), py + fz(8)); }
    ctx.fillStyle = 'rgba(150,200,255,0.5)'; ctx.font = `${fz(6)}px Arial`; ctx.textAlign = 'left';
    ctx.fillText(t('pressForBeam') + '  ' + t('pressForSling'), fz(8), py + fz(17));
    if (activeDefenseSystem) { const sysName = activeDefenseSystem === 'iron_beam' ? t('ironBeam') : t('davidsSling'); ctx.fillStyle = activeDefenseSystem === 'iron_beam' ? '#00ffff' : '#ff8800'; ctx.font = `bold ${fz(9)}px Arial`; ctx.fillText(`${sysName} ${defenseSystemKills}/${defenseSystemMaxKills}`, fz(8), py + fz(28)); }
    if (launcherReloading) { const rlPct = 1 - (launcherReloadTimer / launcherReloadDuration); const rlS = (launcherReloadTimer / 60).toFixed(1); ctx.fillStyle = 'rgba(255,150,50,0.3)'; ctx.fillRect(fz(8), py + fz(32), fz(60), fz(6)); ctx.fillStyle = 'rgba(255,150,50,0.8)'; ctx.fillRect(fz(8), py + fz(32), fz(60) * rlPct, fz(6)); ctx.fillStyle = '#ffaa33'; ctx.font = `bold ${fz(7)}px Arial`; ctx.fillText(`${t('reloading')} ${rlS}s`, fz(8), py + fz(47)); }
  }

  // ===== COMBO (center, bigger — resets on miss not timer) =====
  if (combo >= 2) {
    const mult = getMultiplier();
    const pulse = 1 + Math.sin(frame*0.12)*0.04;
    const cc = combo >= 10 ? '#ff55ff' : combo >= 6 ? '#ffaa00' : '#ffdd00';
    const comboLabel = mult > 1 ? `🔥 Streak: +${combo} · Bonus: ×${mult}` : `🔥 Streak: +${combo}`;
    ctx.save();
    ctx.translate(W/2, barH + fz(14));
    ctx.scale(pulse, pulse);
    ctx.font = `bold ${fz(12)}px Arial`;
    const tw = ctx.measureText(comboLabel).width;
    const pw = tw + fz(24), ph = fz(22);
    ctx.fillStyle = 'rgba(0,5,15,0.6)';
    ctx.beginPath(); ctx.roundRect(-pw/2, -ph/2, pw, ph, 10); ctx.fill();
    ctx.strokeStyle = cc + '44';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.roundRect(-pw/2, -ph/2, pw, ph, 10); ctx.stroke();
    ctx.textAlign = 'center';
    ctx.shadowColor = cc; ctx.shadowBlur = 10;
    ctx.fillStyle = cc;
    ctx.fillText(comboLabel, 0, fz(5));
    ctx.shadowBlur = 0;
    ctx.restore();
  }

  // ===== BOTTOM-LEFT: Kill Tally + Accuracy =====
  // On mobile: only show during wave transition. On desktop: always show.
  const totalKills = killCounts.rocket + killCounts.drone + killCounts.ballistic + killCounts.decoy;
  const showTally = totalKills > 0 && sirenTimer <= 0 && cityIntroTimer <= 0
    && (!isMobileDevice || waveState === 'transition');
  if (showTally) {
    const types = [
      { key: 'rocket', emoji: '🚀', label: 'Rockets' },
      { key: 'drone', emoji: '✈️', label: 'Drones' },
      { key: 'ballistic', emoji: '💣', label: 'Missiles' },
      { key: 'decoy', emoji: '🎆', label: 'Cluster Bombs' },
    ].filter(t => killCounts[t.key] > 0);

    const accuracy = shotsFired > 0 ? Math.round(shotsHit / shotsFired * 100) : 0;
    const kfLineH = fz(14);
    const kfBgW = fz(115);
    const kfBgH = (types.length + 1) * kfLineH + fz(6); // +1 for accuracy line
    // Mobile: center panel. Desktop: bottom-left.
    const kfBgX = isMobileDevice ? (W - kfBgW) / 2 : fz(6) - 4;
    const kfBgY = isMobileDevice ? (H * 0.38 - kfBgH / 2) : (GROUND_Y - fz(6) - kfBgH);
    ctx.fillStyle = 'rgba(0,5,15,0.8)';
    ctx.beginPath(); ctx.roundRect(kfBgX, kfBgY, kfBgW, kfBgH, 6); ctx.fill();
    const kfContentX = kfBgX + 6;
    types.forEach((et, i) => {
      const ey = kfBgY + fz(12) + i * kfLineH;
      ctx.font = `${fz(10)}px Arial`;
      ctx.textAlign = 'left';
      ctx.fillText(et.emoji, kfContentX, ey);
      ctx.fillStyle = '#fff';
      ctx.font = `bold ${fz(10)}px Arial`;
      ctx.fillText(`${et.label} — ${killCounts[et.key]}`, kfContentX + fz(14), ey);
    });
    // Accuracy line
    const accY = kfBgY + fz(12) + types.length * kfLineH;
    ctx.fillStyle = accuracy >= 70 ? '#44ff88' : accuracy >= 40 ? '#ffdd44' : '#ff6666';
    ctx.font = `bold ${fz(10)}px Arial`;
    ctx.textAlign = 'left';
    ctx.fillText(`🎯 ${shotsHit}/${shotsFired} — ${accuracy}%`, kfContentX, accY);
  }

  // ===== BOTTOM-RIGHT: Ammo =====
  if (sirenTimer <= 0 && cityIntroTimer <= 0) {
    const ammoRatio = maxAmmo > 0 ? ammo / maxAmmo : 0;
    const aW = fz(85), aH = fz(22);
    const aX = W - fz(6) - aW, aY = GROUND_Y - fz(8) - aH;
    ctx.fillStyle = 'rgba(0,10,25,0.6)';
    ctx.beginPath(); ctx.roundRect(aX, aY, aW, aH, 6); ctx.fill();
    // Count
    ctx.fillStyle = ammoRatio > 0.2 ? '#e0ecff' : '#ff6666';
    ctx.font = `bold ${fz(12)}px Arial`;
    ctx.textAlign = 'right';
    ctx.fillText(`🎯 ${ammo}/${maxAmmo}`, aX + aW - fz(5), aY + fz(13));
    // Bar
    drawGradBar(aX + 4, aY + aH - fz(4) - 2, aW - 8, fz(3), ammoRatio,
      ammoRatio > 0.5 ? ['#22dd77','#00aa55'] : ammoRatio > 0.2 ? ['#ffcc33','#dd8800'] : ['#ff5555','#cc2222']);
    // Out of ammo
    if (ammo <= 0 && state === 'playing' && Math.sin(frame * 0.15) > 0) {
      ctx.fillStyle = '#ff3333';
      ctx.font = `bold ${fz(12)}px Arial`;
      ctx.textAlign = 'center';
      ctx.shadowColor = 'rgba(0,0,0,0.8)'; ctx.shadowBlur = 5;
      ctx.fillText(t('outOfAmmo'), W/2, GROUND_Y - fz(30));
      ctx.shadowBlur = 0;
    }
  }

  // Crosshair — dark outline behind for contrast on all backgrounds
  if (waveState === 'playing') {
    const cx = mouseX, cy = mouseY;
    // Dark outline layer (drawn first, thicker)
    ctx.strokeStyle = 'rgba(0, 0, 0, 0.45)';
    ctx.lineWidth = 3;
    ctx.setLineDash([4, 4]);
    ctx.beginPath(); ctx.arc(cx, cy, 18, 0, Math.PI*2); ctx.stroke();
    ctx.setLineDash([]);
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(cx-12, cy); ctx.lineTo(cx-5, cy);
    ctx.moveTo(cx+5, cy); ctx.lineTo(cx+12, cy);
    ctx.moveTo(cx, cy-12); ctx.lineTo(cx, cy-5);
    ctx.moveTo(cx, cy+5); ctx.lineTo(cx, cy+12);
    ctx.stroke();
    // Green foreground layer
    ctx.strokeStyle = `rgba(100, 255, 150, ${0.5 + Math.sin(frame*0.08)*0.1})`;
    ctx.lineWidth = 1.5;
    ctx.setLineDash([4, 4]);
    ctx.beginPath(); ctx.arc(cx, cy, 18, 0, Math.PI*2); ctx.stroke();
    ctx.setLineDash([]);
    ctx.strokeStyle = 'rgba(100, 255, 150, 0.8)';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(cx-12, cy); ctx.lineTo(cx-5, cy);
    ctx.moveTo(cx+5, cy); ctx.lineTo(cx+12, cy);
    ctx.moveTo(cx, cy-12); ctx.lineTo(cx, cy-5);
    ctx.moveTo(cx, cy+5); ctx.lineTo(cx, cy+12);
    ctx.stroke();
    ctx.fillStyle = 'rgba(100, 255, 150, 0.9)';
    ctx.beginPath(); ctx.arc(cx, cy, 2, 0, Math.PI*2); ctx.fill();
  }
}

function drawWaveTransition() {
  if (waveState !== 'transition') return;
  const p = 1 - waveTransitionTimer/300;
  const alpha = p < 0.15 ? p/0.15 : p > 0.85 ? (1-p)/0.15 : 1;
  ctx.fillStyle = `rgba(0,15,30,${alpha*0.75})`;
  ctx.fillRect(0, H/2-65, W, 130);
  // Top/bottom border lines
  ctx.fillStyle = `rgba(100,200,255,${alpha*0.2})`;
  ctx.fillRect(0, H/2-65, W, 1);
  ctx.fillRect(0, H/2+64, W, 1);
  ctx.globalAlpha = alpha;
  ctx.save();
  ctx.shadowColor = 'rgba(100,200,255,0.6)';
  ctx.shadowBlur = 10;
  ctx.fillStyle = '#4ac8ff';
  ctx.font = 'bold 32px Arial';
  ctx.textAlign = 'center';
  ctx.fillText(`${t('wave')} ${wave} ${t('waveComplete')}`, W/2, H/2-18);
  ctx.shadowBlur = 0;
  ctx.restore();
  ctx.fillStyle = '#8ad8ff';
  ctx.font = '18px Arial';
  ctx.textAlign = 'center';
  const nextWave = wave + 1;
  if (nextWave <= 15) {
    ctx.fillText(`${t('nextWave')} ${nextWave}...`, W/2, H/2+12);
    // Show next city if changing
    const nextCityIdx = Math.min(Math.floor((nextWave - 1) / 3), CITIES.length - 1);
    if (nextCityIdx !== currentCityIdx) {
      const nextCity = CITIES[nextCityIdx];
      const nextCityName = nextCity.name[currentLang] || nextCity.name.en;
      ctx.save();
      ctx.shadowColor = 'rgba(255,220,50,0.5)';
      ctx.shadowBlur = 8;
      ctx.fillStyle = '#ffdd00';
      ctx.font = 'bold 18px Arial';
      ctx.fillText(`\u279C ${nextCityName}`, W/2, H/2+35);
      ctx.shadowBlur = 0;
      ctx.restore();
    }
    // Show enemy type hint for later waves
    if (nextWave >= 4) {
      const weights = getEnemyWeights(nextWave);
      let hint = '';
      if (weights.drone > 0 && nextWave === 4) hint = t('droneAlert');
      else if (weights.ballistic > 0 && nextWave === 7) hint = t('ballisticAlert');
      if (hint) {
        ctx.save();
        ctx.shadowColor = 'rgba(255,150,50,0.6)';
        ctx.shadowBlur = 8;
        ctx.fillStyle = '#ffaa44';
        ctx.font = 'bold 15px Arial';
        ctx.textAlign = 'center';
        ctx.fillText(hint, W/2, H/2+55);
        ctx.shadowBlur = 0;
        ctx.restore();
      }
    }
  }
  ctx.globalAlpha = 1;
}

function drawLangToggle(baseY) {
  const langs = [{l:'he',flag:'🇮🇱',label:'עב'},{l:'en',flag:'🇺🇸',label:'EN'},{l:'de',flag:'🇩🇪',label:'DE'}];
  const mobLT = isMobileDevice;
  const bw = mobLT ? 44 : fz(52), bh = mobLT ? 36 : fz(42), gap = mobLT ? 6 : fz(8);
  const totalW = langs.length * bw + (langs.length-1) * gap;
  const sx = W/2 - totalW/2;
  langBtnRects = [];
  langs.forEach((lang, i) => {
    const bx = sx + i * (bw + gap);
    const active = currentLang === lang.l;
    // Background
    ctx.fillStyle = active ? 'rgba(0,180,90,0.35)' : 'rgba(50,60,80,0.6)';
    ctx.beginPath(); ctx.roundRect(bx, baseY, bw, bh, 10); ctx.fill();
    if (active) {
      ctx.save();
      ctx.shadowColor = '#00cc66';
      ctx.shadowBlur = 12;
      ctx.strokeStyle = '#00ee66';
      ctx.lineWidth = 2;
      ctx.beginPath(); ctx.roundRect(bx, baseY, bw, bh, 10); ctx.stroke();
      ctx.shadowBlur = 0;
      ctx.restore();
    } else {
      ctx.strokeStyle = 'rgba(100,140,180,0.3)';
      ctx.lineWidth = 1;
      ctx.beginPath(); ctx.roundRect(bx, baseY, bw, bh, 10); ctx.stroke();
    }
    // Flag emoji (large)
    ctx.font = `${mobLT ? 20 : fz(22)}px Arial`;
    ctx.textAlign = 'center';
    ctx.fillStyle = '#fff';
    ctx.fillText(lang.flag, bx + bw/2, baseY + bh*0.48);
    // Label below flag
    ctx.fillStyle = active ? '#fff' : '#8899aa';
    ctx.font = `bold ${mobLT ? 9 : fz(10)}px Arial`;
    ctx.fillText(lang.label, bx + bw/2, baseY + bh*0.82);
    langBtnRects.push({x: bx, y: baseY, w: bw, h: bh, lang: lang.l});
  });
}

function drawLeaderboardTable(baseY) {
  const mobLB = isMobileDevice;
  const titleSz = mobLB ? 24 : fz(24);
  const entrySz = mobLB ? 18 : fz(17);
  const topSz = mobLB ? 20 : fz(19);
  const waveSz = mobLB ? 12 : fz(12);
  const rowH = mobLB ? 32 : fz(30);

  ctx.fillStyle = '#6aacee';
  ctx.font = `bold ${titleSz}px Arial`;
  ctx.textAlign = 'center';
  ctx.fillText(t('leaderboard'), W/2, baseY);
  if (leaderboardLoading) {
    ctx.fillStyle = '#888';
    ctx.font = `${entrySz}px Arial`;
    ctx.fillText('...', W/2, baseY + rowH);
    return;
  }
  if (leaderboardData.length === 0) {
    ctx.fillStyle = '#666';
    ctx.font = `${entrySz}px Arial`;
    ctx.fillText('-', W/2, baseY + rowH);
    return;
  }
